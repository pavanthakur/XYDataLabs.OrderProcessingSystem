# Production Environment - Complete Configuration
# Usage: docker-compose -f docker-compose.prod.yml --profile https up
# Purpose: Production-optimized settings, security, performance, monitoring

services:
  api-prod-http:
    image: xydatalabs-orderprocessingsystem-api-http:prod
    build:
      context: ../..
      dockerfile: XYDataLabs.OrderProcessingSystem.API/Dockerfile
      target: final
    ports:
      - "5040:5040"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5040
      - ASPNETCORE_HTTP_PORTS=5040
      - ConnectionStrings__OrderProcessingSystemDbConnection=Server=host.docker.internal,1433;Database=OrderProcessingSystem_Prod;User Id=sa;Password=${LOCAL_SQL_PASSWORD};TrustServerCertificate=True;
      - DedicatedTenantConnectionStrings__TenantC=Server=host.docker.internal,1433;Database=OrderProcessingSystem_TenantC_Prod;User Id=sa;Password=${LOCAL_SQL_PASSWORD};TrustServerCertificate=True;
      - OpenPay__MerchantId=${LOCAL_OPENPAY_MERCHANT_ID}
      - OpenPay__PrivateKey=${LOCAL_OPENPAY_PRIVATE_KEY}
      - OpenPay__DeviceSessionId=${LOCAL_OPENPAY_DEVICE_SESSION_ID}
      - USE_HTTPS=false
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__System=Error
    volumes:
      - ../../logs:/logs
      - ../../Resources/Certificates/aspnetapp.pfx:/https/aspnetapp.pfx:ro
      - ../../Resources/Configuration/sharedsettings.prod.json:/app/Resources/Configuration/sharedsettings.prod.json:ro
    networks:
      - xy-prod-network
      - xy-database-network
    profiles: ["http", "all", "api"]
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: curl --fail http://localhost:5040/api/v1/info/runtime-configuration --insecure || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  api-prod-https:
    image: xydatalabs-orderprocessingsystem-api-https:prod
    build:
      context: ../..
      dockerfile: XYDataLabs.OrderProcessingSystem.API/Dockerfile
      target: final
    ports:
      - "5041:5041"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:5041
      - ASPNETCORE_HTTPS_PORTS=5041
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${LOCAL_CERT_PASSWORD}
      - ApiSettings__API__https__CertPassword=${LOCAL_CERT_PASSWORD}
      - ConnectionStrings__OrderProcessingSystemDbConnection=Server=host.docker.internal,1433;Database=OrderProcessingSystem_Prod;User Id=sa;Password=${LOCAL_SQL_PASSWORD};TrustServerCertificate=True;
      - DedicatedTenantConnectionStrings__TenantC=Server=host.docker.internal,1433;Database=OrderProcessingSystem_TenantC_Prod;User Id=sa;Password=${LOCAL_SQL_PASSWORD};TrustServerCertificate=True;
      - OpenPay__MerchantId=${LOCAL_OPENPAY_MERCHANT_ID}
      - OpenPay__PrivateKey=${LOCAL_OPENPAY_PRIVATE_KEY}
      - OpenPay__DeviceSessionId=${LOCAL_OPENPAY_DEVICE_SESSION_ID}
      - USE_HTTPS=true
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__System=Error
    volumes:
      - ../../logs:/logs
      - ../../Resources/Certificates/aspnetapp.pfx:/https/aspnetapp.pfx:ro
      - ../../Resources/Configuration/sharedsettings.prod.json:/app/Resources/Configuration/sharedsettings.prod.json:ro
    networks:
      - xy-prod-network
      - xy-database-network
    profiles: ["https", "all", "api-https"]
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: curl --fail https://localhost:5041/api/v1/info/runtime-configuration --insecure || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui-prod-http:
    image: xydatalabs-orderprocessingsystem-ui-http:prod
    build:
      context: ../..
      dockerfile: frontend/apps/web/Dockerfile
      target: final
      args:
        VITE_ORDERPROCESSING_API_BASE_URL: http://localhost:5040
    ports:
      - "5042:5042"
    environment:
      - HOST=0.0.0.0
      - PORT=5042
      - USE_HTTPS=false
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__System=Error
    volumes:
      - ../../Resources/Configuration/sharedsettings.prod.json:/app/Resources/Configuration/sharedsettings.prod.json:ro
    networks:
      - xy-prod-network
    profiles: ["http", "all", "ui"]
    depends_on:
      api-prod-http:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: curl --fail http://localhost:5042/customers --insecure || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui-prod-https:
    image: xydatalabs-orderprocessingsystem-ui-https:prod
    build:
      context: ../..
      dockerfile: frontend/apps/web/Dockerfile
      target: final
      args:
        VITE_ORDERPROCESSING_API_BASE_URL: https://localhost:5041
    ports:
      - "5043:5043"
    environment:
      - HOST=0.0.0.0
      - PORT=5043
      - USE_HTTPS=true
      - PFX_PATH=/https/aspnetapp.pfx
      - PFX_PASSWORD=${LOCAL_CERT_PASSWORD}
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__System=Error
    volumes:
      - ../../Resources/Certificates/aspnetapp.pfx:/https/aspnetapp.pfx:ro
      - ../../Resources/Configuration/sharedsettings.prod.json:/app/Resources/Configuration/sharedsettings.prod.json:ro
    networks:
      - xy-prod-network
    profiles: ["https", "all", "ui-https"]
    depends_on:
      api-prod-https:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: curl --fail https://localhost:5043/customers --insecure || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

# Production networking with enhanced security
networks:
  xy-prod-network:
    external: true
    driver_opts:
      encrypted: "true"
  xy-database-network:
    external: true
