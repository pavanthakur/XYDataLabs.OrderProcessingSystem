name: Deploy Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      location:
        description: 'Azure region'
        required: true
        default: 'centralindia'
        type: string
      appServiceSku:
        description: 'App Service SKU'
        required: true
        default: 'F1'
        type: choice
        options:
          - F1
          - B1
          - B2
          - S1
          - P1v3
      enableIdentity:
        description: 'Enable OIDC identity provisioning'
        required: true
        default: true
        type: boolean
      dryRun:
        description: 'Dry run (what-if only)'
        required: true
        default: true
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  pre-validate:
    name: Pre-Deployment Validation
    # Intentionally independent of the `validate` job — on dryRun=false, `validate` is skipped
    # by its own condition and `pre-validate` runs alone. They never race because `validate`
    # only runs when dryRun=true (mutually exclusive with this job's condition).
    if: github.event_name == 'workflow_dispatch' && !inputs.dryRun
    uses: ./.github/workflows/validate-deployment.yml
    with:
      environment: ${{ inputs.environment }}
      run-whatif: true
      verify-oidc: false
      check-config: false  # SharedSettings are app config, not infra — drift here must not block Bicep deployment
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      AZURE_TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

  validate:
    name: Bicep What-If (Dry Run)
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.dryRun)
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "location=${{ inputs.location }}" >> $GITHUB_OUTPUT
            echo "sku=${{ inputs.appServiceSku }}" >> $GITHUB_OUTPUT
            echo "identity=${{ inputs.enableIdentity }}" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "location=centralindia" >> $GITHUB_OUTPUT
            echo "file=infra/parameters/dev.json" >> $GITHUB_OUTPUT
          fi
      
      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
      
      - name: What-If (subscription scope)
        run: |
          ENV=${{ steps.params.outputs.env }}
          LOCATION=${{ steps.params.outputs.location }}

          # Resolve param file and KV name (staging uses 'stg' suffix in Azure resource names)
          if [ "$ENV" = "staging" ]; then ENV_SUFFIX="stg"; else ENV_SUFFIX="$ENV"; fi
          PARAM_FILE="infra/parameters/${ENV}.json"
          KV_NAME="kv-orderprocessing-${ENV_SUFFIX}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Detect whether Key Vault (and therefore bootstrap) already exists for this environment
            KV_ID=$(az keyvault show --name "$KV_NAME" --query id -o tsv 2>/dev/null || true)
            if [ -n "$KV_ID" ]; then
              echo "Key Vault '$KV_NAME' found — using parameter file (KV reference resolves for sqlAdminPassword)"
              az deployment sub what-if \
                --location "$LOCATION" \
                --template-file infra/main.bicep \
                --parameters @"${PARAM_FILE}"
            else
              echo "Key Vault '$KV_NAME' not found — bootstrap not yet run; using placeholder for sqlAdminPassword (what-if only, nothing deployed)"
              az deployment sub what-if \
                --location "$LOCATION" \
                --template-file infra/main.bicep \
                --parameters location="$LOCATION" \
                             environment="$ENV" \
                             baseName=orderprocessing \
                             githubOwner=${{ github.repository_owner }} \
                             appServiceSku=${{ steps.params.outputs.sku }} \
                             enableIdentity=${{ steps.params.outputs.identity }} \
                             sqlAdminPassword='WhatIfDryRunOnly1!'
            fi
          else
            # PR validation — always use parameter file
            az deployment sub what-if \
              --location "$LOCATION" \
              --template-file infra/main.bicep \
              --parameters @"${{ steps.params.outputs.file }}"
          fi

  deploy:
    name: Deploy Infrastructure
    if: github.event_name == 'workflow_dispatch' && !inputs.dryRun
    needs: pre-validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine parameters
        id: params
        run: |
          echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          echo "location=${{ inputs.location }}" >> $GITHUB_OUTPUT
          echo "sku=${{ inputs.appServiceSku }}" >> $GITHUB_OUTPUT
          echo "identity=${{ inputs.enableIdentity }}" >> $GITHUB_OUTPUT
          echo "deploymentName=infra-${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT
      
      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Enable Key Vault for template deployment
        run: |
          # ARM needs enabledForTemplateDeployment=true to resolve KV parameter references.
          # This may be false on first apply (Bicep sets it to true, but can't read the secret
          # to start the deployment unless it's already true — chicken-and-egg).
          # Bootstrap must be run before this workflow: KV is created by bootstrap, not by this Bicep.
          ENV=${{ steps.params.outputs.env }}
          if [ "$ENV" = "staging" ]; then KV_SUFFIX="stg"; else KV_SUFFIX="$ENV"; fi
          KV_NAME="kv-orderprocessing-${KV_SUFFIX}"
          KV_ID=$(az keyvault show --name "$KV_NAME" --query id -o tsv 2>/dev/null || true)
          if [ -z "$KV_ID" ]; then
            echo "ERROR: Key Vault '$KV_NAME' not found. Run 'Azure Bootstrap & Deploy' first to provision the environment before running infra deploy."
            exit 1
          fi
          echo "Enabling enabledForTemplateDeployment on $KV_NAME..."
          az keyvault update --name "$KV_NAME" --enabled-for-template-deployment true
          echo "Done."

      - name: Deploy (subscription scope)
        id: deploy
        run: |
          # Job-level if: already guarantees workflow_dispatch && !dryRun — no inner guard needed.
          # Manual deployment using parameter file (contains KV reference for sqlAdminPassword)
          ENV=${{ steps.params.outputs.env }}
          if [ "$ENV" = "staging" ]; then PARAM_FILE="infra/parameters/staging.json";
          elif [ "$ENV" = "prod" ]; then PARAM_FILE="infra/parameters/prod.json";
          else PARAM_FILE="infra/parameters/dev.json"; fi
          az deployment sub create \
            --name ${{ steps.params.outputs.deploymentName }} \
            --location ${{ steps.params.outputs.location }} \
            --template-file infra/main.bicep \
            --parameters @${PARAM_FILE} \
                         appServiceSku=${{ steps.params.outputs.sku }} \
                         enableIdentity=${{ steps.params.outputs.identity }}
      
      - name: Get Deployment Outputs
        id: outputs
        run: |
          DEPLOYMENT_NAME="${{ steps.params.outputs.deploymentName }}"
          echo "Fetching outputs for deployment: ${DEPLOYMENT_NAME}"
          
          RG_NAME=$(az deployment sub show --name ${DEPLOYMENT_NAME} --query "properties.outputs.resourceGroupName.value" -o tsv)
          API_HOST=$(az deployment sub show --name ${DEPLOYMENT_NAME} --query "properties.outputs.apiHostName.value" -o tsv)
          UI_HOST=$(az deployment sub show --name ${DEPLOYMENT_NAME} --query "properties.outputs.uiHostName.value" -o tsv)
          AI_NAME=$(az deployment sub show --name ${DEPLOYMENT_NAME} --query "properties.outputs.appInsightsName.value" -o tsv)
          
          echo "rg=${RG_NAME}" >> $GITHUB_OUTPUT
          echo "api=${API_HOST}" >> $GITHUB_OUTPUT
          echo "ui=${UI_HOST}" >> $GITHUB_OUTPUT
          echo "insights=${AI_NAME}" >> $GITHUB_OUTPUT
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.params.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** ${{ steps.params.outputs.location }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment:** ${{ steps.params.outputs.deploymentName }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Resources Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group:** ${{ steps.outputs.rg }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** https://${{ steps.outputs.api }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:** https://${{ steps.outputs.ui }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App Insights:** ${{ steps.outputs.insights }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify resources in [Azure Portal — Resource Groups](https://portal.azure.com/#view/HubsExtension/BrowseResourceGroups) — search for \`${{ steps.outputs.rg }}\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Deploy application code using API/UI workflows" >> $GITHUB_STEP_SUMMARY
          echo "3. Test endpoints above" >> $GITHUB_STEP_SUMMARY
