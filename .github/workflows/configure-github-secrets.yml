name: Configure GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment (dev, staging, prod, or all)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
          - all
      setupGitHubApp:
        description: 'Phase 0 (one-time prerequisite) — Setup GitHub App | Shows setup steps if APP_ID + APP_PRIVATE_KEY secrets are missing'
        required: true
        type: boolean
        default: false
      githubAppName:
        description: 'GitHub App Name (e.g. XYDataLabsGitHubApp or your custom app name)'
        required: false
        type: string
        default: 'XYDataLabsGitHubApp'
      configureSecrets:
        description: 'Phase 1 (one-time) — Configure Repository and Environment Secrets'
        required: true
        type: boolean
        default: true
      clientId:
        description: 'Azure OIDC Client ID (pass from bootstrap)'
        required: false
        type: string
      tenantId:
        description: 'Azure OIDC Tenant ID (pass from bootstrap)'
        required: false
        type: string
      subscriptionId:
        description: 'Azure OIDC Subscription ID (pass from bootstrap)'
        required: false
        type: string
  workflow_call:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: string
      setupGitHubApp:
        description: 'Setup GitHub App'
        required: false
        type: boolean
        default: false
      githubAppName:
        description: 'GitHub App Name'
        required: false
        type: string
        default: 'XYDataLabsGitHubApp'
      configureSecrets:
        description: 'Configure Secrets'
        required: false
        type: boolean
        default: true
      clientId:
        description: 'Azure OIDC Client ID'
        required: false
        type: string
      tenantId:
        description: 'Azure OIDC Tenant ID'
        required: false
        type: string
      subscriptionId:
        description: 'Azure OIDC Subscription ID'
        required: false
        type: string
    outputs:
      setup-result:
        description: "Result of GitHub App setup"
        value: ${{ jobs.setup-github-app.result }}
      secrets-result:
        description: "Result of secrets configuration"
        value: ${{ jobs.configure-secrets.result }}
      validation-result:
        description: "Result of validation"
        value: ${{ jobs.validate-configuration.result }}

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  validate-inputs:
    name: Validate Workflow Inputs
    runs-on: windows-latest
    steps:
      - name: Log Workflow Start
        run: |
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "  GITHUB SECRETS CONFIGURATION WORKFLOW STARTED" -ForegroundColor Cyan
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "⏰ Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "👤 Triggered by: ${{ github.actor }}" -ForegroundColor Gray
          Write-Host "🌿 Branch: ${{ github.ref_name }}" -ForegroundColor Gray
          Write-Host "📦 Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "🔗 Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" -ForegroundColor Gray
          Write-Host "" -ForegroundColor Gray
          Write-Host "📋 USER SELECTED PARAMETERS:" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  🎯 Target Environment:          ${{ inputs.environment }}" -ForegroundColor White
          Write-Host "  0️⃣  [Phase 0] Setup GitHub App:  ${{ inputs.setupGitHubApp }}" -ForegroundColor $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "      GitHub App Name:            ${{ inputs.githubAppName }}" -ForegroundColor DarkGray
          Write-Host "  1️⃣  [Phase 1] Configure Secrets: ${{ inputs.configureSecrets }}" -ForegroundColor $(if ('${{ inputs.configureSecrets }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray

  setup-github-app:
    name: Setup GitHub App
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.setupGitHubApp
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: ${{ inputs.environment != 'all' && inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Explain GitHub App Setup
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         SETUP GITHUB APP - One-Time Configuration              ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "GitHub App Name: ${{ inputs.githubAppName }}" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "🎯 Goal: Automated secret management with zero maintenance" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Benefits:" -ForegroundColor Cyan
          Write-Host "  ✅ Tokens auto-generated (never expire)" -ForegroundColor Green
          Write-Host "  ✅ No manual renewal needed" -ForegroundColor Green
          Write-Host "  ✅ Better security (short-lived tokens)" -ForegroundColor Green
          Write-Host "  ✅ Full automation after initial setup" -ForegroundColor Green
          Write-Host ""
          Write-Host "⚠️  GitHub Security Requirement:" -ForegroundColor Yellow
          Write-Host "   For security, GitHub requires interactive authorization" -ForegroundColor Gray
          Write-Host "   for first-time app creation. This is by design." -ForegroundColor Gray
          Write-Host ""
          Write-Host "⏱️  One-time manual setup required (5 minutes)" -ForegroundColor Cyan
          Write-Host "   After this, everything is fully automated!" -ForegroundColor Green
          Write-Host ""

      - name: Check Existing GitHub App
        id: check-app
        run: |
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "🔍 CHECKING GITHUB APP CONFIGURATION STATUS" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          Write-Host "🤖 GitHub App Name (configured): ${{ inputs.githubAppName }}" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "📋 Required Repository Secrets:" -ForegroundColor Yellow

          $hasAppId = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""

          Write-Host "  APP_ID                : $(if ($hasAppId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasAppId) { "Green" } else { "Red" })
          Write-Host "  APP_PRIVATE_KEY       : $(if ($hasPrivateKey) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { "Green" } else { "Red" })
          Write-Host ""
          Write-Host "ℹ️  Note: APP_INSTALLATION_ID is no longer required - it will be auto-discovered!" -ForegroundColor Cyan
          Write-Host ""

          if ($hasAppId -and $hasPrivateKey) {
            Write-Host "✅ GitHub App Configuration Status: COMPLETE" -ForegroundColor Green
            Write-Host ""
            Write-Host "  All required secrets are configured." -ForegroundColor Gray
            Write-Host "  Installation ID will be auto-discovered at runtime." -ForegroundColor Gray
            Write-Host "  No manual setup needed." -ForegroundColor Gray
            Write-Host "  Workflow will use the configured GitHub App for automation." -ForegroundColor Gray
            Write-Host ""
            "alreadyConfigured=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ GitHub App Configuration Status: INCOMPLETE" -ForegroundColor Red
            Write-Host ""
            Write-Host "  One or more required secrets are missing." -ForegroundColor Gray
            Write-Host "  Manual setup is required to enable automation." -ForegroundColor Gray
            Write-Host ""
            "alreadyConfigured=false" >> $env:GITHUB_OUTPUT
          }
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""

      - name: Validate GitHub App via API
        id: validate-app
        if: steps.check-app.outputs.alreadyConfigured == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Display Confirmed GitHub App Info
        id: display-app-info
        if: steps.check-app.outputs.alreadyConfigured == 'true'
        env:
          GH_TOKEN: ${{ steps.validate-app.outputs.token }}
          EXPECTED_APP_NAME: ${{ inputs.githubAppName }}
        run: |
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "🤖 GITHUB APP VALIDATION VIA API" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          try {
            $apiOutput = gh api /app 2>&1
            $appInfo   = $apiOutput | ConvertFrom-Json
            $actualName = $appInfo.name
            $appId      = $appInfo.id
            $appSlug    = $appInfo.slug
            $htmlUrl    = $appInfo.html_url

            Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Green
            Write-Host "║   ✅ GITHUB APP CONFIRMED                                      ║" -ForegroundColor Green
            Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Green
            Write-Host ""
            Write-Host "  App Name   : $actualName" -ForegroundColor Green
            Write-Host "  App ID     : $appId" -ForegroundColor Green
            Write-Host "  App Slug   : $appSlug" -ForegroundColor Green
            Write-Host "  App URL    : $htmlUrl" -ForegroundColor Green
            Write-Host ""

            if ($actualName -eq $env:EXPECTED_APP_NAME) {
              Write-Host "  ✅ App name matches configured name: '$actualName'" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️  App name mismatch:" -ForegroundColor Yellow
              Write-Host "       Configured (githubAppName): '$($env:EXPECTED_APP_NAME)'" -ForegroundColor Yellow
              Write-Host "       Actual app name from API  : '$actualName'" -ForegroundColor Yellow
              Write-Host "  ℹ️  This is fine — the app is working. Update the githubAppName" -ForegroundColor Cyan
              Write-Host "     input to '$actualName' to suppress this warning." -ForegroundColor Cyan
            }
            Write-Host ""
            Write-Host "✅ GitHub App is active and authenticated. Proceeding with setup instructions." -ForegroundColor Green
            Write-Host ""

            # Output the validated app name for downstream steps
            "validatedAppName=$actualName" >> $env:GITHUB_OUTPUT
          } catch {
            Write-Host "  ⚠️  Could not retrieve app info from GitHub API." -ForegroundColor Yellow
            Write-Host "  API error: $($_.Exception.Message)" -ForegroundColor Yellow
            if ($apiOutput) { Write-Host "  API output: $apiOutput" -ForegroundColor Gray }
            Write-Host "  The APP_ID/APP_PRIVATE_KEY secrets may be set but the token could not be used." -ForegroundColor Gray
            Write-Host "  Continuing with setup instructions..." -ForegroundColor Gray
            Write-Host ""
            "validatedAppName=$($env:EXPECTED_APP_NAME)" >> $env:GITHUB_OUTPUT
          }

      - name: Provide Setup Instructions
        if: steps.check-app.outputs.alreadyConfigured != 'true'
        run: |
          $appName = "${{ inputs.githubAppName }}"
          $appSlug = $appName.ToLower() -replace '[^a-z0-9]', '-'
          $repoSecretsUrl = "https://github.com/${{ github.repository }}/settings/secrets/actions"

          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
          Write-Host "║         📋 GITHUB APP SETUP INSTRUCTIONS                       ║" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "🤖 Target GitHub App Name : $appName" -ForegroundColor Cyan
          Write-Host "⏱️  Estimated time         : 5 minutes" -ForegroundColor Gray
          Write-Host ""

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "PHASE 0 — STEP 1: CREATE GITHUB APP" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "🔧 OPTION A: Use Automation Script (Recommended)" -ForegroundColor Cyan
          Write-Host "  Run this command from repository root:" -ForegroundColor White
          Write-Host "    .\scripts\setup-github-app-from-manifest.ps1" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "  The script will:" -ForegroundColor Gray
          Write-Host "    • Read the app manifest configuration" -ForegroundColor Gray
          Write-Host "    • Provide step-by-step guided instructions" -ForegroundColor Gray
          Write-Host "    • Display all required permissions" -ForegroundColor Gray
          Write-Host ""
          Write-Host "📋 OPTION B: Manual Setup (create app '$appName')" -ForegroundColor Cyan
          Write-Host "  1. Open:  https://github.com/settings/apps/new" -ForegroundColor White
          Write-Host "  2. App name: $appName" -ForegroundColor Yellow
          Write-Host "     (You may use any name — just keep it consistent with" -ForegroundColor Gray
          Write-Host "      the 'githubAppName' input of this workflow)" -ForegroundColor Gray
          Write-Host "  3. Use settings from: .github/app-manifest.json" -ForegroundColor White
          Write-Host "  4. Set permissions (see below)" -ForegroundColor White
          Write-Host "  5. Click 'Create GitHub App'" -ForegroundColor White
          Write-Host "  6. Generate private key (saves a .pem file to your computer)" -ForegroundColor White
          Write-Host "  7. Note the App ID shown on the General settings page" -ForegroundColor White
          Write-Host "  8. Install the app on repository: ${{ github.repository }}" -ForegroundColor White
          Write-Host "     Link: https://github.com/settings/installations" -ForegroundColor Gray
          Write-Host ""

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "REQUIRED GITHUB APP PERMISSIONS" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "   ⚠️  These permissions MUST be set — they are NOT set automatically." -ForegroundColor Yellow
          Write-Host "   Set them when creating the app or verify them for an existing app." -ForegroundColor Gray
          Write-Host ""
          Write-Host "   Repository permissions:" -ForegroundColor White
          Write-Host "     - Actions:        write  (trigger/manage workflow runs)" -ForegroundColor Gray
          Write-Host "     - Secrets:        write  (create/update repository secrets)" -ForegroundColor Gray
          Write-Host "     - Workflows:      write  (update workflow files)" -ForegroundColor Gray
          Write-Host "     - Pull requests:  write  (create PRs for config changes)" -ForegroundColor Gray
          Write-Host "     - Administration: write  (manage repository settings)" -ForegroundColor Gray
          Write-Host "     - Environments:   write  (create/update deployment environments)" -ForegroundColor Gray
          Write-Host "     - Contents:       read   (read repository files)" -ForegroundColor Gray
          Write-Host "     - Metadata:       read   (read repository metadata)" -ForegroundColor Gray
          Write-Host ""
          Write-Host "   Organization permissions:" -ForegroundColor White
          Write-Host "     - Events:         read   (subscribe to organization events)" -ForegroundColor Gray
          Write-Host ""
          Write-Host "   📍 To verify/update permissions on an existing app:" -ForegroundColor Cyan
          Write-Host "      https://github.com/settings/apps/$appSlug/permissions" -ForegroundColor White
          Write-Host ""

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "PHASE 0 — STEP 2: ADD REPOSITORY SECRETS" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "  After creating the GitHub App ('$appName'), you must add two" -ForegroundColor White
          Write-Host "  repository secrets so this workflow can authenticate as the app." -ForegroundColor White
          Write-Host ""
          Write-Host "  ➡️  Open this URL in your browser:" -ForegroundColor Cyan
          Write-Host "      $repoSecretsUrl" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "  Then click 'New repository secret' and add EACH of the following:" -ForegroundColor White
          Write-Host ""
          Write-Host "  ┌──────────────────┬─────────────────────────────────────────────────┐" -ForegroundColor DarkGray
          Write-Host "  │ Secret Name      │ Where to find the value                         │" -ForegroundColor DarkGray
          Write-Host "  ├──────────────────┼─────────────────────────────────────────────────┤" -ForegroundColor DarkGray
          Write-Host "  │ APP_ID           │ Numeric App ID on the app's General settings     │" -ForegroundColor White
          Write-Host "  │                  │ page: https://github.com/settings/apps/$appSlug  │" -ForegroundColor Gray
          Write-Host "  ├──────────────────┼─────────────────────────────────────────────────┤" -ForegroundColor DarkGray
          Write-Host "  │ APP_PRIVATE_KEY  │ Full contents of the .pem file you downloaded    │" -ForegroundColor White
          Write-Host "  │                  │ when generating the private key (entire file,     │" -ForegroundColor Gray
          Write-Host "  │                  │ including -----BEGIN RSA PRIVATE KEY----- lines) │" -ForegroundColor Gray
          Write-Host "  └──────────────────┴─────────────────────────────────────────────────┘" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "  Step-by-step for APP_ID:" -ForegroundColor Cyan
          Write-Host "    1. Go to https://github.com/settings/apps/$appSlug" -ForegroundColor White
          Write-Host "    2. Note the 'App ID' number (e.g. 123456)" -ForegroundColor White
          Write-Host "    3. Go to $repoSecretsUrl" -ForegroundColor White
          Write-Host "    4. Click 'New repository secret'" -ForegroundColor White
          Write-Host "    5. Name: APP_ID   Value: <your numeric App ID>" -ForegroundColor White
          Write-Host "    6. Click 'Add secret'" -ForegroundColor White
          Write-Host ""
          Write-Host "  Step-by-step for APP_PRIVATE_KEY:" -ForegroundColor Cyan
          Write-Host "    1. Go to https://github.com/settings/apps/$appSlug" -ForegroundColor White
          Write-Host "    2. Scroll to 'Private keys' section" -ForegroundColor White
          Write-Host "    3. Click 'Generate a private key' — a .pem file downloads" -ForegroundColor White
          Write-Host "    4. Open the .pem file in a text editor (Notepad, VS Code, etc.)" -ForegroundColor White
          Write-Host "    5. Select ALL content (Ctrl+A) and copy it" -ForegroundColor White
          Write-Host "    6. Go to $repoSecretsUrl" -ForegroundColor White
          Write-Host "    7. Click 'New repository secret'" -ForegroundColor White
          Write-Host "    8. Name: APP_PRIVATE_KEY   Value: <paste entire .pem contents>" -ForegroundColor White
          Write-Host "    9. Click 'Add secret'" -ForegroundColor White
          Write-Host ""

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "PHASE 0 — STEP 3: RE-RUN THIS WORKFLOW (PHASE 1)" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "  Once APP_ID and APP_PRIVATE_KEY are saved, re-run the bootstrap" -ForegroundColor White
          Write-Host "  workflow with:" -ForegroundColor White
          Write-Host "    ✅ Setup Azure OIDC          = true" -ForegroundColor Green
          Write-Host "    ✅ Configure GitHub Secrets  = true" -ForegroundColor Green
          Write-Host "    ❌ Setup GitHub App          = false  (already done)" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "  ➡️  Run workflow: https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "  ✅ After that, ALL AZUREAPPSERVICE_* environment secrets are" -ForegroundColor Green
          Write-Host "     configured automatically — no further manual steps needed." -ForegroundColor Green
          Write-Host ""

          Write-Host "📖 Documentation:" -ForegroundColor Cyan
          Write-Host "   • Quick Setup: Documentation/03-Configuration-Guides/QUICK-SETUP-GITHUB-APP.md" -ForegroundColor White
          Write-Host "   • Automation Guide: Documentation/03-Configuration-Guides/GITHUB-APP-AUTOMATION.md" -ForegroundColor White
          Write-Host ""

      - name: Create Setup Summary
        run: |
          $appName = "${{ inputs.githubAppName }}"
          $appSlug = $appName.ToLower() -replace '[^a-z0-9]', '-'
          $repoSecretsUrl = "https://github.com/${{ github.repository }}/settings/secrets/actions"

          "## 🔐 GitHub App Setup" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "**GitHub App Name**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          $hasApp = "${{ steps.check-app.outputs.alreadyConfigured }}" -eq "true"
          $validatedName = "${{ steps.display-app-info.outputs.validatedAppName }}"

          if ($hasApp) {
            "### ✅ GitHub App Confirmed and Ready" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            if ($validatedName -ne "") {
              "**Validated App Name**: ``$validatedName``" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
            }
            "GitHub App is set up and authenticated. All required secrets are configured." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Configuration detected**:" >> $env:GITHUB_STEP_SUMMARY
            "- \`APP_ID\` ✅" >> $env:GITHUB_STEP_SUMMARY
            "- \`APP_PRIVATE_KEY\` ✅" >> $env:GITHUB_STEP_SUMMARY
            "- \`APP_INSTALLATION_ID\` ✅ (Auto-discovered)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Next step**: Enable 'Configure Secrets' option in this workflow" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "### ⏱️ Phase 0 — One-Time Manual Setup Required" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> ⚠️ **Phase 0 (GitHub App creation + repository secrets) must be completed before Phase 1 can run.**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "#### Step 1 — Create the GitHub App" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Create a GitHub App named **\`$appName\`** (or your own custom name)." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Option A — Automation Script (Recommended)**:" >> $env:GITHUB_STEP_SUMMARY
            "``````powershell" >> $env:GITHUB_STEP_SUMMARY
            ".\scripts\setup-github-app-from-manifest.ps1" >> $env:GITHUB_STEP_SUMMARY
            "``````" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Option B — Manual**: [Create app at github.com/settings/apps/new](https://github.com/settings/apps/new)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> ⚠️ **Required GitHub App Permissions** (NOT set automatically — must be configured when creating the app):" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Permission | Level |" >> $env:GITHUB_STEP_SUMMARY
            "|---|---|" >> $env:GITHUB_STEP_SUMMARY
            "| **Repository permissions** | |" >> $env:GITHUB_STEP_SUMMARY
            "| Actions | write |" >> $env:GITHUB_STEP_SUMMARY
            "| Secrets | write |" >> $env:GITHUB_STEP_SUMMARY
            "| Workflows | write |" >> $env:GITHUB_STEP_SUMMARY
            "| Pull requests | write |" >> $env:GITHUB_STEP_SUMMARY
            "| Administration | write |" >> $env:GITHUB_STEP_SUMMARY
            "| Environments | write |" >> $env:GITHUB_STEP_SUMMARY
            "| Contents | read |" >> $env:GITHUB_STEP_SUMMARY
            "| Metadata | read |" >> $env:GITHUB_STEP_SUMMARY
            "| **Organization permissions** | |" >> $env:GITHUB_STEP_SUMMARY
            "| Events | read |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "📍 To verify/update permissions for an existing app: ``https://github.com/settings/apps/$appSlug/permissions``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "#### Step 2 — Add Repository Secrets" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Go to **[Settings → Secrets and variables → Actions]($repoSecretsUrl)** and add these two secrets:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Secret Name | Where to find the value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------------|------------------------|" >> $env:GITHUB_STEP_SUMMARY
            "| \`APP_ID\` | Numeric App ID on the app's **General** settings page: \`https://github.com/settings/apps/$appSlug\` |" >> $env:GITHUB_STEP_SUMMARY
            "| \`APP_PRIVATE_KEY\` | Full contents of the \`.pem\` file downloaded when generating the private key (include the \`-----BEGIN RSA PRIVATE KEY-----\` lines) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**How to add each secret**:" >> $env:GITHUB_STEP_SUMMARY
            "1. Click **New repository secret** at [$repoSecretsUrl]($repoSecretsUrl)" >> $env:GITHUB_STEP_SUMMARY
            "2. Enter the secret **Name** and **Value** from the table above" >> $env:GITHUB_STEP_SUMMARY
            "3. Click **Add secret**" >> $env:GITHUB_STEP_SUMMARY
            "4. Repeat for the second secret" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "#### Step 3 — Re-run This Workflow (Phase 1)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Once the two secrets are saved, **[run this workflow again](https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml)** with:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Input | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| 🎯 Environment | \`${{ inputs.environment }}\` |" >> $env:GITHUB_STEP_SUMMARY
            "| 🔑 Setup Azure OIDC | \`true\` |" >> $env:GITHUB_STEP_SUMMARY
            "| ℹ️ Setup GitHub App | \`false\` (already done) |" >> $env:GITHUB_STEP_SUMMARY
            "| 🔑 Configure GitHub Secrets | \`true\` |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> ✅ The workflow will then automatically configure all \`AZUREAPPSERVICE_*\` environment secrets — **no further manual steps are needed**." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Documentation**:" >> $env:GITHUB_STEP_SUMMARY
            "- [Quick Setup Guide](../blob/main/Documentation/03-Configuration-Guides/QUICK-SETUP-GITHUB-APP.md)" >> $env:GITHUB_STEP_SUMMARY
            "- [Automation Guide](../blob/main/Documentation/03-Configuration-Guides/GITHUB-APP-AUTOMATION.md)" >> $env:GITHUB_STEP_SUMMARY
          }

  configure-secrets:
    name: Configure GitHub Secrets
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.configureSecrets &&
      (needs.setup-github-app.result == 'success' || needs.setup-github-app.result == 'skipped')
    needs: [validate-inputs, setup-github-app]
    runs-on: windows-latest
    environment: ${{ inputs.environment != 'all' && inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Prerequisites
        id: prereqs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VALIDATING PREREQUISITES                               ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          Write-Host "🔍 Checking Azure OIDC credentials..." -ForegroundColor Cyan
          
          # Check if OIDC credentials were passed as inputs
          $hasClientId = "${{ inputs.clientId }}" -ne ""
          $hasTenantId = "${{ inputs.tenantId }}" -ne ""
          $hasSubscriptionId = "${{ inputs.subscriptionId }}" -ne ""
          
          Write-Host "  Client ID provided: $(if ($hasClientId) { '✅ Yes' } else { '❌ No' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
          Write-Host "  Tenant ID provided: $(if ($hasTenantId) { '✅ Yes' } else { '❌ No' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
          Write-Host "  Subscription ID provided: $(if ($hasSubscriptionId) { '✅ Yes' } else { '❌ No' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
          Write-Host ""
          
          if (-not ($hasClientId -and $hasTenantId -and $hasSubscriptionId)) {
            Write-Host "⚠️  Azure OIDC credentials not provided as inputs" -ForegroundColor Yellow
            Write-Host "   This workflow requires OIDC credentials to be passed from the bootstrap workflow" -ForegroundColor Gray
            Write-Host "   or you must run Azure OIDC setup first." -ForegroundColor Gray
            Write-Host ""
            Write-Error "Missing required OIDC credentials. Cannot proceed."
            exit 1
          }
          
          Write-Host "🔍 Checking GitHub App secrets..." -ForegroundColor Cyan
          Write-Host "  Environment Context: ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host ""
          
          # Check if GitHub App secrets are available
          $hasAppId = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          
          Write-Host "  APP_ID                : $(if ($hasAppId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasAppId) { "Green" } else { "Red" })
          Write-Host "  APP_PRIVATE_KEY       : $(if ($hasPrivateKey) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { "Green" } else { "Red" })
          Write-Host "  APP_INSTALLATION_ID   : ✨ Auto-discovered at runtime" -ForegroundColor Cyan
          Write-Host ""
          
          if ($hasAppId -and $hasPrivateKey) {
            Write-Host "  ✅ All required GitHub App secrets detected" -ForegroundColor Green
            "hasGitHubAppSecrets=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "  ⚠️  GitHub App secrets not configured" -ForegroundColor Yellow
            Write-Host "     GitHub App setup is required for automated secret management." -ForegroundColor Gray
            "hasGitHubAppSecrets=false" >> $env:GITHUB_OUTPUT
          }
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "✅ Prerequisite validation complete" -ForegroundColor Green
          Write-Host ""

      - name: Generate GitHub App Token
        id: app-token
        if: steps.prereqs.outputs.hasGitHubAppSecrets == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Handle GitHub App Token Failure
        if: steps.prereqs.outputs.hasGitHubAppSecrets == 'true' && steps.app-token.outcome == 'failure'
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║         GITHUB APP TOKEN GENERATION FAILED                    ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          Write-Host ""
          Write-Host "❌ Failed to generate GitHub App installation token" -ForegroundColor Red
          Write-Host ""
          Write-Host "Most likely cause: GitHub App not installed on repository" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Solution: Install the app at https://github.com/settings/installations" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "See documentation for details:" -ForegroundColor Gray
          Write-Host "  • Documentation/03-Configuration-Guides/GITHUB-APP-AUTOMATION.md" -ForegroundColor White
          Write-Host ""
          Write-Error "GitHub App token generation failed"
          exit 1

      - name: Check GitHub App Authentication
        id: check
        run: |
          $hasGitHubAppSecrets = "${{ steps.prereqs.outputs.hasGitHubAppSecrets }}" -eq "true"
          $tokenGenerated = "${{ steps.app-token.outcome }}" -eq "success"
          
          if ($hasGitHubAppSecrets -and $tokenGenerated) {
            Write-Host "✅ Using GitHub App for secret management" -ForegroundColor Green
            "useGitHubApp=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ Cannot proceed without GitHub App authentication" -ForegroundColor Red
            Write-Error "GitHub App authentication required"
            exit 1
          }

      - name: Set Repository Secrets
        if: steps.check.outputs.useGitHubApp == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          CLIENT_ID: ${{ inputs.clientId }}
          TENANT_ID: ${{ inputs.tenantId }}
          SUBSCRIPTION_ID: ${{ inputs.subscriptionId }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║        REPOSITORY SECRET CONFIGURATION                        ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Authentication: GitHub App" -ForegroundColor Green
          Write-Host ""
          
          # Validate we have all required values
          if (-not $env:CLIENT_ID -or -not $env:TENANT_ID -or -not $env:SUBSCRIPTION_ID) {
            Write-Host "❌ Missing required OIDC credentials" -ForegroundColor Red
            Write-Error "Required values are missing. Cannot configure secrets."
            exit 1
          }
          
          Write-Host "  ✅ All required values present" -ForegroundColor Green
          Write-Host ""
          
          # Set GH_TOKEN for gh CLI
          $env:GH_TOKEN = $env:GH_APP_TOKEN
          
          Write-Host "🔑 Configuring Azure secrets..." -ForegroundColor Cyan
          Write-Host ""
          
          # Configure each secret with error handling
          $secrets = @{
            "AZUREAPPSERVICE_CLIENTID" = $env:CLIENT_ID
            "AZUREAPPSERVICE_TENANTID" = $env:TENANT_ID
            "AZUREAPPSERVICE_SUBSCRIPTIONID" = $env:SUBSCRIPTION_ID
          }
          
          $successCount = 0
          $failCount = 0
          
          foreach ($secretName in $secrets.Keys) {
            Write-Host "  Setting: $secretName" -ForegroundColor Gray
            try {
              $output = gh secret set $secretName --repo ${{ github.repository }} --body $secrets[$secretName] 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "    ✅ Success" -ForegroundColor Green
                $successCount++
              } else {
                Write-Host "    ❌ Failed (exit code: $LASTEXITCODE)" -ForegroundColor Red
                if ($output) {
                  Write-Host "    Error details: $output" -ForegroundColor Red
                }
                $failCount++
              }
            } catch {
              Write-Host "    ❌ Exception: $($_.Exception.Message)" -ForegroundColor Red
              $failCount++
            }
          }
          
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "Configuration Summary:" -ForegroundColor Cyan
          Write-Host "  ✅ Successful: $successCount" -ForegroundColor Green
          if ($failCount -gt 0) {
            Write-Host "  ❌ Failed: $failCount" -ForegroundColor Red
            Write-Error "Failed to set $failCount secret(s). See logs above for details."
            exit 1
          }
          Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "✅ All repository secrets configured successfully!" -ForegroundColor Green
          Write-Host ""

      - name: Set Environment Secrets
        if: steps.check.outputs.useGitHubApp == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          CLIENT_ID: ${{ inputs.clientId }}
          TENANT_ID: ${{ inputs.tenantId }}
          SUBSCRIPTION_ID: ${{ inputs.subscriptionId }}
        run: |
          $selectedEnv = "${{ inputs.environment }}"
          
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║        ENVIRONMENT SECRET CONFIGURATION                       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Target Selection: $selectedEnv" -ForegroundColor Gray
          Write-Host "Authentication: GitHub App" -ForegroundColor Green
          Write-Host ""
          
          # Set GH_TOKEN for gh CLI commands
          $env:GH_TOKEN = $env:GH_APP_TOKEN
          
          # Determine which environments to configure
          $environments = @()
          if ($selectedEnv -eq "all") {
            $environments = @("dev", "staging", "prod")
          } else {
            $environments = @($selectedEnv)
          }
          
          Write-Host "🔑 Configuring environment secrets for: $($environments -join ', ')" -ForegroundColor Cyan
          Write-Host ""
          
          $ownerRepo = "${{ github.repository }}"
          $owner, $repo = $ownerRepo -split '/', 2
          $totalSuccess = 0
          $totalFail = 0
          
          foreach ($env_name in $environments) {
            Write-Host "  Environment: $env_name" -ForegroundColor Yellow
            
            # First, ensure the environment exists
            Write-Host "    Checking if environment exists..." -ForegroundColor Gray
            try {
              gh api -H "Accept: application/vnd.github+json" "repos/$owner/$repo/environments/$env_name" 2>&1 | Out-Null
              if ($LASTEXITCODE -eq 0) {
                Write-Host "      ✅ Environment exists" -ForegroundColor Green
              } else {
                Write-Host "      ⚠️  Environment doesn't exist, creating it..." -ForegroundColor Yellow
                gh api --method PUT -H "Accept: application/vnd.github+json" "repos/$owner/$repo/environments/$env_name" 2>&1 | Out-Null
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "      ✅ Environment created successfully" -ForegroundColor Green
                } else {
                  Write-Host "      ⚠️  Could not create environment (may need admin permission)" -ForegroundColor Yellow
                  Write-Host "      Skipping environment secrets for $env_name" -ForegroundColor Yellow
                  Write-Host ""
                  continue
                }
              }
            } catch {
              Write-Host "      ⚠️  Could not check environment: $($_.Exception.Message)" -ForegroundColor Yellow
              Write-Host "      Skipping environment secrets for $env_name" -ForegroundColor Yellow
              Write-Host ""
              continue
            }
            
            # Set environment secrets
            $secretsToSet = @{
              "AZUREAPPSERVICE_CLIENTID" = $env:CLIENT_ID
              "AZUREAPPSERVICE_TENANTID" = $env:TENANT_ID
              "AZUREAPPSERVICE_SUBSCRIPTIONID" = $env:SUBSCRIPTION_ID
            }
            
            foreach ($secretName in $secretsToSet.Keys) {
              Write-Host "    Setting: $secretName" -ForegroundColor Gray
              try {
                $output = gh secret set $secretName --env $env_name --repo $ownerRepo --body $secretsToSet[$secretName] 2>&1
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "      ✅ Success" -ForegroundColor Green
                  $totalSuccess++
                } else {
                  Write-Host "      ❌ Failed (exit code: $LASTEXITCODE)" -ForegroundColor Red
                  if ($output) {
                    Write-Host "      Error details: $output" -ForegroundColor Red
                  }
                  $totalFail++
                }
              } catch {
                Write-Host "      ❌ Exception: $($_.Exception.Message)" -ForegroundColor Red
                $totalFail++
              }
            }
            Write-Host ""
          }
          
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "Configuration Summary:" -ForegroundColor Cyan
          Write-Host "  ✅ Successful: $totalSuccess" -ForegroundColor Green
          if ($totalFail -gt 0) {
            Write-Host "  ❌ Failed: $totalFail" -ForegroundColor Red
            Write-Error "Failed to set $totalFail secret(s)."
            exit 1
          }
          Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "✅ All environment secrets configured successfully!" -ForegroundColor Green
          Write-Host ""

  validate-configuration:
    name: Validate Configuration
    if: |
      !cancelled() &&
      inputs.configureSecrets &&
      (needs.configure-secrets.result == 'success')
    needs: [validate-inputs, setup-github-app, configure-secrets]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Configuration Validation
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         FINAL CONFIGURATION VALIDATION                        ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "Environment: ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host ""
          
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📋 Configuration Summary" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          
          $allChecks = @()
          
          # Check GitHub App setup
          $appSetup = "${{ needs.setup-github-app.result }}"
          if ($appSetup -eq "success") {
            Write-Host "  ✅ GitHub App Setup: Configured" -ForegroundColor Green
            $allChecks += $true
          } elseif ($appSetup -eq "skipped") {
            Write-Host "  ⏭️  GitHub App Setup: Skipped (existing config used)" -ForegroundColor Yellow
            $allChecks += $true
          } else {
            Write-Host "  ⚠️  GitHub App Setup: Not configured or failed" -ForegroundColor Yellow
            $allChecks += $true  # Not critical if already configured
          }
          
          # Check secret configuration
          $secretsSetup = "${{ needs.configure-secrets.result }}"
          if ($secretsSetup -eq "success") {
            Write-Host "  ✅ Secret Configuration: Completed" -ForegroundColor Green
            $allChecks += $true
          } else {
            Write-Host "  ❌ Secret Configuration: Failed or not run" -ForegroundColor Red
            $allChecks += $false
          }
          
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📊 Environment-Specific Configuration" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          
          $selectedEnv = "${{ inputs.environment }}"
          $environments = if ($selectedEnv -eq "all") { @("dev", "staging", "prod") } else { @($selectedEnv) }
          
          Write-Host "  Configured environments: $($environments -join ', ')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "  Expected secrets per environment:" -ForegroundColor Gray
          Write-Host "    • AZUREAPPSERVICE_CLIENTID" -ForegroundColor Gray
          Write-Host "    • AZUREAPPSERVICE_TENANTID" -ForegroundColor Gray
          Write-Host "    • AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor Gray
          Write-Host ""
          
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "🔍 Validation Tools" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          Write-Host "  To validate your configuration locally, run:" -ForegroundColor Yellow
          Write-Host "    .\scripts\validate-github-app-config.ps1 -Detailed" -ForegroundColor Cyan
          Write-Host ""
          
          $failedChecks = $allChecks | Where-Object { -not $_ }
          if ($failedChecks.Count -eq 0) {
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host "✅ CONFIGURATION VALIDATION SUCCESSFUL" -ForegroundColor Green
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host ""
            Write-Host "  Your GitHub configuration is complete!" -ForegroundColor Green
          } else {
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
            Write-Host "⚠️  CONFIGURATION VALIDATION COMPLETED WITH WARNINGS" -ForegroundColor Yellow
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "  Some components failed validation." -ForegroundColor Yellow
          }
          Write-Host ""

      - name: Create Validation Summary
        if: always()
        run: |
          "## 🔍 Configuration Validation" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### Configuration Status" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Component | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|--------|" >> $env:GITHUB_STEP_SUMMARY
          
          $app = "${{ needs.setup-github-app.result }}"
          $appIcon = if ($app -eq "success") { "✅" } elseif ($app -eq "skipped") { "⏭️" } else { "⚠️" }
          "| GitHub App | $appIcon $app |" >> $env:GITHUB_STEP_SUMMARY
          
          $secrets = "${{ needs.configure-secrets.result }}"
          $secretsIcon = if ($secrets -eq "success") { "✅" } else { "❌" }
          "| Secrets | $secretsIcon $secrets |" >> $env:GITHUB_STEP_SUMMARY
          
          "" >> $env:GITHUB_STEP_SUMMARY
          "### Validation Tools" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "To validate your local configuration:" >> $env:GITHUB_STEP_SUMMARY
          "``````powershell" >> $env:GITHUB_STEP_SUMMARY
          ".\scripts\validate-github-app-config.ps1 -Detailed" >> $env:GITHUB_STEP_SUMMARY
          "``````" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### Documentation" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- 📖 [GitHub App Automation Guide](../blob/main/Documentation/03-Configuration-Guides/GITHUB-APP-AUTOMATION.md)" >> $env:GITHUB_STEP_SUMMARY
          "- 📖 [Quick Setup Guide](../blob/main/Documentation/03-Configuration-Guides/QUICK-SETUP-GITHUB-APP.md)" >> $env:GITHUB_STEP_SUMMARY
          "- 🔧 [Setup Script](../blob/main/scripts/setup-github-app-from-manifest.ps1)" >> $env:GITHUB_STEP_SUMMARY
          "- 🔍 [Validation Script](../blob/main/scripts/validate-github-app-config.ps1)" >> $env:GITHUB_STEP_SUMMARY
