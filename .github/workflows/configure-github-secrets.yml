  configure-secrets:
    name: Configure GitHub Secrets
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.configureSecrets &&
      (needs.setup-github-app.result == 'success' || needs.setup-github-app.result == 'skipped')
    needs: [validate-inputs, setup-github-app]
    runs-on: windows-latest
    environment: ${{ inputs.environment != 'all' && inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check GitHub App Presence
        id: check-app-presence
        run: |
          $hasAppId      = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          Write-Host "🔍 Checking GitHub App configuration (Phase 0 prerequisites)..." -ForegroundColor Cyan
          Write-Host "  APP_ID          : $(if ($hasAppId)      { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasAppId)      { "Green" } else { "Red" })
          Write-Host "  APP_PRIVATE_KEY : $(if ($hasPrivateKey) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { "Green" } else { "Red" })
          Write-Host "  APP_INSTALLATION_ID : ✨ Auto-discovered at runtime" -ForegroundColor Cyan
          Write-Host ""
          if ($hasAppId -and $hasPrivateKey) {
            Write-Host "  ✅ GitHub App secrets present — token will be generated for secret management" -ForegroundColor Green
            "hasGitHubAppSecrets=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "  ⚠️  GitHub App secrets not configured — Phase 0 (GitHub App setup) is required for Phase 1b" -ForegroundColor Yellow
            "hasGitHubAppSecrets=false" >> $env:GITHUB_OUTPUT
          }

      - name: Generate GitHub App Token
        id: app-token
        if: steps.check-app-presence.outputs.hasGitHubAppSecrets == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Handle GitHub App Token Failure
        if: steps.check-app-presence.outputs.hasGitHubAppSecrets == 'true' && steps.app-token.outcome == 'failure'
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║         GITHUB APP TOKEN GENERATION FAILED                    ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          Write-Host ""
          Write-Host "❌ Failed to generate GitHub App installation token" -ForegroundColor Red
          Write-Host ""
          Write-Host "Most likely cause: GitHub App not installed on repository" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Solution: Install the app at https://github.com/settings/installations" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "See documentation for details:" -ForegroundColor Gray
          Write-Host "  • Documentation/03-Configuration-Guides/GITHUB-APP-AUTOMATION.md" -ForegroundColor White
          Write-Host ""
          Write-Error "GitHub App token generation failed"
          exit 1

      - name: Validate Prerequisites
        id: prereqs
        env:
          # Use GitHub App token (generated above) for gh CLI calls — GITHUB_TOKEN lacks secrets:read scope.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HAS_GITHUB_APP: ${{ steps.check-app-presence.outputs.hasGitHubAppSecrets }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VALIDATING PREREQUISITES                               ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""

          # Helper: print the standard "run Phase 1a + 1b together" solution hint
          function Write-OIDCSolutionHint {
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "  💡 SOLUTION: Run bootstrap with Phase 1a + 1b together:" -ForegroundColor Yellow
            Write-Host "     ✅ Setup Azure OIDC (Phase 1a)          = true" -ForegroundColor White
            Write-Host "     ✅ Configure GitHub Secrets (Phase 1b)  = true" -ForegroundColor White
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          }
          
          Write-Host "🔍 Checking Azure OIDC credentials..." -ForegroundColor Cyan
          
          # Check if OIDC credentials were passed as inputs (e.g. from Phase 1a / setup-oidc job)
          $hasClientId     = "${{ inputs.clientId }}" -ne ""
          $hasTenantId     = "${{ inputs.tenantId }}" -ne ""
          $hasSubscriptionId = "${{ inputs.subscriptionId }}" -ne ""
          # credentialsProvided = true whenever a fresh clientId is supplied from Phase 1a.
          # tenantId/subscriptionId are stable across Entra App re-creations and are masked by
          # GitHub Actions when passed as job outputs (they already exist as secrets, so GitHub
          # redacts them to '***' which evaluates as empty here). Those two values fall back to
          # secrets.AZUREAPPSERVICE_TENANTID/SUBSCRIPTIONID in the Set Environment Secrets step,
          # so requiring all three inputs here caused secret writes to be skipped after any
          # accidental app deletion/re-creation, leaving the old Client ID in environment secrets.
          $credentialsProvided = $hasClientId

          Write-Host "  Client ID provided      : $(if ($hasClientId)       { '✅ Yes' } else { '⬜ No' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Gray" })
          Write-Host "  Tenant ID provided      : $(if ($hasTenantId)       { '✅ Yes' } else { '⬜ No (stable — will use existing secret)' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Gray" })
          Write-Host "  Subscription ID provided: $(if ($hasSubscriptionId) { '✅ Yes' } else { '⬜ No (stable — will use existing secret)' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Gray" })
          Write-Host ""

          if ($credentialsProvided) {
            Write-Host "  ✅ Fresh Client ID detected — force-updating all OIDC secrets across environments" -ForegroundColor Green
            "credentialsProvided=true"  >> $env:GITHUB_OUTPUT
            "useExistingSecrets=false"  >> $env:GITHUB_OUTPUT
          } else {
            # No fresh credentials provided (e.g. Phase 1b run without Phase 1a, or re-run).
            # Fall back to checking whether AZUREAPPSERVICE_* secrets already exist.
            # Uses GitHub App token (generated above) for gh CLI — GITHUB_TOKEN lacks secrets:read scope.
            # Note: gh secret list shows only secret names, not values — no sensitive data is exposed.
            # OIDC secrets are stored at environment level only (dev/staging/prod).
            # Check each target environment to determine if secrets already exist.
            Write-Host "  ⬜ No fresh OIDC credentials provided — checking if environment secrets already exist..." -ForegroundColor Yellow
            Write-Host ""
            $useExistingSecrets = $false
            try {
              # Verify gh CLI is accessible (requires GitHub App token)
              $ghExitCode = 0
              gh secret list --repo '${{ github.repository }}' --env dev 2>&1 | Out-Null
              $ghExitCode = $LASTEXITCODE
              if ($ghExitCode -eq 0 -or $ghExitCode -eq 1) {
                # gh CLI is working — proceed with env-level checks
                $targetEnvironments = @()
                $targetEnv = "${{ inputs.environment }}"
                if ($targetEnv -eq 'all') {
                  $targetEnvironments = @('dev', 'staging', 'prod')
                } elseif ($targetEnv -ne '') {
                  $targetEnvironments = @($targetEnv)
                }

                $allEnvsHaveSecrets = $true
                $existsClientId = $false; $existsTenantId = $false; $existsSubscriptionId = $false
                $missingEnvs = @()
                $configuredEnvs = @()

                if ($targetEnvironments.Count -gt 0) {
                  Write-Host "  Environment-level secrets (checking: $($targetEnvironments -join ', ')):" -ForegroundColor Cyan
                  foreach ($envName in $targetEnvironments) {
                    # Validate envName against known environments to prevent unintended CLI arguments
                    if ($envName -notin @('dev', 'staging', 'prod')) {
                      Write-Host "    [$envName] Skipped — not a recognised environment name" -ForegroundColor Gray
                      continue
                    }
                    $envOutput = gh secret list --repo '${{ github.repository }}' --env $envName 2>&1 | Out-String
                    if ($LASTEXITCODE -eq 0) {
                      $envHasClientId       = $envOutput -match "AZUREAPPSERVICE_CLIENTID"
                      $envHasTenantId       = $envOutput -match "AZUREAPPSERVICE_TENANTID"
                      $envHasSubscriptionId = $envOutput -match "AZUREAPPSERVICE_SUBSCRIPTIONID"
                      Write-Host "    [$envName] AZUREAPPSERVICE_CLIENTID      : $(if ($envHasClientId)       { '✅ Exists' } else { '❌ Missing' })" -ForegroundColor $(if ($envHasClientId)       { "Green" } else { "Red" })
                      Write-Host "    [$envName] AZUREAPPSERVICE_TENANTID      : $(if ($envHasTenantId)       { '✅ Exists' } else { '❌ Missing' })" -ForegroundColor $(if ($envHasTenantId)       { "Green" } else { "Red" })
                      Write-Host "    [$envName] AZUREAPPSERVICE_SUBSCRIPTIONID: $(if ($envHasSubscriptionId) { '✅ Exists' } else { '❌ Missing' })" -ForegroundColor $(if ($envHasSubscriptionId) { "Green" } else { "Red" })
                      if (-not ($envHasClientId -and $envHasTenantId -and $envHasSubscriptionId)) {
                        $allEnvsHaveSecrets = $false
                        $missingEnvs += $envName
                      } else {
                        $configuredEnvs += $envName
                      }
                      if ($envHasClientId)       { $existsClientId       = $true }
                      if ($envHasTenantId)       { $existsTenantId       = $true }
                      if ($envHasSubscriptionId) { $existsSubscriptionId = $true }
                    } else {
                      Write-Host "    [$envName] Could not list environment secrets (environment may not exist yet)" -ForegroundColor Gray
                      $allEnvsHaveSecrets = $false
                      $missingEnvs += $envName
                    }
                  }
                  Write-Host ""
                }

                # useExistingSecrets = true only when ALL target environments have all 3 secrets.
                if ($allEnvsHaveSecrets -and $existsClientId -and $existsTenantId -and $existsSubscriptionId) {
                  Write-Host "  ✅ OIDC secrets already configured in all target environments — no update needed" -ForegroundColor Green
                  Write-Host "     (Secrets were configured in a previous run; no new values will be written)" -ForegroundColor Gray
                  $useExistingSecrets = $true
                } else {
                  # Differentiate partial config (some envs done) vs total absence (nothing configured)
                  if ($configuredEnvs.Count -gt 0 -and $missingEnvs.Count -gt 0) {
                    Write-Host "  ⚠️  Partial configuration detected:" -ForegroundColor Yellow
                    Write-Host "     Configured : $($configuredEnvs -join ', ')" -ForegroundColor Green
                    Write-Host "     Missing    : $($missingEnvs -join ', ')" -ForegroundColor Red
                    Write-Host ""
                    Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                    Write-Host "  💡 TWO OPTIONS to fix this:" -ForegroundColor Yellow
                    Write-Host "" 
                    Write-Host "  Option 1 (Recommended) — Re-run Phase 1a + 1b:" -ForegroundColor Cyan
                    Write-Host "     Re-run Azure Initial Setup with Phase 1a + Phase 1b both enabled." -ForegroundColor White
                    Write-Host "     Phase 1a re-uses the existing Azure AD identity — no new registration is created." -ForegroundColor White
                    Write-Host "     This will write OIDC secrets to [$($missingEnvs -join ', ')] using fresh credentials." -ForegroundColor White
                    Write-Host ""
                    Write-Host "  Option 2 — Delete configured env secrets and re-run Phase 1b alone:" -ForegroundColor Cyan
                    Write-Host "     If you want Phase 1b to proceed without Phase 1a, first delete the existing" -ForegroundColor White
                    Write-Host "     secrets from [$($configuredEnvs -join ', ')] manually:" -ForegroundColor White
                    Write-Host "       Settings → Environments → [$($configuredEnvs -join '/')] → Secrets → delete the three AZUREAPPSERVICE_* secrets" -ForegroundColor Gray
                    Write-Host "     Then re-run with only Phase 1b enabled and fresh credentials (clientId/tenantId/subscriptionId) provided as inputs." -ForegroundColor White
                    Write-Host "     ⚠️  Note: deleting [$($configuredEnvs -join ', ')] secrets will break any running deploys for that environment until re-configured." -ForegroundColor Yellow
                    Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                  } else {
                    Write-Host "  ❌ No OIDC environment secrets found and no credentials were provided!" -ForegroundColor Red
                    Write-Host ""
                    Write-Host "  ℹ️  Phase 1a (Setup Azure OIDC) must run before Phase 1b on first-time setup." -ForegroundColor Yellow
                    Write-Host "     Phase 1a creates the Azure AD identity and outputs clientId/tenantId/subscriptionId." -ForegroundColor Yellow
                  }
                  Write-Host ""
                  Write-OIDCSolutionHint
                  $missingList = if ($missingEnvs.Count -gt 0) { $missingEnvs -join ', ' } else { '(all target environments)' }
                  $rootCause = if ($configuredEnvs.Count -gt 0) {
                    "Partial configuration: ``$($configuredEnvs -join ', ')`` $(if ($configuredEnvs.Count -eq 1) {'has'} else {'have'}) secrets but ``$missingList`` $(if ($missingEnvs.Count -eq 1) {'is'} else {'are'}) missing. Fresh credentials from Phase 1a are required to write to the missing environment(s)."
                  } else {
                    "No fresh OIDC credentials were provided (Phase 1a was skipped) and no ``AZUREAPPSERVICE_*`` secrets exist in any target environment."
                  }
                  "## ❌ Phase 1b Failed — OIDC Credentials Not Available" >> $env:GITHUB_STEP_SUMMARY
                  "" >> $env:GITHUB_STEP_SUMMARY
                  "**Root cause**: $rootCause" >> $env:GITHUB_STEP_SUMMARY
                  "" >> $env:GITHUB_STEP_SUMMARY
                  "| Phase | Requires Azure OIDC? | Notes |" >> $env:GITHUB_STEP_SUMMARY
                  "|-------|---------------------|-------|" >> $env:GITHUB_STEP_SUMMARY
                  "| Phase 0 (GitHub App) | ❌ No | Only manages GitHub secrets |" >> $env:GITHUB_STEP_SUMMARY
                  "| **Phase 1a (Setup Azure OIDC)** | N/A — this IS the OIDC setup | Run **once** (or re-run to get fresh credentials) |" >> $env:GITHUB_STEP_SUMMARY
                  "| **Phase 1b (Configure Secrets)** | ✅ Yes — on first run | Needs clientId/tenantId/subscriptionId from Phase 1a. On re-runs: reuses existing environment secrets. |" >> $env:GITHUB_STEP_SUMMARY
                  "| Phase A (Bootstrap Infra) | ✅ Yes | Uses ``AZUREAPPSERVICE_*`` environment secrets set by Phase 1b |" >> $env:GITHUB_STEP_SUMMARY
                  "| Deploy (API/UI) | ✅ Yes | Uses ``AZUREAPPSERVICE_*`` environment secrets set by Phase 1b |" >> $env:GITHUB_STEP_SUMMARY
                  "" >> $env:GITHUB_STEP_SUMMARY
                  "### ✅ How to Fix" >> $env:GITHUB_STEP_SUMMARY
                  "" >> $env:GITHUB_STEP_SUMMARY
                  if ($configuredEnvs.Count -gt 0) {
                    "**Option 1 (Recommended)** — Re-run Phase 1a + Phase 1b together:" >> $env:GITHUB_STEP_SUMMARY
                    "1. Go to **Azure Initial Setup** → Run workflow" >> $env:GITHUB_STEP_SUMMARY
                    "2. Enable **Phase 1a** (Setup Azure OIDC) + **Phase 1b** (Configure GitHub Secrets)" >> $env:GITHUB_STEP_SUMMARY
                    "3. Phase 1a re-uses the existing Azure AD identity — no new app registration is created" >> $env:GITHUB_STEP_SUMMARY
                    "" >> $env:GITHUB_STEP_SUMMARY
                    "**Option 2** — Delete configured secrets and re-run Phase 1b with explicit inputs:" >> $env:GITHUB_STEP_SUMMARY
                    "1. Go to **Settings → Environments → $($configuredEnvs -join '/') → Secrets** and delete the three ``AZUREAPPSERVICE_*`` secrets" >> $env:GITHUB_STEP_SUMMARY
                    "2. Re-run Phase 1b with ``clientId``, ``tenantId``, and ``subscriptionId`` provided as workflow inputs" >> $env:GITHUB_STEP_SUMMARY
                    "> ⚠️ Deleting secrets from ``$($configuredEnvs -join '/')`` will break deploys for that environment until they are re-configured." >> $env:GITHUB_STEP_SUMMARY
                  } else {
                    "Re-run **Azure Initial Setup** with **both** Phase 1 checkboxes selected (Setup Azure OIDC + Configure GitHub Secrets)." >> $env:GITHUB_STEP_SUMMARY
                    "Phase 1a re-uses the existing Azure AD identity — no new app registration is created." >> $env:GITHUB_STEP_SUMMARY
                  }
                  exit 1
                }
              } else {
                Write-Host "  ⚠️  gh CLI failed (exit code: $ghExitCode) — cannot verify environment secrets." -ForegroundColor Red
                Write-Host ""
                if ($env:HAS_GITHUB_APP -ne 'true') {
                  Write-Host "  ❌ Phase 0 (GitHub App) is required — configure APP_ID and APP_PRIVATE_KEY first." -ForegroundColor Red
                } else {
                  Write-Host "  ❌ GitHub App token was generated but gh CLI still failed." -ForegroundColor Red
                  Write-Host "     Verify the GitHub App has 'Secrets: Write' permission at: https://github.com/settings/apps" -ForegroundColor Yellow
                }
                exit 1
              }
            } catch {
              Write-Host "  ⚠️  Unexpected error while checking environment secrets: $($_.Exception.Message)" -ForegroundColor Red
              Write-Host ""
              Write-OIDCSolutionHint
              exit 1
            }
            "credentialsProvided=false" >> $env:GITHUB_OUTPUT
            "useExistingSecrets=$($useExistingSecrets.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          }
          
          Write-Host "🔍 GitHub App secrets status..." -ForegroundColor Cyan
          Write-Host "  Environment Context: ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host "  APP_ID + APP_PRIVATE_KEY: $(if ($env:HAS_GITHUB_APP -eq 'true') { '✅ Present' } else { '⚠️  Not configured' })" -ForegroundColor $(if ($env:HAS_GITHUB_APP -eq 'true') { "Green" } else { "Yellow" })
          Write-Host "  APP_INSTALLATION_ID   : ✨ Auto-discovered at runtime" -ForegroundColor Cyan
          Write-Host ""
          # Pass through hasGitHubAppSecrets from check-app-presence step
          "hasGitHubAppSecrets=$($env:HAS_GITHUB_APP)" >> $env:GITHUB_OUTPUT
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "✅ Prerequisite validation complete" -ForegroundColor Green
          Write-Host ""
          # Reset LASTEXITCODE — gh commands that failed gracefully (e.g. listing secrets
          # for a non-existent environment like prod) leave $LASTEXITCODE non-zero.
          # GitHub Actions checks $LASTEXITCODE at the end of every step and treats any
          # non-zero value as step failure, even when the script handled the error.
          exit 0

      - name: Check GitHub App Authentication
        id: check
        run: |
          $hasGitHubAppSecrets = "${{ steps.prereqs.outputs.hasGitHubAppSecrets }}" -eq "true"
          $tokenGenerated      = "${{ steps.app-token.outcome }}" -eq "success"
          $useExistingSecrets  = "${{ steps.prereqs.outputs.useExistingSecrets }}"  -eq "true"

          if ($useExistingSecrets) {
            # No new credentials to write — skip GitHub App token requirement entirely
            Write-Host "ℹ️  Existing-secrets mode: no secret writes needed, GitHub App token not required" -ForegroundColor Cyan
            "useGitHubApp=false" >> $env:GITHUB_OUTPUT
          } elseif ($hasGitHubAppSecrets -and $tokenGenerated) {
            Write-Host "✅ Using GitHub App for secret management" -ForegroundColor Green
            "useGitHubApp=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ Cannot proceed without GitHub App authentication" -ForegroundColor Red
            Write-Host "" -ForegroundColor Red
            Write-Host "  ── Diagnostics ──" -ForegroundColor Yellow
            Write-Host "  hasGitHubAppSecrets: $hasGitHubAppSecrets" -ForegroundColor Gray
            Write-Host "  tokenGenerated     : $tokenGenerated" -ForegroundColor Gray
            Write-Host "  useExistingSecrets : $useExistingSecrets" -ForegroundColor Gray
            Write-Host "  " -ForegroundColor Gray
            if (-not $hasGitHubAppSecrets) {
              Write-Host "  ❌ APP_ID and/or APP_PRIVATE_KEY secrets are missing" -ForegroundColor Red
              Write-Host "     → Complete Phase 0: create GitHub App and add secrets" -ForegroundColor Yellow
            } elseif (-not $tokenGenerated) {
              Write-Host "  ❌ GitHub App token generation failed" -ForegroundColor Red
              Write-Host "     → Check the 'Handle GitHub App Token Failure' step above for details" -ForegroundColor Yellow
              Write-Host "     → Verify app is installed: https://github.com/settings/installations" -ForegroundColor Cyan
            }
            Write-Host "  ──────────────────" -ForegroundColor Yellow
            # Step summary
            "## ❌ GitHub App Authentication Failed" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Check | Status |" >> $env:GITHUB_STEP_SUMMARY
            "|---|---|" >> $env:GITHUB_STEP_SUMMARY
            "| APP_ID + APP_PRIVATE_KEY present | $(if ($hasGitHubAppSecrets) { '✅' } else { '❌ Missing' }) |" >> $env:GITHUB_STEP_SUMMARY
            "| App token generated | $(if ($tokenGenerated) { '✅' } else { '❌ Failed' }) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> **To fix**: Ensure the GitHub App is created, installed on this repo, and ``APP_ID`` + ``APP_PRIVATE_KEY`` secrets are set." >> $env:GITHUB_STEP_SUMMARY
            Write-Error "GitHub App authentication required. See diagnostics above."
            exit 1
          }

      - name: Set Environment Secrets
        if: steps.check.outputs.useGitHubApp == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          CLIENT_ID: ${{ inputs.clientId || secrets.AZUREAPPSERVICE_CLIENTID }}
          TENANT_ID: ${{ inputs.tenantId || secrets.AZUREAPPSERVICE_TENANTID }}
          SUBSCRIPTION_ID: ${{ inputs.subscriptionId || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
        run: |
          $selectedEnv = "${{ inputs.environment }}"
          
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║        ENVIRONMENT SECRET CONFIGURATION                       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Target Selection: $selectedEnv" -ForegroundColor Gray
          Write-Host "Authentication: GitHub App" -ForegroundColor Green
          Write-Host ""
          
          # Set GH_TOKEN for gh CLI commands
          $env:GH_TOKEN = $env:GH_APP_TOKEN
          
          # Determine which environments to configure
          $environments = @()
          if ($selectedEnv -eq "all") {
            $environments = @("dev", "staging", "prod")
          } else {
            $environments = @($selectedEnv)
          }
          
          Write-Host "🔑 Configuring environment secrets for: $($environments -join ', ')" -ForegroundColor Cyan
          Write-Host ""
          
          $ownerRepo = "${{ github.repository }}"
          $owner, $repo = $ownerRepo -split '/', 2
          $totalSuccess = 0
          $totalFail = 0
          $failedEnvs = @()
          
          foreach ($env_name in $environments) {
            Write-Host "── $env_name ───────────────────────────────────────────────────" -ForegroundColor DarkGray
            Write-Host "  Environment: $env_name" -ForegroundColor Yellow

            # Check whether environment exists — capture output so errors are visible
            Write-Host "    Checking if environment exists..." -ForegroundColor Gray
            $checkOutput = gh api -H "Accept: application/vnd.github+json" "repos/$owner/$repo/environments/$env_name" 2>&1
            $checkCode   = $LASTEXITCODE

            if ($checkCode -eq 0) {
              Write-Host "      ✅ Environment exists" -ForegroundColor Green
            } else {
              Write-Host "      ➕ Environment not found (exit $checkCode) — creating..." -ForegroundColor Yellow
              $createOutput = gh api --method PUT -H "Accept: application/vnd.github+json" "repos/$owner/$repo/environments/$env_name" 2>&1
              $createCode   = $LASTEXITCODE
              if ($createCode -eq 0) {
                Write-Host "      ✅ Environment '$env_name' created" -ForegroundColor Green
              } else {
                Write-Host "      ❌ Could not create environment '$env_name' (exit $createCode)" -ForegroundColor Red
                Write-Host "         API response: $createOutput" -ForegroundColor Red
                Write-Host "" -ForegroundColor Red
                Write-Host "      ── Diagnostics ──" -ForegroundColor Yellow
                Write-Host "      API endpoint : PUT repos/$owner/$repo/environments/$env_name" -ForegroundColor Gray
                Write-Host "      Auth method  : GitHub App token" -ForegroundColor Gray
                Write-Host "      " -ForegroundColor Gray
                Write-Host "      Possible causes:" -ForegroundColor Yellow
                Write-Host "        1. GitHub App missing 'Environments: write' permission" -ForegroundColor White
                Write-Host "           → Verify at: https://github.com/settings/apps" -ForegroundColor Cyan
                Write-Host "        2. GitHub App not installed on this repository" -ForegroundColor White
                Write-Host "           → Check: https://github.com/settings/installations" -ForegroundColor Cyan
                Write-Host "        3. Repository is on a plan that restricts environment creation" -ForegroundColor White
                Write-Host "      ──────────────────" -ForegroundColor Yellow
                $totalFail += 3  # count all 3 secrets as failed for this environment
                $failedEnvs += $env_name
                Write-Host ""
                continue
              }
            }

            # Set the three OIDC secrets for this environment
            $secretsToSet = @{
              "AZUREAPPSERVICE_CLIENTID"       = $env:CLIENT_ID
              "AZUREAPPSERVICE_TENANTID"       = $env:TENANT_ID
              "AZUREAPPSERVICE_SUBSCRIPTIONID" = $env:SUBSCRIPTION_ID
            }

            foreach ($secretName in $secretsToSet.Keys) {
              Write-Host "    Setting: $secretName" -ForegroundColor Gray
              $setOutput = gh secret set $secretName --env $env_name --repo $ownerRepo --body $secretsToSet[$secretName] 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "      ✅ Success" -ForegroundColor Green
                $totalSuccess++
              } else {
                Write-Host "      ❌ Failed (exit code: $LASTEXITCODE)" -ForegroundColor Red
                Write-Host "         API response  : $setOutput" -ForegroundColor Red
                Write-Host "         Command       : gh secret set $secretName --env $env_name --repo $ownerRepo" -ForegroundColor Gray
                Write-Host ""
                Write-Host "         ── Possible causes ──────────────────────────────────────" -ForegroundColor DarkGray
                Write-Host "         1. GitHub App missing 'Secrets: write' permission" -ForegroundColor Yellow
                Write-Host "            Fix: https://github.com/settings/apps → <App> → Permissions → Secrets" -ForegroundColor Gray
                Write-Host "         2. GitHub App missing 'Environments: write' permission" -ForegroundColor Yellow
                Write-Host "            Fix: same App Permissions page → Repository permissions → Environments" -ForegroundColor Gray
                Write-Host "         3. Environment '$env_name' does not exist in this repository" -ForegroundColor Yellow
                Write-Host "            Fix: https://github.com/${{ github.repository }}/settings/environments" -ForegroundColor Gray
                Write-Host "                 → New environment → name it '$env_name' → Save → re-run" -ForegroundColor Gray
                Write-Host "         ─────────────────────────────────────────────────────────" -ForegroundColor DarkGray
                $totalFail++
                if ($env_name -notin $failedEnvs) { $failedEnvs += $env_name }
              }
            }
            Write-Host ""
          }

          # Verification pass — confirm all three secrets actually appear in each environment
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "🔍 Post-set verification (gh secret list per environment)..." -ForegroundColor Cyan
          Write-Host ""
          foreach ($env_name in $environments) {
            Write-Host "  [$env_name]" -ForegroundColor Yellow
            $listOutput = gh secret list --env $env_name --repo $ownerRepo 2>&1
            if ($LASTEXITCODE -eq 0) {
              $ok1 = $listOutput -match "AZUREAPPSERVICE_CLIENTID"
              $ok2 = $listOutput -match "AZUREAPPSERVICE_TENANTID"
              $ok3 = $listOutput -match "AZUREAPPSERVICE_SUBSCRIPTIONID"
              Write-Host "    AZUREAPPSERVICE_CLIENTID      : $(if ($ok1) { '✅ Confirmed' } else { '❌ NOT FOUND' })" -ForegroundColor $(if ($ok1) { 'Green' } else { 'Red' })
              Write-Host "    AZUREAPPSERVICE_TENANTID      : $(if ($ok2) { '✅ Confirmed' } else { '❌ NOT FOUND' })" -ForegroundColor $(if ($ok2) { 'Green' } else { 'Red' })
              Write-Host "    AZUREAPPSERVICE_SUBSCRIPTIONID: $(if ($ok3) { '✅ Confirmed' } else { '❌ NOT FOUND' })" -ForegroundColor $(if ($ok3) { 'Green' } else { 'Red' })
              if (-not ($ok1 -and $ok2 -and $ok3)) {
                Write-Host "    ⚠️  One or more secrets missing in '$env_name' — check the error output above." -ForegroundColor Yellow
              }
            } else {
              Write-Host "    ⚠️  Could not list secrets for '$env_name': $listOutput" -ForegroundColor Yellow
            }
            Write-Host ""
          }
          
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "Configuration Summary:" -ForegroundColor Cyan
          Write-Host "  ✅ Successful: $totalSuccess" -ForegroundColor Green
          if ($totalFail -gt 0) {
            Write-Host "  ❌ Failed: $totalFail" -ForegroundColor Red
            if ($failedEnvs.Count -gt 0) {
              Write-Host "  ❌ Failed environments: $($failedEnvs -join ', ')" -ForegroundColor Red
            }
            Write-Host ""
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "  ❌ ENVIRONMENT SECRET CONFIGURATION FAILED" -ForegroundColor Red
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "  $totalFail secret write(s) failed. Failed env(s): $($failedEnvs -join ', ')" -ForegroundColor Red
            Write-Host ""
            Write-Host "  ── OPTION A: Delete stale secrets & re-run (safest) ─────────" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "  1. Open the Environments settings page:" -ForegroundColor White
            Write-Host "     https://github.com/${{ github.repository }}/settings/environments" -ForegroundColor Cyan
            Write-Host "     (You will see a list: main / copilot / prod / staging / dev)" -ForegroundColor Gray
            foreach ($failEnv in $failedEnvs) {
              Write-Host ""
              Write-Host "  2. Click '$failEnv':" -ForegroundColor White
              Write-Host "     a. Scroll down to 'Environment secrets'" -ForegroundColor Gray
              Write-Host "     b. Click the trash icon next to each of these 3 secrets:" -ForegroundColor Gray
              Write-Host "          AZUREAPPSERVICE_CLIENTID       ← delete this" -ForegroundColor DarkYellow
              Write-Host "          AZUREAPPSERVICE_TENANTID       ← delete this" -ForegroundColor DarkYellow
              Write-Host "          AZUREAPPSERVICE_SUBSCRIPTIONID ← delete this" -ForegroundColor DarkYellow
            }
            Write-Host ""
            Write-Host "  3. Re-run Azure Initial Setup workflow with:" -ForegroundColor White
            Write-Host "       Phase 1a (Setup Azure OIDC)  = ✅ checked" -ForegroundColor Gray
            Write-Host "       Phase 1b (Configure Secrets) = ✅ checked" -ForegroundColor Gray
            Write-Host "       environment                  = all" -ForegroundColor Gray
            Write-Host ""
            Write-Host "  ── OPTION B: Fix GitHub App permissions ──────────────────────" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "  1. Open: https://github.com/settings/apps" -ForegroundColor White
            Write-Host "  2. Click your GitHub App → 'Permissions & events'" -ForegroundColor White
            Write-Host "  3. Ensure these are set to 'Read and write':" -ForegroundColor White
            Write-Host "       Repository permissions → Secrets      → Read and write" -ForegroundColor Gray
            Write-Host "       Repository permissions → Environments → Read and write" -ForegroundColor Gray
            Write-Host "  4. Click 'Save changes' then re-run this workflow" -ForegroundColor White
            Write-Host ""
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            # Step summary with per-environment breakdown + step-by-step guide
            "## ❌ Environment Secret Configuration Failed" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "$totalFail secret write(s) failed. **All environments must be configured before Bootstrap can run.**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Environment | Status |" >> $env:GITHUB_STEP_SUMMARY
            "|---|---|" >> $env:GITHUB_STEP_SUMMARY
            foreach ($e in $environments) {
              if ($failedEnvs -contains $e) {
                "| $e | ❌ Failed (could not create or set secrets) |" >> $env:GITHUB_STEP_SUMMARY
              } else {
                "| $e | ✅ Configured |" >> $env:GITHUB_STEP_SUMMARY
              }
            }
            "" >> $env:GITHUB_STEP_SUMMARY
            "### 🛠️ Step-by-Step Recovery" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "#### Option A — Delete stale secrets and re-run (recommended)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. Open **[Settings → Environments](https://github.com/${{ github.repository }}/settings/environments)**" >> $env:GITHUB_STEP_SUMMARY
            "   *(you will see: main / copilot / prod / staging / dev)*" >> $env:GITHUB_STEP_SUMMARY
            foreach ($failEnv in $failedEnvs) {
              "2. Click **``$failEnv``** → scroll to *Environment secrets* → delete these 3 secrets:" >> $env:GITHUB_STEP_SUMMARY
              "   - ``AZUREAPPSERVICE_CLIENTID``" >> $env:GITHUB_STEP_SUMMARY
              "   - ``AZUREAPPSERVICE_TENANTID``" >> $env:GITHUB_STEP_SUMMARY
              "   - ``AZUREAPPSERVICE_SUBSCRIPTIONID``" >> $env:GITHUB_STEP_SUMMARY
            }
            "3. Re-run **Azure Initial Setup** with *Phase 1a ✅ + Phase 1b ✅ + environment = all*" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "#### Option B — Fix GitHub App permissions" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. Go to **[https://github.com/settings/apps](https://github.com/settings/apps)**" >> $env:GITHUB_STEP_SUMMARY
            "2. Click your GitHub App → **Permissions & events**" >> $env:GITHUB_STEP_SUMMARY
            "3. Set **Secrets** → *Read and write*; **Environments** → *Read and write*" >> $env:GITHUB_STEP_SUMMARY
            "4. Save and re-run this workflow" >> $env:GITHUB_STEP_SUMMARY
            Write-Error "Failed to configure $totalFail secret(s). All environments must succeed."
            exit 1
          }
          Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "✅ All environment secrets configured successfully!" -ForegroundColor Green
          Write-Host ""

          # Set OIDC_SP_OBJECT_ID as a repo-level secret (same OIDC SP serves all environments)
          # Bootstrap uses this to set a KV access policy so ARM can resolve KV references
          $oidcSpObjectId = '${{ inputs.oidcSpObjectId }}'

          # Set OpenPay credentials as repo-level secrets.
          # These are read by azure-bootstrap.yml and passed to populate-keyvault-secrets.ps1
          # so Key Vault always receives real credentials — no placeholder values, no .env.local needed.
          $openPaySecrets = [ordered]@{
            OPENPAY_MERCHANT_ID       = '${{ inputs.openPayMerchantId }}'
            OPENPAY_PRIVATE_KEY       = '${{ inputs.openPayPrivateKey }}'
            OPENPAY_DEVICE_SESSION_ID = '${{ inputs.openPayDeviceSessionId }}'
          }
          foreach ($entry in $openPaySecrets.GetEnumerator()) {
            if (-not [string]::IsNullOrWhiteSpace($entry.Value)) {
              Write-Host "🔑 Setting repo-level secret: $($entry.Key)" -ForegroundColor Cyan
              $setOut = gh secret set $entry.Key --repo $ownerRepo --body $entry.Value 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "  ✅ $($entry.Key) set successfully" -ForegroundColor Green
              } else {
                Write-Host "  ⚠️  Could not set $($entry.Key) (non-fatal): $setOut" -ForegroundColor Yellow
              }
            } else {
              Write-Host "  ℹ️  $($entry.Key) not provided — secret not updated" -ForegroundColor Gray
            }
          }
          if (-not [string]::IsNullOrWhiteSpace($oidcSpObjectId)) {
            Write-Host "🔑 Setting repo-level secret: OIDC_SP_OBJECT_ID" -ForegroundColor Cyan
            $setOutput = gh secret set OIDC_SP_OBJECT_ID --repo $ownerRepo --body $oidcSpObjectId 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  ✅ OIDC_SP_OBJECT_ID set successfully" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️  Could not set OIDC_SP_OBJECT_ID (non-fatal): $setOutput" -ForegroundColor Yellow
            }
          } else {
            Write-Host "  ℹ️  oidcSpObjectId not provided — OIDC_SP_OBJECT_ID secret not updated" -ForegroundColor Gray
          }

      - name: Report Existing Configuration
        if: steps.prereqs.outputs.useExistingSecrets == 'true'
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║   ✅ OIDC SECRETS FULLY CONFIGURED — NO UPDATE NEEDED         ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          Write-Host "  Repository-level secrets:" -ForegroundColor Green
          Write-Host "    ✅ AZUREAPPSERVICE_CLIENTID" -ForegroundColor Green
          Write-Host "    ✅ AZUREAPPSERVICE_TENANTID" -ForegroundColor Green
          Write-Host "    ✅ AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor Green
          Write-Host ""
          Write-Host "  Environment-level secrets (all target environments verified):" -ForegroundColor Green
          Write-Host "    ✅ All environments have all 3 OIDC secrets" -ForegroundColor Green
          Write-Host ""
          Write-Host "  No secret values were changed — existing configuration is retained." -ForegroundColor Gray
          Write-Host ""
          Write-Host "  ℹ️  To update these secrets with new OIDC credentials, re-run with" -ForegroundColor Cyan
          Write-Host "     both phases selected:" -ForegroundColor Cyan
          Write-Host "     ✅ Setup Azure OIDC (Phase 1a)          = true" -ForegroundColor White
          Write-Host "     ✅ Configure GitHub Secrets (Phase 1b)  = true" -ForegroundColor White
          Write-Host ""
          Write-Host "✅ Phase 1b complete — existing configuration verified" -ForegroundColor Green
          Write-Host ""

  validate-configuration:
    name: Validate Configuration
    if: |
      !cancelled() &&
      inputs.configureSecrets &&
      (needs.configure-secrets.result == 'success')
    needs: [validate-inputs, setup-github-app, configure-secrets]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Configuration Validation
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         FINAL CONFIGURATION VALIDATION                        ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "Environment: ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host ""
          
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📋 Configuration Summary" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          
          $allChecks = @()
          
          # Check GitHub App setup
          $appSetup = "${{ needs.setup-github-app.result }}"
          if ($appSetup -eq "success") {
            Write-Host "  ✅ GitHub App Setup: Configured" -ForegroundColor Green
            $allChecks += $true
          } elseif ($appSetup -eq "skipped") {
            Write-Host "  ⏭️  GitHub App Setup: Skipped (existing config used)" -ForegroundColor Yellow
            $allChecks += $true
          } else {
            Write-Host "  ⚠️  GitHub App Setup: Not configured or failed" -ForegroundColor Yellow
            $allChecks += $true  # Not critical if already configured
          }
          
          # Check secret configuration
          $secretsSetup = "${{ needs.configure-secrets.result }}"
          if ($secretsSetup -eq "success") {
            Write-Host "  ✅ Secret Configuration: Completed" -ForegroundColor Green
            $allChecks += $true
          } else {
            Write-Host "  ❌ Secret Configuration: Failed or not run" -ForegroundColor Red
            $allChecks += $false
          }
          
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📊 Environment-Specific Configuration" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          
          $selectedEnv = "${{ inputs.environment }}"
          $environments = if ($selectedEnv -eq "all") { @("dev", "staging", "prod") } else { @($selectedEnv) }
          
          Write-Host "  Configured environments: $($environments -join ', ')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "  Expected secrets per environment:" -ForegroundColor Gray
          Write-Host "    • AZUREAPPSERVICE_CLIENTID" -ForegroundColor Gray
          Write-Host "    • AZUREAPPSERVICE_TENANTID" -ForegroundColor Gray
          Write-Host "    • AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor Gray
          Write-Host ""
          
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "🔍 Validation Tools" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          Write-Host "  To validate your configuration locally, run:" -ForegroundColor Yellow
          Write-Host "    .\scripts\validate-github-app-config.ps1 -Detailed" -ForegroundColor Cyan
          Write-Host ""
          
          $failedChecks = $allChecks | Where-Object { -not $_ }
          if ($failedChecks.Count -eq 0) {
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host "✅ CONFIGURATION VALIDATION SUCCESSFUL" -ForegroundColor Green
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host ""
            Write-Host "  Your GitHub configuration is complete!" -ForegroundColor Green
          } else {
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
            Write-Host "⚠️  CONFIGURATION VALIDATION COMPLETED WITH WARNINGS" -ForegroundColor Yellow
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "  Some components failed validation." -ForegroundColor Yellow
          }
          Write-Host ""

      - name: Create Validation Summary
        if: always()
        run: |
          "## 🔍 Configuration Validation" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### Configuration Status" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Component | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|--------|" >> $env:GITHUB_STEP_SUMMARY
          
          $app = "${{ needs.setup-github-app.result }}"
          $appIcon = if ($app -eq "success") { "✅" } elseif ($app -eq "skipped") { "⏭️" } else { "⚠️" }
          "| GitHub App | $appIcon $app |" >> $env:GITHUB_STEP_SUMMARY
          
          $secrets = "${{ needs.configure-secrets.result }}"
          $secretsIcon = if ($secrets -eq "success") { "✅" } else { "❌" }
          "| Secrets | $secretsIcon $secrets |" >> $env:GITHUB_STEP_SUMMARY
          
          "" >> $env:GITHUB_STEP_SUMMARY
          "### Validation Tools" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "To validate your local configuration:" >> $env:GITHUB_STEP_SUMMARY
          "``````powershell" >> $env:GITHUB_STEP_SUMMARY
          ".\scripts\validate-github-app-config.ps1 -Detailed" >> $env:GITHUB_STEP_SUMMARY
          "``````" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### Documentation" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- 📖 [GitHub App Automation Guide](../blob/main/Documentation/03-Configuration-Guides/GITHUB-APP-AUTOMATION.md)" >> $env:GITHUB_STEP_SUMMARY
          "- 📖 [Quick Setup Guide](../blob/main/Documentation/03-Configuration-Guides/QUICK-SETUP-GITHUB-APP.md)" >> $env:GITHUB_STEP_SUMMARY
          "- 🔧 [Setup Script](../blob/main/scripts/setup-github-app-from-manifest.ps1)" >> $env:GITHUB_STEP_SUMMARY
          "- 🔍 [Validation Script](../blob/main/scripts/validate-github-app-config.ps1)" >> $env:GITHUB_STEP_SUMMARY
