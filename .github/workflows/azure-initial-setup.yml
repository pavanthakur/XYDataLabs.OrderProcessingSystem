name: Azure Initial Setup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '🎯 Environment | Use "all" (recommended) to configure dev + staging + prod in one run'
        required: true
        type: choice
        options:
          - all
          - dev
          - staging
          - prod
        default: 'all'
      setupGitHubApp:
        description: 'ℹ️ Phase 0 — GitHub App Instructions | Shows setup steps if APP_ID + APP_PRIVATE_KEY secrets are missing'
        required: true
        type: boolean
        default: true
      setupOidc:
        description: '🔑 Phase 1a — Setup Azure OIDC | Creates Azure AD App Registration + federated identity credentials'
        required: true
        type: boolean
        default: true
      oidcAppName:
        description: 'OIDC App Name | Default: GitHub-Actions-OIDC (only change if using custom name)'
        required: false
        type: string
        default: 'GitHub-Actions-OIDC'
      configureSecrets:
        description: '🔑 Phase 1b — Configure GitHub Secrets | Stores OIDC values as GitHub environment secrets. Requires Phase 0 (APP_ID+APP_PRIVATE_KEY)'
        required: true
        type: boolean
        default: true
      githubAppName:
        description: 'GitHub App Name | Your app name (e.g. XYDataLabsGitHubApp) — used for validation and instructions'
        required: false
        type: string
        default: 'XYDataLabsGitHubApp'

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  check-trigger:
    name: Check Workflow Trigger
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Workflow trigger check
        run: |
          Write-Host "ℹ️  This workflow is designed for manual dispatch only" -ForegroundColor Cyan
          Write-Host "   Skipping execution for event: ${{ github.event_name }}" -ForegroundColor Yellow
          Write-Host "   To run this workflow, use: Actions > Azure Initial Setup > Run workflow" -ForegroundColor Gray

  validate-inputs:
    name: Validate Workflow Inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Log Workflow Start
        run: |
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "  AZURE INITIAL SETUP WORKFLOW STARTED" -ForegroundColor Cyan
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "⏰ Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "👤 Triggered by: ${{ github.actor }}" -ForegroundColor Gray
          Write-Host "🌿 Branch: ${{ github.ref_name }}" -ForegroundColor Gray
          Write-Host "📦 Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "🔗 Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" -ForegroundColor Gray
          Write-Host "" -ForegroundColor Gray
          Write-Host "📋 USER SELECTED PARAMETERS:" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  Parameter              Value    Checkbox" -ForegroundColor DarkGray
          Write-Host "  ──────────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "  environment          = ${{ inputs.environment }}" -ForegroundColor White
          Write-Host "" -ForegroundColor Gray
          Write-Host "  SETUP PHASES:" -ForegroundColor Cyan
          Write-Host "  setupGitHubApp       = ${{ inputs.setupGitHubApp }}  $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { '[✅ checked]   — Phase 0: Setup GitHub App' } else { '[☐  unchecked] — Phase 0: Setup GitHub App' })" -ForegroundColor $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  githubAppName        = ${{ inputs.githubAppName }}" -ForegroundColor DarkGray
          Write-Host "  setupOidc            = ${{ inputs.setupOidc }}  $(if ('${{ inputs.setupOidc }}' -eq 'true') { '[✅ checked]   — Phase 1a: Setup Azure OIDC' } else { '[☐  unchecked] — Phase 1a: Setup Azure OIDC' })" -ForegroundColor $(if ('${{ inputs.setupOidc }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  oidcAppName          = ${{ inputs.oidcAppName }}" -ForegroundColor DarkGray
          Write-Host "  configureSecrets     = ${{ inputs.configureSecrets }}  $(if ('${{ inputs.configureSecrets }}' -eq 'true') { '[✅ checked]   — Phase 1b: Configure Secrets' } else { '[☐  unchecked] — Phase 1b: Configure Secrets' })" -ForegroundColor $(if ('${{ inputs.configureSecrets }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray
          Write-Host "  ──────────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  ℹ️  This workflow handles one-time Azure setup (Phase 0, 1a, 1b)." -ForegroundColor Cyan
          Write-Host "     For infrastructure bootstrap & deployments, use 'Azure Bootstrap & Deploy'." -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray

      - name: Validate Configuration
        run: |
          Write-Host "🔍 Validating workflow inputs..." -ForegroundColor Cyan
          Write-Host ("=" * 70) -ForegroundColor Gray

          $env = "${{ inputs.environment }}"
          $setupOidc = "${{ inputs.setupOidc }}"
          $setupGitHubApp = "${{ inputs.setupGitHubApp }}"
          $configSecrets = "${{ inputs.configureSecrets }}"

          Write-Host "`n📋 Workflow Inputs:" -ForegroundColor Cyan
          Write-Host "  Environment: $env" -ForegroundColor Yellow
          Write-Host "  Setup OIDC: $setupOidc" -ForegroundColor Yellow
          Write-Host "  Setup GitHub App: $setupGitHubApp" -ForegroundColor Yellow
          Write-Host "  Configure secrets: $configSecrets" -ForegroundColor Yellow

          # Validate environment selection
          if ($env -notin @('dev', 'staging', 'prod', 'all')) {
            Write-Host "  ❌ Invalid environment: $env" -ForegroundColor Red
            Write-Error "Invalid environment: $env. Must be dev, staging, prod, or all."
            exit 1
          }
          Write-Host "  ✅ Environment selection valid" -ForegroundColor Green

          # No branch-environment check required for setup workflow.
          # Phase 0 is informational only, Phase 1a/1b always run in 'dev' environment context.
          # The environment input only controls which federated credentials get created.
          Write-Host "`n  ℹ️  Branch check: Not required for initial setup" -ForegroundColor Cyan
          Write-Host "     Phase 1a/1b always use 'dev' environment context regardless of branch." -ForegroundColor Gray

          if (($setupOidc -eq "true" -or $configSecrets -eq "true") -and $env -ne "all") {
            Write-Host "" -ForegroundColor Gray
            Write-Host "  ⚠️  RECOMMENDATION: Use environment='all' for Phase 1a/1b" -ForegroundColor Yellow
            Write-Host "     This creates federated credentials for dev + staging + prod in one run," -ForegroundColor Yellow
            Write-Host "     preventing AADSTS700213 errors when running bootstrap for other environments." -ForegroundColor Yellow
          }

          # Check OIDC secrets status
          Write-Host "`n  🔐 Repository Secrets Check:" -ForegroundColor Cyan

          # Detect Phase 0-only run
          $isPhase0Only = ($setupGitHubApp -eq "true") -and ($configSecrets -eq "false") -and ($setupOidc -eq "false")

          if ($isPhase0Only) {
            Write-Host "    ℹ️  Phase 0 run detected — OIDC secrets check skipped" -ForegroundColor Cyan
            Write-Host "    ✅ OIDC secrets are not required yet (Phase 1a/1b task)" -ForegroundColor Green
            Write-Host "    💡 Next step: After completing GitHub App setup, run this workflow again with:" -ForegroundColor Yellow
            Write-Host "       ✅ Setup Azure OIDC" -ForegroundColor White
            Write-Host "       ✅ Configure Secrets" -ForegroundColor White
          } elseif ($setupOidc -eq "false" -and $configSecrets -eq "false") {
            Write-Host "    ℹ️  No OIDC setup phases selected — secrets check skipped" -ForegroundColor Cyan
          } elseif ($setupOidc -eq "false") {
            Write-Host "    Setup OIDC: Unchecked (skipped)" -ForegroundColor Yellow
            Write-Host "    ℹ️  OIDC secrets are stored at environment level (dev/staging/prod) — not at repository level." -ForegroundColor Cyan
            Write-Host "    Verification of environment secrets is performed by Phase 1b (Configure Secrets)." -ForegroundColor Gray
            Write-Host "" -ForegroundColor Gray
            Write-Host "    To verify: Settings → Environments → [dev/staging/prod] → Secrets" -ForegroundColor Gray
            Write-Host "    Expected: AZUREAPPSERVICE_CLIENTID, AZUREAPPSERVICE_TENANTID, AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor Gray
            Write-Host "" -ForegroundColor Gray
            if ($configSecrets -eq "true") {
              Write-Host "    ✅ Phase 1b selected — environment secrets will be verified and updated if needed." -ForegroundColor Green
            } else {
              Write-Host "    ✅ Assuming environment secrets exist from a previous Phase 1a/1b run." -ForegroundColor Green
              Write-Host "       If bootstrap or deploy fails with AADSTS errors, re-run with Phase 1a + 1b enabled." -ForegroundColor Gray
            }
          } else {
            Write-Host "    ✅ Setup Azure OIDC: Checked - secrets will be created" -ForegroundColor Green
          }

          # Check GitHub App secrets when configureSecrets is requested (Phase 1b mandatory gate)
          if ($configSecrets -eq "true") {
            $appName     = "${{ inputs.githubAppName }}"
            $appSlug     = $appName.ToLower() -replace '[^a-z0-9]', '-'
            $secretsUrl  = "https://github.com/${{ github.repository }}/settings/secrets/actions"

            Write-Host "`n  🤖 GitHub App Check (MANDATORY for Phase 1b — 'Configure Secrets'):" -ForegroundColor Cyan
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

            $hasAppId      = "${{ secrets.APP_ID }}" -ne ""
            $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""

            Write-Host "    APP_ID        : $(if ($hasAppId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasAppId) { "Green" } else { "Red" })
            Write-Host "    APP_PRIVATE_KEY: $(if ($hasPrivateKey) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { "Green" } else { "Red" })
            Write-Host ""

            if ($hasAppId -and $hasPrivateKey) {
              Write-Host "    ✅ Phase 0 complete — GitHub App secrets are configured" -ForegroundColor Green
              Write-Host "       GitHub App Name (configured): $appName" -ForegroundColor Cyan
              Write-Host "    ℹ️  APP_INSTALLATION_ID: auto-discovered at runtime" -ForegroundColor Cyan
              Write-Host ""
              Write-Host "    ════════════════════════════════════════════════════════════" -ForegroundColor Green
              Write-Host "    ✅ PHASE 0 IS CONFIGURED CORRECTLY — OK TO PROCEED WITH PHASE 1" -ForegroundColor Green
              Write-Host "    ════════════════════════════════════════════════════════════" -ForegroundColor Green
            } else {
              Write-Host "    ❌ PHASE 0 INCOMPLETE — Phase 1b cannot proceed!" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    Phase 1b ('Configure Secrets') requires a GitHub App to be created" -ForegroundColor Red
              Write-Host "    and its APP_ID + APP_PRIVATE_KEY secrets to be configured first." -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    ══════════════════════════════════════════════════════════════════" -ForegroundColor Red
              Write-Host "    HOW TO COMPLETE PHASE 0 (GitHub App Setup)" -ForegroundColor Yellow
              Write-Host "    ══════════════════════════════════════════════════════════════════" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 1 — Create GitHub App '$appName'" -ForegroundColor Cyan
              Write-Host "      Option A (Recommended): Run the setup script:" -ForegroundColor White
              Write-Host "        .\scripts\setup-github-app-from-manifest.ps1" -ForegroundColor Yellow
              Write-Host "      Option B (Manual):" -ForegroundColor White
              Write-Host "        1. Open: https://github.com/settings/apps/new" -ForegroundColor White
              Write-Host "        2. App name: $appName (or your chosen name)" -ForegroundColor White
              Write-Host "        3. Set REQUIRED permissions:" -ForegroundColor White
              Write-Host "           • Actions: write   • Secrets: write   • Workflows: write" -ForegroundColor Gray
              Write-Host "           • Environments: write   • Contents: read   • Metadata: read" -ForegroundColor Gray
              Write-Host "        4. Generate a private key (saves a .pem file)" -ForegroundColor White
              Write-Host "        5. Note the App ID from the General settings page" -ForegroundColor White
              Write-Host "        6. Install app on: ${{ github.repository }}" -ForegroundColor White
              Write-Host "           Link: https://github.com/settings/installations" -ForegroundColor Gray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 2 — Add Repository Secrets at:" -ForegroundColor Cyan
              Write-Host "      ➡️  $secretsUrl" -ForegroundColor Yellow
              Write-Host "" -ForegroundColor Gray
              Write-Host "      Click 'New repository secret' and add:" -ForegroundColor White
              Write-Host "      ┌─────────────────┬──────────────────────────────────────────────┐" -ForegroundColor DarkGray
              Write-Host "      │ APP_ID          │ Numeric App ID from app's General settings   │" -ForegroundColor White
              Write-Host "      │                 │ page: https://github.com/settings/apps/$appSlug │" -ForegroundColor Gray
              Write-Host "      ├─────────────────┼──────────────────────────────────────────────┤" -ForegroundColor DarkGray
              Write-Host "      │ APP_PRIVATE_KEY │ Full contents of the downloaded .pem file    │" -ForegroundColor White
              Write-Host "      │                 │ (include -----BEGIN RSA PRIVATE KEY----- )   │" -ForegroundColor Gray
              Write-Host "      └─────────────────┴──────────────────────────────────────────────┘" -ForegroundColor DarkGray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 3 — Re-run this workflow with:" -ForegroundColor Cyan
              Write-Host "      ✅ Setup Azure OIDC         = true" -ForegroundColor Green
              Write-Host "      ✅ Configure GitHub Secrets = true" -ForegroundColor Green
              Write-Host "      ❌ Setup GitHub App         = false (already done)" -ForegroundColor DarkGray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    ══════════════════════════════════════════════════════════════════" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    ❌ VALIDATION FAILED: Phase 0 prerequisites not met." -ForegroundColor Red
              Write-Host "    Cannot proceed with Phase 1a/1b until GitHub App is created and" -ForegroundColor Red
              Write-Host "    APP_ID + APP_PRIVATE_KEY secrets are added at:" -ForegroundColor Red
              Write-Host "    $secretsUrl" -ForegroundColor Yellow
              Write-Host "" -ForegroundColor Gray
              Write-Error "Phase 0 incomplete: GitHub App secrets (APP_ID, APP_PRIVATE_KEY) are required. See instructions above."
              exit 1
            }
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          }

          Write-Host "`n" -ForegroundColor Gray
          Write-Host ("=" * 70) -ForegroundColor Gray
          Write-Host "✅ Input validation passed - proceeding..." -ForegroundColor Green
          exit 0

      - name: Phase Readiness Pre-Flight Summary
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PHASE READINESS PRE-FLIGHT SUMMARY (DRY-RUN CHECK)       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "This step shows what will run and whether prerequisites are met." -ForegroundColor Gray
          Write-Host ""

          # ── Detect credential availability ────────────────────────────────
          $hasClientId     = "${{ secrets.AZUREAPPSERVICE_CLIENTID }}"   -ne ""
          $hasTenantId     = "${{ secrets.AZUREAPPSERVICE_TENANTID }}"   -ne ""
          $hasSubscriptionId = "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}" -ne ""
          $oidcConfigured  = $hasClientId -and $hasTenantId -and $hasSubscriptionId

          $hasAppId        = "${{ secrets.APP_ID }}"          -ne ""
          $hasPrivateKey   = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          $appConfigured   = $hasAppId -and $hasPrivateKey

          # ── Read selected inputs ────────────────────────────────────────
          $doSetupOidc     = "${{ inputs.setupOidc }}"        -eq "true"
          $doSetupGhApp    = "${{ inputs.setupGitHubApp }}"   -eq "true"
          $doConfigSecrets = "${{ inputs.configureSecrets }}" -eq "true"

          # ── Credential summary ───────────────────────────────────────────
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "🔐 CREDENTIAL STATUS" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "  Azure OIDC (AZUREAPPSERVICE_*):" -ForegroundColor Cyan
          Write-Host "    CLIENTID      : $(if ($hasClientId)       { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { 'Green' } else { 'Red' })
          Write-Host "    TENANTID      : $(if ($hasTenantId)       { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { 'Green' } else { 'Red' })
          Write-Host "    SUBSCRIPTIONID: $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { 'Green' } else { 'Red' })
          Write-Host ""
          Write-Host "  GitHub App (Phase 0 credentials):" -ForegroundColor Cyan
          Write-Host "    APP_ID        : $(if ($hasAppId)      { '✅ Present' } else { '⬜ Missing' })" -ForegroundColor $(if ($hasAppId) { 'Green' } else { 'Yellow' })
          Write-Host "    APP_PRIVATE_KEY: $(if ($hasPrivateKey) { '✅ Present' } else { '⬜ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { 'Green' } else { 'Yellow' })
          Write-Host ""

          # ── Phase readiness table ───────────────────────────────────────
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "📋 PHASE EXECUTION PLAN" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""

          # Phase 0: GitHub App instructions
          $phase0Icon = if ($doSetupGhApp) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          Write-Host "  Phase 0 — GitHub App Instructions  : $phase0Icon" -ForegroundColor $(if ($doSetupGhApp) { 'Cyan' } else { 'DarkGray' })

          # Phase 1a: Setup OIDC
          $effectiveSetupOidc = $doSetupOidc -or $doConfigSecrets
          $phase1aIcon   = if ($effectiveSetupOidc) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          $phase1aAuth   = if ($oidcConfigured) { 'non-interactive (OIDC)' } else { 'interactive (device code — first-time)' }
          $phase1aNote   = if (-not $doSetupOidc -and $doConfigSecrets) {
            " (auto-triggered by Phase 1b)"
          } else { '' }
          Write-Host "  Phase 1a — Setup Azure OIDC        : $phase1aIcon$phase1aNote" -ForegroundColor $(if ($effectiveSetupOidc) { 'Cyan' } else { 'DarkGray' })
          if ($effectiveSetupOidc) {
            Write-Host "             └─ Login method: $phase1aAuth" -ForegroundColor Gray
          }

          # Phase 1b: Configure GitHub Secrets
          $phase1bPrereq  = $appConfigured
          $phase1bEnabled = $doConfigSecrets -or $doSetupGhApp
          $phase1bIcon    = if ($phase1bEnabled) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          $oidcAvailableForPhase1b = $effectiveSetupOidc -or $oidcConfigured
          $phase1bReady   = (-not $phase1bEnabled) -or ($phase1bPrereq -and $oidcAvailableForPhase1b)
          Write-Host "  Phase 1b — Configure GitHub Secrets: $phase1bIcon" -ForegroundColor $(if ($phase1bEnabled) { 'Cyan' } else { 'DarkGray' })
          if ($phase1bEnabled) {
            if ($effectiveSetupOidc) {
              Write-Host "             └─ OIDC source: fresh credentials from Phase 1a$(if (-not $doSetupOidc) { ' (auto-triggered)' } else { '' })" -ForegroundColor Gray
            } elseif ($oidcConfigured) {
              Write-Host "             └─ OIDC source: existing AZUREAPPSERVICE_* secrets ✅" -ForegroundColor Green
            } else {
              Write-Host "             └─ ⚠️  OIDC source: not found at repository level" -ForegroundColor Yellow
              Write-Host "                    (May exist as environment secrets — Phase 1b will verify)" -ForegroundColor Gray
            }
            Write-Host "             └─ GitHub App token: $(if ($appConfigured) { '✅ APP_ID + APP_PRIVATE_KEY present' } else { '❌ Missing — Phase 0 required' })" `
              -ForegroundColor $(if ($appConfigured) { 'Green' } else { 'Red' })
          }

          Write-Host ""

          # ── Overall readiness gate ──────────────────────────────────────
          $allReady = $phase1bReady
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

          if ($allReady) {
            Write-Host ""
            Write-Host "✅ PRE-FLIGHT CHECK PASSED — All selected phases have prerequisites met." -ForegroundColor Green
            Write-Host ""
          } else {
            Write-Host ""
            Write-Host "⚠️  PRE-FLIGHT CHECK — One or more phases have unmet prerequisites:" -ForegroundColor Yellow
            if (-not $phase1bReady) {
              if (-not $appConfigured) {
                Write-Host "  ❌ Phase 1b needs GitHub App credentials (APP_ID + APP_PRIVATE_KEY)." -ForegroundColor Red
                Write-Host "     → Complete Phase 0 (APP_ID + APP_PRIVATE_KEY must be set)" -ForegroundColor Yellow
              }
              if (-not $oidcAvailableForPhase1b) {
                Write-Host "  ❌ Phase 1b: OIDC credentials not found at repository level; Phase 1a is not running." -ForegroundColor Red
                Write-Host "     → For first-time setup: enable Phase 1a + 1b together" -ForegroundColor Yellow
              }
            }
            Write-Host ""
            Write-Error "Pre-flight check failed — one or more selected phases have unmet prerequisites. See details above."
            exit 1
          }

          Write-Host ""
          Write-Host "ℹ️  After initial setup completes, use 'Azure Bootstrap & Deploy' workflow" -ForegroundColor Cyan
          Write-Host "   for infrastructure provisioning (Phase 2) and deployments." -ForegroundColor Cyan
          Write-Host ""

  setup-oidc:
    name: Setup Azure OIDC
    # Only runs when Phase 1a or Phase 1b is explicitly selected.
    # Phase 1b auto-triggers Phase 1a because configure-github-secrets needs OIDC values.
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.setupOidc || inputs.configureSecrets)
    needs: [validate-inputs]
    runs-on: windows-latest
    # Always uses 'dev' environment context — all environments share
    # the same Azure AD App Registration. This avoids the chicken-and-egg
    # problem where a new environment's federated credential doesn't exist yet.
    environment: dev
    outputs:
      clientIdB64: ${{ steps.oidc-handoff.outputs.clientIdB64 }}
      tenantIdB64: ${{ steps.oidc-handoff.outputs.tenantIdB64 }}
      subscriptionIdB64: ${{ steps.oidc-handoff.outputs.subscriptionIdB64 }}
      spObjectIdB64: ${{ steps.oidc-handoff.outputs.spObjectIdB64 }}
    steps:
      - uses: actions/checkout@v6

      - name: Auth Check
        id: auth-check
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         AZURE AUTHENTICATION CHECK                           ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          $hasOidc    = -not [string]::IsNullOrWhiteSpace("${{ secrets.AZUREAPPSERVICE_CLIENTID }}")
          $setupOidc  = "${{ inputs.setupOidc }}" -eq "true"

          # When setupOidc=true we are creating/modifying Azure AD App Registrations.
          # The OIDC service principal only has subscription Contributor — it does NOT have
          # Azure AD directory permissions (Application.ReadWrite.All) needed to manage
          # App Registrations.  Force device code so the human user's Azure AD identity
          # is used instead.
          if ($setupOidc) {
            Write-Host "ℹ️  setupOidc=true: Azure AD App Registration management required." -ForegroundColor Cyan
            Write-Host "   Forcing device code login — only a user with Azure AD admin rights" -ForegroundColor Cyan
            Write-Host "   (Application Administrator / Global Admin) can create App Registrations." -ForegroundColor Cyan
            Write-Host "   The OIDC service principal has subscription Contributor only." -ForegroundColor Gray
            "useExistingOidc=false" >> $env:GITHUB_OUTPUT
          } elseif ($hasOidc) {
            Write-Host "✅ Existing OIDC credentials found — will use non-interactive login" -ForegroundColor Green
            "useExistingOidc=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠️  No existing OIDC credentials — will use device code login" -ForegroundColor Yellow
            Write-Host "   This is expected for first-time setup." -ForegroundColor Gray
            "useExistingOidc=false" >> $env:GITHUB_OUTPUT
          }
        env:
          CLIENTID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}

      - name: Azure Login (Existing OIDC)
        if: steps.auth-check.outputs.useExistingOidc == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Azure Login (Device Code)
        if: steps.auth-check.outputs.useExistingOidc == 'false'
        timeout-minutes: 5
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
          Write-Host "║         DEVICE CODE LOGIN — FIRST-TIME SETUP                  ║" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "You have 5 minutes to authenticate. A device code will appear below." -ForegroundColor Cyan
          Write-Host ""

          $timeoutSeconds = 300  # 5 minutes

          # Run az login in a background job so we can enforce a timeout and surface the URL
          $loginJob = Start-Job { az login --use-device-code 2>&1 }

          $startTime  = Get-Date
          $shownLines = [System.Collections.Generic.HashSet[string]]::new()
          $urlWritten = $false

          while ($loginJob.State -notin @('Completed', 'Failed', 'Stopped')) {
            Start-Sleep -Seconds 2

            # Enforce timeout
            if (((Get-Date) - $startTime).TotalSeconds -gt $timeoutSeconds) {
              Stop-Job  $loginJob -ErrorAction SilentlyContinue
              Remove-Job $loginJob -Force -ErrorAction SilentlyContinue
              Write-Host ""
              Write-Host "⏱️  TIMEOUT — Authentication not completed within 5 minutes." -ForegroundColor Red
              Write-Host "   Re-run the workflow and authenticate promptly." -ForegroundColor Yellow
              "⏱️ **Login timed out** — Re-run the workflow and authenticate within 5 minutes." >> $env:GITHUB_STEP_SUMMARY
              Write-Error "Device code login timed out after 5 minutes"
              exit 1
            }

            # Stream new output lines
            $lines = Receive-Job $loginJob -Keep 2>&1
            foreach ($line in ($lines | ForEach-Object { [string]$_ })) {
              if ($shownLines.Add($line)) {
                Write-Host $line

                # When the URL line appears, reprint it prominently and add to summary
                if (-not $urlWritten -and $line -match '(https://login\.microsoft\.com/[^\s]+)') {
                  $loginUrl = $Matches[1].TrimEnd('.')
                  Write-Host ""
                  Write-Host "  ╔══ 👉 CLICK TO AUTHENTICATE ═══════════════════════════════╗" -ForegroundColor Cyan
                  Write-Host "  ║  $loginUrl" -ForegroundColor Yellow
                  Write-Host "  ╚═══════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
                  Write-Host ""
                  # Write clickable link to step summary (visible in the job summary panel)
                  "**[👉 Open login page: $loginUrl]($loginUrl)**" >> $env:GITHUB_STEP_SUMMARY
                  $urlWritten = $true
                }
              }
            }
          }

          # Flush any remaining output
          Receive-Job $loginJob 2>&1 | ForEach-Object {
            $s = [string]$_
            if ($shownLines.Add($s)) { Write-Host $s }
          }

          $jobFailed = $loginJob.State -eq 'Failed'
          Remove-Job $loginJob -Force -ErrorAction SilentlyContinue

          if ($jobFailed) {
            Write-Host "❌ Device code login failed" -ForegroundColor Red
            Write-Error "Azure device code login failed"
            exit 1
          }

          Write-Host ""
          Write-Host "✅ Device code login successful" -ForegroundColor Green

      - name: Emit Existing Credentials as Outputs
        id: oidc-passthrough
        if: ${{ !inputs.setupOidc }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PASSTHROUGH — USING EXISTING OIDC CREDENTIALS           ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Phase 1a (Setup OIDC) was not selected." -ForegroundColor Gray
          Write-Host "Passing through existing OIDC credentials to downstream jobs." -ForegroundColor Gray
          Write-Host ""

          $storedClientId = "${{ secrets.AZUREAPPSERVICE_CLIENTID }}"
          $tenantId       = "${{ secrets.AZUREAPPSERVICE_TENANTID }}"
          $subscriptionId = "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}"

          # ── Client ID integrity check ────────────────────────────────────────────
          # Always query Azure by display name and compare against the stored secret.
          # If they differ (e.g. after accidental app deletion + re-creation) we use
          # the Azure-sourced value so Phase 1b force-writes the correct Client ID.
          # GitHub secrets are write-only — we cannot read the stored value back to
          # compare programmatically, but we CAN compare what Azure says against what
          # the GitHub Actions context exposes via ${{ secrets.* }}.
          # ─────────────────────────────────────────────────────────────────────────
          $appName  = "${{ inputs.oidcAppName }}"
          $clientId = $storedClientId   # default; overridden on mismatch

          Write-Host "🔍 Verifying Client ID against Azure ($appName)..." -ForegroundColor Cyan
          try {
            $azureApps    = az ad app list --display-name $appName 2>&1 | ConvertFrom-Json -ErrorAction Stop
            $azureClientId = if ($azureApps -and $azureApps.Count -gt 0) { $azureApps[0].appId } else { $null }

            if ($azureClientId) {
              Write-Host "  Stored secret Client ID : $storedClientId" -ForegroundColor Gray
              Write-Host "  Azure App Client ID     : $azureClientId"  -ForegroundColor Gray

              if ($storedClientId -ne $azureClientId) {
                Write-Host ""
                Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                Write-Host "  ⚠️  CLIENT ID MISMATCH DETECTED" -ForegroundColor Yellow
                Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                Write-Host "  Stored GitHub secret : $storedClientId  ← STALE (old / deleted app)" -ForegroundColor Red
                Write-Host "  Azure App Client ID  : $azureClientId   ← CORRECT" -ForegroundColor Green
                Write-Host ""
                Write-Host "  Likely cause: '$appName' was deleted and re-created in Entra ID," -ForegroundColor Yellow
                Write-Host "  leaving the old Client ID in the GitHub environment secrets." -ForegroundColor Yellow
                Write-Host ""
                Write-Host "  ✅ Auto-fix in progress: using Azure-sourced Client ID for this run." -ForegroundColor Cyan
                Write-Host "     Phase 1b will overwrite AZUREAPPSERVICE_CLIENTID in all environments." -ForegroundColor Cyan
                Write-Host ""
                Write-Host "  ── MANUAL FALLBACK (use only if Phase 1b also fails below) ──────" -ForegroundColor DarkGray
                Write-Host "  1. Open: https://github.com/${{ github.repository }}/settings/environments" -ForegroundColor White
                Write-Host "     (Screenshot: you will see dev / staging / prod each showing '3 secrets')" -ForegroundColor Gray
                Write-Host "  2. For EACH environment (dev, staging, prod):" -ForegroundColor White
                Write-Host "       a. Click the environment name" -ForegroundColor Gray
                Write-Host "       b. Scroll to 'Environment secrets'" -ForegroundColor Gray
                Write-Host "       c. Click the trash icon next to each of these 3 secrets:" -ForegroundColor Gray
                Write-Host "            AZUREAPPSERVICE_CLIENTID" -ForegroundColor DarkYellow
                Write-Host "            AZUREAPPSERVICE_TENANTID" -ForegroundColor DarkYellow
                Write-Host "            AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor DarkYellow
                Write-Host "  3. Re-run Azure Initial Setup with ALL of these checked:" -ForegroundColor White
                Write-Host "       Phase 1a (Setup Azure OIDC)  = ✅  (re-creates OIDC credentials)" -ForegroundColor Gray
                Write-Host "       Phase 1b (Configure Secrets) = ✅  (writes fresh secrets)" -ForegroundColor Gray
                Write-Host "       environment                  = all   (updates dev + staging + prod)" -ForegroundColor Gray
                Write-Host "  ──────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
                Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                $clientId = $azureClientId
              } else {
                Write-Host "  ✅ Client ID matches Azure — secret is current" -ForegroundColor Green
              }
            } else {
              Write-Host "  ⚠️  App '$appName' not found in Azure AD — using stored secret value" -ForegroundColor Yellow
              Write-Host "     If unexpected, verify the app exists at:" -ForegroundColor Gray
              Write-Host "     https://portal.azure.com → Azure Active Directory → App Registrations" -ForegroundColor Gray
            }
          } catch {
            Write-Host "  ⚠️  Could not query Azure AD: $($_.Exception.Message)" -ForegroundColor Yellow
            Write-Host "     Using stored secret value." -ForegroundColor Gray
          }
          Write-Host ""

          # Get the app object ID from the existing app registration
          try {
            $app = az ad app show --id $clientId | ConvertFrom-Json
            $appObjectId = $app.id
            Write-Host "  App Object ID: $appObjectId" -ForegroundColor Gray
          } catch {
            Write-Host "  ⚠️  Could not retrieve app object ID (may not be needed)" -ForegroundColor Yellow
            $appObjectId = ""
          }
          
          # Retrieve spObjectId for the service principal (needed by bootstrap for KV access policy)
          try {
            $spInfo = az ad sp list --filter "appId eq '$clientId'" | ConvertFrom-Json
            $spObjectId = if ($spInfo -and $spInfo.Count -gt 0) { $spInfo[0].id } else { '' }
            if ($spObjectId) {
              Write-Host "  Service Principal Object ID: $spObjectId" -ForegroundColor Gray
            } else {
              Write-Host "  ⚠️  Could not retrieve service principal object ID" -ForegroundColor Yellow
            }
          } catch {
            Write-Host "  ⚠️  Could not retrieve service principal object ID: $($_.Exception.Message)" -ForegroundColor Yellow
            $spObjectId = ''
          }

          "clientId=$clientId"             >> $env:GITHUB_OUTPUT
          "tenantId=$tenantId"             >> $env:GITHUB_OUTPUT
          "subscriptionId=$subscriptionId" >> $env:GITHUB_OUTPUT
          "appObjectId=$appObjectId"       >> $env:GITHUB_OUTPUT
          "spObjectId=$spObjectId"         >> $env:GITHUB_OUTPUT
          
          Write-Host "✅ Existing credentials emitted as outputs" -ForegroundColor Green

      - name: Setup OIDC App Registration
        id: oidc-setup
        if: ${{ inputs.setupOidc }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         SETUP OIDC APP REGISTRATION                          ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          # Map 'all' to the full list of environments the script expects
          $envInput = "${{ inputs.environment }}"
          $environments = if ($envInput -eq "all") { "dev,staging,prod" } else { $envInput }
          
          $params = @{
            AppDisplayName = "${{ inputs.oidcAppName }}"
            Environments   = $environments
            GitHubOwner    = "${{ github.repository_owner }}"
            Repository     = "${{ github.event.repository.name }}"
            GitHubSecretsManagedByWorkflow = ("${{ inputs.configureSecrets }}" -eq "true")
          }
          
          Write-Host "📋 Parameters:" -ForegroundColor Yellow
          Write-Host "  App Display Name: $($params.AppDisplayName)" -ForegroundColor Gray
          Write-Host "  Environments: $($params.Environments)" -ForegroundColor Gray
          Write-Host "  GitHub Owner: $($params.GitHubOwner)" -ForegroundColor Gray
          Write-Host "  Repository: $($params.Repository)" -ForegroundColor Gray
          Write-Host ""
          
          $result = ./Resources/Azure-Deployment/setup-github-oidc.ps1 @params
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ OIDC setup failed" -ForegroundColor Red
            Write-Error "OIDC App Registration setup failed"
            exit 1
          }
          
          # Query Azure directly — the script does not export env vars
          $appName        = "${{ inputs.oidcAppName }}"
          $appInfo        = az ad app list --display-name $appName | ConvertFrom-Json
          $clientId       = $appInfo[0].appId
          $appObjectId    = $appInfo[0].id
          $subscription   = az account show | ConvertFrom-Json
          $tenantId       = $subscription.tenantId
          $subscriptionId = $subscription.id
          
          "clientId=$clientId"              >> $env:GITHUB_OUTPUT
          "tenantId=$tenantId"              >> $env:GITHUB_OUTPUT
          "subscriptionId=$subscriptionId"  >> $env:GITHUB_OUTPUT
          "appObjectId=$appObjectId"        >> $env:GITHUB_OUTPUT
          
          Write-Host ""
          Write-Host "✅ OIDC App Registration configured successfully" -ForegroundColor Green
          Write-Host "  Client ID: $clientId" -ForegroundColor Gray
          Write-Host "  Tenant ID: $tenantId" -ForegroundColor Gray
          Write-Host "  Subscription ID: $subscriptionId" -ForegroundColor Gray

      - name: Verify Federated Credentials
        if: ${{ inputs.setupOidc }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      VERIFY FEDERATED CREDENTIALS                            ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          $appObjectId = "${{ steps.oidc-setup.outputs.appObjectId }}"
          $env = "${{ inputs.environment }}"
          
          Write-Host "🔍 Verifying federated credentials for app: $appObjectId" -ForegroundColor Cyan
          Write-Host "   Environment scope: $env" -ForegroundColor Gray
          Write-Host ""
          
          $maxRetries = 3
          $retryDelay = 20
          $attempt = 0
          $verified = $false
          
          while ($attempt -lt $maxRetries -and -not $verified) {
            $attempt++
            Write-Host "  Attempt $attempt of $maxRetries..." -ForegroundColor Gray
            
            try {
              $creds = az ad app federated-credential list --id $appObjectId | ConvertFrom-Json
              
              if ($creds -and $creds.Count -gt 0) {
                Write-Host "  ✅ Found $($creds.Count) federated credential(s):" -ForegroundColor Green
                foreach ($cred in $creds) {
                  Write-Host "    - $($cred.name): $($cred.subject)" -ForegroundColor Gray
                }
                $verified = $true
              } else {
                Write-Host "  ⚠️  No federated credentials found yet" -ForegroundColor Yellow
                if ($attempt -lt $maxRetries) {
                  Write-Host "  Waiting ${retryDelay}s before retry..." -ForegroundColor Gray
                  Start-Sleep -Seconds $retryDelay
                }
              }
            } catch {
              Write-Host "  ⚠️  Error checking credentials: $($_.Exception.Message)" -ForegroundColor Yellow
              if ($attempt -lt $maxRetries) {
                Write-Host "  Waiting ${retryDelay}s before retry..." -ForegroundColor Gray
                Start-Sleep -Seconds $retryDelay
              }
            }
          }
          
          if (-not $verified) {
            Write-Host ""
            Write-Host "❌ Could not verify federated credentials after $maxRetries attempts" -ForegroundColor Red
            Write-Error "Federated credential verification failed"
            exit 1
          }
          
          Write-Host ""
          Write-Host "✅ Federated credentials verified successfully" -ForegroundColor Green

      - name: Prepare Encoded Cross-Job Outputs
        id: oidc-handoff
        if: success() && (steps.oidc-setup.outcome == 'success' || steps.oidc-passthrough.outcome == 'success')
        run: |
          function Write-EncodedOutput {
            param(
              [string]$Name,
              [string]$Value
            )

            if ([string]::IsNullOrWhiteSpace($Value)) {
              return
            }

            $encodedValue = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($Value))
            "$Name=$encodedValue" >> $env:GITHUB_OUTPUT
          }

          $clientId = "${{ steps.oidc-setup.outputs.clientId }}"
          if ([string]::IsNullOrWhiteSpace($clientId)) {
            $clientId = "${{ steps.oidc-passthrough.outputs.clientId }}"
          }

          $tenantId = "${{ steps.oidc-setup.outputs.tenantId }}"
          if ([string]::IsNullOrWhiteSpace($tenantId)) {
            $tenantId = "${{ steps.oidc-passthrough.outputs.tenantId }}"
          }

          $subscriptionId = "${{ steps.oidc-setup.outputs.subscriptionId }}"
          if ([string]::IsNullOrWhiteSpace($subscriptionId)) {
            $subscriptionId = "${{ steps.oidc-passthrough.outputs.subscriptionId }}"
          }

          $spObjectId = "${{ steps.oidc-setup.outputs.spObjectId }}"
          if ([string]::IsNullOrWhiteSpace($spObjectId)) {
            $spObjectId = "${{ steps.oidc-passthrough.outputs.spObjectId }}"
          }

          Write-EncodedOutput -Name 'clientIdB64' -Value $clientId
          Write-EncodedOutput -Name 'tenantIdB64' -Value $tenantId
          Write-EncodedOutput -Name 'subscriptionIdB64' -Value $subscriptionId
          Write-EncodedOutput -Name 'spObjectIdB64' -Value $spObjectId

          Write-Host "✅ Encoded OIDC values prepared for downstream jobs" -ForegroundColor Green

      - name: Create Setup Summary
        if: always()
        run: |
          "## 🔑 Azure OIDC Setup Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          $setupOidc = "${{ inputs.setupOidc }}"
          $env = "${{ inputs.environment }}"
          
          if ($setupOidc -eq "true") {
            $clientId = "${{ steps.oidc-setup.outputs.clientId }}"
            $tenantId = "${{ steps.oidc-setup.outputs.tenantId }}"
            $subscriptionId = "${{ steps.oidc-setup.outputs.subscriptionId }}"
            $hasOutputs = $clientId -ne "" -and $tenantId -ne "" -and $subscriptionId -ne ""
            
            if ($hasOutputs) {
              "**OIDC App Registration**: ✅ Created/Updated" >> $env:GITHUB_STEP_SUMMARY
              "**Environment Scope**: ``$env``" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Output | Value |" >> $env:GITHUB_STEP_SUMMARY
              "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
              "| Client ID | ``$clientId`` |" >> $env:GITHUB_STEP_SUMMARY
              "| Tenant ID | ``$tenantId`` |" >> $env:GITHUB_STEP_SUMMARY
              "| Subscription ID | ``$subscriptionId`` |" >> $env:GITHUB_STEP_SUMMARY
            } else {
              "**OIDC App Registration**: ❌ Failed" >> $env:GITHUB_STEP_SUMMARY
              "**Environment Scope**: ``$env``" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "> The ``setup-github-oidc.ps1`` script failed before producing outputs." >> $env:GITHUB_STEP_SUMMARY
              "> Check the **Setup OIDC App Registration** step logs above for the error details." >> $env:GITHUB_STEP_SUMMARY
            }
          } elseif ("${{ steps.oidc-passthrough.outputs.clientId }}" -ne "") {
            $ptClientId = "${{ steps.oidc-passthrough.outputs.clientId }}"
            $storedId   = "${{ secrets.AZUREAPPSERVICE_CLIENTID }}"
            $mismatch   = ($storedId -ne "" -and $storedId -ne $ptClientId)
            "**OIDC Setup**: Skipped — using existing credentials (passthrough)" >> $env:GITHUB_STEP_SUMMARY
            if ($mismatch) {
              "" >> $env:GITHUB_STEP_SUMMARY
              "> ⚠️ **Client ID mismatch detected**: stored secret (`$storedId`) differs from Azure (`$ptClientId`)." >> $env:GITHUB_STEP_SUMMARY
              "> Phase 1b will overwrite the stale `AZUREAPPSERVICE_CLIENTID` secret with the Azure-sourced value." >> $env:GITHUB_STEP_SUMMARY
            }
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Output | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| Client ID (Azure) | ``$ptClientId`` |" >> $env:GITHUB_STEP_SUMMARY
            if ($mismatch) {
              "| Client ID (stored secret — stale) | ``$storedId`` |" >> $env:GITHUB_STEP_SUMMARY
            }
            "| Tenant ID | ``${{ steps.oidc-passthrough.outputs.tenantId }}`` |" >> $env:GITHUB_STEP_SUMMARY
            "| Subscription ID | ``${{ steps.oidc-passthrough.outputs.subscriptionId }}`` |" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "**OIDC Setup**: Skipped (using existing credentials)" >> $env:GITHUB_STEP_SUMMARY
          }
          "" >> $env:GITHUB_STEP_SUMMARY

  configure-github-secrets:
    name: Run GitHub Secrets Setup Workflow
    needs: [validate-inputs, setup-oidc]
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      (needs.setup-oidc.result == 'success' || needs.setup-oidc.result == 'skipped') &&
      (inputs.configureSecrets || inputs.setupGitHubApp)
    uses: ./.github/workflows/configure-github-secrets.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      setupGitHubApp: ${{ inputs.setupGitHubApp }}
      githubAppName: ${{ inputs.githubAppName }}
      configureSecrets: ${{ inputs.configureSecrets }}
      clientIdB64: ${{ needs.setup-oidc.outputs.clientIdB64 }}
      tenantIdB64: ${{ needs.setup-oidc.outputs.tenantIdB64 }}
      subscriptionIdB64: ${{ needs.setup-oidc.outputs.subscriptionIdB64 }}
      oidcSpObjectIdB64: ${{ needs.setup-oidc.outputs.spObjectIdB64 }}

  summary:
    name: Initial Setup Summary
    if: always() && github.event_name == 'workflow_dispatch'
    needs: [validate-inputs, setup-oidc, configure-github-secrets]
    runs-on: windows-latest
    steps:
      - name: Generate Summary
        run: |
          $validateInputs = "${{ needs.validate-inputs.result }}"
          $setupOidc      = "${{ needs.setup-oidc.result }}"
          $configSecrets  = "${{ needs.configure-github-secrets.result }}"
          $hasAppId       = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey  = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          $appSecretsOk   = $hasAppId -and $hasPrivateKey
          $allSuccess     = ($validateInputs -eq "success") -and
                            ($setupOidc     -eq "success" -or $setupOidc     -eq "skipped") -and
                            ($configSecrets -eq "success" -or $configSecrets -eq "skipped")

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📊 INITIAL SETUP SUMMARY" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "  Environment : ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host "  Phase 0 (GitHub App)       : ${{ inputs.setupGitHubApp }}" -ForegroundColor Gray
          Write-Host "  Phase 1a (Setup OIDC)      : ${{ inputs.setupOidc }}" -ForegroundColor Gray
          Write-Host "  Phase 1b (Configure Secrets): ${{ inputs.configureSecrets }}" -ForegroundColor Gray
          Write-Host ""
          $iconFor = { param($r) if ($r -eq "success") { "✅" } elseif ($r -eq "skipped") { "⏭️ " } else { "❌" } }
          Write-Host "  Job Results:" -ForegroundColor Cyan
          Write-Host "    Validate Inputs    : $(& $iconFor $validateInputs) $validateInputs"
          Write-Host "    Setup OIDC         : $(& $iconFor $setupOidc) $setupOidc"
          Write-Host "    Configure Secrets  : $(& $iconFor $configSecrets) $configSecrets"
          Write-Host ""
          if ($allSuccess -and $appSecretsOk) {
            Write-Host "  ✅ Initial Setup Complete — proceed to Azure Bootstrap & Deploy" -ForegroundColor Green
          } elseif (-not $appSecretsOk) {
            Write-Host "  ⚠️  GitHub App secrets missing — complete Phase 0 manual steps first" -ForegroundColor Yellow
          } else {
            Write-Host "  ❌ One or more jobs failed — check individual job logs above" -ForegroundColor Red
          }
          Write-Host ""
          Write-Host "  Full details → open the 'Summary' tab at the top of this workflow run." -ForegroundColor Gray
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""

          "## 📊 Azure Initial Setup Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          "### 📋 User Configuration" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Parameter | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🎯 Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| ℹ️ [Phase 0] Setup GitHub App | ``${{ inputs.setupGitHubApp }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 [Phase 1a] Setup OIDC | ``${{ inputs.setupOidc }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 [Phase 1b] Configure Secrets | ``${{ inputs.configureSecrets }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### ✅ Job Execution Results" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          "| Step | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|------|--------|" >> $env:GITHUB_STEP_SUMMARY

          if ($validateInputs -ne "") {
            $icon = if ($validateInputs -eq "success") { "✅" } elseif ($validateInputs -eq "skipped") { "⏭️" } else { "❌" }
            "| Validate Inputs | $icon $validateInputs |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($setupOidc -ne "") {
            $icon = if ($setupOidc -eq "success") { "✅" } elseif ($setupOidc -eq "skipped") { "⏭️" } else { "❌" }
            "| Setup OIDC | $icon $setupOidc |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($configSecrets -ne "") {
            $icon = if ($configSecrets -eq "success") { "✅" } elseif ($configSecrets -eq "skipped") { "⏭️" } else { "❌" }
            "| Configure Secrets | $icon $configSecrets |" >> $env:GITHUB_STEP_SUMMARY
          }

          "" >> $env:GITHUB_STEP_SUMMARY
          "### 🏗️ What Gets Created" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Resource | Automated? | Trigger |" >> $env:GITHUB_STEP_SUMMARY
          "|----------|-----------|---------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🏢 Microsoft Entra ID App Registration | ✅ Yes | Setup OIDC = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 Azure Federated Credentials (OIDC) | ✅ Yes | Setup OIDC = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🌐 GitHub Environments (dev/staging/prod) | ✅ Yes | Configure Secrets = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔐 GitHub OIDC Secrets (AZUREAPPSERVICE_*) | ✅ Yes | Configure Secrets = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🤖 GitHub App (APP_ID + APP_PRIVATE_KEY) | ⚠️ Manual | One-time setup required |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          # Determine next steps based on current state
          $ranPhase0     = "${{ inputs.setupGitHubApp }}" -eq "true"
          $appName       = "${{ inputs.githubAppName }}"
          $appSlug       = $appName.ToLower() -replace '[^a-z0-9]', '-'
          $secretsUrl    = "https://github.com/${{ github.repository }}/settings/secrets/actions"

          if ($ranPhase0 -and -not $appSecretsOk) {
            "## 🔴 Action Required — Phase 0 Complete, Manual Step Needed" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> **Phase 0 instructions have been shown. Before Phase 1a/1b can run you must complete the two steps below.**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**GitHub App Name configured**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 1 — Create GitHub App (if not already done)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Create a GitHub App named **``$appName``** with the required permissions:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "- **Option A** (Recommended): ``.\scripts\setup-github-app-from-manifest.ps1``" >> $env:GITHUB_STEP_SUMMARY
            "- **Option B** (Manual): [Create at github.com/settings/apps/new](https://github.com/settings/apps/new)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> 📖 **Detailed guide**: [QUICK-SETUP-GITHUB-APP.md](../blob/${{ github.ref_name }}/Documentation/03-Configuration-Guides/QUICK-SETUP-GITHUB-APP.md)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 2 — Add Repository Secrets" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Go to **[Settings → Secrets and variables → Actions]($secretsUrl)** and add:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Secret Name | Where to find the value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------------|------------------------|" >> $env:GITHUB_STEP_SUMMARY
            "| ``APP_ID`` | Numeric App ID on the app's **General** settings page: ``https://github.com/settings/apps/$appSlug`` |" >> $env:GITHUB_STEP_SUMMARY
            "| ``APP_PRIVATE_KEY`` | Full contents of the ``.pem`` file downloaded when generating the private key (include the ``-----BEGIN RSA PRIVATE KEY-----`` header) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**How to add each secret**: Click **New repository secret**, enter Name + Value from table above, then click **Add secret**." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 3 — Re-run This Workflow (Phase 1a + 1b)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Once the two secrets are saved, **[run this workflow again](https://github.com/${{ github.repository }}/actions/workflows/azure-initial-setup.yml)** with:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Input | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| 🎯 Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
            "| 🔑 Setup Azure OIDC | ``true`` |" >> $env:GITHUB_STEP_SUMMARY
            "| ℹ️ Setup GitHub App | ``false`` (already done) |" >> $env:GITHUB_STEP_SUMMARY
            "| 🔑 Configure GitHub Secrets | ``true`` |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> ✅ The workflow will then automatically configure all ``AZUREAPPSERVICE_*`` environment secrets — **no further manual steps are needed**." >> $env:GITHUB_STEP_SUMMARY
          } elseif ($appSecretsOk) {
            "## ✅ Phase 0 Complete — GitHub App Secrets Configured" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**GitHub App Name**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "``APP_ID`` and ``APP_PRIVATE_KEY`` are present. The workflow can use the GitHub App for automated secret management." >> $env:GITHUB_STEP_SUMMARY
          }

          if ($allSuccess -and $appSecretsOk) {
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "## ✅ Initial Setup Complete — Next Steps" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "OIDC credentials and GitHub secrets are configured. You can now use the **Azure Bootstrap & Deploy** workflow:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. Go to **[Actions → Azure Bootstrap & Deploy](https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml)**" >> $env:GITHUB_STEP_SUMMARY
            "2. Set **Use workflow from** = branch matching your target environment (dev→dev, staging→staging, main→prod)" >> $env:GITHUB_STEP_SUMMARY
            "3. Select your target **Environment**" >> $env:GITHUB_STEP_SUMMARY
            "4. Check ✅ **Bootstrap Infrastructure**, ✅ **Deploy API**, ✅ **Deploy UI**" >> $env:GITHUB_STEP_SUMMARY
            "5. Click **Run workflow**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }

          # OpenPay payment secrets — informational status (non-blocking, must be set manually)
          $hasOpenPayMerchant  = '${{ secrets.OPENPAY_MERCHANT_ID }}'    -ne ''
          $hasOpenPayKey       = '${{ secrets.OPENPAY_PRIVATE_KEY }}'    -ne ''
          $hasOpenPaySession   = '${{ secrets.OPENPAY_DEVICE_SESSION_ID }}' -ne ''
          $secretsUrl = "https://github.com/${{ github.repository }}/settings/secrets/actions"

          "" >> $env:GITHUB_STEP_SUMMARY
          "---" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "## 💳 OpenPay Payment Secrets Status" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "> These secrets must be present **before running Azure Bootstrap & Deploy**. They are set manually by an authorized person in GitHub Settings — they are never written by this workflow." >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Secret | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|--------|--------|" >> $env:GITHUB_STEP_SUMMARY
          $merchantIcon  = if ($hasOpenPayMerchant) { "✅ Present" } else { "❌ **MISSING**" }
          $keyIcon       = if ($hasOpenPayKey)       { "✅ Present" } else { "❌ **MISSING**" }
          $sessionIcon   = if ($hasOpenPaySession)   { "✅ Present" } else { "❌ **MISSING**" }
          "| ``OPENPAY_MERCHANT_ID``     | $merchantIcon |" >> $env:GITHUB_STEP_SUMMARY
          "| ``OPENPAY_PRIVATE_KEY``     | $keyIcon |" >> $env:GITHUB_STEP_SUMMARY
          "| ``OPENPAY_DEVICE_SESSION_ID`` | $sessionIcon |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          if (-not ($hasOpenPayMerchant -and $hasOpenPayKey -and $hasOpenPaySession)) {
            "### ⚠️ Action Required — Add OpenPay Secrets Before Running Bootstrap" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. Go to **[Settings → Secrets and variables → Actions]($secretsUrl)**" >> $env:GITHUB_STEP_SUMMARY
            "2. Click **New repository secret** for each missing secret above" >> $env:GITHUB_STEP_SUMMARY
            "3. Get values from [sandbox-dashboard.openpay.mx](https://sandbox-dashboard.openpay.mx) (sandbox) or the live dashboard (production)" >> $env:GITHUB_STEP_SUMMARY
            "4. Then run **Azure Bootstrap & Deploy** — it will validate these secrets before proceeding" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "> ✅ All OpenPay secrets present. Bootstrap can proceed." >> $env:GITHUB_STEP_SUMMARY
          }

          # Console output mirror
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "💳 OpenPay Payment Secrets" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          $icons = @{ $true = "✅"; $false = "❌ MISSING" }
          Write-Host "  OPENPAY_MERCHANT_ID      : $($icons[$hasOpenPayMerchant])"     -ForegroundColor $(if ($hasOpenPayMerchant) { 'Green' } else { 'Red' })
          Write-Host "  OPENPAY_PRIVATE_KEY      : $($icons[$hasOpenPayKey])"          -ForegroundColor $(if ($hasOpenPayKey)       { 'Green' } else { 'Red' })
          Write-Host "  OPENPAY_DEVICE_SESSION_ID: $($icons[$hasOpenPaySession])"      -ForegroundColor $(if ($hasOpenPaySession)   { 'Green' } else { 'Red' })
          if (-not ($hasOpenPayMerchant -and $hasOpenPayKey -and $hasOpenPaySession)) {
            Write-Host ""
            Write-Host "  ⚠️  One or more OpenPay secrets are missing." -ForegroundColor Yellow
            Write-Host "  Add them at: $secretsUrl" -ForegroundColor Yellow
            Write-Host "  Bootstrap will validate these before proceeding and fail with a clear error." -ForegroundColor Gray
          }
