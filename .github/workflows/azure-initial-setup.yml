name: Azure Initial Setup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '🎯 Environment | Use "all" (recommended) to configure dev + staging + prod in one run'
        required: true
        type: choice
        options:
          - all
          - dev
          - staging
          - prod
        default: 'all'
      setupGitHubApp:
        description: 'ℹ️ Phase 0 — GitHub App Instructions | Shows setup steps if APP_ID + APP_PRIVATE_KEY secrets are missing'
        required: true
        type: boolean
        default: true
      setupOidc:
        description: '🔑 Phase 1a — Setup Azure OIDC | Creates Azure AD App Registration + federated identity credentials'
        required: true
        type: boolean
        default: true
      oidcAppName:
        description: 'OIDC App Name | Default: GitHub-Actions-OIDC (only change if using custom name)'
        required: false
        type: string
        default: 'GitHub-Actions-OIDC'
      configureSecrets:
        description: '🔑 Phase 1b — Configure GitHub Secrets | Stores OIDC values as GitHub environment secrets. Requires Phase 0 (APP_ID+APP_PRIVATE_KEY)'
        required: true
        type: boolean
        default: true
      githubAppName:
        description: 'GitHub App Name | Your app name (e.g. XYDataLabsGitHubApp) — used for validation and instructions'
        required: false
        type: string
        default: 'XYDataLabsGitHubApp'

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  check-trigger:
    name: Check Workflow Trigger
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Workflow trigger check
        run: |
          Write-Host "ℹ️  This workflow is designed for manual dispatch only" -ForegroundColor Cyan
          Write-Host "   Skipping execution for event: ${{ github.event_name }}" -ForegroundColor Yellow
          Write-Host "   To run this workflow, use: Actions > Azure Initial Setup > Run workflow" -ForegroundColor Gray

  validate-inputs:
    name: Validate Workflow Inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Log Workflow Start
        run: |
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "  AZURE INITIAL SETUP WORKFLOW STARTED" -ForegroundColor Cyan
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "⏰ Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "👤 Triggered by: ${{ github.actor }}" -ForegroundColor Gray
          Write-Host "🌿 Branch: ${{ github.ref_name }}" -ForegroundColor Gray
          Write-Host "📦 Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "🔗 Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" -ForegroundColor Gray
          Write-Host "" -ForegroundColor Gray
          Write-Host "📋 USER SELECTED PARAMETERS:" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  Parameter              Value    Checkbox" -ForegroundColor DarkGray
          Write-Host "  ──────────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "  environment          = ${{ inputs.environment }}" -ForegroundColor White
          Write-Host "" -ForegroundColor Gray
          Write-Host "  SETUP PHASES:" -ForegroundColor Cyan
          Write-Host "  setupGitHubApp       = ${{ inputs.setupGitHubApp }}  $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { '[✅ checked]   — Phase 0: Setup GitHub App' } else { '[☐  unchecked] — Phase 0: Setup GitHub App' })" -ForegroundColor $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  githubAppName        = ${{ inputs.githubAppName }}" -ForegroundColor DarkGray
          Write-Host "  setupOidc            = ${{ inputs.setupOidc }}  $(if ('${{ inputs.setupOidc }}' -eq 'true') { '[✅ checked]   — Phase 1a: Setup Azure OIDC' } else { '[☐  unchecked] — Phase 1a: Setup Azure OIDC' })" -ForegroundColor $(if ('${{ inputs.setupOidc }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  oidcAppName          = ${{ inputs.oidcAppName }}" -ForegroundColor DarkGray
          Write-Host "  configureSecrets     = ${{ inputs.configureSecrets }}  $(if ('${{ inputs.configureSecrets }}' -eq 'true') { '[✅ checked]   — Phase 1b: Configure Secrets' } else { '[☐  unchecked] — Phase 1b: Configure Secrets' })" -ForegroundColor $(if ('${{ inputs.configureSecrets }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray
          Write-Host "  ──────────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  ℹ️  This workflow handles one-time Azure setup (Phase 0, 1a, 1b)." -ForegroundColor Cyan
          Write-Host "     For infrastructure bootstrap & deployments, use 'Azure Bootstrap & Deploy'." -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray

      - name: Validate Configuration
        run: |
          Write-Host "🔍 Validating workflow inputs..." -ForegroundColor Cyan
          Write-Host ("=" * 70) -ForegroundColor Gray

          $env = "${{ inputs.environment }}"
          $setupOidc = "${{ inputs.setupOidc }}"
          $setupGitHubApp = "${{ inputs.setupGitHubApp }}"
          $configSecrets = "${{ inputs.configureSecrets }}"

          Write-Host "`n📋 Workflow Inputs:" -ForegroundColor Cyan
          Write-Host "  Environment: $env" -ForegroundColor Yellow
          Write-Host "  Setup OIDC: $setupOidc" -ForegroundColor Yellow
          Write-Host "  Setup GitHub App: $setupGitHubApp" -ForegroundColor Yellow
          Write-Host "  Configure secrets: $configSecrets" -ForegroundColor Yellow

          # Validate environment selection
          if ($env -notin @('dev', 'staging', 'prod', 'all')) {
            Write-Host "  ❌ Invalid environment: $env" -ForegroundColor Red
            Write-Error "Invalid environment: $env. Must be dev, staging, prod, or all."
            exit 1
          }
          Write-Host "  ✅ Environment selection valid" -ForegroundColor Green

          # No branch-environment check required for setup workflow.
          # Phase 0 is informational only, Phase 1a/1b always run in 'dev' environment context.
          # The environment input only controls which federated credentials get created.
          Write-Host "`n  ℹ️  Branch check: Not required for initial setup" -ForegroundColor Cyan
          Write-Host "     Phase 1a/1b always use 'dev' environment context regardless of branch." -ForegroundColor Gray

          if (($setupOidc -eq "true" -or $configSecrets -eq "true") -and $env -ne "all") {
            Write-Host "" -ForegroundColor Gray
            Write-Host "  ⚠️  RECOMMENDATION: Use environment='all' for Phase 1a/1b" -ForegroundColor Yellow
            Write-Host "     This creates federated credentials for dev + staging + prod in one run," -ForegroundColor Yellow
            Write-Host "     preventing AADSTS700213 errors when running bootstrap for other environments." -ForegroundColor Yellow
          }

          # Check OIDC secrets status
          Write-Host "`n  🔐 Repository Secrets Check:" -ForegroundColor Cyan

          # Detect Phase 0-only run
          $isPhase0Only = ($setupGitHubApp -eq "true") -and ($configSecrets -eq "false") -and ($setupOidc -eq "false")

          if ($isPhase0Only) {
            Write-Host "    ℹ️  Phase 0 run detected — OIDC secrets check skipped" -ForegroundColor Cyan
            Write-Host "    ✅ OIDC secrets are not required yet (Phase 1a/1b task)" -ForegroundColor Green
            Write-Host "    💡 Next step: After completing GitHub App setup, run this workflow again with:" -ForegroundColor Yellow
            Write-Host "       ✅ Setup Azure OIDC" -ForegroundColor White
            Write-Host "       ✅ Configure Secrets" -ForegroundColor White
          } elseif ($setupOidc -eq "false" -and $configSecrets -eq "false") {
            Write-Host "    ℹ️  No OIDC setup phases selected — secrets check skipped" -ForegroundColor Cyan
          } elseif ($setupOidc -eq "false") {
            Write-Host "    Setup OIDC: Unchecked (skipped)" -ForegroundColor Yellow
            Write-Host "    ℹ️  OIDC secrets are stored at environment level (dev/staging/prod) — not at repository level." -ForegroundColor Cyan
            Write-Host "    Verification of environment secrets is performed by Phase 1b (Configure Secrets)." -ForegroundColor Gray
            Write-Host "" -ForegroundColor Gray
            Write-Host "    To verify: Settings → Environments → [dev/staging/prod] → Secrets" -ForegroundColor Gray
            Write-Host "    Expected: AZUREAPPSERVICE_CLIENTID, AZUREAPPSERVICE_TENANTID, AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor Gray
            Write-Host "" -ForegroundColor Gray
            if ($configSecrets -eq "true") {
              Write-Host "    ✅ Phase 1b selected — 1b-only preflight will verify a reusable OIDC source or an already-complete target baseline." -ForegroundColor Green
              Write-Host "       If neither exists, enable Phase 1a + 1b together." -ForegroundColor Gray
            } else {
              Write-Host "    ✅ Assuming environment secrets exist from a previous Phase 1a/1b run." -ForegroundColor Green
              Write-Host "       If bootstrap or deploy fails with AADSTS errors, re-run with Phase 1a + 1b enabled." -ForegroundColor Gray
            }
          } else {
            Write-Host "    ✅ Setup Azure OIDC: Checked - secrets will be created" -ForegroundColor Green
          }

          # Check GitHub App secrets when configureSecrets is requested (Phase 1b mandatory gate)
          if ($configSecrets -eq "true") {
            $appName     = "${{ inputs.githubAppName }}"
            $appSlug     = $appName.ToLower() -replace '[^a-z0-9]', '-'
            $secretsUrl  = "https://github.com/${{ github.repository }}/settings/secrets/actions"

            Write-Host "`n  🤖 GitHub App Check (MANDATORY for Phase 1b — 'Configure Secrets'):" -ForegroundColor Cyan
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

            $hasAppId      = "${{ secrets.APP_ID }}" -ne ""
            $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""

            Write-Host "    APP_ID        : $(if ($hasAppId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasAppId) { "Green" } else { "Red" })
            Write-Host "    APP_PRIVATE_KEY: $(if ($hasPrivateKey) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { "Green" } else { "Red" })
            Write-Host ""

            if ($hasAppId -and $hasPrivateKey) {
              Write-Host "    ✅ Phase 0 complete — GitHub App secrets are configured" -ForegroundColor Green
              Write-Host "       GitHub App Name (configured): $appName" -ForegroundColor Cyan
              Write-Host "    ℹ️  APP_INSTALLATION_ID: auto-discovered at runtime" -ForegroundColor Cyan
              Write-Host ""
              Write-Host "    ════════════════════════════════════════════════════════════" -ForegroundColor Green
              Write-Host "    ✅ PHASE 0 IS CONFIGURED CORRECTLY — OK TO PROCEED WITH PHASE 1" -ForegroundColor Green
              Write-Host "    ════════════════════════════════════════════════════════════" -ForegroundColor Green
            } else {
              Write-Host "    ❌ PHASE 0 INCOMPLETE — Phase 1b cannot proceed!" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    Phase 1b ('Configure Secrets') requires a GitHub App to be created" -ForegroundColor Red
              Write-Host "    and its APP_ID + APP_PRIVATE_KEY secrets to be configured first." -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    ══════════════════════════════════════════════════════════════════" -ForegroundColor Red
              Write-Host "    HOW TO COMPLETE PHASE 0 (GitHub App Setup)" -ForegroundColor Yellow
              Write-Host "    ══════════════════════════════════════════════════════════════════" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 1 — Create GitHub App '$appName'" -ForegroundColor Cyan
              Write-Host "      Option A (Recommended): Run the setup script:" -ForegroundColor White
              Write-Host "        .\scripts\setup-github-app-from-manifest.ps1" -ForegroundColor Yellow
              Write-Host "      Option B (Manual):" -ForegroundColor White
              Write-Host "        1. Open: https://github.com/settings/apps/new" -ForegroundColor White
              Write-Host "        2. App name: $appName (or your chosen name)" -ForegroundColor White
              Write-Host "        3. Set REQUIRED permissions:" -ForegroundColor White
              Write-Host "           • Actions: write   • Secrets: write   • Workflows: write" -ForegroundColor Gray
              Write-Host "           • Contents: read   • Metadata: read" -ForegroundColor Gray
              Write-Host "        4. Generate a private key (saves a .pem file)" -ForegroundColor White
              Write-Host "        5. Note the App ID from the General settings page" -ForegroundColor White
              Write-Host "        6. Install app on: ${{ github.repository }}" -ForegroundColor White
              Write-Host "           Link: https://github.com/settings/installations" -ForegroundColor Gray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 2 — Add Repository Secrets at:" -ForegroundColor Cyan
              Write-Host "      ➡️  $secretsUrl" -ForegroundColor Yellow
              Write-Host "" -ForegroundColor Gray
              Write-Host "      Click 'New repository secret' and add:" -ForegroundColor White
              Write-Host "      ┌─────────────────┬──────────────────────────────────────────────┐" -ForegroundColor DarkGray
              Write-Host "      │ APP_ID          │ Numeric App ID from app's General settings   │" -ForegroundColor White
              Write-Host "      │                 │ page: https://github.com/settings/apps/$appSlug │" -ForegroundColor Gray
              Write-Host "      ├─────────────────┼──────────────────────────────────────────────┤" -ForegroundColor DarkGray
              Write-Host "      │ APP_PRIVATE_KEY │ Full contents of the downloaded .pem file    │" -ForegroundColor White
              Write-Host "      │                 │ (include -----BEGIN RSA PRIVATE KEY----- )   │" -ForegroundColor Gray
              Write-Host "      └─────────────────┴──────────────────────────────────────────────┘" -ForegroundColor DarkGray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 3 — Re-run this workflow with:" -ForegroundColor Cyan
              Write-Host "      ✅ Setup Azure OIDC         = true" -ForegroundColor Green
              Write-Host "      ✅ Configure GitHub Secrets = true" -ForegroundColor Green
              Write-Host "      ❌ Setup GitHub App         = false (already done)" -ForegroundColor DarkGray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    ══════════════════════════════════════════════════════════════════" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    ❌ VALIDATION FAILED: Phase 0 prerequisites not met." -ForegroundColor Red
              Write-Host "    Cannot proceed with Phase 1a/1b until GitHub App is created and" -ForegroundColor Red
              Write-Host "    APP_ID + APP_PRIVATE_KEY secrets are added at:" -ForegroundColor Red
              Write-Host "    $secretsUrl" -ForegroundColor Yellow
              Write-Host "" -ForegroundColor Gray
              Write-Error "Phase 0 incomplete: GitHub App secrets (APP_ID, APP_PRIVATE_KEY) are required. See instructions above."
              exit 1
            }
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          }

          Write-Host "`n" -ForegroundColor Gray
          Write-Host ("=" * 70) -ForegroundColor Gray
          Write-Host "✅ Input validation passed - proceeding..." -ForegroundColor Green
          exit 0

      - name: Generate Phase 1b Guard Token
        id: phase1b-guard-token
        if: ${{ inputs.configureSecrets && !inputs.setupOidc }}
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Validate Phase 1b-Only Baseline
        id: phase1b-baseline
        if: ${{ inputs.configureSecrets && !inputs.setupOidc }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.phase1b-guard-token.outputs.token }}
        run: |
          function Get-EnvironmentSecretState {
            param(
              [Parameter(Mandatory = $true)]
              [string]$EnvironmentName
            )

            $listOutput = gh secret list --repo '${{ github.repository }}' --env $EnvironmentName 2>&1 | Out-String
            $exitCode = $LASTEXITCODE

            if ($exitCode -ne 0) {
              $envCheckOutput = gh api -H "Accept: application/vnd.github+json" "repos/${{ github.repository }}/environments/$EnvironmentName" 2>&1 | Out-String
              $envCheckExitCode = $LASTEXITCODE
              $notFound = ($envCheckExitCode -ne 0) -and ($envCheckOutput -match '404|Not Found')

              return @{
                Readable = $false
                Exists = if ($notFound) { $false } else { $true }
                NotFound = $notFound
                ClientId = $false
                TenantId = $false
                SubscriptionId = $false
                Complete = $false
                Output = if ($notFound) { $envCheckOutput } else { @($listOutput.Trim(), $envCheckOutput.Trim()) -join [Environment]::NewLine }
              }
            }

            $hasClientId = $listOutput -match 'AZUREAPPSERVICE_CLIENTID'
            $hasTenantId = $listOutput -match 'AZUREAPPSERVICE_TENANTID'
            $hasSubscriptionId = $listOutput -match 'AZUREAPPSERVICE_SUBSCRIPTIONID'

            return @{
              Readable = $true
              Exists = $true
              NotFound = $false
              ClientId = $hasClientId
              TenantId = $hasTenantId
              SubscriptionId = $hasSubscriptionId
              Complete = ($hasClientId -and $hasTenantId -and $hasSubscriptionId)
              Output = $listOutput
            }
          }

          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PHASE 1b-ONLY BASELINE VALIDATION                       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            Write-Host "❌ Cannot validate the Phase 1b-only baseline because a GitHub App token was not generated." -ForegroundColor Red
            Write-Host "   Fix Phase 0 (APP_ID + APP_PRIVATE_KEY and GitHub App installation), or enable Phase 1a + Phase 1b together." -ForegroundColor Yellow
            Write-Error "Phase 1b-only guard could not verify environment secrets because GitHub App authentication is unavailable."
            exit 1
          }

          $targetEnv = "${{ inputs.environment }}"
          $targetEnvironments = if ($targetEnv -eq 'all') { @('dev', 'staging', 'prod') } else { @($targetEnv) }
          $sourceEnvironment = 'dev'
          $missingEnvs = @()
          $configuredEnvs = @()
          $unreadableEnvs = @()

          Write-Host "Checking reusable OIDC source baseline in shared environment context: $sourceEnvironment" -ForegroundColor Cyan
          $sourceState = Get-EnvironmentSecretState -EnvironmentName $sourceEnvironment
          if ($sourceState.Readable) {
            Write-Host "  [$sourceEnvironment] CLIENTID      : $(if ($sourceState.ClientId) { '✅' } else { '❌' })" -ForegroundColor $(if ($sourceState.ClientId) { 'Green' } else { 'Red' })
            Write-Host "  [$sourceEnvironment] TENANTID      : $(if ($sourceState.TenantId) { '✅' } else { '❌' })" -ForegroundColor $(if ($sourceState.TenantId) { 'Green' } else { 'Red' })
            Write-Host "  [$sourceEnvironment] SUBSCRIPTIONID: $(if ($sourceState.SubscriptionId) { '✅' } else { '❌' })" -ForegroundColor $(if ($sourceState.SubscriptionId) { 'Green' } else { 'Red' })
          } else {
            Write-Host "  [$sourceEnvironment] ⚠️  Could not read environment secrets" -ForegroundColor Yellow
            if (-not [string]::IsNullOrWhiteSpace($sourceState.Output)) {
              Write-Host "     gh output: $($sourceState.Output.Trim())" -ForegroundColor DarkGray
            }
            Write-Host "     Phase 1b-only can still proceed if all selected target environments are already complete." -ForegroundColor Gray
          }
          Write-Host ""

          Write-Host "Checking environment secret baseline for: $($targetEnvironments -join ', ')" -ForegroundColor Cyan
          foreach ($envName in $targetEnvironments) {
            $envState = Get-EnvironmentSecretState -EnvironmentName $envName
            if (-not $envState.Readable) {
              if ($envState.NotFound) {
                Write-Host "  [$envName] ⬜ Environment does not exist yet — Phase 1b can create it if credentials are available" -ForegroundColor Yellow
                $missingEnvs += $envName
              } else {
                Write-Host "  [$envName] ❌ Could not read environment secrets" -ForegroundColor Red
                if (-not [string]::IsNullOrWhiteSpace($envState.Output)) {
                  Write-Host "     gh output: $($envState.Output.Trim())" -ForegroundColor DarkGray
                }
                $unreadableEnvs += $envName
              }
              continue
            }

            Write-Host "  [$envName] CLIENTID      : $(if ($envState.ClientId) { '✅' } else { '❌' })" -ForegroundColor $(if ($envState.ClientId) { 'Green' } else { 'Red' })
            Write-Host "  [$envName] TENANTID      : $(if ($envState.TenantId) { '✅' } else { '❌' })" -ForegroundColor $(if ($envState.TenantId) { 'Green' } else { 'Red' })
            Write-Host "  [$envName] SUBSCRIPTIONID: $(if ($envState.SubscriptionId) { '✅' } else { '❌' })" -ForegroundColor $(if ($envState.SubscriptionId) { 'Green' } else { 'Red' })

            if ($envState.Complete) {
              $configuredEnvs += $envName
            } else {
              $missingEnvs += $envName
            }
          }

          Write-Host ""
          $sourceReusable = $sourceState.Readable -and $sourceState.Complete
          $allTargetsConfigured = $missingEnvs.Count -eq 0

          "sourceEnvironment=$sourceEnvironment" >> $env:GITHUB_OUTPUT
          "targetEnvironmentsCsv=$($targetEnvironments -join ',')" >> $env:GITHUB_OUTPUT
          "configuredEnvsCsv=$($configuredEnvs -join ',')" >> $env:GITHUB_OUTPUT
          "missingEnvsCsv=$($missingEnvs -join ',')" >> $env:GITHUB_OUTPUT
          "unreadableEnvsCsv=$($unreadableEnvs -join ',')" >> $env:GITHUB_OUTPUT
          "sourceReadable=$($sourceState.Readable.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "sourceReusable=$($sourceReusable.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "allTargetsConfigured=$($allTargetsConfigured.ToString().ToLower())" >> $env:GITHUB_OUTPUT

          if ($unreadableEnvs.Count -gt 0) {
            Write-Host "❌ Phase 1b-only guard could not verify one or more target environments." -ForegroundColor Red
            Write-Host "   Unreadable : $($unreadableEnvs -join ', ')" -ForegroundColor Red
            Write-Host "   This usually indicates a GitHub App permission, installation, or transient GitHub API issue." -ForegroundColor Yellow
            Write-Error "Phase 1b-only guard could not read all target environments to verify baseline state."
            exit 1
          }

          if (-not $sourceReusable -and -not $allTargetsConfigured) {
            Write-Host "❌ Phase 1b-only is blocked because there is no reusable OIDC source baseline and not all target environments are already complete." -ForegroundColor Red
            Write-Host "   Shared source environment ($sourceEnvironment): $(if ($sourceState.Readable) { 'incomplete' } else { 'not readable' })" -ForegroundColor Red
            if ($configuredEnvs.Count -gt 0) {
              Write-Host "   Configured : $($configuredEnvs -join ', ')" -ForegroundColor Green
            }
            if ($missingEnvs.Count -gt 0) {
              Write-Host "   Missing    : $($missingEnvs -join ', ')" -ForegroundColor Red
            }
            Write-Host ""
            Write-Host "Use Phase 1a + Phase 1b together to create or refresh the shared OIDC source and then write missing environment secrets." -ForegroundColor Yellow
            Write-Error "Phase 1b-only requires either a reusable shared OIDC source baseline or a fully configured target baseline."
            exit 1
          }

          if ($sourceReusable -and $missingEnvs.Count -gt 0) {
            Write-Host "✅ Phase 1b-only baseline confirmed — shared source environment '$sourceEnvironment' can repair missing target environments." -ForegroundColor Green
            Write-Host "   Missing target environments to be updated: $($missingEnvs -join ', ')" -ForegroundColor Yellow
          } elseif ($allTargetsConfigured) {
            Write-Host "✅ Phase 1b-only baseline confirmed — all target environments already have complete OIDC secrets." -ForegroundColor Green
          } else {
            Write-Host "✅ Phase 1b-only baseline confirmed — shared source environment '$sourceEnvironment' is complete." -ForegroundColor Green
          }

      - name: Phase Readiness Pre-Flight Summary
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PHASE READINESS PRE-FLIGHT SUMMARY (DRY-RUN CHECK)       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "This step shows what will run and whether prerequisites are met." -ForegroundColor Gray
          Write-Host ""

          $hasAppId        = "${{ secrets.APP_ID }}"          -ne ""
          $hasPrivateKey   = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          $appConfigured   = $hasAppId -and $hasPrivateKey

          # ── Read selected inputs ────────────────────────────────────────
          $doSetupOidc     = "${{ inputs.setupOidc }}"        -eq "true"
          $doSetupGhApp    = "${{ inputs.setupGitHubApp }}"   -eq "true"
          $doConfigSecrets = "${{ inputs.configureSecrets }}" -eq "true"
          $phase1bBaselineStepRan = (-not $doSetupOidc -and $doConfigSecrets)
          $sharedSourceEnv = "${{ steps.phase1b-baseline.outputs.sourceEnvironment }}"
          $targetEnvCsv = "${{ steps.phase1b-baseline.outputs.targetEnvironmentsCsv }}"
          $configuredEnvCsv = "${{ steps.phase1b-baseline.outputs.configuredEnvsCsv }}"
          $missingEnvCsv = "${{ steps.phase1b-baseline.outputs.missingEnvsCsv }}"
          $sourceReadable = "${{ steps.phase1b-baseline.outputs.sourceReadable }}" -eq "true"
          $sourceReusable = "${{ steps.phase1b-baseline.outputs.sourceReusable }}" -eq "true"
          $allTargetsConfigured = "${{ steps.phase1b-baseline.outputs.allTargetsConfigured }}" -eq "true"
          $oidcConfigured = if ($phase1bBaselineStepRan) { $sourceReusable -or $allTargetsConfigured } else { $false }

          # ── Credential summary ───────────────────────────────────────────
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "🔐 CREDENTIAL STATUS" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          if ($phase1bBaselineStepRan) {
            Write-Host "  Azure OIDC (verified Phase 1b baseline):" -ForegroundColor Cyan
            $sourceLabel = if ($sourceReusable) {
              '✅ Reusable shared source baseline present'
            } elseif ($sourceReadable) {
              '⚠️  Shared source environment is readable but incomplete'
            } else {
              '⚠️  Shared source environment was not readable'
            }
            Write-Host "    Shared source ($sharedSourceEnv): $sourceLabel" -ForegroundColor $(if ($sourceReusable) { 'Green' } elseif ($sourceReadable) { 'Yellow' } else { 'Yellow' })

            if ($allTargetsConfigured) {
              Write-Host "    Target baseline ($targetEnvCsv): ✅ Complete in all selected environments" -ForegroundColor Green
            } else {
              Write-Host "    Target baseline ($targetEnvCsv): ⚠️  Missing in $missingEnvCsv" -ForegroundColor Yellow
              if (-not [string]::IsNullOrWhiteSpace($configuredEnvCsv)) {
                Write-Host "    Already configured         : $configuredEnvCsv" -ForegroundColor Gray
              }
            }
          } elseif ($doSetupOidc) {
            Write-Host "  Azure OIDC (Phase 1a):" -ForegroundColor Cyan
            Write-Host "    Setup Azure OIDC is selected — credentials will be created or refreshed in this run." -ForegroundColor Green
          } else {
            Write-Host "  Azure OIDC:" -ForegroundColor Cyan
            Write-Host "    No direct environment-secret verification is performed in this pre-flight mode." -ForegroundColor Gray
          }
          Write-Host ""
          Write-Host "  GitHub App (Phase 0 credentials):" -ForegroundColor Cyan
          Write-Host "    APP_ID        : $(if ($hasAppId)      { '✅ Present' } else { '⬜ Missing' })" -ForegroundColor $(if ($hasAppId) { 'Green' } else { 'Yellow' })
          Write-Host "    APP_PRIVATE_KEY: $(if ($hasPrivateKey) { '✅ Present' } else { '⬜ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { 'Green' } else { 'Yellow' })
          Write-Host ""

          # ── Phase readiness table ───────────────────────────────────────
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "📋 PHASE EXECUTION PLAN" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""

          # Phase 0: GitHub App instructions
          $phase0Icon = if ($doSetupGhApp) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          Write-Host "  Phase 0 — GitHub App Instructions  : $phase0Icon" -ForegroundColor $(if ($doSetupGhApp) { 'Cyan' } else { 'DarkGray' })

          # Phase 1a: Setup OIDC
          $effectiveSetupOidc = $doSetupOidc -or $doConfigSecrets
          $phase1aIcon   = if ($effectiveSetupOidc) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          $phase1aAuth   = if ($doSetupOidc) {
            'interactive (device code — App Registration management)'
          } elseif ($phase1bBaselineStepRan -and $sourceReusable) {
            'non-interactive (OIDC via shared dev environment)'
          } elseif ($phase1bBaselineStepRan -and $allTargetsConfigured) {
            'no Azure login (verification only — all selected targets already complete)'
          } elseif ($oidcConfigured) {
            'non-interactive (OIDC)'
          } else {
            'interactive (device code — no existing OIDC)'
          }
          $phase1aNote   = if (-not $doSetupOidc -and $doConfigSecrets) {
            " (passthrough mode — verifying existing credentials for Phase 1b)"
          } else { '' }
          Write-Host "  Phase 1a — Setup Azure OIDC        : $phase1aIcon$phase1aNote" -ForegroundColor $(if ($effectiveSetupOidc) { 'Cyan' } else { 'DarkGray' })
          if ($effectiveSetupOidc) {
            Write-Host "             └─ Login method: $phase1aAuth" -ForegroundColor Gray
          }

          # Phase 1b: Configure GitHub Secrets
          $phase1bPrereq  = $appConfigured
          $phase1bEnabled = $doConfigSecrets -or $doSetupGhApp
          $phase1bIcon    = if ($phase1bEnabled) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          $oidcAvailableForPhase1b = if ($phase1bBaselineStepRan) { $sourceReusable -or $allTargetsConfigured } else { $effectiveSetupOidc -or $oidcConfigured }
          $phase1bReady   = (-not $phase1bEnabled) -or ($phase1bPrereq -and $oidcAvailableForPhase1b)
          Write-Host "  Phase 1b — Configure GitHub Secrets: $phase1bIcon" -ForegroundColor $(if ($phase1bEnabled) { 'Cyan' } else { 'DarkGray' })
          if ($phase1bEnabled) {
            if ($phase1bBaselineStepRan -and $allTargetsConfigured) {
              Write-Host "             └─ OIDC source: all selected target environments already have existing AZUREAPPSERVICE_* secrets ✅" -ForegroundColor Green
            } elseif ($phase1bBaselineStepRan -and $sourceReusable) {
              Write-Host "             └─ OIDC source: shared source environment '$sharedSourceEnv' is reusable$(if (-not [string]::IsNullOrWhiteSpace($missingEnvCsv)) { " — missing targets: $missingEnvCsv" } else { '' })" -ForegroundColor Green
            } elseif ($effectiveSetupOidc) {
              Write-Host "             └─ OIDC source: fresh credentials from Phase 1a$(if (-not $doSetupOidc) { ' (auto-triggered)' } else { '' })" -ForegroundColor Gray
            } elseif ($oidcConfigured) {
              Write-Host "             └─ OIDC source: existing AZUREAPPSERVICE_* secrets ✅" -ForegroundColor Green
            } else {
              Write-Host "             └─ ⚠️  OIDC source: not found at repository level" -ForegroundColor Yellow
              Write-Host "                    (May exist as environment secrets — Phase 1b will verify)" -ForegroundColor Gray
            }
            Write-Host "             └─ GitHub App token: $(if ($appConfigured) { '✅ APP_ID + APP_PRIVATE_KEY present' } else { '❌ Missing — Phase 0 required' })" `
              -ForegroundColor $(if ($appConfigured) { 'Green' } else { 'Red' })
          }

          Write-Host ""

          # ── Overall readiness gate ──────────────────────────────────────
          $allReady = $phase1bReady
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

          if ($allReady) {
            Write-Host ""
            Write-Host "✅ PRE-FLIGHT CHECK PASSED — All selected phases have prerequisites met." -ForegroundColor Green
            Write-Host ""
          } else {
            Write-Host ""
            Write-Host "⚠️  PRE-FLIGHT CHECK — One or more phases have unmet prerequisites:" -ForegroundColor Yellow
            if (-not $phase1bReady) {
              if (-not $appConfigured) {
                Write-Host "  ❌ Phase 1b needs GitHub App credentials (APP_ID + APP_PRIVATE_KEY)." -ForegroundColor Red
                Write-Host "     → Complete Phase 0 (APP_ID + APP_PRIVATE_KEY must be set)" -ForegroundColor Yellow
              }
              if (-not $oidcAvailableForPhase1b) {
                Write-Host "  ❌ Phase 1b: OIDC credentials not found at repository level; Phase 1a is not running." -ForegroundColor Red
                Write-Host "     → For first-time setup: enable Phase 1a + 1b together" -ForegroundColor Yellow
              }
            }
            Write-Host ""
            Write-Error "Pre-flight check failed — one or more selected phases have unmet prerequisites. See details above."
            exit 1
          }

          Write-Host ""
          Write-Host "ℹ️  After initial setup completes, use 'Azure Bootstrap & Deploy' workflow" -ForegroundColor Cyan
          Write-Host "   for infrastructure provisioning (Phase 2) and deployments." -ForegroundColor Cyan
          Write-Host ""

  setup-oidc:
    name: Setup Azure OIDC
    # Only runs when Phase 1a or Phase 1b is explicitly selected.
    # Phase 1b auto-triggers Phase 1a because the integrated secret-configuration
    # path still needs OIDC values inside this workflow.
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.setupOidc || inputs.configureSecrets)
    needs: [validate-inputs]
    runs-on: windows-latest
    # Always uses 'dev' environment context — all environments share
    # the same Azure AD App Registration. This avoids the chicken-and-egg
    # problem where a new environment's federated credential doesn't exist yet.
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Auth Check
        id: auth-check
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         AZURE AUTHENTICATION CHECK                           ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          $hasOidc    = -not [string]::IsNullOrWhiteSpace("${{ secrets.AZUREAPPSERVICE_CLIENTID }}")
          $setupOidc  = "${{ inputs.setupOidc }}" -eq "true"

          # When setupOidc=true we are creating/modifying Azure AD App Registrations.
          # The OIDC service principal only has subscription Contributor — it does NOT have
          # Azure AD directory permissions (Application.ReadWrite.All) needed to manage
          # App Registrations.  Force device code so the human user's Azure AD identity
          # is used instead.
          if ($setupOidc) {
            Write-Host "ℹ️  setupOidc=true: Azure AD App Registration management required." -ForegroundColor Cyan
            Write-Host "   Forcing device code login — only a user with Azure AD admin rights" -ForegroundColor Cyan
            Write-Host "   (Application Administrator / Global Admin) can create App Registrations." -ForegroundColor Cyan
            Write-Host "   The OIDC service principal has subscription Contributor only." -ForegroundColor Gray
            "useExistingOidc=false" >> $env:GITHUB_OUTPUT
          } elseif ($hasOidc) {
            Write-Host "✅ Existing OIDC credentials found — will use non-interactive login" -ForegroundColor Green
            "useExistingOidc=true" >> $env:GITHUB_OUTPUT
          } else {
            # setupOidc=false and no OIDC credentials exist.
            # This job is acting as a passthrough relay only (reading dev env secrets for Phase 1b).
            # No Azure login is required — the passthrough step reads from the GitHub Actions
            # environment context, not from Azure.  Skipping login avoids a confusing
            # 5-minute device-code timeout for a no-op relay run.
            Write-Host "ℹ️  setupOidc=false and no existing OIDC credentials found." -ForegroundColor Cyan
            Write-Host "   Running in passthrough mode — no Azure login required." -ForegroundColor Gray
            Write-Host "   (If Phase 1a is needed, re-run with setupOidc=true.)" -ForegroundColor Gray
            "useExistingOidc=skip" >> $env:GITHUB_OUTPUT
          }
        env:
          CLIENTID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}

      - name: Azure Login (Existing OIDC)
        if: steps.auth-check.outputs.useExistingOidc == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Azure Login (Device Code)
        if: steps.auth-check.outputs.useExistingOidc == 'false'
        timeout-minutes: 5
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
          Write-Host "║         DEVICE CODE LOGIN — FIRST-TIME SETUP                  ║" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "You have 5 minutes to authenticate. A device code will appear below." -ForegroundColor Cyan
          Write-Host ""

          $timeoutSeconds = 300  # 5 minutes

          # Run az login in a background job so we can enforce a timeout and surface the URL
          $loginJob = Start-Job { az login --use-device-code 2>&1 }

          $startTime  = Get-Date
          $shownLines = [System.Collections.Generic.HashSet[string]]::new()
          $urlWritten = $false

          while ($loginJob.State -notin @('Completed', 'Failed', 'Stopped')) {
            Start-Sleep -Seconds 2

            # Enforce timeout
            if (((Get-Date) - $startTime).TotalSeconds -gt $timeoutSeconds) {
              Stop-Job  $loginJob -ErrorAction SilentlyContinue
              Remove-Job $loginJob -Force -ErrorAction SilentlyContinue
              Write-Host ""
              Write-Host "⏱️  TIMEOUT — Authentication not completed within 5 minutes." -ForegroundColor Red
              Write-Host "   Re-run the workflow and authenticate promptly." -ForegroundColor Yellow
              "⏱️ **Login timed out** — Re-run the workflow and authenticate within 5 minutes." >> $env:GITHUB_STEP_SUMMARY
              Write-Error "Device code login timed out after 5 minutes"
              exit 1
            }

            # Stream new output lines
            $lines = Receive-Job $loginJob -Keep 2>&1
            foreach ($line in ($lines | ForEach-Object { [string]$_ })) {
              if ($shownLines.Add($line)) {
                Write-Host $line

                # When the URL line appears, reprint it prominently and add to summary
                if (-not $urlWritten -and $line -match '(https://login\.microsoft\.com/[^\s]+)') {
                  $loginUrl = $Matches[1].TrimEnd('.')
                  Write-Host ""
                  Write-Host "  ╔══ 👉 CLICK TO AUTHENTICATE ═══════════════════════════════╗" -ForegroundColor Cyan
                  Write-Host "  ║  $loginUrl" -ForegroundColor Yellow
                  Write-Host "  ╚═══════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
                  Write-Host ""
                  # Write clickable link to step summary (visible in the job summary panel)
                  "**[👉 Open login page: $loginUrl]($loginUrl)**" >> $env:GITHUB_STEP_SUMMARY
                  $urlWritten = $true
                }
              }
            }
          }

          # Flush any remaining output
          Receive-Job $loginJob 2>&1 | ForEach-Object {
            $s = [string]$_
            if ($shownLines.Add($s)) { Write-Host $s }
          }

          $jobFailed = $loginJob.State -eq 'Failed'
          Remove-Job $loginJob -Force -ErrorAction SilentlyContinue

          if ($jobFailed) {
            Write-Host "❌ Device code login failed" -ForegroundColor Red
            Write-Error "Azure device code login failed"
            exit 1
          }

          Write-Host ""
          Write-Host "✅ Device code login successful" -ForegroundColor Green

      - name: Emit Existing Credentials as Outputs
        id: oidc-passthrough
        if: ${{ !inputs.setupOidc }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PASSTHROUGH — USING EXISTING OIDC CREDENTIALS           ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Phase 1a (Setup OIDC) was not selected." -ForegroundColor Gray
          Write-Host "Passing through existing OIDC credentials to downstream jobs." -ForegroundColor Gray
          Write-Host ""

          $storedClientId = "${{ secrets.AZUREAPPSERVICE_CLIENTID }}"
          $tenantId       = "${{ secrets.AZUREAPPSERVICE_TENANTID }}"
          $subscriptionId = "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}"

          # ── Client ID integrity check ────────────────────────────────────────────
          # Always query Azure by display name and compare against the stored secret.
          # If they differ (e.g. after accidental app deletion + re-creation) we use
          # the Azure-sourced value so Phase 1b force-writes the correct Client ID.
          # GitHub secrets are write-only — we cannot read the stored value back to
          # compare programmatically, but we CAN compare what Azure says against what
          # the GitHub Actions context exposes via ${{ secrets.* }}.
          # ─────────────────────────────────────────────────────────────────────────
          $appName  = "${{ inputs.oidcAppName }}"
          $clientId = $storedClientId   # default; overridden on mismatch

          Write-Host "🔍 Verifying Client ID against Azure ($appName)..." -ForegroundColor Cyan
          try {
            $azureApps    = az ad app list --display-name $appName 2>&1 | ConvertFrom-Json -ErrorAction Stop
            $azureClientId = if ($azureApps -and $azureApps.Count -gt 0) { $azureApps[0].appId } else { $null }

            if ($azureClientId) {
              Write-Host "  Stored secret Client ID : $storedClientId" -ForegroundColor Gray
              Write-Host "  Azure App Client ID     : $azureClientId"  -ForegroundColor Gray

              if ($storedClientId -ne $azureClientId) {
                Write-Host ""
                Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                Write-Host "  ⚠️  CLIENT ID MISMATCH DETECTED" -ForegroundColor Yellow
                Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                Write-Host "  Stored GitHub secret : $storedClientId  ← STALE (old / deleted app)" -ForegroundColor Red
                Write-Host "  Azure App Client ID  : $azureClientId   ← CORRECT" -ForegroundColor Green
                Write-Host ""
                Write-Host "  Likely cause: '$appName' was deleted and re-created in Entra ID," -ForegroundColor Yellow
                Write-Host "  leaving the old Client ID in the GitHub environment secrets." -ForegroundColor Yellow
                Write-Host ""
                Write-Host "  ✅ Auto-fix in progress: using Azure-sourced Client ID for this run." -ForegroundColor Cyan
                Write-Host "     Phase 1b will overwrite AZUREAPPSERVICE_CLIENTID in all environments." -ForegroundColor Cyan
                Write-Host ""
                Write-Host "  ── MANUAL FALLBACK (use only if Phase 1b also fails below) ──────" -ForegroundColor DarkGray
                Write-Host "  1. Open: https://github.com/${{ github.repository }}/settings/environments" -ForegroundColor White
                Write-Host "     (Screenshot: you will see dev / staging / prod each showing '3 secrets')" -ForegroundColor Gray
                Write-Host "  2. For EACH environment (dev, staging, prod):" -ForegroundColor White
                Write-Host "       a. Click the environment name" -ForegroundColor Gray
                Write-Host "       b. Scroll to 'Environment secrets'" -ForegroundColor Gray
                Write-Host "       c. Click the trash icon next to each of these 3 secrets:" -ForegroundColor Gray
                Write-Host "            AZUREAPPSERVICE_CLIENTID" -ForegroundColor DarkYellow
                Write-Host "            AZUREAPPSERVICE_TENANTID" -ForegroundColor DarkYellow
                Write-Host "            AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor DarkYellow
                Write-Host "  3. Re-run Azure Initial Setup with ALL of these checked:" -ForegroundColor White
                Write-Host "       Phase 1a (Setup Azure OIDC)  = ✅  (re-creates OIDC credentials)" -ForegroundColor Gray
                Write-Host "       Phase 1b (Configure Secrets) = ✅  (writes fresh secrets)" -ForegroundColor Gray
                Write-Host "       environment                  = all   (updates dev + staging + prod)" -ForegroundColor Gray
                Write-Host "  ──────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
                Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                $clientId = $azureClientId
              } else {
                Write-Host "  ✅ Client ID matches Azure — secret is current" -ForegroundColor Green
              }
            } else {
              Write-Host "  ⚠️  App '$appName' not found in Azure AD — using stored secret value" -ForegroundColor Yellow
              Write-Host "     If unexpected, verify the app exists at:" -ForegroundColor Gray
              Write-Host "     https://portal.azure.com → Azure Active Directory → App Registrations" -ForegroundColor Gray
            }
          } catch {
            Write-Host "  ⚠️  Could not query Azure AD: $($_.Exception.Message)" -ForegroundColor Yellow
            Write-Host "     Using stored secret value." -ForegroundColor Gray
          }
          Write-Host ""

          # Get the app object ID from the existing app registration
          try {
            $app = az ad app show --id $clientId | ConvertFrom-Json
            $appObjectId = $app.id
            Write-Host "  App Object ID: $appObjectId" -ForegroundColor Gray
          } catch {
            Write-Host "  ⚠️  Could not retrieve app object ID (may not be needed)" -ForegroundColor Yellow
            $appObjectId = ""
          }
          
          # Retrieve spObjectId for the service principal (needed by bootstrap for KV access policy)
          try {
            $spInfo = az ad sp list --filter "appId eq '$clientId'" | ConvertFrom-Json
            $spObjectId = if ($spInfo -and $spInfo.Count -gt 0) { $spInfo[0].id } else { '' }
            if ($spObjectId) {
              Write-Host "  Service Principal Object ID: $spObjectId" -ForegroundColor Gray
            } else {
              Write-Host "  ⚠️  Could not retrieve service principal object ID" -ForegroundColor Yellow
            }
          } catch {
            Write-Host "  ⚠️  Could not retrieve service principal object ID: $($_.Exception.Message)" -ForegroundColor Yellow
            $spObjectId = ''
          }

          "clientId=$clientId"             >> $env:GITHUB_OUTPUT
          "tenantId=$tenantId"             >> $env:GITHUB_OUTPUT
          "subscriptionId=$subscriptionId" >> $env:GITHUB_OUTPUT
          "appObjectId=$appObjectId"       >> $env:GITHUB_OUTPUT
          "spObjectId=$spObjectId"         >> $env:GITHUB_OUTPUT
          
          Write-Host "✅ Existing credentials emitted as outputs" -ForegroundColor Green

      - name: Setup OIDC App Registration
        id: oidc-setup
        if: ${{ inputs.setupOidc }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         SETUP OIDC APP REGISTRATION                          ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          # Map 'all' to the full list of environments the script expects
          $envInput = "${{ inputs.environment }}"
          $environments = if ($envInput -eq "all") { "dev,staging,prod" } else { $envInput }
          
          $params = @{
            AppDisplayName = "${{ inputs.oidcAppName }}"
            Environments   = $environments
            GitHubOwner    = "${{ github.repository_owner }}"
            Repository     = "${{ github.event.repository.name }}"
            GitHubSecretsManagedByWorkflow = ("${{ inputs.configureSecrets }}" -eq "true")
          }
          
          Write-Host "📋 Parameters:" -ForegroundColor Yellow
          Write-Host "  App Display Name: $($params.AppDisplayName)" -ForegroundColor Gray
          Write-Host "  Environments: $($params.Environments)" -ForegroundColor Gray
          Write-Host "  GitHub Owner: $($params.GitHubOwner)" -ForegroundColor Gray
          Write-Host "  Repository: $($params.Repository)" -ForegroundColor Gray
          Write-Host ""
          
          $result = ./Resources/Azure-Deployment/setup-github-oidc.ps1 @params
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ OIDC setup failed" -ForegroundColor Red
            Write-Error "OIDC App Registration setup failed"
            exit 1
          }
          
          # Query Azure directly — the script does not export env vars
          $appName        = "${{ inputs.oidcAppName }}"
          $appInfo        = az ad app list --display-name $appName | ConvertFrom-Json
          $clientId       = $appInfo[0].appId
          $appObjectId    = $appInfo[0].id
          $subscription   = az account show | ConvertFrom-Json
          $tenantId       = $subscription.tenantId
          $subscriptionId = $subscription.id
          try {
            $spInfo = az ad sp list --filter "appId eq '$clientId'" 2>&1 | ConvertFrom-Json -ErrorAction Stop
            $spObjectId = if ($spInfo -and $spInfo.Count -gt 0) { $spInfo[0].id } else { "" }
          } catch {
            Write-Host "  ⚠️  Could not retrieve service principal object ID: $($_.Exception.Message)" -ForegroundColor Yellow
            $spObjectId = ""
          }
          
          "clientId=$clientId"              >> $env:GITHUB_OUTPUT
          "tenantId=$tenantId"              >> $env:GITHUB_OUTPUT
          "subscriptionId=$subscriptionId"  >> $env:GITHUB_OUTPUT
          "appObjectId=$appObjectId"        >> $env:GITHUB_OUTPUT
          "spObjectId=$spObjectId"          >> $env:GITHUB_OUTPUT
          
          Write-Host ""
          Write-Host "✅ OIDC App Registration configured successfully" -ForegroundColor Green
          Write-Host "  Client ID: $clientId" -ForegroundColor Gray
          Write-Host "  Tenant ID: $tenantId" -ForegroundColor Gray
          Write-Host "  Subscription ID: $subscriptionId" -ForegroundColor Gray
          if (-not [string]::IsNullOrWhiteSpace($spObjectId)) {
            Write-Host "  Service Principal Object ID: $spObjectId" -ForegroundColor Gray
          }

      - name: Verify Federated Credentials
        if: ${{ inputs.setupOidc }}
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      VERIFY FEDERATED CREDENTIALS                            ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          $appObjectId = "${{ steps.oidc-setup.outputs.appObjectId }}"
          $env = "${{ inputs.environment }}"
          
          Write-Host "🔍 Verifying federated credentials for app: $appObjectId" -ForegroundColor Cyan
          Write-Host "   Environment scope: $env" -ForegroundColor Gray
          Write-Host ""
          
          $maxRetries = 3
          $retryDelay = 20
          $attempt = 0
          $verified = $false
          
          while ($attempt -lt $maxRetries -and -not $verified) {
            $attempt++
            Write-Host "  Attempt $attempt of $maxRetries..." -ForegroundColor Gray
            
            try {
              $creds = az ad app federated-credential list --id $appObjectId | ConvertFrom-Json
              
              if ($creds -and $creds.Count -gt 0) {
                Write-Host "  ✅ Found $($creds.Count) federated credential(s):" -ForegroundColor Green
                foreach ($cred in $creds) {
                  Write-Host "    - $($cred.name): $($cred.subject)" -ForegroundColor Gray
                }
                $verified = $true
              } else {
                Write-Host "  ⚠️  No federated credentials found yet" -ForegroundColor Yellow
                if ($attempt -lt $maxRetries) {
                  Write-Host "  Waiting ${retryDelay}s before retry..." -ForegroundColor Gray
                  Start-Sleep -Seconds $retryDelay
                }
              }
            } catch {
              Write-Host "  ⚠️  Error checking credentials: $($_.Exception.Message)" -ForegroundColor Yellow
              if ($attempt -lt $maxRetries) {
                Write-Host "  Waiting ${retryDelay}s before retry..." -ForegroundColor Gray
                Start-Sleep -Seconds $retryDelay
              }
            }
          }
          
          if (-not $verified) {
            Write-Host ""
            Write-Host "❌ Could not verify federated credentials after $maxRetries attempts" -ForegroundColor Red
            Write-Error "Federated credential verification failed"
            exit 1
          }
          
          Write-Host ""
          Write-Host "✅ Federated credentials verified successfully" -ForegroundColor Green

      - name: Prepare Deterministic OIDC Handoff Artifact
        continue-on-error: true
        if: success() && (steps.oidc-setup.outcome == 'success' || steps.oidc-passthrough.outcome == 'success')
        shell: pwsh
        run: |
          $clientId = "${{ steps.oidc-setup.outputs.clientId }}"
          if ([string]::IsNullOrWhiteSpace($clientId)) {
            $clientId = "${{ steps.oidc-passthrough.outputs.clientId }}"
          }

          $tenantId = "${{ steps.oidc-setup.outputs.tenantId }}"
          if ([string]::IsNullOrWhiteSpace($tenantId)) {
            $tenantId = "${{ steps.oidc-passthrough.outputs.tenantId }}"
          }

          $subscriptionId = "${{ steps.oidc-setup.outputs.subscriptionId }}"
          if ([string]::IsNullOrWhiteSpace($subscriptionId)) {
            $subscriptionId = "${{ steps.oidc-passthrough.outputs.subscriptionId }}"
          }

          $spObjectId = "${{ steps.oidc-setup.outputs.spObjectId }}"
          if ([string]::IsNullOrWhiteSpace($spObjectId)) {
            $spObjectId = "${{ steps.oidc-passthrough.outputs.spObjectId }}"
          }

          $credentialSource = if ("${{ steps.oidc-setup.outcome }}" -eq 'success') { 'setup' } else { 'passthrough' }

          $handoffDir = Join-Path $env:RUNNER_TEMP 'oidc-handoff'
          $handoffFile = Join-Path $handoffDir 'oidc-handoff.json'
          New-Item -ItemType Directory -Path $handoffDir -Force | Out-Null

          @{
            clientId = $clientId
            tenantId = $tenantId
            subscriptionId = $subscriptionId
            spObjectId = $spObjectId
            credentialSource = $credentialSource
          } | ConvertTo-Json | Set-Content -Path $handoffFile -Encoding UTF8

          Write-Host "✅ Deterministic OIDC handoff artifact prepared" -ForegroundColor Green

      - name: Upload OIDC Handoff Artifact
        continue-on-error: true
        if: success() && (steps.oidc-setup.outcome == 'success' || steps.oidc-passthrough.outcome == 'success')
        uses: actions/upload-artifact@v6
        with:
          name: oidc-handoff-${{ github.run_id }}
          path: ${{ runner.temp }}/oidc-handoff/oidc-handoff.json
          if-no-files-found: error
          retention-days: 1

      - name: Create Setup Summary
        if: always()
        run: |
          "## 🔑 Azure OIDC Setup Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          $setupOidc = "${{ inputs.setupOidc }}"
          $env = "${{ inputs.environment }}"
          
          if ($setupOidc -eq "true") {
            $clientId = "${{ steps.oidc-setup.outputs.clientId }}"
            $tenantId = "${{ steps.oidc-setup.outputs.tenantId }}"
            $subscriptionId = "${{ steps.oidc-setup.outputs.subscriptionId }}"
            $hasOutputs = $clientId -ne "" -and $tenantId -ne "" -and $subscriptionId -ne ""
            
            if ($hasOutputs) {
              "**OIDC App Registration**: ✅ Created/Updated" >> $env:GITHUB_STEP_SUMMARY
              "**Environment Scope**: ``$env``" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Output | Value |" >> $env:GITHUB_STEP_SUMMARY
              "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
              "| Client ID | ``$clientId`` |" >> $env:GITHUB_STEP_SUMMARY
              "| Tenant ID | ``$tenantId`` |" >> $env:GITHUB_STEP_SUMMARY
            } else {
              "**OIDC App Registration**: ❌ Failed" >> $env:GITHUB_STEP_SUMMARY
              "**Environment Scope**: ``$env``" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "> The ``setup-github-oidc.ps1`` script failed before producing outputs." >> $env:GITHUB_STEP_SUMMARY
              "> Check the **Setup OIDC App Registration** step logs above for the error details." >> $env:GITHUB_STEP_SUMMARY
            }
          } elseif ("${{ steps.oidc-passthrough.outputs.clientId }}" -ne "") {
            $ptClientId = "${{ steps.oidc-passthrough.outputs.clientId }}"
            $storedId   = "${{ secrets.AZUREAPPSERVICE_CLIENTID }}"
            $mismatch   = ($storedId -ne "" -and $storedId -ne $ptClientId)
            "**OIDC Setup**: Skipped — using existing credentials (passthrough)" >> $env:GITHUB_STEP_SUMMARY
            if ($mismatch) {
              "" >> $env:GITHUB_STEP_SUMMARY
              "> ⚠️ **Client ID mismatch detected**: stored secret (`$storedId`) differs from Azure (`$ptClientId`)." >> $env:GITHUB_STEP_SUMMARY
              "> Phase 1b will overwrite the stale `AZUREAPPSERVICE_CLIENTID` secret with the Azure-sourced value." >> $env:GITHUB_STEP_SUMMARY
            }
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Output | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| Client ID (Azure) | ``$ptClientId`` |" >> $env:GITHUB_STEP_SUMMARY
            if ($mismatch) {
              "| Client ID (stored secret — stale) | ``$storedId`` |" >> $env:GITHUB_STEP_SUMMARY
            }
            "| Tenant ID | ``${{ steps.oidc-passthrough.outputs.tenantId }}`` |" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "**OIDC Setup**: Skipped (using existing credentials)" >> $env:GITHUB_STEP_SUMMARY
          }
          "" >> $env:GITHUB_STEP_SUMMARY

  # These three jobs exist solely to ensure each GitHub environment exists before
  # Phase 1b tries to write secrets into it. A workflow job that references an
  # environment via `environment:` causes GitHub to auto-create it if it is missing —
  # no Administration: write permission required. The jobs contain a single trivial
  # step; all real work happens in configure-secrets.
  ensure-env-dev:
    name: Ensure dev Environment Exists
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.configureSecrets &&
      (inputs.environment == 'dev' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: dev
    steps:
      - name: Environment Ready
        run: Write-Host "✅ dev environment exists (auto-created by GitHub if needed)" -ForegroundColor Green

  ensure-env-staging:
    name: Ensure staging Environment Exists
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.configureSecrets &&
      (inputs.environment == 'staging' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: staging
    steps:
      - name: Environment Ready
        run: Write-Host "✅ staging environment exists (auto-created by GitHub if needed)" -ForegroundColor Green

  ensure-env-prod:
    name: Ensure prod Environment Exists
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.configureSecrets &&
      (inputs.environment == 'prod' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: prod
    steps:
      - name: Environment Ready
        run: Write-Host "✅ prod environment exists (auto-created by GitHub if needed)" -ForegroundColor Green

  configure-secrets:
    name: Configure GitHub Secrets
    needs: [validate-inputs, setup-oidc, ensure-env-dev, ensure-env-staging, ensure-env-prod]
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      (needs.setup-oidc.result == 'success' || needs.setup-oidc.result == 'skipped') &&
      (needs.ensure-env-dev.result == 'success' || needs.ensure-env-dev.result == 'skipped') &&
      (needs.ensure-env-staging.result == 'success' || needs.ensure-env-staging.result == 'skipped') &&
      (needs.ensure-env-prod.result == 'success' || needs.ensure-env-prod.result == 'skipped') &&
      inputs.configureSecrets
    runs-on: windows-latest
    steps:
      - name: Check GitHub App Presence
        id: check-app-presence
        shell: pwsh
        run: |
          $hasAppId = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          Write-Host "🔍 Checking GitHub App configuration (Phase 0 prerequisites)..." -ForegroundColor Cyan
          Write-Host "  APP_ID          : $(if ($hasAppId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasAppId) { 'Green' } else { 'Red' })
          Write-Host "  APP_PRIVATE_KEY : $(if ($hasPrivateKey) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { 'Green' } else { 'Red' })
          Write-Host "  APP_INSTALLATION_ID : ✨ Auto-discovered at runtime" -ForegroundColor Cyan
          Write-Host ""

          if ($hasAppId -and $hasPrivateKey) {
            Write-Host "  ✅ GitHub App secrets present — token will be generated for secret management" -ForegroundColor Green
            "hasGitHubAppSecrets=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "  ⚠️  GitHub App secrets not configured — Phase 0 (GitHub App setup) is required for Phase 1b" -ForegroundColor Yellow
            "hasGitHubAppSecrets=false" >> $env:GITHUB_OUTPUT
          }

      - name: Generate GitHub App Token
        id: app-token
        if: steps.check-app-presence.outputs.hasGitHubAppSecrets == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download OIDC Handoff Artifact
        id: oidc-handoff-artifact
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: oidc-handoff-${{ github.run_id }}
          path: ${{ runner.temp }}/oidc-handoff

      - name: Handle GitHub App Token Failure
        if: steps.check-app-presence.outputs.hasGitHubAppSecrets == 'true' && steps.app-token.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║         GITHUB APP TOKEN GENERATION FAILED                    ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          Write-Host ""
          Write-Host "❌ Failed to generate GitHub App installation token" -ForegroundColor Red
          Write-Host ""
          Write-Host "Most likely cause: GitHub App not installed on repository" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Solution: Install the app at https://github.com/settings/installations" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "See documentation for details:" -ForegroundColor Gray
          Write-Host "  • docs/guides/configuration/workflow-automation-visual-guide.md" -ForegroundColor White
          Write-Host ""
          Write-Error "GitHub App token generation failed"
          exit 1

      - name: Validate Prerequisites
        id: prereqs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HAS_GITHUB_APP: ${{ steps.check-app-presence.outputs.hasGitHubAppSecrets }}
          EXPECT_OIDC_HANDOFF: ${{ inputs.setupOidc }}
          ARTIFACT_DOWNLOAD_OUTCOME: ${{ steps.oidc-handoff-artifact.outcome }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          TARGET_ENVIRONMENT: ${{ inputs.environment }}
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VALIDATING PREREQUISITES                               ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""

          function Write-OIDCSolutionHint {
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "  💡 SOLUTION: Run bootstrap with Phase 1a + 1b together:" -ForegroundColor Yellow
            Write-Host "     ✅ Setup Azure OIDC (Phase 1a)          = true" -ForegroundColor White
            Write-Host "     ✅ Configure GitHub Secrets (Phase 1b)  = true" -ForegroundColor White
            Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          }

          $handoffFile = Join-Path $env:RUNNER_TEMP 'oidc-handoff/oidc-handoff.json'
          $artifactValues = @{}
          if (Test-Path $handoffFile) {
            try {
              $artifactValues = Get-Content -Path $handoffFile -Raw | ConvertFrom-Json -AsHashtable
              Write-Host "  Deterministic handoff artifact: detected" -ForegroundColor Gray
            } catch {
              Write-Host "  ⚠️  Deterministic handoff artifact was present but unreadable: $($_.Exception.Message)" -ForegroundColor Yellow
            }
          }

          $clientId = [string]$artifactValues['clientId']
          $tenantId = [string]$artifactValues['tenantId']
          $subscriptionId = [string]$artifactValues['subscriptionId']
          $oidcSpObjectId = [string]$artifactValues['spObjectId']
          $credentialSource = [string]$artifactValues['credentialSource']
          if ([string]::IsNullOrWhiteSpace($credentialSource) -and -not [string]::IsNullOrWhiteSpace($clientId)) {
            $credentialSource = 'artifact'
          }

          $expectOidcHandoff = $env:EXPECT_OIDC_HANDOFF -eq 'true'
          $artifactDownloadOutcome = $env:ARTIFACT_DOWNLOAD_OUTCOME
          $artifactState = if ($artifactValues.Count -gt 0) { 'loaded' } elseif (Test-Path $handoffFile) { 'unreadable' } else { 'not-found' }
          $hasClientId = -not [string]::IsNullOrWhiteSpace($clientId)
          $hasTenantId = -not [string]::IsNullOrWhiteSpace($tenantId)
          $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($subscriptionId)

          "resolvedClientId=$clientId" >> $env:GITHUB_OUTPUT
          "resolvedTenantId=$tenantId" >> $env:GITHUB_OUTPUT
          "resolvedSubscriptionId=$subscriptionId" >> $env:GITHUB_OUTPUT
          "resolvedOidcSpObjectId=$oidcSpObjectId" >> $env:GITHUB_OUTPUT

          Write-Host "🔍 Checking Azure OIDC credentials..." -ForegroundColor Cyan
          Write-Host "  Client ID available      : $(if ($hasClientId) { '✅ Yes' } else { '⬜ No' })" -ForegroundColor $(if ($hasClientId) { 'Green' } else { 'Gray' })
          Write-Host "  Tenant ID available      : $(if ($hasTenantId) { '✅ Yes' } else { '⬜ No' })" -ForegroundColor $(if ($hasTenantId) { 'Green' } else { 'Gray' })
          Write-Host "  Subscription ID available: $(if ($hasSubscriptionId) { '✅ Yes' } else { '⬜ No' })" -ForegroundColor $(if ($hasSubscriptionId) { 'Green' } else { 'Gray' })
          Write-Host "  Credential source        : $(if ([string]::IsNullOrWhiteSpace($credentialSource)) { 'none' } else { $credentialSource })" -ForegroundColor Gray
          Write-Host "  Handoff expected         : $(if ($expectOidcHandoff) { '✅ Yes' } else { '⬜ No' })" -ForegroundColor $(if ($expectOidcHandoff) { 'Green' } else { 'Gray' })
          Write-Host "  Artifact download step   : $(if ([string]::IsNullOrWhiteSpace($artifactDownloadOutcome)) { 'not-run' } else { $artifactDownloadOutcome })" -ForegroundColor Gray
          Write-Host "  Artifact file state      : $artifactState" -ForegroundColor Gray
          Write-Host ""

          if ($expectOidcHandoff -and -not $hasClientId) {
            Write-Host "  ❌ Expected same-workflow OIDC handoff from Phase 1a, but no Client ID was available." -ForegroundColor Red
            Write-Host "     Checked source: deterministic in-workflow handoff artifact." -ForegroundColor Yellow
            "## ❌ Phase 1b Failed — OIDC Handoff Missing" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Root cause**: Phase 1a completed without a usable in-workflow OIDC handoff artifact for Phase 1b." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Check the Setup Azure OIDC job for artifact preparation and upload failures." >> $env:GITHUB_STEP_SUMMARY
            Write-Error "Expected in-workflow OIDC handoff was missing."
            exit 1
          }

          Write-Host "🔍 Checking target environment secret baseline..." -ForegroundColor Cyan
          Write-Host ""

          $ghExitCode = 0
          gh secret list --repo $env:GITHUB_REPOSITORY_NAME --env dev 2>&1 | Out-Null
          $ghExitCode = $LASTEXITCODE
          if ($ghExitCode -ne 0 -and $ghExitCode -ne 1) {
            Write-Host "  ⚠️  gh CLI failed (exit code: $ghExitCode) — cannot verify environment secrets." -ForegroundColor Red
            Write-Host ""
            if ($env:HAS_GITHUB_APP -ne 'true') {
              Write-Host "  ❌ Phase 0 (GitHub App) is required — configure APP_ID and APP_PRIVATE_KEY first." -ForegroundColor Red
            } else {
              Write-Host "  ❌ GitHub App token was generated but gh CLI still failed." -ForegroundColor Red
              Write-Host "     Verify the GitHub App has 'Secrets: Write' permission at: https://github.com/settings/apps" -ForegroundColor Yellow
            }
            exit 1
          }

          $targetEnvironments = @()
          $targetEnv = $env:TARGET_ENVIRONMENT
          if ($targetEnv -eq 'all') {
            $targetEnvironments = @('dev', 'staging', 'prod')
          } elseif ($targetEnv -ne '') {
            $targetEnvironments = @($targetEnv)
          }

          $allEnvsHaveSecrets = $true
          $existsClientId = $false
          $existsTenantId = $false
          $existsSubscriptionId = $false
          $missingEnvs = @()
          $configuredEnvs = @()
          $unreadableEnvs = @()

          if ($targetEnvironments.Count -gt 0) {
            Write-Host "  Environment-level secrets (checking: $($targetEnvironments -join ', ')):" -ForegroundColor Cyan
            foreach ($envName in $targetEnvironments) {
              if ($envName -notin @('dev', 'staging', 'prod')) {
                Write-Host "    [$envName] Skipped — not a recognised environment name" -ForegroundColor Gray
                continue
              }

              $envOutput = gh secret list --repo $env:GITHUB_REPOSITORY_NAME --env $envName 2>&1 | Out-String
              if ($LASTEXITCODE -eq 0) {
                $envHasClientId = $envOutput -match 'AZUREAPPSERVICE_CLIENTID'
                $envHasTenantId = $envOutput -match 'AZUREAPPSERVICE_TENANTID'
                $envHasSubscriptionId = $envOutput -match 'AZUREAPPSERVICE_SUBSCRIPTIONID'
                Write-Host "    [$envName] AZUREAPPSERVICE_CLIENTID      : $(if ($envHasClientId) { '✅ Exists' } else { '❌ Missing' })" -ForegroundColor $(if ($envHasClientId) { 'Green' } else { 'Red' })
                Write-Host "    [$envName] AZUREAPPSERVICE_TENANTID      : $(if ($envHasTenantId) { '✅ Exists' } else { '❌ Missing' })" -ForegroundColor $(if ($envHasTenantId) { 'Green' } else { 'Red' })
                Write-Host "    [$envName] AZUREAPPSERVICE_SUBSCRIPTIONID: $(if ($envHasSubscriptionId) { '✅ Exists' } else { '❌ Missing' })" -ForegroundColor $(if ($envHasSubscriptionId) { 'Green' } else { 'Red' })
                if (-not ($envHasClientId -and $envHasTenantId -and $envHasSubscriptionId)) {
                  $allEnvsHaveSecrets = $false
                  $missingEnvs += $envName
                } else {
                  $configuredEnvs += $envName
                }
                if ($envHasClientId) { $existsClientId = $true }
                if ($envHasTenantId) { $existsTenantId = $true }
                if ($envHasSubscriptionId) { $existsSubscriptionId = $true }
              } else {
                $envCheckOutput = gh api -H "Accept: application/vnd.github+json" "repos/$($env:GITHUB_REPOSITORY_NAME)/environments/$envName" 2>&1 | Out-String
                $envCheckExitCode = $LASTEXITCODE
                $environmentExists = $envCheckExitCode -eq 0
                $environmentMissing = (-not $environmentExists) -and ($envCheckOutput -match '404|Not Found')

                if ($environmentMissing) {
                  Write-Host "    [$envName] Environment does not exist yet — Phase 1b can create it if credentials are available" -ForegroundColor Yellow
                  $allEnvsHaveSecrets = $false
                  $missingEnvs += $envName
                } else {
                  Write-Host "    [$envName] Could not list environment secrets" -ForegroundColor Red
                  if (-not [string]::IsNullOrWhiteSpace($envOutput)) {
                    Write-Host "      gh output: $($envOutput.Trim())" -ForegroundColor DarkGray
                  }
                  $allEnvsHaveSecrets = $false
                  $unreadableEnvs += $envName
                }
              }
            }
            Write-Host ""
          }

          if ($unreadableEnvs.Count -gt 0) {
            Write-Host "  ❌ Could not verify one or more target environments:" -ForegroundColor Red
            Write-Host "     Unreadable : $($unreadableEnvs -join ', ')" -ForegroundColor Red
            Write-Host "     This usually indicates a GitHub App permission, installation, or transient GitHub API issue." -ForegroundColor Yellow
            Write-Host ""
            "## ❌ Phase 1b Failed — Could Not Read Environment Secrets" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Root cause**: GitHub could not read the secret metadata for ``$($unreadableEnvs -join ', ')``." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Check GitHub App installation, repository/environment permissions, and any transient GitHub API errors shown in the log output above." >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

          if ($allEnvsHaveSecrets -and $existsClientId -and $existsTenantId -and $existsSubscriptionId) {
            Write-Host "  ✅ OIDC secrets already configured in all target environments — no update needed" -ForegroundColor Green
            Write-Host "     (Secrets were configured in a previous run; no new values will be written)" -ForegroundColor Gray
            "credentialsProvided=false" >> $env:GITHUB_OUTPUT
            "useExistingSecrets=true" >> $env:GITHUB_OUTPUT
          } elseif ($hasClientId) {
            Write-Host "  ✅ Reusable OIDC baseline detected from source '$credentialSource' — Phase 1b will configure missing targets" -ForegroundColor Green
            if ($configuredEnvs.Count -gt 0) {
              Write-Host "     Already configured: $($configuredEnvs -join ', ')" -ForegroundColor Gray
            }
            if ($missingEnvs.Count -gt 0) {
              Write-Host "     Needs update     : $($missingEnvs -join ', ')" -ForegroundColor Yellow
            }
            "credentialsProvided=true" >> $env:GITHUB_OUTPUT
            "useExistingSecrets=false" >> $env:GITHUB_OUTPUT
          } else {
            if ($configuredEnvs.Count -gt 0 -and $missingEnvs.Count -gt 0) {
              Write-Host "  ⚠️  Partial configuration detected:" -ForegroundColor Yellow
              Write-Host "     Configured : $($configuredEnvs -join ', ')" -ForegroundColor Green
              Write-Host "     Missing    : $($missingEnvs -join ', ')" -ForegroundColor Red
              Write-Host ""
            } else {
              Write-Host "  ❌ No OIDC environment secrets found and no reusable credentials were available!" -ForegroundColor Red
              Write-Host ""
            }
            Write-OIDCSolutionHint

            $missingList = if ($missingEnvs.Count -gt 0) { $missingEnvs -join ', ' } else { '(all target environments)' }
            $rootCause = if ($configuredEnvs.Count -gt 0) {
              "Partial configuration: ``$($configuredEnvs -join ', ')`` $(if ($configuredEnvs.Count -eq 1) {'has'} else {'have'}) secrets but ``$missingList`` $(if ($missingEnvs.Count -eq 1) {'is'} else {'are'}) missing. No reusable OIDC baseline was available to repair the missing environment(s)."
            } else {
              'No reusable OIDC baseline was available and no ``AZUREAPPSERVICE_*`` secrets exist in the target environments.'
            }
            "## ❌ Phase 1b Failed — OIDC Credentials Not Available" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Root cause**: $rootCause" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Re-run **Azure Initial Setup** with **both** Phase 1 checkboxes selected (Setup Azure OIDC + Configure GitHub Secrets)." >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

          Write-Host "🔍 GitHub App secrets status..." -ForegroundColor Cyan
          Write-Host "  Environment Context: $env:TARGET_ENVIRONMENT" -ForegroundColor Gray
          Write-Host "  APP_ID + APP_PRIVATE_KEY: $(if ($env:HAS_GITHUB_APP -eq 'true') { '✅ Present' } else { '⚠️  Not configured' })" -ForegroundColor $(if ($env:HAS_GITHUB_APP -eq 'true') { 'Green' } else { 'Yellow' })
          Write-Host "  APP_INSTALLATION_ID   : ✨ Auto-discovered at runtime" -ForegroundColor Cyan
          Write-Host ""
          "hasGitHubAppSecrets=$($env:HAS_GITHUB_APP)" >> $env:GITHUB_OUTPUT
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "✅ Prerequisite validation complete" -ForegroundColor Green
          Write-Host ""
          exit 0

      - name: Check GitHub App Authentication
        id: check
        shell: pwsh
        run: |
          $hasGitHubAppSecrets = "${{ steps.prereqs.outputs.hasGitHubAppSecrets }}" -eq 'true'
          $tokenGenerated = "${{ steps.app-token.outcome }}" -eq 'success'
          $useExistingSecrets = "${{ steps.prereqs.outputs.useExistingSecrets }}" -eq 'true'

          if ($useExistingSecrets) {
            Write-Host "ℹ️  Existing-secrets mode: no secret writes needed; GitHub App token was used only for verification" -ForegroundColor Cyan
            "useGitHubApp=false" >> $env:GITHUB_OUTPUT
          } elseif ($hasGitHubAppSecrets -and $tokenGenerated) {
            Write-Host "✅ Using GitHub App for secret management" -ForegroundColor Green
            "useGitHubApp=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ Cannot proceed without GitHub App authentication" -ForegroundColor Red
            Write-Host "" -ForegroundColor Red
            Write-Host "  ── Diagnostics ──" -ForegroundColor Yellow
            Write-Host "  hasGitHubAppSecrets: $hasGitHubAppSecrets" -ForegroundColor Gray
            Write-Host "  tokenGenerated     : $tokenGenerated" -ForegroundColor Gray
            Write-Host "  useExistingSecrets : $useExistingSecrets" -ForegroundColor Gray
            Write-Host "  " -ForegroundColor Gray
            if (-not $hasGitHubAppSecrets) {
              Write-Host "  ❌ APP_ID and/or APP_PRIVATE_KEY secrets are missing" -ForegroundColor Red
              Write-Host "     → Complete Phase 0: create GitHub App and add secrets" -ForegroundColor Yellow
            } elseif (-not $tokenGenerated) {
              Write-Host "  ❌ GitHub App token generation failed" -ForegroundColor Red
              Write-Host "     → Check the 'Handle GitHub App Token Failure' step above for details" -ForegroundColor Yellow
              Write-Host "     → Verify app is installed: https://github.com/settings/installations" -ForegroundColor Cyan
            }
            Write-Host "  ──────────────────" -ForegroundColor Yellow
            "## ❌ GitHub App Authentication Failed" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Check | Status |" >> $env:GITHUB_STEP_SUMMARY
            "|---|---|" >> $env:GITHUB_STEP_SUMMARY
            "| APP_ID + APP_PRIVATE_KEY present | $(if ($hasGitHubAppSecrets) { '✅' } else { '❌ Missing' }) |" >> $env:GITHUB_STEP_SUMMARY
            "| App token generated | $(if ($tokenGenerated) { '✅' } else { '❌ Failed' }) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> **To fix**: Ensure the GitHub App is created, installed on this repo, and ``APP_ID`` + ``APP_PRIVATE_KEY`` secrets are set." >> $env:GITHUB_STEP_SUMMARY
            Write-Error "GitHub App authentication required. See diagnostics above."
            exit 1
          }

      - name: Set Environment Secrets
        if: steps.check.outputs.useGitHubApp == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          CLIENT_ID: ${{ steps.prereqs.outputs.resolvedClientId }}
          TENANT_ID: ${{ steps.prereqs.outputs.resolvedTenantId }}
          SUBSCRIPTION_ID: ${{ steps.prereqs.outputs.resolvedSubscriptionId }}
        shell: pwsh
        run: |
          $selectedEnv = "${{ inputs.environment }}"

          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║        ENVIRONMENT SECRET CONFIGURATION                       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Target Selection: $selectedEnv" -ForegroundColor Gray
          Write-Host "Authentication: GitHub App" -ForegroundColor Green
          Write-Host ""

          $env:GH_TOKEN = $env:GH_APP_TOKEN

          $environments = @()
          if ($selectedEnv -eq 'all') {
            $environments = @('dev', 'staging', 'prod')
          } else {
            $environments = @($selectedEnv)
          }

          Write-Host "🔑 Configuring environment secrets for: $($environments -join ', ')" -ForegroundColor Cyan
          Write-Host ""

          $ownerRepo = "${{ github.repository }}"
          $owner, $repo = $ownerRepo -split '/', 2
          $totalSuccess = 0
          $totalFail = 0
          $failedEnvs = @()

          foreach ($env_name in $environments) {
            Write-Host "── $env_name ───────────────────────────────────────────────────" -ForegroundColor DarkGray
            Write-Host "  Environment: $env_name" -ForegroundColor Yellow

            if ($env_name -notin @('dev', 'staging', 'prod')) {
              Write-Error "Refusing to write secrets to unknown environment '$env_name'. Allowed: dev, staging, prod."
              exit 1
            }

            # Verify environment exists. The ensure-env-* jobs above should have caused
            # GitHub to auto-create it. If this check still fails, it means a prior job
            # failed or was skipped unexpectedly.
            Write-Host "    Checking if environment exists..." -ForegroundColor Gray
            $checkOutput = gh api -H 'Accept: application/vnd.github+json' "repos/$owner/$repo/environments/$env_name" 2>&1
            $checkCode = $LASTEXITCODE

            if ($checkCode -eq 0) {
              Write-Host "      ✅ Environment exists" -ForegroundColor Green
            } else {
              Write-Host "      ❌ Environment '$env_name' does not exist (exit $checkCode)" -ForegroundColor Red
              Write-Host "         This is unexpected — the ensure-env-$env_name job should have created it." -ForegroundColor Yellow
              Write-Host "         Check whether the ensure-env-$env_name job succeeded in this run." -ForegroundColor Yellow
              $totalFail += 3
              $failedEnvs += $env_name
              Write-Host ""
              continue
            }

            $secretsToSet = @{
              'AZUREAPPSERVICE_CLIENTID' = $env:CLIENT_ID
              'AZUREAPPSERVICE_TENANTID' = $env:TENANT_ID
              'AZUREAPPSERVICE_SUBSCRIPTIONID' = $env:SUBSCRIPTION_ID
            }

            foreach ($secretName in $secretsToSet.Keys) {
              Write-Host "    Setting: $secretName" -ForegroundColor Gray
              $setOutput = gh secret set $secretName --env $env_name --repo $ownerRepo --body $secretsToSet[$secretName] 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "      ✅ Success" -ForegroundColor Green
                $totalSuccess++
              } else {
                Write-Host "      ❌ Failed (exit code: $LASTEXITCODE)" -ForegroundColor Red
                Write-Host "         API response  : $setOutput" -ForegroundColor Red
                $totalFail++
                if ($env_name -notin $failedEnvs) { $failedEnvs += $env_name }
              }
            }
            Write-Host ""
          }

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "🔍 Post-set verification (gh secret list per environment)..." -ForegroundColor Cyan
          Write-Host ""
          foreach ($env_name in $environments) {
            Write-Host "  [$env_name]" -ForegroundColor Yellow
            $listOutput = gh secret list --env $env_name --repo $ownerRepo 2>&1
            if ($LASTEXITCODE -eq 0) {
              $ok1 = $listOutput -match 'AZUREAPPSERVICE_CLIENTID'
              $ok2 = $listOutput -match 'AZUREAPPSERVICE_TENANTID'
              $ok3 = $listOutput -match 'AZUREAPPSERVICE_SUBSCRIPTIONID'
              Write-Host "    AZUREAPPSERVICE_CLIENTID      : $(if ($ok1) { '✅ Confirmed' } else { '❌ NOT FOUND' })" -ForegroundColor $(if ($ok1) { 'Green' } else { 'Red' })
              Write-Host "    AZUREAPPSERVICE_TENANTID      : $(if ($ok2) { '✅ Confirmed' } else { '❌ NOT FOUND' })" -ForegroundColor $(if ($ok2) { 'Green' } else { 'Red' })
              Write-Host "    AZUREAPPSERVICE_SUBSCRIPTIONID: $(if ($ok3) { '✅ Confirmed' } else { '❌ NOT FOUND' })" -ForegroundColor $(if ($ok3) { 'Green' } else { 'Red' })
            } else {
              Write-Host "    ⚠️  Could not list secrets for '$env_name': $listOutput" -ForegroundColor Yellow
            }
            Write-Host ""
          }

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "Configuration Summary:" -ForegroundColor Cyan
          Write-Host "  ✅ Successful: $totalSuccess" -ForegroundColor Green
          if ($totalFail -gt 0) {
            Write-Host "  ❌ Failed: $totalFail" -ForegroundColor Red
            if ($failedEnvs.Count -gt 0) {
              Write-Host "  ❌ Failed environments: $($failedEnvs -join ', ')" -ForegroundColor Red
            }
            Write-Error "Failed to configure $totalFail secret(s). All environments must succeed."
            exit 1
          }

          $oidcSpObjectId = '${{ steps.prereqs.outputs.resolvedOidcSpObjectId }}'
          if (-not [string]::IsNullOrWhiteSpace($oidcSpObjectId)) {
            Write-Host "🔑 Setting repo-level secret: OIDC_SP_OBJECT_ID" -ForegroundColor Cyan
            $setOutput = gh secret set OIDC_SP_OBJECT_ID --repo $ownerRepo --body $oidcSpObjectId 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  ✅ OIDC_SP_OBJECT_ID set successfully" -ForegroundColor Green
            } else {
              Write-Host "  ⚠️  Could not set OIDC_SP_OBJECT_ID (non-fatal): $setOutput" -ForegroundColor Yellow
            }
          } else {
            Write-Host "  ℹ️  oidcSpObjectId not provided — OIDC_SP_OBJECT_ID secret not updated" -ForegroundColor Gray
          }

          Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "✅ All environment secrets configured successfully!" -ForegroundColor Green
          Write-Host ""

      - name: Report Existing Configuration
        if: steps.prereqs.outputs.useExistingSecrets == 'true'
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║   ✅ OIDC SECRETS FULLY CONFIGURED — NO UPDATE NEEDED         ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          Write-Host "  Verification scope:" -ForegroundColor Green
          Write-Host "    ✅ Environment-level AZUREAPPSERVICE_* secrets were verified for all target environments" -ForegroundColor Green
          Write-Host "    ✅ No repository-level OIDC secret writes were needed in this run" -ForegroundColor Green
          Write-Host ""
          Write-Host "  No secret values were changed — existing configuration is retained." -ForegroundColor Gray
          Write-Host ""
          Write-Host "✅ Phase 1b complete — existing configuration verified" -ForegroundColor Green
          Write-Host ""

  validate-configuration:
    name: Validate Configuration
    if: |
      !cancelled() &&
      inputs.configureSecrets &&
      needs.configure-secrets.result == 'success'
    needs: [validate-inputs, configure-secrets]
    runs-on: windows-latest
    steps:
      - name: Run Configuration Validation
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         FINAL CONFIGURATION VALIDATION                        ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "Environment: ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host ""

          $hasAppId = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          $appSetupOk = $hasAppId -and $hasPrivateKey
          $secretsSetup = "${{ needs.configure-secrets.result }}"

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📋 Configuration Summary" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          Write-Host "  GitHub App Setup      : $(if ($appSetupOk) { '✅ Configured' } else { '⚠️ Missing secrets' })" -ForegroundColor $(if ($appSetupOk) { 'Green' } else { 'Yellow' })
          Write-Host "  Secret Configuration  : $(if ($secretsSetup -eq 'success') { '✅ Completed' } else { '❌ Failed or not run' })" -ForegroundColor $(if ($secretsSetup -eq 'success') { 'Green' } else { 'Red' })
          Write-Host ""

          if ($appSetupOk -and $secretsSetup -eq 'success') {
            Write-Host "✅ CONFIGURATION VALIDATION SUCCESSFUL" -ForegroundColor Green
          } else {
            Write-Host "⚠️  CONFIGURATION VALIDATION COMPLETED WITH WARNINGS" -ForegroundColor Yellow
          }

  summary:
    name: Initial Setup Summary
    if: always() && github.event_name == 'workflow_dispatch'
    needs: [validate-inputs, setup-oidc, configure-secrets, validate-configuration]
    runs-on: windows-latest
    steps:
      - name: Generate Summary
        run: |
          $validateInputs = "${{ needs.validate-inputs.result }}"
          $setupOidc      = "${{ needs.setup-oidc.result }}"
          $configSecrets  = "${{ needs.configure-secrets.result }}"
          $hasAppId       = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey  = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          $appSecretsOk   = $hasAppId -and $hasPrivateKey
          $allSuccess     = ($validateInputs -eq "success") -and
                            ($setupOidc     -eq "success" -or $setupOidc     -eq "skipped") -and
                            ($configSecrets -eq "success" -or $configSecrets -eq "skipped")

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📊 INITIAL SETUP SUMMARY" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "  Environment : ${{ inputs.environment }}" -ForegroundColor Gray
          Write-Host "  Phase 0 (GitHub App)       : ${{ inputs.setupGitHubApp }}" -ForegroundColor Gray
          Write-Host "  Phase 1a (Setup OIDC)      : ${{ inputs.setupOidc }}" -ForegroundColor Gray
          Write-Host "  Phase 1b (Configure Secrets): ${{ inputs.configureSecrets }}" -ForegroundColor Gray
          Write-Host ""
          $iconFor = { param($r) if ($r -eq "success") { "✅" } elseif ($r -eq "skipped") { "⏭️ " } else { "❌" } }
          Write-Host "  Job Results:" -ForegroundColor Cyan
          Write-Host "    Validate Inputs    : $(& $iconFor $validateInputs) $validateInputs"
          Write-Host "    Setup OIDC         : $(& $iconFor $setupOidc) $setupOidc"
          Write-Host "    Configure Secrets  : $(& $iconFor $configSecrets) $configSecrets"
          Write-Host ""
          if ($allSuccess -and $appSecretsOk) {
            Write-Host "  ✅ Initial Setup Complete — proceed to Azure Bootstrap & Deploy" -ForegroundColor Green
          } elseif (-not $appSecretsOk) {
            Write-Host "  ⚠️  GitHub App secrets missing — complete Phase 0 manual steps first" -ForegroundColor Yellow
          } else {
            Write-Host "  ❌ One or more jobs failed — check individual job logs above" -ForegroundColor Red
          }
          Write-Host ""
          Write-Host "  Full details → open the 'Summary' tab at the top of this workflow run." -ForegroundColor Gray
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""

          "## 📊 Azure Initial Setup Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          "### 📋 User Configuration" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Parameter | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🎯 Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| ℹ️ [Phase 0] Setup GitHub App | ``${{ inputs.setupGitHubApp }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 [Phase 1a] Setup OIDC | ``${{ inputs.setupOidc }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 [Phase 1b] Configure Secrets | ``${{ inputs.configureSecrets }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### ✅ Job Execution Results" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          "| Step | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|------|--------|" >> $env:GITHUB_STEP_SUMMARY

          if ($validateInputs -ne "") {
            $icon = if ($validateInputs -eq "success") { "✅" } elseif ($validateInputs -eq "skipped") { "⏭️" } else { "❌" }
            "| Validate Inputs | $icon $validateInputs |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($setupOidc -ne "") {
            $icon = if ($setupOidc -eq "success") { "✅" } elseif ($setupOidc -eq "skipped") { "⏭️" } else { "❌" }
            "| Setup OIDC | $icon $setupOidc |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($configSecrets -ne "") {
            $icon = if ($configSecrets -eq "success") { "✅" } elseif ($configSecrets -eq "skipped") { "⏭️" } else { "❌" }
            "| Configure Secrets | $icon $configSecrets |" >> $env:GITHUB_STEP_SUMMARY
          }

          "" >> $env:GITHUB_STEP_SUMMARY
          "### 🏗️ What Gets Created" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Resource | Automated? | Trigger |" >> $env:GITHUB_STEP_SUMMARY
          "|----------|-----------|---------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🏢 Microsoft Entra ID App Registration | ✅ Yes | Setup OIDC = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 Azure Federated Credentials (OIDC) | ✅ Yes | Setup OIDC = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🌐 GitHub Environments (dev/staging/prod) | ✅ Yes | Configure Secrets = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔐 GitHub OIDC Secrets (AZUREAPPSERVICE_*) | ✅ Yes | Configure Secrets = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🤖 GitHub App (APP_ID + APP_PRIVATE_KEY) | ⚠️ Manual | One-time setup required |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          # Determine next steps based on current state
          $ranPhase0     = "${{ inputs.setupGitHubApp }}" -eq "true"
          $appName       = "${{ inputs.githubAppName }}"
          $appSlug       = $appName.ToLower() -replace '[^a-z0-9]', '-'
          $secretsUrl    = "https://github.com/${{ github.repository }}/settings/secrets/actions"

          if ($ranPhase0 -and -not $appSecretsOk) {
            "## 🔴 Action Required — Phase 0 Complete, Manual Step Needed" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> **Phase 0 instructions have been shown. Before Phase 1a/1b can run you must complete the two steps below.**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**GitHub App Name configured**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 1 — Create GitHub App (if not already done)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Create a GitHub App named **``$appName``** with the required permissions:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "- **Option A** (Recommended): ``.\scripts\setup-github-app-from-manifest.ps1``" >> $env:GITHUB_STEP_SUMMARY
            "- **Option B** (Manual): [Create at github.com/settings/apps/new](https://github.com/settings/apps/new)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> 📖 **Detailed guide**: [quick-setup-github-app.md](../blob/${{ github.ref_name }}/docs/guides/configuration/quick-setup-github-app.md)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 2 — Add Repository Secrets" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Go to **[Settings → Secrets and variables → Actions]($secretsUrl)** and add:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Secret Name | Where to find the value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------------|------------------------|" >> $env:GITHUB_STEP_SUMMARY
            "| ``APP_ID`` | Numeric App ID on the app's **General** settings page: ``https://github.com/settings/apps/$appSlug`` |" >> $env:GITHUB_STEP_SUMMARY
            "| ``APP_PRIVATE_KEY`` | Full contents of the ``.pem`` file downloaded when generating the private key (include the ``-----BEGIN RSA PRIVATE KEY-----`` header) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**How to add each secret**: Click **New repository secret**, enter Name + Value from table above, then click **Add secret**." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 3 — Re-run This Workflow (Phase 1a + 1b)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Once the two secrets are saved, **[run this workflow again](https://github.com/${{ github.repository }}/actions/workflows/azure-initial-setup.yml)** with:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Input | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| 🎯 Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
            "| 🔑 Setup Azure OIDC | ``true`` |" >> $env:GITHUB_STEP_SUMMARY
            "| ℹ️ Setup GitHub App | ``false`` (already done) |" >> $env:GITHUB_STEP_SUMMARY
            "| 🔑 Configure GitHub Secrets | ``true`` |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> ✅ The workflow will then automatically configure all ``AZUREAPPSERVICE_*`` environment secrets — **no further manual steps are needed**." >> $env:GITHUB_STEP_SUMMARY
          } elseif ($appSecretsOk) {
            "## ✅ Phase 0 Complete — GitHub App Secrets Configured" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**GitHub App Name**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "``APP_ID`` and ``APP_PRIVATE_KEY`` are present. The workflow can use the GitHub App for automated secret management." >> $env:GITHUB_STEP_SUMMARY
          }

          if ($allSuccess -and $appSecretsOk) {
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "## ✅ Initial Setup Complete — Next Steps" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "OIDC credentials and GitHub secrets are configured. You can now use the **Azure Bootstrap & Deploy** workflow:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. Go to **[Actions → Azure Bootstrap & Deploy](https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml)**" >> $env:GITHUB_STEP_SUMMARY
            "2. Set **Use workflow from** = branch matching your target environment (dev→dev, staging→staging, main→prod)" >> $env:GITHUB_STEP_SUMMARY
            "3. Select your target **Environment**" >> $env:GITHUB_STEP_SUMMARY
            "4. Check ✅ **Bootstrap Infrastructure**, ✅ **Deploy API**, ✅ **Deploy UI**" >> $env:GITHUB_STEP_SUMMARY
            "5. Click **Run workflow**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }

          # OpenPay payment secrets — informational reminder only. These are environment-scoped
          # and must be added manually by an authorized person in GitHub Settings.
          $environmentsUrl = "https://github.com/${{ github.repository }}/settings/environments"

          "" >> $env:GITHUB_STEP_SUMMARY
          "---" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "## 💳 OpenPay Payment Secrets" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "> These secrets must be present **before running Azure Bootstrap & Deploy**. They are environment-scoped, set manually by an authorized person, and never written by this workflow." >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Add these three environment secrets to each target GitHub environment you plan to bootstrap:" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- ``OPENPAY_MERCHANT_ID``" >> $env:GITHUB_STEP_SUMMARY
          "- ``OPENPAY_PRIVATE_KEY``" >> $env:GITHUB_STEP_SUMMARY
          "- ``OPENPAY_DEVICE_SESSION_ID``" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### ⚠️ Action Required — Add OpenPay Secrets Before Running Bootstrap" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "1. Go to **[Settings → Environments]($environmentsUrl)**" >> $env:GITHUB_STEP_SUMMARY
          "2. Open each target environment (``dev``, ``staging``, and/or ``prod``)" >> $env:GITHUB_STEP_SUMMARY
          "3. Add the three OpenPay values under **Environment secrets**" >> $env:GITHUB_STEP_SUMMARY
          "4. Then run **Azure Bootstrap & Deploy** — the target bootstrap job validates its environment secrets before proceeding" >> $env:GITHUB_STEP_SUMMARY

          # Console output mirror
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "💳 OpenPay Payment Secrets" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "  OpenPay secrets are environment-scoped and must be added manually." -ForegroundColor Yellow
          Write-Host "  Add them at: $environmentsUrl" -ForegroundColor Yellow
          Write-Host "  Each bootstrap job validates the target environment before proceeding." -ForegroundColor Gray
