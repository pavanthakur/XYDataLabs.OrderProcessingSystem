name: CI — Build, Test, and Frontend Validation

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'XYDataLabs.OrderProcessingSystem.API/**'
      - 'XYDataLabs.OrderProcessingSystem.UI/**'
      - 'XYDataLabs.OrderProcessingSystem.Application/**'
      - 'XYDataLabs.OrderProcessingSystem.Domain/**'
      - 'XYDataLabs.OrderProcessingSystem.Infrastructure/**'
      - 'XYDataLabs.OrderProcessingSystem.SharedKernel/**'
      - 'XYDataLabs.OpenPayAdapter/**'
      - 'frontend/**'
      - 'tests/**'
      - 'Resources/Configuration/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '*.sln'

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '8.x'
  NODE_VERSION: '20.x'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend type safety
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend workspace
        working-directory: frontend
        run: npm run build

      - name: Restore dependencies
        run: dotnet restore XYDataLabs.OrderProcessingSystem.sln

      - name: Build solution
        run: dotnet build XYDataLabs.OrderProcessingSystem.sln --configuration Release --no-restore

      - name: Test — Domain
        run: dotnet test tests/XYDataLabs.OrderProcessingSystem.Domain.Tests/XYDataLabs.OrderProcessingSystem.Domain.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Test — Application
        run: dotnet test tests/XYDataLabs.OrderProcessingSystem.Application.Tests/XYDataLabs.OrderProcessingSystem.Application.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Test — API
        run: dotnet test tests/XYDataLabs.OrderProcessingSystem.API.Tests/XYDataLabs.OrderProcessingSystem.API.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Test — UI
        run: dotnet test tests/XYDataLabs.OrderProcessingSystem.UI.Tests/XYDataLabs.OrderProcessingSystem.UI.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Test — Architecture
        run: dotnet test tests/XYDataLabs.OrderProcessingSystem.Architecture.Tests/XYDataLabs.OrderProcessingSystem.Architecture.Tests.csproj --configuration Release --no-build --verbosity normal

        # Integration tests require Testcontainers + Docker daemon (Linux containers).
        # windows-latest runner does not support Linux containers.
        # Run locally or promote to a dedicated linux runner when Testcontainers CI is needed.
