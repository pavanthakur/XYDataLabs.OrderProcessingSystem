name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - 'XYDataLabs.OrderProcessingSystem.API/**'
      - 'XYDataLabs.OrderProcessingSystem.Application/**'
      - 'XYDataLabs.OrderProcessingSystem.Domain/**'
      - 'XYDataLabs.OrderProcessingSystem.Infrastructure/**'
      - 'XYDataLabs.OrderProcessingSystem.SharedKernel/**'
      - 'XYDataLabs.OpenPayAdapter/**'           # Multitenant payment: ProcessPaymentCommandHandler uses OpenPayAdapterService for per-tenant Use3DSecure routing
      - 'Resources/Configuration/**'
      - '.github/workflows/deploy-api-to-azure.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'
  # This will be overridden dynamically per branch in deploy job
  AZURE_WEBAPP_NAME: ''
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  PROJECT_PATH: 'XYDataLabs.OrderProcessingSystem.API/XYDataLabs.OrderProcessingSystem.API.csproj'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test tests/XYDataLabs.OrderProcessingSystem.Domain.Tests/XYDataLabs.OrderProcessingSystem.Domain.Tests.csproj --configuration Release --verbosity normal
          dotnet test tests/XYDataLabs.OrderProcessingSystem.Application.Tests/XYDataLabs.OrderProcessingSystem.Application.Tests.csproj --configuration Release --verbosity normal
          dotnet test tests/XYDataLabs.OrderProcessingSystem.API.Tests/XYDataLabs.OrderProcessingSystem.API.Tests.csproj --configuration Release --verbosity normal
          dotnet test tests/XYDataLabs.OrderProcessingSystem.Architecture.Tests/XYDataLabs.OrderProcessingSystem.Architecture.Tests.csproj --configuration Release --verbosity normal
          # Integration tests are excluded here — they use Testcontainers which requires a Docker daemon.
          # The windows-latest runner used by this workflow does not support Linux containers.
          # Run integration tests locally or in a dedicated linux-based workflow with Docker enabled.
          # dotnet test tests/XYDataLabs.OrderProcessingSystem.Integration.Tests/XYDataLabs.OrderProcessingSystem.Integration.Tests.csproj --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dotnet-app
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 30  # Covers approval wait + deploy + migrations + SQL setup + health check (~15 min worst case on F1)
    # Prod approval window: set via GitHub Settings → Environments → prod → Required reviewers timeout
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check Azure Credentials
        id: check-credentials
        shell: pwsh
        env:
          CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
        run: |
          # Check if credentials are available via environment variables
          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $targetEnv = 'prod'; $envSuffix = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $targetEnv = 'staging'; $envSuffix = 'stg' }
          elseif ($ref -eq 'refs/heads/dev') { $targetEnv = 'dev'; $envSuffix = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $targetEnv = $branch; $envSuffix = $branch }

          $hasClientId = -not [string]::IsNullOrWhiteSpace($env:CLIENT_ID)
          $hasTenantId = -not [string]::IsNullOrWhiteSpace($env:TENANT_ID)
          $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($env:SUBSCRIPTION_ID)
          
          if ($hasClientId -and $hasTenantId -and $hasSubscriptionId) {
            Write-Host "✅ Azure credentials found" -ForegroundColor Green
            "credentialsConfigured=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
            Write-Host "║         AZURE CREDENTIALS NOT CONFIGURED                      ║" -ForegroundColor Yellow
            Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "⚠️  Deployment cannot proceed - Azure credentials are missing" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "Required secrets for the '$targetEnv' GitHub environment (Azure suffix '$envSuffix'):" -ForegroundColor Cyan
            Write-Host "  AZUREAPPSERVICE_CLIENTID       : $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
            Write-Host "  AZUREAPPSERVICE_TENANTID       : $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
            Write-Host "  AZUREAPPSERVICE_SUBSCRIPTIONID : $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
            Write-Host "📋 TO FIX THIS:" -ForegroundColor Cyan
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
            Write-Host ""
            Write-Host "1. Run the Azure Initial Setup workflow to configure OIDC and GitHub secrets:" -ForegroundColor White
            Write-Host "   https://github.com/${{ github.repository }}/actions/workflows/azure-initial-setup.yml" -ForegroundColor Gray
            Write-Host ""
            Write-Host "2. Select 'Run workflow' and configure:" -ForegroundColor White
            Write-Host "   - Environment: all (recommended)" -ForegroundColor Gray
            Write-Host "   - Setup GitHub App: true only if APP_ID / APP_PRIVATE_KEY are missing" -ForegroundColor Gray
            Write-Host "   - Setup Azure OIDC: true" -ForegroundColor Gray
            Write-Host "   - Configure secrets: true" -ForegroundColor Gray
            Write-Host ""
            Write-Host "3. If the target app or resource group does not exist yet, run Azure Bootstrap & Deploy with Bootstrap Infrastructure checked" -ForegroundColor White
            Write-Host "   https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml" -ForegroundColor Gray
            Write-Host "" 
            Write-Host "4. Re-run this deployment" -ForegroundColor White
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
            Write-Host ""
            Write-Host "ℹ️  Skipping deployment (credentials not configured)" -ForegroundColor Yellow
            Write-Host ""
            "credentialsConfigured=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
      
      - name: Set target web app name
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $owner = "${{ github.repository_owner }}"
          if ($ref -eq 'refs/heads/main') { $name = "$owner-orderprocessing-api-xyapp-prod" }
          elseif ($ref -eq 'refs/heads/staging') { $name = "$owner-orderprocessing-api-xyapp-stg" }
          elseif ($ref -eq 'refs/heads/dev') { $name = "$owner-orderprocessing-api-xyapp-dev" }
          else { $branch = $ref.Replace('refs/heads/',''); $name = "$owner-orderprocessing-api-xyapp-$branch" }
          echo "AZURE_WEBAPP_NAME=$name" >> $env:GITHUB_ENV
          Write-Host "Deploying to WebApp: $name"

      - name: Download artifact
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: actions/download-artifact@v8
        with:
          name: dotnet-app

      - name: Login to Azure
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Check Target Infrastructure Exists
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        id: check-target
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $targetEnv = 'prod'; $envSuffix = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $targetEnv = 'staging'; $envSuffix = 'stg' }
          elseif ($ref -eq 'refs/heads/dev') { $targetEnv = 'dev'; $envSuffix = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $targetEnv = $branch; $envSuffix = $branch }

          $rgName = "rg-orderprocessing-$envSuffix"
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"

          "resourceGroupName=$rgName" >> $env:GITHUB_OUTPUT
          "targetEnvironment=$targetEnv" >> $env:GITHUB_OUTPUT
          "resourceSuffix=$envSuffix" >> $env:GITHUB_OUTPUT

          Write-Host "Resolved target: GitHub environment '$targetEnv' / Azure resource suffix '$envSuffix'" -ForegroundColor Cyan

          $groupExists = az group exists --name $rgName
          if ($groupExists -ne 'true') {
            Write-Host "⚠️  Target resource group '$rgName' does not exist. Skipping deployment." -ForegroundColor Yellow
            Write-Host "ℹ️  Bootstrap the $targetEnv environment before merging branch changes that should deploy there." -ForegroundColor Yellow
            "infraReady=false" >> $env:GITHUB_OUTPUT
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Deployment Skipped - Environment Not Bootstrapped`n- GitHub environment: $targetEnv`n- Azure resource suffix: $envSuffix`n- Resource group missing: $rgName`n- Expected app service: $appName`n- Run Azure Bootstrap & Deploy with bootstrapInfra=true for this environment, then re-run deployment.`n"
            exit 0
          }

          $webAppId = az webapp show --name $appName --resource-group $rgName --query id -o tsv 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($webAppId)) {
            Write-Host "⚠️  Target app service '$appName' does not exist in '$rgName'. Skipping deployment." -ForegroundColor Yellow
            Write-Host "ℹ️  Bootstrap may not have been run for $targetEnv, or the app was deleted separately." -ForegroundColor Yellow
            "infraReady=false" >> $env:GITHUB_OUTPUT
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Deployment Skipped - App Service Missing`n- GitHub environment: $targetEnv`n- Azure resource suffix: $envSuffix`n- Resource group: $rgName`n- Missing app service: $appName`n- Run Azure Bootstrap & Deploy with bootstrapInfra=true for this environment, then re-run deployment.`n"
            exit 0
          }

          Write-Host "✅ Target infrastructure exists: $rgName / $appName" -ForegroundColor Green
          "infraReady=true" >> $env:GITHUB_OUTPUT

      - name: Deploy to Azure Web App
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Checkout code for migrations
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        uses: actions/checkout@v6

      - name: Run Database Migrations
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              RUN DATABASE MIGRATIONS                           ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          # Determine environment from branch
          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $env = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $env = 'staging' }
          elseif ($ref -eq 'refs/heads/dev') { $env = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $env = $branch }
          $envSuffix = if ($env -eq 'staging') { 'stg' } else { $env }
          
          Write-Host "🔄 Running database migrations for $env environment..." -ForegroundColor Cyan
          Write-Host "GitHub environment: $env | Azure resource suffix: $envSuffix" -ForegroundColor Gray
          Write-Host ""
          
          $owner = "${{ github.repository_owner }}"
          
          # MULTITENANT NOTE — shared-pool DB only:
          # run-database-migrations.ps1 applies EF migrations to the shared-pool DB (OrderProcessingSystemDbContext).
          # TenantC (Dedicated tier) is migrated and seeded at app startup by DbInitializer.SeedDedicatedTenants().
          # That phase reads 'DedicatedTenantConnectionStrings--TenantC' from Key Vault at runtime.
          # If that secret is absent, TenantC requests return HTTP 400 (fail-loud per ADR-009) — no failure surfaces here in CI.
          # Ensure populate-keyvault-secrets.ps1 has stored 'DedicatedTenantConnectionStrings--TenantC' in Key Vault
          # before deploying to any environment where TenantC traffic is expected.
          try {
            ./Resources/Azure-Deployment/run-database-migrations.ps1 -Environment $env -BaseName orderprocessing -Owner $owner
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ DATABASE MIGRATIONS FAILED" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "   Database schema may be out of date." -ForegroundColor Yellow
              Write-Host "   Check the logs above for specific error details." -ForegroundColor Yellow
              Write-Host ""
              exit 1
            } else {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
              Write-Host "✅ DATABASE MIGRATIONS COMPLETED SUCCESSFULLY" -ForegroundColor Green
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
              Write-Host ""
            }
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING MIGRATIONS" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            throw
          }

      - name: Configure SQL Managed Identity Database User
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      CONFIGURE SQL MANAGED IDENTITY DATABASE USER             ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $targetEnv = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $targetEnv = 'staging' }
          elseif ($ref -eq 'refs/heads/dev') { $targetEnv = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $targetEnv = $branch }

          $envSuffix = if ($targetEnv -eq 'staging') { 'stg' } else { $targetEnv }
          $kvName = "kv-orderprocessing-$envSuffix"
          $owner = "${{ github.repository_owner }}"

          try {
            $sqlAdminPassword = az keyvault secret show --vault-name $kvName --name sql-admin-password --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($sqlAdminPassword)) {
              throw "Could not retrieve sql-admin-password from Key Vault '$kvName'."
            }

            Write-Output "::add-mask::$sqlAdminPassword"
            ./Resources/Azure-Deployment/setup-sql-managed-identity.ps1 -Environment $targetEnv -BaseName orderprocessing -GitHubOwner $owner -UseSqlAuthentication -SqlAdminUsername sqladmin -SqlAdminPassword $sqlAdminPassword

            if ($LASTEXITCODE -ne 0) {
              throw "SQL managed identity database user setup failed with exit code $LASTEXITCODE"
            }
          }
          catch {
            Write-Host "" 
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ SQL MANAGED IDENTITY SETUP FAILED" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "" 
            Write-Host "Exception: $($_.Exception.Message)" -ForegroundColor Red
            $managedIdentityPermissionHint = $_.Exception.Message -like '*Could not resolve managed identity appId*' -or $_.Exception.Message -like '*Insufficient privileges to complete the operation*'
            if ($managedIdentityPermissionHint) {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
              Write-Host "POSSIBLE FIX — GRANT GRAPH READ PERMISSION TO GITHUB OIDC APP" -ForegroundColor Yellow
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
              Write-Host "1. Azure Portal -> Microsoft Entra ID -> App registrations" -ForegroundColor White
              Write-Host "2. Open 'GitHub-Actions-OIDC'" -ForegroundColor White
              Write-Host "3. API permissions -> Add a permission -> Microsoft Graph" -ForegroundColor White
              Write-Host "4. Choose Application permissions" -ForegroundColor White
              Write-Host "5. Add 'Application.Read.All'" -ForegroundColor White
              Write-Host "6. Grant admin consent" -ForegroundColor White
              Write-Host "7. Wait 1-3 minutes for propagation" -ForegroundColor White
              Write-Host "8. Re-run this workflow" -ForegroundColor White
              Write-Host ""
              Write-Host "If still failing, also add 'Directory.Read.All', grant consent, wait briefly, and re-run." -ForegroundColor Yellow
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Possible Fix - SQL Managed Identity Entra Permission`n- Open Azure Portal -> Microsoft Entra ID -> App registrations`n- Open GitHub-Actions-OIDC`n- API permissions -> Add a permission -> Microsoft Graph -> Application permissions`n- Add Application.Read.All`n- Grant admin consent`n- Wait 1-3 minutes and re-run this workflow`n- If still failing, also add Directory.Read.All and grant admin consent`n"
            }
            throw
          }

      - name: Health Check
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        shell: pwsh
        run: |
          Write-Host "Waiting 60 seconds for app to start (cold-start buffer)..." -ForegroundColor Yellow
          Start-Sleep -Seconds 60

          $apiUrl       = "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          $readinessUrl = "$apiUrl/health/ready"

          # Primary check: readiness endpoint.
          # Retry up to 3 times with 30 s between attempts; 60 s timeout each.
          # Azure App Service cold starts can take 60–90 s after deployment.
          Write-Host "Testing readiness endpoint: $readinessUrl" -ForegroundColor Cyan
          $readinessOk = $false
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              $readinessResponse = Invoke-WebRequest -Uri $readinessUrl -Method Get -TimeoutSec 60 -ErrorAction Stop
              Write-Host "✅ Readiness endpoint responded with status: $($readinessResponse.StatusCode)" -ForegroundColor Green
              $readinessOk = $true
              break
            } catch {
              Write-Host "  Attempt $attempt/$maxAttempts failed: $($_.Exception.Message)" -ForegroundColor Yellow
              if ($attempt -lt $maxAttempts) {
                Write-Host "  Retrying in 30 s..." -ForegroundColor Yellow
                Start-Sleep -Seconds 30
              }
            }
          }
          if (-not $readinessOk) {
            Write-Host "❌ Readiness health check FAILED after $maxAttempts attempts" -ForegroundColor Red
          }

          # Informational: root endpoint (may return 404 if no default route — not a failure)
          Write-Host "Testing API root endpoint: $apiUrl" -ForegroundColor Cyan
          try {
            $response = Invoke-WebRequest -Uri $apiUrl -Method Get -TimeoutSec 30
            Write-Host "✅ API root responded with status: $($response.StatusCode)" -ForegroundColor Green
          } catch {
            Write-Host "ℹ️  API root returned non-200 (expected if no default route): $($_.Exception.Message)" -ForegroundColor Yellow
          }

          if (-not $readinessOk) {
            Write-Host "" -ForegroundColor Gray
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ DEPLOYMENT HEALTH CHECK FAILED" -ForegroundColor Red
            Write-Host "   The API readiness endpoint did not report ready after deployment. Check App Service logs and dependency health." -ForegroundColor Red
            Write-Host "   URL: $readinessUrl" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            exit 1
          }

      - name: Deployment Summary
        if: always()
        shell: pwsh
        run: |
          $ref    = "${{ github.ref_name }}"
          $owner  = "${{ github.repository_owner }}"
          if ($ref -eq 'main') { $defaultTargetEnv = 'prod'; $defaultEnvSuffix = 'prod' }
          elseif ($ref -eq 'staging') { $defaultTargetEnv = 'staging'; $defaultEnvSuffix = 'stg' }
          elseif ($ref -eq 'dev') { $defaultTargetEnv = 'dev'; $defaultEnvSuffix = 'dev' }
          else { $defaultTargetEnv = $ref; $defaultEnvSuffix = $ref }

          $defaultApp = "$owner-orderprocessing-api-xyapp-$defaultEnvSuffix"
          $defaultRg = "rg-orderprocessing-$defaultEnvSuffix"
          $app = if ([string]::IsNullOrWhiteSpace("${{ env.AZURE_WEBAPP_NAME }}")) { $defaultApp } else { "${{ env.AZURE_WEBAPP_NAME }}" }
          $rg = if ([string]::IsNullOrWhiteSpace("${{ steps.check-target.outputs.resourceGroupName }}")) { $defaultRg } else { "${{ steps.check-target.outputs.resourceGroupName }}" }
          $targetEnv = if ([string]::IsNullOrWhiteSpace("${{ steps.check-target.outputs.targetEnvironment }}")) { $defaultTargetEnv } else { "${{ steps.check-target.outputs.targetEnvironment }}" }
          $envSuffix = if ([string]::IsNullOrWhiteSpace("${{ steps.check-target.outputs.resourceSuffix }}")) { $defaultEnvSuffix } else { "${{ steps.check-target.outputs.resourceSuffix }}" }
          $run    = "${{ github.run_id }}"
          $repo   = "${{ github.repository }}"
          $actor  = "${{ github.actor }}"
          $event  = "${{ github.event_name }}"
          $sha    = "${{ github.sha }}".Substring(0, 7)
          $credentialsConfigured = "${{ steps.check-credentials.outputs.credentialsConfigured }}"
          $infraReady = "${{ steps.check-target.outputs.infraReady }}"
          $appUrl = if ($credentialsConfigured -ne 'true') {
            "https://$app.azurewebsites.net/health/ready (target URL; deployment skipped before Azure login)"
          } elseif ($infraReady -ne 'true') {
            "https://$app.azurewebsites.net/health/ready (target URL; app not provisioned yet)"
          } else {
            "https://$app.azurewebsites.net/health/ready"
          }

          $status = if ($credentialsConfigured -ne 'true') {
            '⏭️ SKIPPED - credentials missing'
          } elseif ($infraReady -ne 'true') {
            '⏭️ SKIPPED - environment not bootstrapped'
          } elseif ('${{ job.status }}' -eq 'success') {
            '✅ SUCCESS'
          } else {
            '❌ FAILED'
          }

          "## 🚀 API Deployment Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Field | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| Status | $status |" >> $env:GITHUB_STEP_SUMMARY
          "| Branch | ``$ref`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Commit | ``$sha`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Triggered by | $actor ($event) |" >> $env:GITHUB_STEP_SUMMARY
          "| GitHub Environment | ``$targetEnv`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Azure Resource Suffix | ``$envSuffix`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Resource Group | ``$rg`` |" >> $env:GITHUB_STEP_SUMMARY
          "| App Service | ``$app`` |" >> $env:GITHUB_STEP_SUMMARY
          "| URL | $appUrl |" >> $env:GITHUB_STEP_SUMMARY
          "| Run | [View run](https://github.com/$repo/actions/runs/$run) |" >> $env:GITHUB_STEP_SUMMARY

          if ($infraReady -ne 'true' -and $credentialsConfigured -eq 'true') {
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Run Azure Bootstrap & Deploy with bootstrapInfra=true for this branch environment before expecting push-based deployments to succeed." >> $env:GITHUB_STEP_SUMMARY
          } elseif ($credentialsConfigured -ne 'true') {
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Run Azure Initial Setup with Setup Azure OIDC=true and Configure GitHub Secrets=true before rerunning this deployment." >> $env:GITHUB_STEP_SUMMARY
          }
