name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - 'XYDataLabs.OrderProcessingSystem.API/**'
      - 'XYDataLabs.OrderProcessingSystem.Application/**'
      - 'XYDataLabs.OrderProcessingSystem.Domain/**'
      - 'XYDataLabs.OrderProcessingSystem.Infrastructure/**'
      - 'XYDataLabs.OrderProcessingSystem.Utilities/**'
      - 'Resources/Configuration/**'
      - '.github/workflows/deploy-api-to-azure.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'
  # This will be overridden dynamically per branch in deploy job
  AZURE_WEBAPP_NAME: ''
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  PROJECT_PATH: 'XYDataLabs.OrderProcessingSystem.API/XYDataLabs.OrderProcessingSystem.API.csproj'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test XYDataLabs.OrderProcessingSystem.UnitTest/XYDataLabs.OrderProcessingSystem.UnitTest.csproj --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check Azure Credentials
        id: check-credentials
        shell: pwsh
        env:
          CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
        run: |
          # Check if credentials are available via environment variables
          $hasClientId = -not [string]::IsNullOrWhiteSpace($env:CLIENT_ID)
          $hasTenantId = -not [string]::IsNullOrWhiteSpace($env:TENANT_ID)
          $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($env:SUBSCRIPTION_ID)
          
          if ($hasClientId -and $hasTenantId -and $hasSubscriptionId) {
            Write-Host "✅ Azure credentials found" -ForegroundColor Green
            "credentialsConfigured=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
            Write-Host "║         AZURE CREDENTIALS NOT CONFIGURED                      ║" -ForegroundColor Yellow
            Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "⚠️  Deployment cannot proceed - Azure credentials are missing" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "Required secrets for the '${{ github.ref }}' environment:" -ForegroundColor Cyan
            Write-Host "  AZUREAPPSERVICE_CLIENTID       : $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
            Write-Host "  AZUREAPPSERVICE_TENANTID       : $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
            Write-Host "  AZUREAPPSERVICE_SUBSCRIPTIONID : $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
            Write-Host "📋 TO FIX THIS:" -ForegroundColor Cyan
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
            Write-Host ""
            Write-Host "1. Run the Azure Bootstrap workflow to set up infrastructure:" -ForegroundColor White
            Write-Host "   https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml" -ForegroundColor Gray
            Write-Host ""
            Write-Host "2. Select 'Run workflow' and configure:" -ForegroundColor White
            Write-Host "   - Environment: dev (or staging/prod as needed)" -ForegroundColor Gray
            Write-Host "   - Setup Azure OIDC: true (first time)" -ForegroundColor Gray
            Write-Host "   - Setup GitHub App: true (first time)" -ForegroundColor Gray
            Write-Host "   - Configure secrets: true" -ForegroundColor Gray
            Write-Host "   - Bootstrap infrastructure: true" -ForegroundColor Gray
            Write-Host ""
            Write-Host "3. After bootstrap completes, re-run this deployment" -ForegroundColor White
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
            Write-Host ""
            Write-Host "ℹ️  Skipping deployment (credentials not configured)" -ForegroundColor Yellow
            Write-Host ""
            "credentialsConfigured=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
      
      - name: Set target web app name
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $owner = "${{ github.repository_owner }}"
          if ($ref -eq 'refs/heads/main') { $name = "$owner-orderprocessing-api-xyapp-prod" }
          elseif ($ref -eq 'refs/heads/staging') { $name = "$owner-orderprocessing-api-xyapp-stg" }
          elseif ($ref -eq 'refs/heads/dev') { $name = "$owner-orderprocessing-api-xyapp-dev" }
          else { $branch = $ref.Replace('refs/heads/',''); $name = "$owner-orderprocessing-api-xyapp-$branch" }
          echo "AZURE_WEBAPP_NAME=$name" >> $env:GITHUB_ENV
          Write-Host "Deploying to WebApp: $name"

      - name: Download artifact
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Login to Azure
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Checkout code for migrations
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: actions/checkout@v4

      - name: Run Database Migrations
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              RUN DATABASE MIGRATIONS                           ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          # Determine environment from branch
          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $env = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $env = 'staging' }
          elseif ($ref -eq 'refs/heads/dev') { $env = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $env = $branch }
          
          Write-Host "🔄 Running database migrations for $env environment..." -ForegroundColor Cyan
          Write-Host ""
          
          $owner = "${{ github.repository_owner }}"
          
          try {
            ./Resources/Azure-Deployment/run-database-migrations.ps1 -Environment $env -BaseName orderprocessing -Owner $owner
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ DATABASE MIGRATIONS FAILED" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "   Database schema may be out of date." -ForegroundColor Yellow
              Write-Host "   Check the logs above for specific error details." -ForegroundColor Yellow
              Write-Host ""
              exit 1
            } else {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
              Write-Host "✅ DATABASE MIGRATIONS COMPLETED SUCCESSFULLY" -ForegroundColor Green
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
              Write-Host ""
            }
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING MIGRATIONS" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            throw
          }

      - name: Configure SQL Managed Identity Database User
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        shell: pwsh
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      CONFIGURE SQL MANAGED IDENTITY DATABASE USER             ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $targetEnv = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $targetEnv = 'staging' }
          elseif ($ref -eq 'refs/heads/dev') { $targetEnv = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $targetEnv = $branch }

          $envSuffix = if ($targetEnv -eq 'staging') { 'stg' } else { $targetEnv }
          $kvName = "kv-orderprocessing-$envSuffix"
          $owner = "${{ github.repository_owner }}"

          try {
            $sqlAdminPassword = az keyvault secret show --vault-name $kvName --name sql-admin-password --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($sqlAdminPassword)) {
              throw "Could not retrieve sql-admin-password from Key Vault '$kvName'."
            }

            Write-Output "::add-mask::$sqlAdminPassword"
            ./Resources/Azure-Deployment/setup-sql-managed-identity.ps1 -Environment $targetEnv -BaseName orderprocessing -GitHubOwner $owner -UseSqlAuthentication -SqlAdminUsername sqladmin -SqlAdminPassword $sqlAdminPassword

            if ($LASTEXITCODE -ne 0) {
              throw "SQL managed identity database user setup failed with exit code $LASTEXITCODE"
            }
          }
          catch {
            Write-Host "" 
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ SQL MANAGED IDENTITY SETUP FAILED" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "" 
            Write-Host "Exception: $($_.Exception.Message)" -ForegroundColor Red
            throw
          }

      - name: Health Check
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        shell: pwsh
        run: |
          Write-Host "Waiting 60 seconds for app to start (cold-start buffer)..." -ForegroundColor Yellow
          Start-Sleep -Seconds 60

          $apiUrl     = "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          $swaggerUrl = "$apiUrl/swagger"

          # Primary check: Swagger endpoint (APIs may not have a root route).
          # Retry up to 3 times with 30 s between attempts; 60 s timeout each.
          # Azure App Service cold starts can take 60–90 s after deployment.
          Write-Host "Testing Swagger endpoint: $swaggerUrl" -ForegroundColor Cyan
          $swaggerOk   = $false
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              $swaggerResponse = Invoke-WebRequest -Uri $swaggerUrl -Method Get -TimeoutSec 60
              Write-Host "✅ Swagger UI responded with status: $($swaggerResponse.StatusCode)" -ForegroundColor Green
              $swaggerOk = $true
              break
            } catch {
              Write-Host "  Attempt $attempt/$maxAttempts failed: $($_.Exception.Message)" -ForegroundColor Yellow
              if ($attempt -lt $maxAttempts) {
                Write-Host "  Retrying in 30 s..." -ForegroundColor Yellow
                Start-Sleep -Seconds 30
              }
            }
          }
          if (-not $swaggerOk) {
            Write-Host "❌ Swagger health check FAILED after $maxAttempts attempts" -ForegroundColor Red
          }

          # Informational: root endpoint (may return 404 if no default route — not a failure)
          Write-Host "Testing API root endpoint: $apiUrl" -ForegroundColor Cyan
          try {
            $response = Invoke-WebRequest -Uri $apiUrl -Method Get -TimeoutSec 30
            Write-Host "✅ API root responded with status: $($response.StatusCode)" -ForegroundColor Green
          } catch {
            Write-Host "ℹ️  API root returned non-200 (expected if no default route): $($_.Exception.Message)" -ForegroundColor Yellow
          }

          if (-not $swaggerOk) {
            Write-Host "" -ForegroundColor Gray
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ DEPLOYMENT HEALTH CHECK FAILED" -ForegroundColor Red
            Write-Host "   The API did not respond after deployment. Check App Service logs." -ForegroundColor Red
            Write-Host "   URL: $apiUrl" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            exit 1
          }

      - name: Deployment Summary
        if: always()
        shell: pwsh
        run: |
          $ref    = "${{ github.ref_name }}"
          $app    = "${{ env.AZURE_WEBAPP_NAME }}"
          $run    = "${{ github.run_id }}"
          $repo   = "${{ github.repository }}"
          $actor  = "${{ github.actor }}"
          $event  = "${{ github.event_name }}"
          $sha    = "${{ github.sha }}".Substring(0, 7)
          $appUrl = if ($app) { "https://$app.azurewebsites.net/swagger" } else { "(app name not set — credentials missing)" }

          $status = if ('${{ job.status }}' -eq 'success') { '✅ SUCCESS' } else { '❌ FAILED' }

          "## 🚀 API Deployment Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Field | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| Status | $status |" >> $env:GITHUB_STEP_SUMMARY
          "| Branch | ``$ref`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Commit | ``$sha`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Triggered by | $actor ($event) |" >> $env:GITHUB_STEP_SUMMARY
          "| App Service | ``$app`` |" >> $env:GITHUB_STEP_SUMMARY
          "| URL | $appUrl |" >> $env:GITHUB_STEP_SUMMARY
          "| Run | [View run](https://github.com/$repo/actions/runs/$run) |" >> $env:GITHUB_STEP_SUMMARY
