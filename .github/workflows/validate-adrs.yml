name: Validate ADR Markdown

on:
  push:
    branches: [ main, dev, staging ]
    paths:
      - 'docs/architecture/decisions/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'Resources/Azure-Deployment/**'
      - 'XYDataLabs.OrderProcessingSystem.sln'
      - 'scripts/validate-adr-frontmatter.ps1'
      - 'scripts/sync-check-solution.ps1'
      - '.markdownlint.json'
  pull_request:
    paths:
      - 'docs/architecture/decisions/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'Resources/Azure-Deployment/**'
      - 'XYDataLabs.OrderProcessingSystem.sln'
      - 'scripts/validate-adr-frontmatter.ps1'
      - 'scripts/sync-check-solution.ps1'
      - '.markdownlint.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint and Validate ADRs
    # Opt-in: set repository variable ADR_VALIDATION_ENABLED=true in GitHub Settings → Variables → Repository variables to enable.
    # If the variable is absent or set to anything other than 'true', the job is skipped.
    if: vars.ADR_VALIDATION_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # markdownlint-cli2: checks formatting rules defined in .markdownlint.json
      # Disabled rules: MD013 (line length — tables exceed 80 chars), MD036 (**bold** as pseudo-heading)
      - name: Lint ADR markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: 'docs/architecture/decisions/ADR-*.md'
          config: '.markdownlint.json'

      # Custom frontmatter script: enforces ADR-specific naming and **Status:** conventions
      # ADR-000 (template) is intentionally excluded — it has a non-conforming Status format by design
      - name: Validate ADR frontmatter
        shell: pwsh
        run: scripts/validate-adr-frontmatter.ps1

      # Ensures every file in the four tracked directories is registered in the .sln
      - name: Check solution file sync
        shell: pwsh
        run: scripts/sync-check-solution.ps1

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host 'ADR validation complete. See steps above for details.'
          Write-Host 'Checks: markdownlint formatting | frontmatter naming + Status field | solution sync'
