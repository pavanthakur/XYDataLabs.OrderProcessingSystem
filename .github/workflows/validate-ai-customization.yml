name: Validate AI Customization

on:
  push:
    branches: [ main, dev, staging ]
    paths:
      - '.github/copilot-instructions.md'
      - '.github/completion-check-rubric.md'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/agents/**'
      - '.github/skills/**'
      - '.github/workflows/validate-ai-customization.yml'
      - '.github/workflows/README.md'
      - 'docs/AI-OPERATING-MODEL.md'
      - 'docs/DEVELOPER-OPERATING-MODEL.md'
      - 'docs/README.md'
      - 'docs/internal/DEFERRED-WORK-LOG.md'
      - 'docs/internal/README.md'
      - 'scripts/validate-ai-customization.ps1'
      - 'scripts/README.md'
  pull_request:
    paths:
      - '.github/copilot-instructions.md'
      - '.github/completion-check-rubric.md'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/agents/**'
      - '.github/skills/**'
      - '.github/workflows/validate-ai-customization.yml'
      - '.github/workflows/README.md'
      - 'docs/AI-OPERATING-MODEL.md'
      - 'docs/DEVELOPER-OPERATING-MODEL.md'
      - 'docs/README.md'
      - 'docs/internal/DEFERRED-WORK-LOG.md'
      - 'docs/internal/README.md'
      - 'scripts/validate-ai-customization.ps1'
      - 'scripts/README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate shared AI assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate AI customization assets
        shell: pwsh
        run: scripts/validate-ai-customization.ps1

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host 'AI customization validation complete. See step output for details.'
          Write-Host 'Checks: required governance files | frontmatter metadata | prompt and agent discoverability | completion-check governance references'