name: Deploy React Frontend to Azure App Service

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - 'frontend/**'
      - 'Resources/Configuration/**'
      - '.github/workflows/deploy-ui-to-azure.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: ''
  FRONTEND_ARTIFACT_PATH: './react-web'

# This workflow builds and deploys the Track U React frontend to the existing UI App Service.

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      apiBaseUrl: ${{ steps.resolve-target.outputs.apiBaseUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve target API base URL
        id: resolve-target
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $owner = "${{ github.repository_owner }}".ToLowerInvariant()

          if ($ref -eq 'refs/heads/main') { $envSuffix = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $envSuffix = 'stg' }
          elseif ($ref -eq 'refs/heads/dev') { $envSuffix = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $envSuffix = $branch }

          $apiBaseUrl = "https://${owner}-orderprocessing-api-xyapp-${envSuffix}.azurewebsites.net"
          "apiBaseUrl=$apiBaseUrl" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved API base URL: $apiBaseUrl"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend workspace
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend workspace
        working-directory: frontend
        run: npm run test:web

      - name: Build frontend artifact
        working-directory: frontend
        env:
          VITE_ORDERPROCESSING_API_BASE_URL: ${{ steps.resolve-target.outputs.apiBaseUrl }}
          ORDERPROCESSING_API_BASE_URL: ${{ steps.resolve-target.outputs.apiBaseUrl }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: react-web
          path: frontend/apps/web/dist

  deploy:
    runs-on: windows-latest
    needs: build
    timeout-minutes: 30  # Covers approval wait + deploy + health check (~8 min worst case on F1)
    # Prod approval window: set via GitHub Settings → Environments → prod → Required reviewers timeout
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Azure Credentials
        id: check-credentials
        shell: pwsh
        env:
          CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
        run: |
          # Check if credentials are available via environment variables
          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $targetEnv = 'prod'; $envSuffix = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $targetEnv = 'staging'; $envSuffix = 'stg' }
          elseif ($ref -eq 'refs/heads/dev') { $targetEnv = 'dev'; $envSuffix = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $targetEnv = $branch; $envSuffix = $branch }

          $hasClientId = -not [string]::IsNullOrWhiteSpace($env:CLIENT_ID)
          $hasTenantId = -not [string]::IsNullOrWhiteSpace($env:TENANT_ID)
          $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($env:SUBSCRIPTION_ID)
          
          if ($hasClientId -and $hasTenantId -and $hasSubscriptionId) {
            Write-Host "✅ Azure credentials found" -ForegroundColor Green
            "credentialsConfigured=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
            Write-Host "║         AZURE CREDENTIALS NOT CONFIGURED                      ║" -ForegroundColor Yellow
            Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "⚠️  Deployment cannot proceed - Azure credentials are missing" -ForegroundColor Yellow
            Write-Host ""
            Write-Host "Required secrets for the '$targetEnv' GitHub environment (Azure suffix '$envSuffix'):" -ForegroundColor Cyan
            Write-Host "  AZUREAPPSERVICE_CLIENTID       : $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
            Write-Host "  AZUREAPPSERVICE_TENANTID       : $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
            Write-Host "  AZUREAPPSERVICE_SUBSCRIPTIONID : $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
            Write-Host "📋 TO FIX THIS:" -ForegroundColor Cyan
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Cyan
            Write-Host ""
            Write-Host "1. Run the Azure Initial Setup workflow to configure OIDC and GitHub secrets:" -ForegroundColor White
            Write-Host "   https://github.com/${{ github.repository }}/actions/workflows/azure-initial-setup.yml" -ForegroundColor Gray
            Write-Host ""
            Write-Host "2. Select 'Run workflow' and configure:" -ForegroundColor White
            Write-Host "   - Environment: all (recommended)" -ForegroundColor Gray
            Write-Host "   - Setup GitHub App: true only if APP_ID / APP_PRIVATE_KEY are missing" -ForegroundColor Gray
            Write-Host "   - Setup Azure OIDC: true" -ForegroundColor Gray
            Write-Host "   - Configure secrets: true" -ForegroundColor Gray
            Write-Host ""
            Write-Host "3. If the target app or resource group does not exist yet, run Azure Bootstrap & Deploy with Bootstrap Infrastructure checked" -ForegroundColor White
            Write-Host "   https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml" -ForegroundColor Gray
            Write-Host ""
            Write-Host "4. Re-run this deployment" -ForegroundColor White
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
            Write-Host ""
            Write-Host "ℹ️  Skipping deployment (credentials not configured)" -ForegroundColor Yellow
            Write-Host ""
            "credentialsConfigured=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
      
      - name: Set target web app name
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $owner = "${{ github.repository_owner }}"
          if ($ref -eq 'refs/heads/main') { $name = "$owner-orderprocessing-ui-xyapp-prod" }
          elseif ($ref -eq 'refs/heads/staging') { $name = "$owner-orderprocessing-ui-xyapp-stg" }
          elseif ($ref -eq 'refs/heads/dev') { $name = "$owner-orderprocessing-ui-xyapp-dev" }
          else { $branch = $ref.Replace('refs/heads/',''); $name = "$owner-orderprocessing-ui-xyapp-$branch" }
          echo "AZURE_WEBAPP_NAME=$name" >> $env:GITHUB_ENV
          Write-Host "Deploying to WebApp: $name"

      - name: Download artifact
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: actions/download-artifact@v8
        with:
          name: react-web
          path: ${{ env.FRONTEND_ARTIFACT_PATH }}

      - name: Login to Azure
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Check Target Infrastructure Exists
        if: steps.check-credentials.outputs.credentialsConfigured == 'true'
        id: check-target
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -eq 'refs/heads/main') { $targetEnv = 'prod'; $envSuffix = 'prod' }
          elseif ($ref -eq 'refs/heads/staging') { $targetEnv = 'staging'; $envSuffix = 'stg' }
          elseif ($ref -eq 'refs/heads/dev') { $targetEnv = 'dev'; $envSuffix = 'dev' }
          else { $branch = $ref.Replace('refs/heads/',''); $targetEnv = $branch; $envSuffix = $branch }

          $rgName = "rg-orderprocessing-$envSuffix"
          $appName = "${{ env.AZURE_WEBAPP_NAME }}"

          "resourceGroupName=$rgName" >> $env:GITHUB_OUTPUT
          "targetEnvironment=$targetEnv" >> $env:GITHUB_OUTPUT
          "resourceSuffix=$envSuffix" >> $env:GITHUB_OUTPUT

          Write-Host "Resolved target: GitHub environment '$targetEnv' / Azure resource suffix '$envSuffix'" -ForegroundColor Cyan

          $groupExists = az group exists --name $rgName
          if ($groupExists -ne 'true') {
            Write-Host "⚠️  Target resource group '$rgName' does not exist. Skipping deployment." -ForegroundColor Yellow
            Write-Host "ℹ️  Bootstrap the $targetEnv environment before merging branch changes that should deploy there." -ForegroundColor Yellow
            "infraReady=false" >> $env:GITHUB_OUTPUT
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Deployment Skipped - Environment Not Bootstrapped`n- GitHub environment: $targetEnv`n- Azure resource suffix: $envSuffix`n- Resource group missing: $rgName`n- Expected app service: $appName`n- Run Azure Bootstrap & Deploy with bootstrapInfra=true for this environment, then re-run deployment.`n"
            exit 0
          }

          $webAppId = az webapp show --name $appName --resource-group $rgName --query id -o tsv 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($webAppId)) {
            Write-Host "⚠️  Target app service '$appName' does not exist in '$rgName'. Skipping deployment." -ForegroundColor Yellow
            Write-Host "ℹ️  Bootstrap may not have been run for $targetEnv, or the app was deleted separately." -ForegroundColor Yellow
            "infraReady=false" >> $env:GITHUB_OUTPUT
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Deployment Skipped - App Service Missing`n- GitHub environment: $targetEnv`n- Azure resource suffix: $envSuffix`n- Resource group: $rgName`n- Missing app service: $appName`n- Run Azure Bootstrap & Deploy with bootstrapInfra=true for this environment, then re-run deployment.`n"
            exit 0
          }

          Write-Host "✅ Target infrastructure exists: $rgName / $appName" -ForegroundColor Green
          "infraReady=true" >> $env:GITHUB_OUTPUT

      - name: Deploy to Azure Web App
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.FRONTEND_ARTIFACT_PATH }}

      - name: Health Check
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        shell: pwsh
        run: |
          $uiUrl = "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/customers"

          Write-Host "Testing frontend route: $uiUrl" -ForegroundColor Cyan
          $healthy = $false
          $maxAttempts = 6
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri $uiUrl -Method Get -TimeoutSec 60
              if ($response.StatusCode -eq 200 -and $response.Content -match 'id="root"') {
                Write-Host "✅ Frontend responded with status: $($response.StatusCode)" -ForegroundColor Green
                Write-Host "Frontend is accessible at: $uiUrl" -ForegroundColor Cyan
                $healthy = $true
                break
              }

              Write-Host "  Attempt $attempt/$maxAttempts returned an unexpected payload." -ForegroundColor Yellow
            } catch {
              Write-Host "  Attempt $attempt/$maxAttempts failed: $($_.Exception.Message)" -ForegroundColor Yellow
              if ($attempt -lt $maxAttempts) {
                Write-Host "  Retrying in 20 s..." -ForegroundColor Yellow
                Start-Sleep -Seconds 20
              }
            }
          }
          if (-not $healthy) {
            Write-Host "❌ Frontend health check FAILED after $maxAttempts attempts" -ForegroundColor Red
          }

          if (-not $healthy) {
            Write-Host "" -ForegroundColor Gray
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ DEPLOYMENT HEALTH CHECK FAILED" -ForegroundColor Red
            Write-Host "   The React frontend did not respond after deployment. Check App Service logs." -ForegroundColor Red
            Write-Host "   URL: $uiUrl" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            exit 1
          }

      - name: Set up Node.js for browser smoke test
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies for browser smoke test
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        working-directory: frontend/apps/web
        run: npx playwright install chromium

      - name: Browser Smoke Test - Tenant Bootstrap
        if: steps.check-credentials.outputs.credentialsConfigured == 'true' && steps.check-target.outputs.infraReady == 'true'
        working-directory: frontend
        run: npm run smoke:web:tenant -- --url "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/customers"

      # Backend tests remain owned by deploy-api-to-azure.yml.
      # Frontend regression tests run in the build job above so tenant bootstrap issues
      # are blocked before artifact upload and deployment, and the browser smoke test
      # above validates the deployed UI respects runtime bootstrap tenants.

      - name: Deployment Summary
        if: always()
        shell: pwsh
        run: |
          $ref    = "${{ github.ref_name }}"
          $owner  = "${{ github.repository_owner }}"
          if ($ref -eq 'main') { $defaultTargetEnv = 'prod'; $defaultEnvSuffix = 'prod' }
          elseif ($ref -eq 'staging') { $defaultTargetEnv = 'staging'; $defaultEnvSuffix = 'stg' }
          elseif ($ref -eq 'dev') { $defaultTargetEnv = 'dev'; $defaultEnvSuffix = 'dev' }
          else { $defaultTargetEnv = $ref; $defaultEnvSuffix = $ref }

          $defaultApp = "$owner-orderprocessing-ui-xyapp-$defaultEnvSuffix"
          $defaultRg = "rg-orderprocessing-$defaultEnvSuffix"
          $app = if ([string]::IsNullOrWhiteSpace("${{ env.AZURE_WEBAPP_NAME }}")) { $defaultApp } else { "${{ env.AZURE_WEBAPP_NAME }}" }
          $rg = if ([string]::IsNullOrWhiteSpace("${{ steps.check-target.outputs.resourceGroupName }}")) { $defaultRg } else { "${{ steps.check-target.outputs.resourceGroupName }}" }
          $targetEnv = if ([string]::IsNullOrWhiteSpace("${{ steps.check-target.outputs.targetEnvironment }}")) { $defaultTargetEnv } else { "${{ steps.check-target.outputs.targetEnvironment }}" }
          $envSuffix = if ([string]::IsNullOrWhiteSpace("${{ steps.check-target.outputs.resourceSuffix }}")) { $defaultEnvSuffix } else { "${{ steps.check-target.outputs.resourceSuffix }}" }
          $run    = "${{ github.run_id }}"
          $repo   = "${{ github.repository }}"
          $actor  = "${{ github.actor }}"
          $event  = "${{ github.event_name }}"
          $sha    = "${{ github.sha }}".Substring(0, 7)
          $credentialsConfigured = "${{ steps.check-credentials.outputs.credentialsConfigured }}"
          $infraReady = "${{ steps.check-target.outputs.infraReady }}"
          $appUrl = if ($credentialsConfigured -ne 'true') {
            "https://$app.azurewebsites.net (target URL; deployment skipped before Azure login)"
          } elseif ($infraReady -ne 'true') {
            "https://$app.azurewebsites.net (target URL; app not provisioned yet)"
          } else {
            "https://$app.azurewebsites.net"
          }

          $status = if ($credentialsConfigured -ne 'true') {
            '⏭️ SKIPPED - credentials missing'
          } elseif ($infraReady -ne 'true') {
            '⏭️ SKIPPED - environment not bootstrapped'
          } elseif ('${{ job.status }}' -eq 'success') {
            '✅ SUCCESS'
          } else {
            '❌ FAILED'
          }

          "## 🚀 UI Deployment Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Field | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| Status | $status |" >> $env:GITHUB_STEP_SUMMARY
          "| Branch | ``$ref`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Commit | ``$sha`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Triggered by | $actor ($event) |" >> $env:GITHUB_STEP_SUMMARY
          "| GitHub Environment | ``$targetEnv`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Azure Resource Suffix | ``$envSuffix`` |" >> $env:GITHUB_STEP_SUMMARY
          "| Resource Group | ``$rg`` |" >> $env:GITHUB_STEP_SUMMARY
          "| App Service | ``$app`` |" >> $env:GITHUB_STEP_SUMMARY
          "| URL | $appUrl |" >> $env:GITHUB_STEP_SUMMARY
          "| Run | [View run](https://github.com/$repo/actions/runs/$run) |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "> Note: This workflow does not run solution tests. API workflow owns Domain/Application/API/Architecture test execution." >> $env:GITHUB_STEP_SUMMARY

          if ($infraReady -ne 'true' -and $credentialsConfigured -eq 'true') {
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Run Azure Bootstrap & Deploy with bootstrapInfra=true for this branch environment before expecting push-based deployments to succeed." >> $env:GITHUB_STEP_SUMMARY
          } elseif ($credentialsConfigured -ne 'true') {
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Run Azure Initial Setup with Setup Azure OIDC=true and Configure GitHub Secrets=true before rerunning this deployment." >> $env:GITHUB_STEP_SUMMARY
          }
