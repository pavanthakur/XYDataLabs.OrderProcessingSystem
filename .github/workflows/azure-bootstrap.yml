name: Azure Bootstrap & Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '🎯 Environment | ⚠️ IMPORTANT: set "Use workflow from" branch to match (dev→dev, staging→staging, main→prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
          - all
        default: 'dev'
      bootstrapInfra:
        description: '🔄 Phase A — Bootstrap Infrastructure | Creates Resource Group, App Service Plan, Web Apps, App Insights, Key Vault + managed identity'
        required: true
        type: boolean
        default: true
      deployApi:
        description: '🔄 Phase A — Deploy API [Optional] | Deploys API code after infrastructure is ready'
        required: true
        type: boolean
        default: true
      deployUi:
        description: '🔄 Phase A — Deploy UI [Optional] | Deploys UI code after infrastructure is ready'
        required: true
        type: boolean
        default: true
      cleanupInfra:
        description: '🗑️ Phase X (DESTRUCTIVE) — Cleanup Infrastructure | Deletes UI App, API App, then the entire Resource Group. ⚠️ IRREVERSIBLE — use only for teardown/reset. Do NOT combine with Bootstrap.'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  check-trigger:
    name: Check Workflow Trigger
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Workflow trigger check
        run: |
          Write-Host "ℹ️  This workflow is designed for manual dispatch only" -ForegroundColor Cyan
          Write-Host "   Skipping execution for event: ${{ github.event_name }}" -ForegroundColor Yellow
          Write-Host "   To run this workflow, use: Actions > Azure Bootstrap & Deploy > Run workflow" -ForegroundColor Gray

  validate-inputs:
    name: Validate Workflow Inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    environment: ${{ inputs.environment != 'all' && inputs.environment || 'dev' }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Log Workflow Start
        run: |
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "  AZURE BOOTSTRAP & DEPLOY WORKFLOW STARTED" -ForegroundColor Cyan
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "⏰ Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "👤 Triggered by: ${{ github.actor }}" -ForegroundColor Gray
          Write-Host "🌿 Branch: ${{ github.ref_name }}" -ForegroundColor Gray
          Write-Host "📦 Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "🔗 Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" -ForegroundColor Gray
          Write-Host "" -ForegroundColor Gray
          Write-Host "📋 USER SELECTED PARAMETERS:" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  Parameter              Value    Checkbox" -ForegroundColor DarkGray
          Write-Host "  ──────────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "  environment          = ${{ inputs.environment }}" -ForegroundColor White
          Write-Host "" -ForegroundColor Gray
          Write-Host "  INFRASTRUCTURE:" -ForegroundColor Cyan
          Write-Host "  bootstrapInfra       = ${{ inputs.bootstrapInfra }}  $(if ('${{ inputs.bootstrapInfra }}' -eq 'true') { '[✅ checked]   — Phase A: Bootstrap Infrastructure' } else { '[☐  unchecked] — Phase A: Bootstrap Infrastructure' })" -ForegroundColor $(if ('${{ inputs.bootstrapInfra }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray
          Write-Host "  DEPLOYMENT:" -ForegroundColor Cyan
          Write-Host "  deployApi            = ${{ inputs.deployApi }}  $(if ('${{ inputs.deployApi }}' -eq 'true') { '[✅ checked]   — Phase A: Deploy API' } else { '[☐  unchecked] — Phase A: Deploy API' })" -ForegroundColor $(if ('${{ inputs.deployApi }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  deployUi             = ${{ inputs.deployUi }}  $(if ('${{ inputs.deployUi }}' -eq 'true') { '[✅ checked]   — Phase A: Deploy UI' } else { '[☐  unchecked] — Phase A: Deploy UI' })" -ForegroundColor $(if ('${{ inputs.deployUi }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray
          Write-Host "  CLEANUP:" -ForegroundColor $(if ('${{ inputs.cleanupInfra }}' -eq 'true') { 'Red' } else { 'DarkGray' })
          Write-Host "  cleanupInfra         = ${{ inputs.cleanupInfra }}  $(if ('${{ inputs.cleanupInfra }}' -eq 'true') { '[✅ checked]   — Phase X: ⚠️  DESTRUCTIVE Cleanup' } else { '[☐  unchecked] — Phase X: Cleanup Infrastructure' })" -ForegroundColor $(if ('${{ inputs.cleanupInfra }}' -eq 'true') { 'Red' } else { 'DarkGray' })
          Write-Host "  ──────────────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray

      - name: Validate Configuration
        run: |
          Write-Host "🔍 Validating workflow inputs..." -ForegroundColor Cyan
          Write-Host ("=" * 70) -ForegroundColor Gray

          $env = "${{ inputs.environment }}"
          $bootstrap = "${{ inputs.bootstrapInfra }}"
          $deployApi = "${{ inputs.deployApi }}"
          $deployUi  = "${{ inputs.deployUi }}"
          $cleanup   = "${{ inputs.cleanupInfra }}"

          Write-Host "`n📋 Workflow Inputs:" -ForegroundColor Cyan
          Write-Host "  Environment: $env" -ForegroundColor Yellow
          Write-Host "  Bootstrap infra: $bootstrap" -ForegroundColor Yellow
          Write-Host "  Deploy API: $deployApi" -ForegroundColor Yellow
          Write-Host "  Deploy UI: $deployUi" -ForegroundColor Yellow
          Write-Host "  Cleanup infra: $cleanup" -ForegroundColor Yellow

          # Display branch-to-environment mapping
          Write-Host "`n🗺️  Branch → Environment Mapping:" -ForegroundColor Cyan
          Write-Host "  dev branch      → dev environment (dev.json)" -ForegroundColor Gray
          Write-Host "  staging branch  → staging environment (staging.json)" -ForegroundColor Gray
          Write-Host "  main branch     → prod environment (prod.json)" -ForegroundColor Gray

          Write-Host "`n⚠️  Validation Checks:" -ForegroundColor Cyan

          # Validate environment selection
          if ($env -notin @('dev', 'staging', 'prod', 'all')) {
            Write-Host "  ❌ Invalid environment: $env" -ForegroundColor Red
            Write-Error "Invalid environment: $env. Must be dev, staging, prod, or all."
            exit 1
          }
          Write-Host "  ✅ Environment selection valid" -ForegroundColor Green

          # Validate branch matches target environment (strict — always enforced)
          $currentBranch = "${{ github.ref_name }}"
          $expectedBranch = if ($env -eq "prod") { "main" } elseif ($env -eq "all") { "any" } else { $env }

          Write-Host "`n  Branch/Environment Match Check:" -ForegroundColor Cyan
          Write-Host "    Current branch: $currentBranch" -ForegroundColor Gray
          Write-Host "    Target environment: $env" -ForegroundColor Gray
          Write-Host "    Expected branch: $expectedBranch" -ForegroundColor Gray

          if ($env -ne "all" -and $currentBranch -ne $expectedBranch) {
            Write-Host "`n  ╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
            Write-Host "  ║         BRANCH MISMATCH — BOOTSTRAP BLOCKED                   ║" -ForegroundColor Red
            Write-Host "  ╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
            Write-Host "" -ForegroundColor Gray
            Write-Host "  Current branch  : $currentBranch" -ForegroundColor Red
            Write-Host "  Target env       : $env" -ForegroundColor Red
            Write-Host "  Required branch  : $expectedBranch" -ForegroundColor Red
            Write-Host "" -ForegroundColor Gray
            Write-Host "  📋 Branch → Environment Convention:" -ForegroundColor Cyan
            Write-Host "     dev branch      → dev environment" -ForegroundColor Gray
            Write-Host "     staging branch  → staging environment" -ForegroundColor Gray
            Write-Host "     main branch     → prod environment" -ForegroundColor Gray
            Write-Host "" -ForegroundColor Gray
            Write-Host "  TO FIX: Switch to the '$expectedBranch' branch before running this workflow." -ForegroundColor Yellow
            Write-Host "" -ForegroundColor Gray
            Write-Error "Branch mismatch: running from '$currentBranch' but targeting '$env' (expected '$expectedBranch' branch)."
            exit 1
          } else {
            Write-Host "  ✅ Branch matches target environment" -ForegroundColor Green
          }

          # Check OIDC secrets exist (required for all operations in this workflow)
          Write-Host "`n  🔐 OIDC Secrets Check:" -ForegroundColor Cyan

          $hasClientId       = "${{ secrets.AZUREAPPSERVICE_CLIENTID }}"       -ne ""
          $hasTenantId       = "${{ secrets.AZUREAPPSERVICE_TENANTID }}"       -ne ""
          $hasSubscriptionId = "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}" -ne ""

          Write-Host "    AZUREAPPSERVICE_CLIENTID      : $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
          Write-Host "    AZUREAPPSERVICE_TENANTID      : $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
          Write-Host "    AZUREAPPSERVICE_SUBSCRIPTIONID: $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })

          if (-not $hasClientId -or -not $hasTenantId -or -not $hasSubscriptionId) {
            Write-Host "" -ForegroundColor Gray
            Write-Host "    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "    ❌ OIDC SECRETS MISSING — Cannot proceed!" -ForegroundColor Red
            Write-Host "    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "" -ForegroundColor Gray
            Write-Host "    All operations in this workflow require Azure OIDC credentials." -ForegroundColor Red
            Write-Host "    These are created by the 'Azure Initial Setup' workflow (one-time)." -ForegroundColor Yellow
            Write-Host "" -ForegroundColor Gray
            Write-Host "    TO FIX — Run the Azure Initial Setup workflow:" -ForegroundColor Cyan
            Write-Host "      1. Go to Actions → 'Azure Initial Setup' → Run workflow" -ForegroundColor White
            Write-Host "      2. All defaults are correct (environment='all', OIDC + secrets enabled)" -ForegroundColor White
            Write-Host "      3. Click 'Run workflow' and wait for completion" -ForegroundColor White
            Write-Host "" -ForegroundColor Gray
            Write-Host "    After Azure Initial Setup completes, re-run this workflow." -ForegroundColor Yellow
            Write-Host "    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Error "OIDC secrets not configured. Run the 'Azure Initial Setup' workflow first."
            exit 1
          }
          Write-Host "    ✅ All OIDC secrets present" -ForegroundColor Green

          Write-Host "`n" -ForegroundColor Gray
          Write-Host ("=" * 70) -ForegroundColor Gray
          Write-Host "✅ Input validation passed - proceeding..." -ForegroundColor Green
          exit 0

      - name: Phase Readiness Pre-Flight Summary
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PHASE READINESS PRE-FLIGHT SUMMARY (DRY-RUN CHECK)       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "This step shows what will run. OIDC credentials are already validated." -ForegroundColor Gray
          Write-Host ""

          # ── Read selected inputs ────────────────────────────────────────
          $doBootstrap     = "${{ inputs.bootstrapInfra }}"   -eq "true"
          $doDeployApi     = "${{ inputs.deployApi }}"        -eq "true"
          $doDeployUi      = "${{ inputs.deployUi }}"         -eq "true"
          $doCleanup       = "${{ inputs.cleanupInfra }}"     -eq "true"

          # ── Phase readiness table ───────────────────────────────────────
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "📋 PHASE EXECUTION PLAN" -ForegroundColor Yellow
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""

          # Phase A: Bootstrap Infrastructure
          $phase2Icon = if ($doBootstrap) { '🔵 WILL RUN' } else { '⏭️  SKIPPED' }
          Write-Host "  Phase A — Bootstrap Infrastructure : $phase2Icon" -ForegroundColor $(if ($doBootstrap) { 'Cyan' } else { 'DarkGray' })
          if ($doBootstrap) {
            Write-Host "             └─ Azure auth: AZUREAPPSERVICE_* secrets → azure/login@v2 (OIDC) ✅" -ForegroundColor Green
            Write-Host "             └─ Deploy API: $(if ($doDeployApi) { '✅ Yes' } else { 'No' })" -ForegroundColor Gray
            Write-Host "             └─ Deploy UI : $(if ($doDeployUi)  { '✅ Yes' } else { 'No' })" -ForegroundColor Gray
          }

          # Standalone deploy phases (only shown when bootstrap is not selected)
          if ($doDeployApi -and -not $doBootstrap) {
            Write-Host "  Deploy API                          : 🔵 WILL RUN" -ForegroundColor Cyan
            Write-Host "             └─ Azure auth: environment secrets → azure/login@v2 (OIDC) ✅" -ForegroundColor Green
          }
          if ($doDeployUi -and -not $doBootstrap) {
            Write-Host "  Deploy UI                           : 🔵 WILL RUN" -ForegroundColor Cyan
            Write-Host "             └─ Azure auth: environment secrets → azure/login@v2 (OIDC) ✅" -ForegroundColor Green
          }

          # Phase X: Cleanup Infrastructure — DESTRUCTIVE
          $phaseXIcon = if ($doCleanup) { '🔴 WILL RUN (⚠️ DESTRUCTIVE — IRREVERSIBLE)' } else { '⏭️  SKIPPED' }
          Write-Host "  Phase X — Cleanup Infrastructure   : $phaseXIcon" -ForegroundColor $(if ($doCleanup) { 'Red' } else { 'DarkGray' })
          if ($doCleanup) {
            Write-Host "             └─ ⚠️  Deletes: UI App Service, API App Service, then entire Resource Group" -ForegroundColor Red
            Write-Host "             └─ All SQL, Key Vault, App Insights, ASP removed with Resource Group" -ForegroundColor Red
            Write-Host "             └─ Azure auth: AZUREAPPSERVICE_* secrets ✅" -ForegroundColor Green
            if ($doBootstrap) {
              Write-Host "             └─ ⚠️  WARNING: Bootstrap is also selected — avoid running both together!" -ForegroundColor Red
            }
          }

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host ""
          Write-Host "✅ PRE-FLIGHT CHECK PASSED — All selected phases have prerequisites met." -ForegroundColor Green
          Write-Host ""

  bootstrap-dev:
    name: Bootstrap Dev Environment
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.bootstrapInfra &&
      (inputs.environment == 'dev' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: dev
    env:
      CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate GitHub App Token
        id: app-token
        if: ${{ env.APP_ID != '' }}
        continue-on-error: true
        env:
          APP_ID: ${{ secrets.APP_ID }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Validate Azure Credentials
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VALIDATE AZURE CREDENTIALS - DEV                      ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "🔍 Checking Azure credentials..." -ForegroundColor Cyan
            
            $hasClientId = -not [string]::IsNullOrWhiteSpace($env:CLIENT_ID)
            $hasTenantId = -not [string]::IsNullOrWhiteSpace($env:TENANT_ID)
            $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($env:SUBSCRIPTION_ID)
            
            Write-Host "  CLIENT_ID:         $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
            Write-Host "  TENANT_ID:         $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
            Write-Host "  SUBSCRIPTION_ID:   $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
            Write-Host ""
            
            if (-not $hasClientId -or -not $hasTenantId -or -not $hasSubscriptionId) {
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ DEPLOYMENT BLOCKED — OIDC NOT CONFIGURED FOR 'dev'" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "The 'Azure Initial Setup' workflow must be completed first." -ForegroundColor Red
              Write-Host "It creates Azure AD OIDC credentials and GitHub environment secrets." -ForegroundColor Red
              Write-Host ""
              Write-Host "TO FIX — Run the 'Azure Initial Setup' workflow (one-time):" -ForegroundColor Cyan
              Write-Host "  1. Go to Actions → 'Azure Initial Setup' → Run workflow" -ForegroundColor White
              Write-Host "  2. All defaults are correct (environment='all', OIDC + secrets enabled)" -ForegroundColor White
              Write-Host "  3. Click 'Run workflow' and wait for completion" -ForegroundColor White
              Write-Host ""
              Write-Host "After initial setup succeeds, re-run this workflow." -ForegroundColor Yellow
              Write-Host ""
              Write-Host "⚠️  No infrastructure or deployment will proceed until OIDC is configured." -ForegroundColor Red
              Write-Host "⚠️  API and UI deployments are also blocked when bootstrap fails." -ForegroundColor Red
              Write-Host ""
              if (-not $hasClientId) { Write-Host "  ❌ AZUREAPPSERVICE_CLIENTID       — Missing in 'dev' environment" -ForegroundColor Red }
              if (-not $hasTenantId) { Write-Host "  ❌ AZUREAPPSERVICE_TENANTID       — Missing in 'dev' environment" -ForegroundColor Red }
              if (-not $hasSubscriptionId) { Write-Host "  ❌ AZUREAPPSERVICE_SUBSCRIPTIONID — Missing in 'dev' environment" -ForegroundColor Red }
              Write-Host ""
              Write-Error "DEPLOYMENT BLOCKED: OIDC not configured for 'dev'. Run the 'Azure Initial Setup' workflow with environment='all' first."
              exit 1
            }
            
            Write-Host "✅ All Azure credentials validated successfully" -ForegroundColor Green
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING CREDENTIAL VALIDATION" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Error "Credential validation failed: $($_.Exception.Message)"
            exit 1
          }
      - name: Azure Login (OIDC or Secrets)
        id: azure-login
        timeout-minutes: 3
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}
      
      - name: Diagnose Azure Login Failure
        if: failure() && steps.azure-login.outcome == 'failure'
        run: |
          Write-Host "" 
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host "❌ AZURE LOGIN FAILED — DIAGNOSIS" -ForegroundColor Red
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host ""
          Write-Host "GitHub OIDC secrets are present for 'dev' but Azure login failed." -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Most likely cause: AADSTS700213" -ForegroundColor Red
          Write-Host "  The Azure AD App Registration is missing the federated identity" -ForegroundColor Red
          Write-Host "  credential for subject 'repo:${{ github.repository }}:environment:dev'." -ForegroundColor Red
          Write-Host ""
          Write-Host "This happens when the 'Azure Initial Setup' workflow was never run, or" -ForegroundColor Yellow
          Write-Host "was run with environment='dev' only (not 'all'), or the Azure AD App" -ForegroundColor Yellow
          Write-Host "Registration was recreated." -ForegroundColor Yellow
          Write-Host ""
