      # Refresh Azure authentication token before Key Vault operations
      # Token from initial login may have expired after long-running migration steps  
      - name: Clear Azure CLI Token Cache
        run: |
          Write-Host "рҹ”„ Clearing Azure CLI token cache to force fresh authentication..." -ForegroundColor Cyan
          try {
            # Clear Azure account to force re-authentication
            az account clear 2>&1 | Out-Null
            Write-Host "  вң“ Azure account cleared" -ForegroundColor Gray
            
            # Purge Azure CLI cache
            az cache purge 2>&1 | Out-Null
            Write-Host "  вң“ Azure CLI cache purged" -ForegroundColor Gray
            
            Write-Host "вң… Token cache cleared successfully" -ForegroundColor Green
          }
          catch {
            # Cache clearing failure is not critical - log and continue
            Write-Host "  вҡ пёҸ  Cache clearing encountered an issue (non-critical): $($_.Exception.Message)" -ForegroundColor Yellow
            Write-Host "  Proceeding with Azure login refresh..." -ForegroundColor Gray
          }
      
      - name: Refresh Azure Login for Key Vault Operations
        timeout-minutes: 3
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}
      
