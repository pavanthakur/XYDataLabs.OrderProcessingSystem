          retention-days: 30

  enable-validation:
    name: Enable Pre-Deployment Validation
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.enableValidation &&
      inputs.bootstrapInfra &&
      !cancelled() &&
      (needs.bootstrap-dev.result == 'success' || needs.bootstrap-dev.result == 'skipped') &&
      (needs.bootstrap-staging.result == 'success' || needs.bootstrap-staging.result == 'skipped') &&
      (needs.bootstrap-prod.result == 'success' || needs.bootstrap-prod.result == 'skipped')
    needs: [validate-inputs, bootstrap-dev, bootstrap-staging, bootstrap-prod]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Validation in Workflow
        run: |
          Write-Host "рҹ”§ Enabling pre-deployment validation..." -ForegroundColor Cyan

          $workflowPath = ".github/workflows/infra-deploy.yml"
          $content = Get-Content $workflowPath -Raw

          # Re-enable pre-validate job
          $content = $content -replace 'if: false  # TODO: Enable after bootstrap - requires Azure OIDC setup', 'if: (github.event_name == ''push'') || (github.event_name == ''workflow_dispatch'' && !inputs.dryRun)'

          # Re-enable job dependency
          $content = $content -replace '# needs: pre-validate  # TODO: Uncomment after bootstrap', 'needs: pre-validate'

          Set-Content $workflowPath -Value $content -NoNewline

          Write-Host "вң… Validation enabled" -ForegroundColor Green

      - name: Commit Changes
        id: commit
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/infra-deploy.yml
          
          if (git diff --staged --quiet) {
            Write-Host "в„№пёҸ  No changes detected - validation may already be enabled" -ForegroundColor Yellow
            exit 0
          }
          
          git commit -m "chore(ci): enable pre-deployment validation after bootstrap"
          git push
      
      - name: Handle Push Failure
        if: steps.commit.outcome == 'failure'
        run: |
          Write-Host "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—" -ForegroundColor Yellow
          Write-Host "в•‘    WORKFLOW UPDATE REQUIRES MANUAL ACTION                     в•‘" -ForegroundColor Yellow
          Write-Host "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "вҡ пёҸ  Unable to automatically update workflow file" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "GitHub's security model prevents workflows from modifying other workflow" -ForegroundColor White
          Write-Host "files using the default GITHUB_TOKEN for security reasons." -ForegroundColor White
          Write-Host ""
          Write-Host "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" -ForegroundColor Gray
          Write-Host "рҹ“Ӣ MANUAL STEP REQUIRED (One-time, 2 minutes)" -ForegroundColor Cyan
          Write-Host "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" -ForegroundColor Gray
          Write-Host ""
          Write-Host "To enable pre-deployment validation, make this change:" -ForegroundColor White
          Write-Host ""
          Write-Host "File: .github/workflows/infra-deploy.yml" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "In the pre-validate job, change:" -ForegroundColor Cyan
          Write-Host "  if: false  # TODO: Enable after bootstrap" -ForegroundColor Red
          Write-Host "to:" -ForegroundColor Cyan
          Write-Host "  if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && !inputs.dryRun)" -ForegroundColor Green
          Write-Host ""
          Write-Host "Also in the deploy job, uncomment:" -ForegroundColor Cyan
          Write-Host "  needs: pre-validate" -ForegroundColor Green
          Write-Host ""
          
          Write-Warning "Automatic workflow update failed. Please manually enable validation using the instructions above."

      - name: Create Completion Summary
        run: |
          $commitSuccess = "${{ steps.commit.outcome }}" -eq "success"
          
          "## вң… Azure Bootstrap Complete!" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### рҹҺү What's Ready" >> $env:GITHUB_STEP_SUMMARY
          "- вң… Azure OIDC configured" >> $env:GITHUB_STEP_SUMMARY
          "- вң… GitHub secrets configured" >> $env:GITHUB_STEP_SUMMARY
          "- вң… Infrastructure bootstrapped (${{ inputs.environment }})" >> $env:GITHUB_STEP_SUMMARY
          
          if ($commitSuccess) {
            "- вң… Pre-deployment validation enabled" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "- вҡ пёҸ Pre-deployment validation - **Manual step required** (see above)" >> $env:GITHUB_STEP_SUMMARY
          }
          
          "" >> $env:GITHUB_STEP_SUMMARY
          
          if (-not $commitSuccess) {
            "### вҡ пёҸ Manual Step Required" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "To enable pre-deployment validation, edit ```.github/workflows/infra-deploy.yml```:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. In the ``pre-validate`` job, change ``if: false`` to ``if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && !inputs.dryRun)``" >> $env:GITHUB_STEP_SUMMARY
            "2. In the ``deploy`` job, uncomment the line ``needs: pre-validate``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "See detailed instructions in the logs above." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }
          
          "### рҹҡҖ Next Steps" >> $env:GITHUB_STEP_SUMMARY
          "1. Push code changes to trigger deployment workflow" >> $env:GITHUB_STEP_SUMMARY
          "2. Monitor deployments at: [Actions](https://github.com/pavanthakur/XYDataLabs.OrderProcessingSystem/actions)" >> $env:GITHUB_STEP_SUMMARY
          "3. View resources in [Azure Portal](https://portal.azure.com)" >> $env:GITHUB_STEP_SUMMARY

  summary:
    name: Bootstrap Summary
    if: always() && github.event_name == 'workflow_dispatch'
    needs: [setup-oidc, configure-github-secrets, pre-validate-prerequisites, bootstrap-dev, bootstrap-staging, bootstrap-prod, enable-validation]
    runs-on: windows-latest
    steps:
      - name: Generate Summary
        run: |
          "## рҹ“Ҡ Bootstrap Workflow Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### рҹ“Ӣ User Configuration" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Parameter | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| рҹҺҜ Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”‘ [Phase 1] Setup OIDC | ``${{ inputs.setupOidc }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| в„№пёҸ [Phase 0] Setup GitHub App | ``${{ inputs.setupGitHubApp }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹӨ– GitHub App Name | ``${{ inputs.githubAppName }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”‘ [Phase 1] Configure Secrets | ``${{ inputs.configureSecrets }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”Қ Pre-Flight Validation | ``${{ inputs.enableValidation }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”„ [Phase 2] Bootstrap Infrastructure | ``${{ inputs.bootstrapInfra }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”„ [Phase 2] Deploy API | ``${{ inputs.deployApi }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”„ [Phase 2] Deploy UI | ``${{ inputs.deployUi }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### вң… Job Execution Results" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Job | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|-----|--------|" >> $env:GITHUB_STEP_SUMMARY

          $setupOidc = "${{ needs.setup-oidc.result }}"
          $configSecrets = "${{ needs.configure-github-secrets.result }}"
          $preValidate = "${{ needs.pre-validate-prerequisites.result }}"
          $bootstrapDev = "${{ needs.bootstrap-dev.result }}"
          $bootstrapStaging = "${{ needs.bootstrap-staging.result }}"
          $bootstrapProd = "${{ needs.bootstrap-prod.result }}"
          $enableVal = "${{ needs.enable-validation.result }}"

          "| Step | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|------|--------|" >> $env:GITHUB_STEP_SUMMARY

          if ($setupOidc -ne "") {
            $icon = if ($setupOidc -eq "success") { "вң…" } else { "вқҢ" }
            "| Setup OIDC | $icon $setupOidc |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($configSecrets -ne "") {
            $icon = if ($configSecrets -eq "success") { "вң…" } else { "вқҢ" }
            "| Configure Secrets | $icon $configSecrets |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($preValidate -ne "") {
            $icon = if ($preValidate -eq "success") { "вң…" } elseif ($preValidate -eq "skipped") { "вҸӯпёҸ" } else { "вқҢ" }
            "| Pre-Validate Prerequisites | $icon $preValidate |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapDev -ne "") {
            $icon = if ($bootstrapDev -eq "success") { "вң…" } elseif ($bootstrapDev -eq "skipped") { "вҸӯпёҸ" } else { "вқҢ" }
            "| Bootstrap Dev | $icon $bootstrapDev |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapStaging -ne "") {
            $icon = if ($bootstrapStaging -eq "success") { "вң…" } elseif ($bootstrapStaging -eq "skipped") { "вҸӯпёҸ" } else { "вқҢ" }
            "| Bootstrap Staging | $icon $bootstrapStaging |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapProd -ne "") {
            $icon = if ($bootstrapProd -eq "success") { "вң…" } elseif ($bootstrapProd -eq "skipped") { "вҸӯпёҸ" } else { "вқҢ" }
            "| Bootstrap Prod | $icon $bootstrapProd |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($enableVal -ne "") {
            $icon = if ($enableVal -eq "success") { "вң…" } elseif ($enableVal -eq "skipped") { "вҸӯпёҸ" } else { "вқҢ" }
            "| Enable Validation | $icon $enableVal |" >> $env:GITHUB_STEP_SUMMARY
          }

          "" >> $env:GITHUB_STEP_SUMMARY
          "### рҹҸ—пёҸ What Gets Created Automatically" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Resource | Automated? | Trigger |" >> $env:GITHUB_STEP_SUMMARY
          "|----------|-----------|---------|" >> $env:GITHUB_STEP_SUMMARY
          "| рҹҸў Microsoft Entra ID App Registration | вң… Yes | Setup OIDC = true |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”‘ Azure Federated Credentials (OIDC) | вң… Yes | Setup OIDC = true |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹҢҗ GitHub Environments (dev/staging/prod) | вң… Yes | Configure Secrets = true |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ”җ GitHub OIDC Secrets (AZUREAPPSERVICE_*) | вң… Yes | Configure Secrets = true |" >> $env:GITHUB_STEP_SUMMARY
          "| вҳҒпёҸ Azure Resource Groups + App Services | вң… Yes | Bootstrap Infrastructure = true |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹ—„пёҸ Azure SQL Database | вң… Yes | Bootstrap Infrastructure = true |" >> $env:GITHUB_STEP_SUMMARY
          "| рҹӨ– GitHub App (APP_ID + APP_PRIVATE_KEY) | вҡ пёҸ Manual | One-time setup required |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### рҹ—‘пёҸ What Can Be Safely Deleted and Re-Created" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Resource | Can Delete? | Notes |" >> $env:GITHUB_STEP_SUMMARY
          "|----------|------------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| GitHub Environments (settings/environments) | вң… Yes | Re-created by Configure Secrets |" >> $env:GITHUB_STEP_SUMMARY
          "| OIDC Secrets (AZUREAPPSERVICE_*) | вң… Yes | Re-created by Setup OIDC + Configure Secrets |" >> $env:GITHUB_STEP_SUMMARY
          "| APP_ID + APP_PRIVATE_KEY secrets | вҡ пёҸ Caution | Must re-run setup-github-app-from-manifest.ps1 after deletion |" >> $env:GITHUB_STEP_SUMMARY
          "| GitHub App Installation (settings/installations) | вҡ пёҸ Caution | Must re-install app after deletion, then update APP_ID + APP_PRIVATE_KEY |" >> $env:GITHUB_STEP_SUMMARY

          "" >> $env:GITHUB_STEP_SUMMARY
          "---" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          # Determine next steps based on current state
          $ranPhase0     = "${{ inputs.setupGitHubApp }}" -eq "true"
          $hasAppId      = "${{ secrets.APP_ID }}" -ne ""
          $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""
          $appSecretsOk  = $hasAppId -and $hasPrivateKey
          $appName       = "${{ inputs.githubAppName }}"
          $appSlug       = $appName.ToLower() -replace '[^a-z0-9]', '-'
          $secretsUrl    = "https://github.com/${{ github.repository }}/settings/secrets/actions"

          if ($ranPhase0 -and -not $appSecretsOk) {
            "## рҹ”ҙ Action Required вҖ” Phase 0 Complete, Manual Step Needed" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> **Phase 0 instructions have been shown. Before Phase 1 can run you must complete the two steps below.**" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**GitHub App Name configured**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 1 вҖ” Create GitHub App (if not already done)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Create a GitHub App named **\`$appName\`** with the required permissions:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "- **Option A** (Recommended): ``.\scripts\setup-github-app-from-manifest.ps1``" >> $env:GITHUB_STEP_SUMMARY
            "- **Option B** (Manual): [Create at github.com/settings/apps/new](https://github.com/settings/apps/new)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> рҹ“– **Detailed guide**: [QUICK-SETUP-GITHUB-APP.md](../blob/${{ github.ref_name }}/Documentation/03-Configuration-Guides/QUICK-SETUP-GITHUB-APP.md)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 2 вҖ” Add Repository Secrets" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Go to **[Settings вҶ’ Secrets and variables вҶ’ Actions]($secretsUrl)** and add:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Secret Name | Where to find the value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------------|------------------------|" >> $env:GITHUB_STEP_SUMMARY
            "| \`APP_ID\` | Numeric App ID on the app's **General** settings page: \`https://github.com/settings/apps/$appSlug\` |" >> $env:GITHUB_STEP_SUMMARY
            "| \`APP_PRIVATE_KEY\` | Full contents of the \`.pem\` file downloaded when generating the private key (include the \`-----BEGIN RSA PRIVATE KEY-----\` header) |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**How to add each secret**: Click **New repository secret**, enter Name + Value from table above, then click **Add secret**." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### Step 3 вҖ” Re-run This Workflow (Phase 1)" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Once the two secrets are saved, **[run this workflow again](https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml)** with:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Input | Value |" >> $env:GITHUB_STEP_SUMMARY
            "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
            "| рҹҺҜ Environment | \`${{ inputs.environment }}\` |" >> $env:GITHUB_STEP_SUMMARY
            "| рҹ”‘ Setup Azure OIDC | \`true\` |" >> $env:GITHUB_STEP_SUMMARY
            "| в„№пёҸ Setup GitHub App | \`false\` (already done) |" >> $env:GITHUB_STEP_SUMMARY
            "| рҹ”‘ Configure GitHub Secrets | \`true\` |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> вң… The workflow will then automatically configure all \`AZUREAPPSERVICE_*\` environment secrets вҖ” **no further manual steps are needed**." >> $env:GITHUB_STEP_SUMMARY
          } elseif ($appSecretsOk) {
            "## вң… Phase 0 Complete вҖ” GitHub App Secrets Configured" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**GitHub App Name**: ``$appName``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "\`APP_ID\` and \`APP_PRIVATE_KEY\` are present. The workflow can use the GitHub App for automated secret management." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Next:** Run this workflow with \`Setup Azure OIDC = true\` and \`Configure GitHub Secrets = true\` to set up Azure credentials." >> $env:GITHUB_STEP_SUMMARY
          }

  # Optional: Trigger deployment workflows after successful bootstrap
  trigger-deployments:
    name: Trigger Deployments
    runs-on: ubuntu-latest
    needs: [summary]
    if: |
      !cancelled() &&
      (inputs.deployApi || inputs.deployUi) &&
      needs.summary.result != 'failure' &&
      needs.summary.result != 'cancelled'
    steps:
      - name: Trigger API Deployment
        if: inputs.deployApi
        uses: actions/github-script@v7
        env:
          TARGET_ENV: ${{ inputs.environment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-api-to-azure.yml',
              ref: context.ref
            });
            
            core.notice(`рҹҡҖ API deployment triggered for environment: ${process.env.TARGET_ENV}`);
            core.notice(`рҹ“Ӣ Branch: ${context.ref.replace('refs/heads/', '')}`);
            core.notice(`рҹ”— View workflow: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/deploy-api-to-azure.yml`);

      - name: Trigger UI Deployment
        if: inputs.deployUi
        uses: actions/github-script@v7
        env:
          TARGET_ENV: ${{ inputs.environment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-ui-to-azure.yml',
              ref: context.ref
            });
            
            core.notice(`рҹҡҖ UI deployment triggered for environment: ${process.env.TARGET_ENV}`);
            core.notice(`рҹ“Ӣ Branch: ${context.ref.replace('refs/heads/', '')}`);
            core.notice(`рҹ”— View workflow: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/deploy-ui-to-azure.yml`);

      - name: Add Deployment Summary
        if: always()
        run: |
          echo "## рҹҡҖ Deployment Triggers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.deployApi }}" == "true" ]; then
            echo "| API Deployment | вң… Triggered |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "рҹ”— [View API Deployment Runs](https://github.com/${{ github.repository }}/actions/workflows/deploy-api-to-azure.yml)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.deployUi }}" == "true" ]; then
            echo "| UI Deployment | вң… Triggered |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "рҹ”— [View UI Deployment Runs](https://github.com/${{ github.repository }}/actions/workflows/deploy-ui-to-azure.yml)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Deployments determine their target environment from the branch name." >> $GITHUB_STEP_SUMMARY
          echo "> The branch \`${{ github.ref_name }}\` corresponds to the \`${{ inputs.environment }}\` environment." >> $GITHUB_STEP_SUMMARY

