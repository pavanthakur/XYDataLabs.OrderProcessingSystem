  enable-validation:
    name: Enable Pre-Deployment Validation
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.enableValidation &&
      inputs.bootstrapInfra &&
      !cancelled() &&
      (needs.bootstrap-dev.result == 'success' || needs.bootstrap-dev.result == 'skipped') &&
      (needs.bootstrap-staging.result == 'success' || needs.bootstrap-staging.result == 'skipped') &&
      (needs.bootstrap-prod.result == 'success' || needs.bootstrap-prod.result == 'skipped')
    needs: [validate-inputs, bootstrap-dev, bootstrap-staging, bootstrap-prod]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Validation in Workflow
        run: |
          Write-Host "🔧 Enabling pre-deployment validation..." -ForegroundColor Cyan

          $workflowPath = ".github/workflows/infra-deploy.yml"
          $content = Get-Content $workflowPath -Raw

          # Re-enable pre-validate job
          $content = $content -replace 'if: false  # TODO: Enable after bootstrap - requires Azure OIDC setup', 'if: (github.event_name == ''push'') || (github.event_name == ''workflow_dispatch'' && !inputs.dryRun)'

          # Re-enable job dependency
          $content = $content -replace '# needs: pre-validate  # TODO: Uncomment after bootstrap', 'needs: pre-validate'

          Set-Content $workflowPath -Value $content -NoNewline

          Write-Host "✅ Validation enabled" -ForegroundColor Green

      - name: Commit Changes
        id: commit
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/infra-deploy.yml
          
          if (git diff --staged --quiet) {
            Write-Host "ℹ️  No changes detected - validation may already be enabled" -ForegroundColor Yellow
            exit 0
          }
          
          git commit -m "chore(ci): enable pre-deployment validation after bootstrap"
          git push
      
      - name: Handle Push Failure
        if: steps.commit.outcome == 'failure'
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Yellow
          Write-Host "║    WORKFLOW UPDATE REQUIRES MANUAL ACTION                     ║" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "⚠️  Unable to automatically update workflow file" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "GitHub's security model prevents workflows from modifying other workflow" -ForegroundColor White
          Write-Host "files using the default GITHUB_TOKEN for security reasons." -ForegroundColor White
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host "📋 MANUAL STEP REQUIRED (One-time, 2 minutes)" -ForegroundColor Cyan
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
          Write-Host ""
          Write-Host "To enable pre-deployment validation, make this change:" -ForegroundColor White
          Write-Host ""
          Write-Host "File: .github/workflows/infra-deploy.yml" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "In the pre-validate job, change:" -ForegroundColor Cyan
          Write-Host "  if: false  # TODO: Enable after bootstrap" -ForegroundColor Red
          Write-Host "to:" -ForegroundColor Cyan
          Write-Host "  if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && !inputs.dryRun)" -ForegroundColor Green
          Write-Host ""
          Write-Host "Also in the deploy job, uncomment:" -ForegroundColor Cyan
          Write-Host "  needs: pre-validate" -ForegroundColor Green
          Write-Host ""
          
          Write-Warning "Automatic workflow update failed. Please manually enable validation using the instructions above."

      - name: Create Completion Summary
        run: |
          $commitSuccess = "${{ steps.commit.outcome }}" -eq "success"
          
          "## ✅ Azure Bootstrap Complete!" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### 🎉 What's Ready" >> $env:GITHUB_STEP_SUMMARY
          "- ✅ Azure OIDC configured" >> $env:GITHUB_STEP_SUMMARY
          "- ✅ GitHub secrets configured" >> $env:GITHUB_STEP_SUMMARY
          "- ✅ Infrastructure bootstrapped (${{ inputs.environment }})" >> $env:GITHUB_STEP_SUMMARY
          
          if ($commitSuccess) {
            "- ✅ Pre-deployment validation enabled" >> $env:GITHUB_STEP_SUMMARY
          } else {
            "- ⚠️ Pre-deployment validation - **Manual step required** (see above)" >> $env:GITHUB_STEP_SUMMARY
          }
          
          "" >> $env:GITHUB_STEP_SUMMARY
          
          if (-not $commitSuccess) {
            "### ⚠️ Manual Step Required" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "To enable pre-deployment validation, edit ```.github/workflows/infra-deploy.yml```:" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "1. In the ``pre-validate`` job, change ``if: false`` to ``if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && !inputs.dryRun)``" >> $env:GITHUB_STEP_SUMMARY
            "2. In the ``deploy`` job, uncomment the line ``needs: pre-validate``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "See detailed instructions in the logs above." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }
          
          "### 🚀 Next Steps" >> $env:GITHUB_STEP_SUMMARY
          "1. Push code changes to trigger deployment workflow" >> $env:GITHUB_STEP_SUMMARY
          "2. Monitor deployments at: [Actions](https://github.com/pavanthakur/XYDataLabs.OrderProcessingSystem/actions)" >> $env:GITHUB_STEP_SUMMARY
          "3. View resources in [Azure Portal](https://portal.azure.com)" >> $env:GITHUB_STEP_SUMMARY

  summary:
    name: Bootstrap Summary
    if: always() && github.event_name == 'workflow_dispatch'
    needs: [setup-oidc, configure-github-secrets, pre-validate-prerequisites, bootstrap-dev, bootstrap-staging, bootstrap-prod, enable-validation]
    runs-on: windows-latest
    steps:
      - name: Generate Summary
        run: |
          "## 📊 Bootstrap Workflow Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### 📋 User Configuration" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Parameter | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🎯 Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 1️⃣ Setup OIDC | ``${{ inputs.setupOidc }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 2️⃣ Setup GitHub App | ``${{ inputs.setupGitHubApp }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 3️⃣ Configure Secrets | ``${{ inputs.configureSecrets }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔍 Pre-Flight Validation | ``${{ inputs.enableValidation }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 4️⃣ Bootstrap Infrastructure | ``${{ inputs.bootstrapInfra }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 5️⃣ Deploy API | ``${{ inputs.deployApi }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 6️⃣ Deploy UI | ``${{ inputs.deployUi }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### ✅ Job Execution Results" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Job | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|-----|--------|" >> $env:GITHUB_STEP_SUMMARY

          $setupOidc = "${{ needs.setup-oidc.result }}"
          $configSecrets = "${{ needs.configure-github-secrets.result }}"
          $preValidate = "${{ needs.pre-validate-prerequisites.result }}"
          $bootstrapDev = "${{ needs.bootstrap-dev.result }}"
          $bootstrapStaging = "${{ needs.bootstrap-staging.result }}"
          $bootstrapProd = "${{ needs.bootstrap-prod.result }}"
          $enableVal = "${{ needs.enable-validation.result }}"

          "| Step | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|------|--------|" >> $env:GITHUB_STEP_SUMMARY

          if ($setupOidc -ne "") {
            $icon = if ($setupOidc -eq "success") { "✅" } else { "❌" }
            "| Setup OIDC | $icon $setupOidc |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($configSecrets -ne "") {
            $icon = if ($configSecrets -eq "success") { "✅" } else { "❌" }
            "| Configure Secrets | $icon $configSecrets |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($preValidate -ne "") {
            $icon = if ($preValidate -eq "success") { "✅" } elseif ($preValidate -eq "skipped") { "⏭️" } else { "❌" }
            "| Pre-Validate Prerequisites | $icon $preValidate |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapDev -ne "") {
            $icon = if ($bootstrapDev -eq "success") { "✅" } elseif ($bootstrapDev -eq "skipped") { "⏭️" } else { "❌" }
            "| Bootstrap Dev | $icon $bootstrapDev |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapStaging -ne "") {
            $icon = if ($bootstrapStaging -eq "success") { "✅" } elseif ($bootstrapStaging -eq "skipped") { "⏭️" } else { "❌" }
            "| Bootstrap Staging | $icon $bootstrapStaging |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapProd -ne "") {
            $icon = if ($bootstrapProd -eq "success") { "✅" } elseif ($bootstrapProd -eq "skipped") { "⏭️" } else { "❌" }
            "| Bootstrap Prod | $icon $bootstrapProd |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($enableVal -ne "") {
            $icon = if ($enableVal -eq "success") { "✅" } elseif ($enableVal -eq "skipped") { "⏭️" } else { "❌" }
            "| Enable Validation | $icon $enableVal |" >> $env:GITHUB_STEP_SUMMARY
          }

  # Optional: Trigger deployment workflows after successful bootstrap
  trigger-deployments:
    name: Trigger Deployments
    runs-on: ubuntu-latest
    needs: [summary]
    if: |
      !cancelled() &&
      (inputs.deployApi || inputs.deployUi) &&
      needs.summary.result != 'failure' &&
      needs.summary.result != 'cancelled'
    steps:
      - name: Trigger API Deployment
        if: inputs.deployApi
        uses: actions/github-script@v7
        env:
          TARGET_ENV: ${{ inputs.environment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-api-to-azure.yml',
              ref: context.ref
            });
            
            core.notice(`🚀 API deployment triggered for environment: ${process.env.TARGET_ENV}`);
            core.notice(`📋 Branch: ${context.ref.replace('refs/heads/', '')}`);
            core.notice(`🔗 View workflow: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/deploy-api-to-azure.yml`);

      - name: Trigger UI Deployment
        if: inputs.deployUi
        uses: actions/github-script@v7
        env:
          TARGET_ENV: ${{ inputs.environment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-ui-to-azure.yml',
              ref: context.ref
            });
            
            core.notice(`🚀 UI deployment triggered for environment: ${process.env.TARGET_ENV}`);
            core.notice(`📋 Branch: ${context.ref.replace('refs/heads/', '')}`);
            core.notice(`🔗 View workflow: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/deploy-ui-to-azure.yml`);

      - name: Add Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Triggers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target Environment:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.deployApi }}" == "true" ]; then
            echo "| API Deployment | ✅ Triggered |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View API Deployment Runs](https://github.com/${{ github.repository }}/actions/workflows/deploy-api-to-azure.yml)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.deployUi }}" == "true" ]; then
            echo "| UI Deployment | ✅ Triggered |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View UI Deployment Runs](https://github.com/${{ github.repository }}/actions/workflows/deploy-ui-to-azure.yml)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Deployments determine their target environment from the branch name." >> $GITHUB_STEP_SUMMARY
          echo "> The branch \`${{ github.ref_name }}\` corresponds to the \`${{ inputs.environment }}\` environment." >> $GITHUB_STEP_SUMMARY

