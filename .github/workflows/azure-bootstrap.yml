  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE X — CLEANUP JOBS (DESTRUCTIVE)
  # Deletes App Services individually, then the entire Resource Group.
  # Uses same OIDC credential pattern as bootstrap jobs.
  # ─────────────────────────────────────────────────────────────────────────────

  cleanup-dev:
    name: Cleanup Dev Environment
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.cleanupInfra &&
      (inputs.environment == 'dev' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: dev
    env:
      CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        timeout-minutes: 3
        uses: azure/login@v3
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Cleanup Dev Infrastructure
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║   ⚠️  CLEANUP DEV INFRASTRUCTURE — DESTRUCTIVE OPERATION      ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""

          $env         = 'dev'
          $baseName    = 'orderprocessing'
          $githubOwner = '${{ github.repository_owner }}'
          $rg          = "rg-$baseName-$env"
          $apiApp      = "$githubOwner-$baseName-api-xyapp-$env"
          $uiApp       = "$githubOwner-$baseName-ui-xyapp-$env"

          Write-Host "📋 Resources targeted for deletion:" -ForegroundColor Yellow
          Write-Host "  Resource Group : $rg" -ForegroundColor Gray
          Write-Host "  UI App Service : $uiApp" -ForegroundColor Gray
          Write-Host "  API App Service: $apiApp" -ForegroundColor Gray
          Write-Host "  All remaining resources (SQL, Key Vault, App Insights, ASP) deleted with Resource Group" -ForegroundColor Gray
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

          function Remove-AppService {
            param([string]$AppName, [string]$ResourceGroup)
            Write-Host ""
            Write-Host "  🗑️  Deleting App Service: $AppName..." -ForegroundColor Yellow
            $exists = az webapp show --name $AppName --resource-group $ResourceGroup --query "name" -o tsv 2>$null
            if ($LASTEXITCODE -eq 0 -and $exists) {
              az webapp stop --name $AppName --resource-group $ResourceGroup 2>$null
              az webapp delete --name $AppName --resource-group $ResourceGroup --keep-empty-plan 2>$null
              if ($LASTEXITCODE -eq 0) { Write-Host "  ✅ $AppName deleted." -ForegroundColor Green }
              else { Write-Host "  ⚠️  $AppName deletion returned exit code $LASTEXITCODE." -ForegroundColor Yellow }
            } else {
              Write-Host "  ⚠️  $AppName not found — already deleted or never created." -ForegroundColor Yellow
            }
          }

          # Step 1: Delete UI App Service
          Remove-AppService -AppName $uiApp -ResourceGroup $rg

          # Step 2: Delete API App Service
          Remove-AppService -AppName $apiApp -ResourceGroup $rg

          # Step 3: Delete Resource Group (removes SQL, Key Vault, App Insights, ASP, and everything else)
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "  🗑️  Deleting Resource Group ($rg)..." -ForegroundColor Red
          $rgExists = az group exists --name $rg 2>$null
          if ($rgExists -eq "true") {
            az group delete --name $rg --yes --no-wait
            Write-Host "  ✅ Resource Group deletion initiated (background). All remaining resources will be removed." -ForegroundColor Green
          } else {
            Write-Host "  ⚠️  Resource Group $rg not found — already deleted or never created." -ForegroundColor Yellow
          }

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
          Write-Host "✅ DEV CLEANUP COMPLETE — End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Green
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green

  cleanup-staging:
    name: Cleanup Staging Environment
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.cleanupInfra &&
      (inputs.environment == 'staging' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: staging
    env:
      CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        timeout-minutes: 3
        uses: azure/login@v3
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Cleanup Staging Infrastructure
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║ ⚠️  CLEANUP STAGING INFRASTRUCTURE — DESTRUCTIVE OPERATION    ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""

          $env         = 'stg'
          $baseName    = 'orderprocessing'
          $githubOwner = '${{ github.repository_owner }}'
          $rg          = "rg-$baseName-$env"
          $apiApp      = "$githubOwner-$baseName-api-xyapp-$env"
          $uiApp       = "$githubOwner-$baseName-ui-xyapp-$env"

          Write-Host "📋 Resources targeted for deletion:" -ForegroundColor Yellow
          Write-Host "  Resource Group : $rg" -ForegroundColor Gray
          Write-Host "  UI App Service : $uiApp" -ForegroundColor Gray
          Write-Host "  API App Service: $apiApp" -ForegroundColor Gray
          Write-Host "  All remaining resources (SQL, Key Vault, App Insights, ASP) deleted with Resource Group" -ForegroundColor Gray
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

          function Remove-AppService {
            param([string]$AppName, [string]$ResourceGroup)
            Write-Host ""
            Write-Host "  🗑️  Deleting App Service: $AppName..." -ForegroundColor Yellow
            $exists = az webapp show --name $AppName --resource-group $ResourceGroup --query "name" -o tsv 2>$null
            if ($LASTEXITCODE -eq 0 -and $exists) {
              az webapp stop --name $AppName --resource-group $ResourceGroup 2>$null
              az webapp delete --name $AppName --resource-group $ResourceGroup --keep-empty-plan 2>$null
              if ($LASTEXITCODE -eq 0) { Write-Host "  ✅ $AppName deleted." -ForegroundColor Green }
              else { Write-Host "  ⚠️  $AppName deletion returned exit code $LASTEXITCODE." -ForegroundColor Yellow }
            } else {
              Write-Host "  ⚠️  $AppName not found — already deleted or never created." -ForegroundColor Yellow
            }
          }

          Remove-AppService -AppName $uiApp  -ResourceGroup $rg
          Remove-AppService -AppName $apiApp -ResourceGroup $rg

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "  🗑️  Deleting Resource Group ($rg)..." -ForegroundColor Red
          $rgExists = az group exists --name $rg 2>$null
          if ($rgExists -eq "true") {
            az group delete --name $rg --yes --no-wait
            Write-Host "  ✅ Resource Group deletion initiated (background). All remaining resources will be removed." -ForegroundColor Green
          } else {
            Write-Host "  ⚠️  Resource Group $rg not found — already deleted or never created." -ForegroundColor Yellow
          }

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
          Write-Host "✅ STAGING CLEANUP COMPLETE — End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Green
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green

  cleanup-prod:
    name: Cleanup Production Environment
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.cleanupInfra &&
      (inputs.environment == 'prod' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: prod
    env:
      CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        timeout-minutes: 3
        uses: azure/login@v3
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Cleanup Production Infrastructure
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║ ⚠️  CLEANUP PROD INFRASTRUCTURE — DESTRUCTIVE OPERATION       ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""

          $env         = 'prod'
          $baseName    = 'orderprocessing'
          $githubOwner = '${{ github.repository_owner }}'
          $rg          = "rg-$baseName-$env"
          $apiApp      = "$githubOwner-$baseName-api-xyapp-$env"
          $uiApp       = "$githubOwner-$baseName-ui-xyapp-$env"

          Write-Host "📋 Resources targeted for deletion:" -ForegroundColor Yellow
          Write-Host "  Resource Group : $rg" -ForegroundColor Gray
          Write-Host "  UI App Service : $uiApp" -ForegroundColor Gray
          Write-Host "  API App Service: $apiApp" -ForegroundColor Gray
          Write-Host "  All remaining resources (SQL, Key Vault, App Insights, ASP) deleted with Resource Group" -ForegroundColor Gray
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray

          function Remove-AppService {
            param([string]$AppName, [string]$ResourceGroup)
            Write-Host ""
            Write-Host "  🗑️  Deleting App Service: $AppName..." -ForegroundColor Yellow
            $exists = az webapp show --name $AppName --resource-group $ResourceGroup --query "name" -o tsv 2>$null
            if ($LASTEXITCODE -eq 0 -and $exists) {
              az webapp stop --name $AppName --resource-group $ResourceGroup 2>$null
              az webapp delete --name $AppName --resource-group $ResourceGroup --keep-empty-plan 2>$null
              if ($LASTEXITCODE -eq 0) { Write-Host "  ✅ $AppName deleted." -ForegroundColor Green }
              else { Write-Host "  ⚠️  $AppName deletion returned exit code $LASTEXITCODE." -ForegroundColor Yellow }
            } else {
              Write-Host "  ⚠️  $AppName not found — already deleted or never created." -ForegroundColor Yellow
            }
          }

          Remove-AppService -AppName $uiApp  -ResourceGroup $rg
          Remove-AppService -AppName $apiApp -ResourceGroup $rg

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor DarkGray
          Write-Host "  🗑️  Deleting Resource Group ($rg)..." -ForegroundColor Red
          $rgExists = az group exists --name $rg 2>$null
          if ($rgExists -eq "true") {
            az group delete --name $rg --yes --no-wait
            Write-Host "  ✅ Resource Group deletion initiated (background). All remaining resources will be removed." -ForegroundColor Green
          } else {
            Write-Host "  ⚠️  Resource Group $rg not found — already deleted or never created." -ForegroundColor Yellow
          }

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
          Write-Host "✅ PROD CLEANUP COMPLETE — End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Green
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green

  summary:
    name: Bootstrap Summary
    if: always() && github.event_name == 'workflow_dispatch'
    needs: [validate-inputs, bootstrap-dev, bootstrap-staging, bootstrap-prod, cleanup-dev, cleanup-staging, cleanup-prod, trigger-deployments]
    runs-on: windows-latest
    steps:
      - name: Generate Summary
        env:
          API_RUN_NUMBER: ${{ needs.trigger-deployments.outputs.api_run_number }}
          API_RUN_URL: ${{ needs.trigger-deployments.outputs.api_run_url }}
          UI_RUN_NUMBER: ${{ needs.trigger-deployments.outputs.ui_run_number }}
          UI_RUN_URL: ${{ needs.trigger-deployments.outputs.ui_run_url }}
          API_URL: ${{ needs.trigger-deployments.outputs.api_url }}
          UI_URL: ${{ needs.trigger-deployments.outputs.ui_url }}
          DEPLOY_ERRORS: ${{ needs.trigger-deployments.outputs.errors }}
        run: |
          "## 📊 Bootstrap Workflow Summary" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### 📋 User Configuration" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Parameter | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|-----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🎯 Environment | ``${{ inputs.environment }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🏗️ Bootstrap Infrastructure | ``${{ inputs.bootstrapInfra }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔄 Deploy API | ``${{ inputs.deployApi }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| 🔄 Deploy UI | ``${{ inputs.deployUi }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "| ⚠️ [Phase X] Cleanup Infrastructure | ``${{ inputs.cleanupInfra }}`` |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          
          "### ✅ Job Execution Results" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          $validateInputs      = "${{ needs.validate-inputs.result }}"
          $bootstrapDev        = "${{ needs.bootstrap-dev.result }}"
          $bootstrapStaging    = "${{ needs.bootstrap-staging.result }}"
          $bootstrapProd       = "${{ needs.bootstrap-prod.result }}"
          $cleanupDev          = "${{ needs.cleanup-dev.result }}"
          $cleanupStaging      = "${{ needs.cleanup-staging.result }}"
          $cleanupProd         = "${{ needs.cleanup-prod.result }}"
          $triggerDeployments  = "${{ needs.trigger-deployments.result }}"

          "| Step | Status |" >> $env:GITHUB_STEP_SUMMARY
          "|------|--------|" >> $env:GITHUB_STEP_SUMMARY

          if ($validateInputs -ne "") {
            $icon = if ($validateInputs -eq "success") { "✅" } elseif ($validateInputs -eq "skipped") { "⏭️" } else { "❌" }
            "| Validate Inputs | $icon $validateInputs |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapDev -ne "") {
            $icon = if ($bootstrapDev -eq "success") { "✅" } elseif ($bootstrapDev -eq "skipped") { "⏭️" } else { "❌" }
            "| Bootstrap Dev | $icon $bootstrapDev |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapStaging -ne "") {
            $icon = if ($bootstrapStaging -eq "success") { "✅" } elseif ($bootstrapStaging -eq "skipped") { "⏭️" } else { "❌" }
            "| Bootstrap Staging | $icon $bootstrapStaging |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($bootstrapProd -ne "") {
            $icon = if ($bootstrapProd -eq "success") { "✅" } elseif ($bootstrapProd -eq "skipped") { "⏭️" } else { "❌" }
            "| Bootstrap Prod | $icon $bootstrapProd |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($cleanupDev -ne "") {
            $icon = if ($cleanupDev -eq "success") { "✅" } elseif ($cleanupDev -eq "skipped") { "⏭️" } else { "❌" }
            "| ⚠️ Cleanup Dev | $icon $cleanupDev |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($cleanupStaging -ne "") {
            $icon = if ($cleanupStaging -eq "success") { "✅" } elseif ($cleanupStaging -eq "skipped") { "⏭️" } else { "❌" }
            "| ⚠️ Cleanup Staging | $icon $cleanupStaging |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($cleanupProd -ne "") {
            $icon = if ($cleanupProd -eq "success") { "✅" } elseif ($cleanupProd -eq "skipped") { "⏭️" } else { "❌" }
            "| ⚠️ Cleanup Prod | $icon $cleanupProd |" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($triggerDeployments -ne "") {
            $icon = if ($triggerDeployments -eq "success") { "✅" } elseif ($triggerDeployments -eq "skipped") { "⏭️" } else { "❌" }
            "| 🚀 Trigger Deployments | $icon $triggerDeployments |" >> $env:GITHUB_STEP_SUMMARY
          }

          "" >> $env:GITHUB_STEP_SUMMARY

          $deployApi = '${{ inputs.deployApi }}' -eq 'true'
          $deployUi  = '${{ inputs.deployUi }}'  -eq 'true'

          if ($deployApi -or $deployUi) {
            # Deployment detail section — shown whenever deploy inputs were selected
            "" >> $env:GITHUB_STEP_SUMMARY
            "### 🚀 Deployment Detail" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Service | Selected | Run | Status |" >> $env:GITHUB_STEP_SUMMARY
            "|---------|----------|-----|--------|" >> $env:GITHUB_STEP_SUMMARY

            if ($deployApi) {
              $apiRunNum = $env:API_RUN_NUMBER
              $apiRunUrl = $env:API_RUN_URL
              $apiStatus = if ($apiRunNum) { "✅ success" } elseif ($triggerDeployments -eq "skipped") { "⏭️ skipped" } else { "❌ failed" }
              $apiRun    = if ($apiRunUrl) { "[#$apiRunNum]($apiRunUrl)" } else { "—" }
              "| API | ✅ yes | $apiRun | $apiStatus |" >> $env:GITHUB_STEP_SUMMARY
            } else {
              "| API | ➖ no | — | — |" >> $env:GITHUB_STEP_SUMMARY
            }

            if ($deployUi) {
              $uiRunNum = $env:UI_RUN_NUMBER
              $uiRunUrl = $env:UI_RUN_URL
              $uiStatus = if ($uiRunNum) { "✅ success" } elseif ($triggerDeployments -eq "skipped") { "⏭️ skipped" } else { "❌ failed" }
              $uiRun    = if ($uiRunUrl) { "[#$uiRunNum]($uiRunUrl)" } else { "—" }
              "| UI  | ✅ yes | $uiRun | $uiStatus |" >> $env:GITHUB_STEP_SUMMARY
            } else {
              "| UI  | ➖ no | — | — |" >> $env:GITHUB_STEP_SUMMARY
            }

            "" >> $env:GITHUB_STEP_SUMMARY

            # Endpoint URLs — only when at least one deploy succeeded
            $apiUrl = $env:API_URL
            $uiUrl  = $env:UI_URL
            if ($apiUrl -or $uiUrl) {
              "#### 🔗 Deployed Endpoints" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Service | URL |" >> $env:GITHUB_STEP_SUMMARY
              "|---------|-----|" >> $env:GITHUB_STEP_SUMMARY
              if ($apiUrl) { "| API (Swagger) | [$apiUrl]($apiUrl) |" >> $env:GITHUB_STEP_SUMMARY }
              if ($uiUrl)  { "| UI            | [$uiUrl]($uiUrl)   |" >> $env:GITHUB_STEP_SUMMARY }
              "" >> $env:GITHUB_STEP_SUMMARY
            }

            # Error detail — surfaces the dispatch error message inline
            $deployErrors = $env:DEPLOY_ERRORS
            if ($deployErrors) {
              "> [!CAUTION]" >> $env:GITHUB_STEP_SUMMARY
              "> **Deployment errors:**" >> $env:GITHUB_STEP_SUMMARY
              $deployErrors -split "`n" | ForEach-Object { "> $_" >> $env:GITHUB_STEP_SUMMARY }
              "" >> $env:GITHUB_STEP_SUMMARY
            }

            "### 🧭 Manual Follow-Up" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> Review [.github/prompts/README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/.github/prompts/README.md) for required post-deploy prompts and manual follow-up steps." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }
          "### 🏗️ What Gets Created Automatically" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Resource | Automated? | Trigger |" >> $env:GITHUB_STEP_SUMMARY
          "|----------|-----------|---------|" >> $env:GITHUB_STEP_SUMMARY
          "| 🔑 OIDC + GitHub Secrets | ✅ Prerequisite | 'Azure Initial Setup' workflow |" >> $env:GITHUB_STEP_SUMMARY
          "| ☁️ Azure Resource Groups + App Services | ✅ Yes | Bootstrap Infrastructure = true |" >> $env:GITHUB_STEP_SUMMARY
          "| 🗄️ Azure SQL Database | ✅ Yes | Bootstrap Infrastructure = true |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### 🗑️ What Can Be Safely Deleted and Re-Created" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Resource | Can Delete? | Notes |" >> $env:GITHUB_STEP_SUMMARY
          "|----------|------------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| GitHub Environments + OIDC Secrets | ✅ Yes | Re-created by 'Azure Initial Setup' workflow |" >> $env:GITHUB_STEP_SUMMARY
          "| APP_ID + APP_PRIVATE_KEY secrets | ⚠️ Caution | Must re-run setup-github-app-from-manifest.ps1 after deletion |" >> $env:GITHUB_STEP_SUMMARY
          "| Azure Resource Groups | ⚠️ Caution | Re-created by Bootstrap Infrastructure, but destroys all resources |" >> $env:GITHUB_STEP_SUMMARY

          "" >> $env:GITHUB_STEP_SUMMARY
          "---" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          # Show failure diagnosis when validate-inputs failed
          if ($validateInputs -eq "failure") {
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "## ❌ Validate Inputs Failed — Cause and Remediation" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY

            $branch = "${{ github.ref_name }}"
            $env    = "${{ inputs.environment }}"
            $expectedBranch = if ($env -eq "prod") { "main" } elseif ($env -eq "all") { "any" } else { $env }
            $isMismatch = ($env -ne "all") -and ($branch -ne $expectedBranch)

            if ($isMismatch) {
              "### 🌿 Branch / Environment Mismatch" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Field | Value |" >> $env:GITHUB_STEP_SUMMARY
              "|-------|-------|" >> $env:GITHUB_STEP_SUMMARY
              "| Current branch | ``$branch`` |" >> $env:GITHUB_STEP_SUMMARY
              "| Target environment | ``$env`` |" >> $env:GITHUB_STEP_SUMMARY
              "| Required branch | ``$expectedBranch`` |" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "> ❌ **You ran this workflow from the ``$branch`` branch but selected environment ``$env``.**" >> $env:GITHUB_STEP_SUMMARY
              "> Each environment must be deployed from its matching branch." >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "### ✅ How to Fix" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Step | Action |" >> $env:GITHUB_STEP_SUMMARY
              "|------|--------|" >> $env:GITHUB_STEP_SUMMARY
              "| 1 | Go to **[Actions → Azure Bootstrap & Deploy → Run workflow](https://github.com/${{ github.repository }}/actions/workflows/azure-bootstrap.yml)** |" >> $env:GITHUB_STEP_SUMMARY
              "| 2 | In **'Use workflow from'** — switch branch to **``$expectedBranch``** |" >> $env:GITHUB_STEP_SUMMARY
              "| 3 | Set **Environment** to **``$env``** |" >> $env:GITHUB_STEP_SUMMARY
              "| 4 | Click **Run workflow** |" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "**Branch → Environment convention:**" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Branch | Environment |" >> $env:GITHUB_STEP_SUMMARY
              "|--------|-------------|" >> $env:GITHUB_STEP_SUMMARY
              "| ``dev`` | ``dev`` |" >> $env:GITHUB_STEP_SUMMARY
              "| ``staging`` | ``staging`` |" >> $env:GITHUB_STEP_SUMMARY
              "| ``main`` | ``prod`` |" >> $env:GITHUB_STEP_SUMMARY
            } else {
              "### 🔐 OIDC Secrets Missing" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "> The ``AZUREAPPSERVICE_CLIENTID``, ``AZUREAPPSERVICE_TENANTID``, or ``AZUREAPPSERVICE_SUBSCRIPTIONID`` secrets are not configured for the **``$env``** environment." >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "### ✅ How to Fix — Run the 'Azure Initial Setup' Workflow" >> $env:GITHUB_STEP_SUMMARY
              "" >> $env:GITHUB_STEP_SUMMARY
              "| Step | Action |" >> $env:GITHUB_STEP_SUMMARY
              "|------|--------|" >> $env:GITHUB_STEP_SUMMARY
              "| 1 | Go to **[Actions → Azure Initial Setup → Run workflow](https://github.com/${{ github.repository }}/actions/workflows/azure-initial-setup.yml)** |" >> $env:GITHUB_STEP_SUMMARY
              "| 2 | All defaults are correct (environment=``all``, OIDC + secrets enabled) |" >> $env:GITHUB_STEP_SUMMARY
              "| 3 | Click **Run workflow** and wait for completion, then re-run this workflow |" >> $env:GITHUB_STEP_SUMMARY
            }
          }

          # Show failure diagnosis when any bootstrap job failed
          $anyBootstrapFailed = ($bootstrapDev -eq "failure") -or ($bootstrapStaging -eq "failure") -or ($bootstrapProd -eq "failure")

          if ($anyBootstrapFailed) {
            "" >> $env:GITHUB_STEP_SUMMARY
            "---" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "## ❌ Bootstrap Failed — Likely Cause and Remediation" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Failed Job | Most Likely Cause |" >> $env:GITHUB_STEP_SUMMARY
            "|-----------|------------------|" >> $env:GITHUB_STEP_SUMMARY
            if ($bootstrapDev -eq "failure") {
              "| Bootstrap Dev | Azure AD federated credential for \`environment:dev\` is missing in the App Registration |" >> $env:GITHUB_STEP_SUMMARY
            }
            if ($bootstrapStaging -eq "failure") {
              "| Bootstrap Staging | Azure AD federated credential for \`environment:staging\` is missing in the App Registration |" >> $env:GITHUB_STEP_SUMMARY
            }
            if ($bootstrapProd -eq "failure") {
              "| Bootstrap Prod | Azure AD federated credential for \`environment:prod\` is missing in the App Registration |" >> $env:GITHUB_STEP_SUMMARY
            }
            "" >> $env:GITHUB_STEP_SUMMARY
            "> **Typical error**: ``AADSTS700213: No matching federated identity record found for presented assertion subject 'repo:${{ github.repository }}:environment:ENV'``" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "**Root cause**: The 'Azure Initial Setup' workflow was not run for this environment, or was only run for ``dev`` (not ``all``). The GitHub OIDC secrets exist but the matching federated credential is absent from your Azure AD App Registration." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "### ✅ How to Fix — Run the 'Azure Initial Setup' Workflow" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "| Step | Action |" >> $env:GITHUB_STEP_SUMMARY
            "|------|--------|" >> $env:GITHUB_STEP_SUMMARY
            "| 1 | Go to **[Actions → Azure Initial Setup → Run workflow](https://github.com/${{ github.repository }}/actions/workflows/azure-initial-setup.yml)** |" >> $env:GITHUB_STEP_SUMMARY
            "| 2 | All defaults are correct (environment=``all``, OIDC + secrets enabled) |" >> $env:GITHUB_STEP_SUMMARY
            "| 3 | Click **Run workflow** and wait for completion |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "> After initial setup completes successfully, re-run this workflow." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }

  # Trigger deployment workflows — ONLY after bootstrap succeeds for the target environment.
  # When bootstrapInfra is selected, the relevant bootstrap job(s) must succeed before
  # API/UI deployments are dispatched. This prevents deploying to environments where
  # OIDC setup was never completed. When bootstrapInfra is NOT selected
  # (deploy-only run), deployments proceed without bootstrap checks.
  trigger-deployments:
    name: Trigger Deployments
    runs-on: ubuntu-latest
    needs: [bootstrap-dev, bootstrap-staging, bootstrap-prod]
    outputs:
      api_run_url:    ${{ steps.dispatch.outputs.api_run_url }}
      api_run_number: ${{ steps.dispatch.outputs.api_run_number }}
      ui_run_url:     ${{ steps.dispatch.outputs.ui_run_url }}
      ui_run_number:  ${{ steps.dispatch.outputs.ui_run_number }}
      api_url:        ${{ steps.dispatch.outputs.api_url }}
      ui_url:         ${{ steps.dispatch.outputs.ui_url }}
      errors:         ${{ steps.dispatch.outputs.errors }}
    if: |
      !cancelled() &&
      (inputs.deployApi || inputs.deployUi) &&
      (
        inputs.bootstrapInfra != true ||
        (inputs.environment == 'dev' && needs.bootstrap-dev.result == 'success') ||
        (inputs.environment == 'staging' && needs.bootstrap-staging.result == 'success') ||
        (inputs.environment == 'prod' && needs.bootstrap-prod.result == 'success') ||
        (
          inputs.environment == 'all' &&
          needs.bootstrap-dev.result == 'success' &&
          needs.bootstrap-staging.result == 'success' &&
          needs.bootstrap-prod.result == 'success'
        )
      )
    steps:
      - name: Dispatch and Await Deployments
        id: dispatch
        if: inputs.environment != 'all'
        uses: actions/github-script@v8
        env:
          DEPLOY_API: ${{ inputs.deployApi }}
          DEPLOY_UI:  ${{ inputs.deployUi }}
          TARGET_ENV: ${{ inputs.environment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployApi = process.env.DEPLOY_API === 'true';
            const deployUi  = process.env.DEPLOY_UI  === 'true';
            const targetEnv = process.env.TARGET_ENV;
            const ref       = context.ref;
            const branch    = ref.replace('refs/heads/', '');

            // Dispatch a workflow and poll until it reaches 'completed' status.
            // Returns the final run object. Throws on timeout or non-success conclusion.
            async function dispatchAndAwait(workflowId) {
              const dispatchedAt = new Date();

              core.info(`🚀 Dispatching ${workflowId} on branch '${branch}'...`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: workflowId,
                ref:   ref
              });

              // Poll until the newly-created run appears (up to 3 min, every 5 s).
              // GitHub can take >90 s to surface a new run in the list API.
              let run = null;
              for (let i = 0; i < 36; i++) {
                await new Promise(r => setTimeout(r, 5000));
                const res = await github.rest.actions.listWorkflowRuns({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  workflow_id: workflowId,
                  branch:      branch,
                  event:       'workflow_dispatch',
                  per_page:    5
                });
                run = res.data.workflow_runs.find(r => new Date(r.created_at) >= dispatchedAt);
                if (run) { core.info(`  [${workflowId}] Found run #${run.run_number}: ${run.html_url}`); break; }
              }
              if (!run) throw new Error(`[${workflowId}] Run not found within 3 minutes of dispatch`);

              // Poll until complete (every 15 s, max 25 min = 100 attempts)
              for (let i = 0; i < 100 && run.status !== 'completed'; i++) {
                core.info(`  [${workflowId}] status=${run.status} (${i * 15} s elapsed)...`);
                await new Promise(r => setTimeout(r, 15000));
                const updated = await github.rest.actions.getWorkflowRun({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  run_id: run.id
                });
                run = updated.data;
              }

              if (run.status !== 'completed') {
                throw new Error(`[${workflowId}] Timed out after 25 minutes. Run: ${run.html_url}`);
              }
              if (run.conclusion !== 'success') {
                throw new Error(`[${workflowId}] Completed with conclusion '${run.conclusion}'. Run: ${run.html_url}`);
              }

              core.notice(`✅ ${workflowId} succeeded: ${run.html_url}`);
              return run;
            }

            // Dispatch API and UI in parallel; wait for both before reporting results
            const tasks = [];
            if (deployApi) tasks.push({ label: 'API', id: 'deploy-api-to-azure.yml' });
            if (deployUi)  tasks.push({ label: 'UI',  id: 'deploy-ui-to-azure.yml'  });

            const settled = await Promise.allSettled(tasks.map(t => dispatchAndAwait(t.id)));

            let apiRun = null, uiRun = null;
            const errors = [];
            settled.forEach((result, i) => {
              const label = tasks[i].label;
              if (result.status === 'fulfilled') {
                if (label === 'API') apiRun = result.value;
                else                 uiRun  = result.value;
              } else {
                errors.push(result.reason.message);
                core.error(`❌ ${label} deployment failed: ${result.reason.message}`);
              }
            });

            // Build Azure app URLs (staging env uses 'stg' suffix in resource names)
            const owner     = context.repo.owner.toLowerCase();
            const envSuffix = targetEnv === 'staging' ? 'stg' : targetEnv;
            const apiUrl    = `https://${owner}-orderprocessing-api-xyapp-${envSuffix}.azurewebsites.net/swagger`;
            const uiUrl     = `https://${owner}-orderprocessing-ui-xyapp-${envSuffix}.azurewebsites.net`;

            // Expose outputs so the Bootstrap Summary job can embed run links and URLs
            if (deployApi) {
              core.setOutput('api_run_url',    apiRun ? apiRun.html_url    : '');
              core.setOutput('api_run_number', apiRun ? String(apiRun.run_number) : '');
            }
            if (deployUi) {
              core.setOutput('ui_run_url',     uiRun ? uiRun.html_url     : '');
              core.setOutput('ui_run_number',  uiRun ? String(uiRun.run_number)  : '');
            }
            core.setOutput('api_url', deployApi ? apiUrl : '');
            core.setOutput('ui_url',  deployUi  ? uiUrl  : '');
            core.setOutput('errors',  errors.join('\n'));

            if (errors.length > 0) {
              core.setFailed(`One or more deployments failed:\n${errors.join('\n')}`);
            }

      - name: environment=all notice
        if: inputs.environment == 'all'
        run: |
          echo "ℹ️ environment=all is infrastructure-only. Deploy each environment separately from its own branch." >> $GITHUB_STEP_SUMMARY

