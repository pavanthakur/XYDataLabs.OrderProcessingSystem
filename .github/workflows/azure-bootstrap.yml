            }
            
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host "✅ APPLICATION INSIGHTS VERIFIED SUCCESSFULLY" -ForegroundColor Green
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host ""
            Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING APP INSIGHTS VERIFICATION" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Host "Stack Trace:" -ForegroundColor Yellow
            Write-Host "$($_.ScriptStackTrace)" -ForegroundColor Gray
            Write-Host ""
            Write-Error "App Insights verification failed with exception: $($_.Exception.Message)"
            exit 1
          }

      - name: Configure App Service Environment
        if: success()
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      CONFIGURE APP SERVICE ENVIRONMENT FOR STAGING            ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "⚙️  Configuring ASPNETCORE_ENVIRONMENT for staging environment..." -ForegroundColor Cyan
            Write-Host ""
            
            ./Resources/Azure-Deployment/configure-app-environment.ps1 -Environment staging -BaseName orderprocessing -GitHubOwner ${{ github.repository_owner }}
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ APP SERVICE ENVIRONMENT CONFIGURATION FAILED" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "Exit Code: $LASTEXITCODE" -ForegroundColor Red
              Write-Host "Script: ./Resources/Azure-Deployment/configure-app-environment.ps1" -ForegroundColor Gray
              Write-Host ""
              Write-Host "⚠️  WARNING: Applications may not detect the correct environment" -ForegroundColor Yellow
              Write-Host ""
              Write-Error "Environment configuration failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
            
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host "✅ APP SERVICE ENVIRONMENT CONFIGURED SUCCESSFULLY" -ForegroundColor Green
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host ""
            Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING ENVIRONMENT CONFIGURATION" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Host "Stack Trace:" -ForegroundColor Yellow
            Write-Host "$($_.ScriptStackTrace)" -ForegroundColor Gray
            Write-Host ""
            Write-Error "Environment configuration failed with exception: $($_.Exception.Message)"
            exit 1
          }
      
      - name: Upload Bootstrap Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bootstrap-log-staging
          path: Resources/Azure-Deployment/logs/bootstrap-*.log
          retention-days: 30

  bootstrap-prod:
    name: Bootstrap Production Environment
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.bootstrapInfra &&
      (inputs.environment == 'prod' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: prod
    env:
      CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
      OPENPAY_MERCHANT_ID: ${{ secrets[format('OPENPAY_{0}', 'MERCHANT_ID')] }}
      OPENPAY_PRIVATE_KEY: ${{ secrets[format('OPENPAY_{0}', 'PRIVATE_KEY')] }}
      OPENPAY_DEVICE_SESSION_ID: ${{ secrets[format('OPENPAY_{0}_{1}', 'DEVICE', 'SESSION_ID')] }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate OpenPay Secrets
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:OPENPAY_MERCHANT_ID))       { $missing += 'OPENPAY_MERCHANT_ID' }
          if ([string]::IsNullOrWhiteSpace($env:OPENPAY_PRIVATE_KEY))       { $missing += 'OPENPAY_PRIVATE_KEY' }
          if ([string]::IsNullOrWhiteSpace($env:OPENPAY_DEVICE_SESSION_ID)) { $missing += 'OPENPAY_DEVICE_SESSION_ID' }

          if ($missing.Count -gt 0) {
            $envUrl = 'https://github.com/${{ github.repository }}/settings/environments'
            Write-Host ''
            Write-Host '════════════════════════════════════════════════════' -ForegroundColor Red
            Write-Host '❌ DEPLOYMENT BLOCKED — MISSING ENVIRONMENT OPENPAY SECRETS' -ForegroundColor Red
            Write-Host '════════════════════════════════════════════════════' -ForegroundColor Red
            Write-Host ''
            Write-Host 'Target GitHub environment: prod' -ForegroundColor Yellow
            Write-Host 'The following environment secrets are missing:' -ForegroundColor Yellow
            $missing | ForEach-Object { Write-Host "   • $_" -ForegroundColor Red }
            Write-Host ''
            Write-Host 'How to fix:' -ForegroundColor Cyan
            Write-Host "  1. Go to: $envUrl" -ForegroundColor White
            Write-Host '  2. Open the prod environment' -ForegroundColor White
            Write-Host '  3. Add each missing secret under Environment secrets' -ForegroundColor White
            Write-Host '  4. Re-run this workflow' -ForegroundColor White
            Write-Host ''

            '## ❌ Deployment Blocked — Missing OpenPay Environment Secrets' >> $env:GITHUB_STEP_SUMMARY
            '' >> $env:GITHUB_STEP_SUMMARY
            '**GitHub environment**: `prod`' >> $env:GITHUB_STEP_SUMMARY
            '' >> $env:GITHUB_STEP_SUMMARY
            'The following environment secrets must be added before bootstrap can run:' >> $env:GITHUB_STEP_SUMMARY
            '' >> $env:GITHUB_STEP_SUMMARY
            foreach ($s in $missing) { "- ``$s``" >> $env:GITHUB_STEP_SUMMARY }
            '' >> $env:GITHUB_STEP_SUMMARY
            "**How to fix:** Go to [Settings → Environments]($envUrl), open the `prod` environment, and add each missing secret under Environment secrets." >> $env:GITHUB_STEP_SUMMARY

            exit 1
          }

          Write-Host '✅ All OpenPay environment secrets are present for prod — bootstrap may proceed.' -ForegroundColor Green
      
      - name: Generate GitHub App Token
        id: app-token
        if: ${{ env.APP_ID != '' }}
        continue-on-error: true
        env:
          APP_ID: ${{ secrets.APP_ID }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Validate Azure Credentials
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VALIDATE AZURE CREDENTIALS - PRODUCTION              ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "🔍 Checking Azure credentials..." -ForegroundColor Cyan
            
            $hasClientId = -not [string]::IsNullOrWhiteSpace($env:CLIENT_ID)
            $hasTenantId = -not [string]::IsNullOrWhiteSpace($env:TENANT_ID)
            $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($env:SUBSCRIPTION_ID)
            
            Write-Host "  CLIENT_ID:         $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
            Write-Host "  TENANT_ID:         $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
            Write-Host "  SUBSCRIPTION_ID:   $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
            Write-Host ""
            
            if (-not $hasClientId -or -not $hasTenantId -or -not $hasSubscriptionId) {
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ DEPLOYMENT BLOCKED — OIDC NOT CONFIGURED FOR 'prod'" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "The 'Azure Initial Setup' workflow must be completed first." -ForegroundColor Red
              Write-Host "It creates Azure AD OIDC credentials and GitHub environment secrets." -ForegroundColor Red
              Write-Host ""
              Write-Host "TO FIX — Run the 'Azure Initial Setup' workflow (one-time):" -ForegroundColor Cyan
              Write-Host "  1. Go to Actions → 'Azure Initial Setup' → Run workflow" -ForegroundColor White
              Write-Host "  2. All defaults are correct (environment='all', OIDC + secrets enabled)" -ForegroundColor White
              Write-Host "  3. Click 'Run workflow' and wait for completion" -ForegroundColor White
              Write-Host ""
              Write-Host "After initial setup succeeds, re-run this workflow." -ForegroundColor Yellow
              Write-Host ""
              Write-Host "⚠️  No infrastructure or deployment will proceed until OIDC is configured." -ForegroundColor Red
              Write-Host "⚠️  API and UI deployments are also blocked when bootstrap fails." -ForegroundColor Red
              Write-Host ""
              if (-not $hasClientId) { Write-Host "  ❌ AZUREAPPSERVICE_CLIENTID       — Missing in 'prod' environment" -ForegroundColor Red }
              if (-not $hasTenantId) { Write-Host "  ❌ AZUREAPPSERVICE_TENANTID       — Missing in 'prod' environment" -ForegroundColor Red }
              if (-not $hasSubscriptionId) { Write-Host "  ❌ AZUREAPPSERVICE_SUBSCRIPTIONID — Missing in 'prod' environment" -ForegroundColor Red }
              Write-Host ""
              Write-Error "DEPLOYMENT BLOCKED: OIDC not configured for 'prod'. Run the 'Azure Initial Setup' workflow with environment='all' first."
              exit 1
            }
            
            Write-Host "✅ All Azure credentials validated successfully" -ForegroundColor Green
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING CREDENTIAL VALIDATION" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Error "Credential validation failed: $($_.Exception.Message)"
            exit 1
          }
      - name: Azure Login (OIDC or Secrets)
        id: azure-login
        timeout-minutes: 3
        uses: azure/login@v3
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}
      
      - name: Diagnose Azure Login Failure
        if: failure() && steps.azure-login.outcome == 'failure'
        run: |
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host "❌ AZURE LOGIN FAILED — DIAGNOSIS (prod)" -ForegroundColor Red
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host ""
          Write-Host "Error: AADSTS700016 / AADSTS700213" -ForegroundColor Red
          Write-Host "  The Client ID stored in AZUREAPPSERVICE_CLIENTID for the 'prod' environment" -ForegroundColor Red
          Write-Host "  does not match any App Registration in the Azure AD tenant." -ForegroundColor Red
          Write-Host "  This almost always means the Entra App was deleted and re-created," -ForegroundColor Red
          Write-Host "  leaving a stale Client ID in the GitHub environment secret." -ForegroundColor Red
          Write-Host ""
          Write-Host "  subject claim used: repo:${{ github.repository }}:environment:prod" -ForegroundColor Gray
          Write-Host ""
          Write-Host "  ── STEP-BY-STEP FIX ──────────────────────────────────────────" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "  STEP 1 — Delete the stale secrets from all environments:" -ForegroundColor White
          Write-Host "    Open: https://github.com/${{ github.repository }}/settings/environments" -ForegroundColor Cyan
          Write-Host "    (You will see: main / copilot / prod / staging / dev — each may show '3 secrets')" -ForegroundColor Gray
          Write-Host ""
          Write-Host "    For EACH of dev / staging / prod:" -ForegroundColor White
          Write-Host "      a. Click the environment name" -ForegroundColor Gray
          Write-Host "      b. Scroll to 'Environment secrets'" -ForegroundColor Gray
          Write-Host "      c. Click the trash icon next to each of these 3 secrets:" -ForegroundColor Gray
          Write-Host "           AZUREAPPSERVICE_CLIENTID       ← delete" -ForegroundColor DarkYellow
          Write-Host "           AZUREAPPSERVICE_TENANTID       ← delete" -ForegroundColor DarkYellow
          Write-Host "           AZUREAPPSERVICE_SUBSCRIPTIONID ← delete" -ForegroundColor DarkYellow
          Write-Host ""
          Write-Host "  STEP 2 — Re-run Azure Initial Setup:" -ForegroundColor White
          Write-Host "    Go to: Actions → 'Azure Initial Setup' → Run workflow" -ForegroundColor Gray
          Write-Host "    Use these inputs:" -ForegroundColor Gray
          Write-Host "      Phase 1a (Setup Azure OIDC)  = ✅ checked" -ForegroundColor Gray
          Write-Host "      Phase 1b (Configure Secrets) = ✅ checked" -ForegroundColor Gray
          Write-Host "      environment                  = all" -ForegroundColor Gray
          Write-Host "    Wait for all jobs to turn green." -ForegroundColor Gray
          Write-Host ""
          Write-Host "  STEP 3 — Re-run this Bootstrap workflow." -ForegroundColor White
          Write-Host ""
          Write-Host "  ──────────────────────────────────────────────────────────────" -ForegroundColor DarkGray
          Write-Host "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host ""
          "## ❌ Azure Login Failed — prod" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "**Error**: AADSTS700016 / AADSTS700213 — The Client ID in ``AZUREAPPSERVICE_CLIENTID`` does not match any Entra App." >> $env:GITHUB_STEP_SUMMARY
          "**Likely cause**: The Entra App was deleted and re-created, leaving a stale Client ID in the GitHub environment secret." >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "### 🛠️ Step-by-Step Fix" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "**Step 1 — Delete stale secrets from all environments:**" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "1. Open **[Settings → Environments](https://github.com/${{ github.repository }}/settings/environments)**" >> $env:GITHUB_STEP_SUMMARY
          "   *(you will see: main / copilot / prod / staging / dev — each showing '3 secrets')*" >> $env:GITHUB_STEP_SUMMARY
          "2. For **each** of ``dev`` / ``staging`` / ``prod`` → click → *Environment secrets* → delete:" >> $env:GITHUB_STEP_SUMMARY
          "   - ``AZUREAPPSERVICE_CLIENTID``" >> $env:GITHUB_STEP_SUMMARY
          "   - ``AZUREAPPSERVICE_TENANTID``" >> $env:GITHUB_STEP_SUMMARY
          "   - ``AZUREAPPSERVICE_SUBSCRIPTIONID``" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "**Step 2 — Re-run Azure Initial Setup:**" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "Go to **Actions → Azure Initial Setup → Run workflow** with:" >> $env:GITHUB_STEP_SUMMARY
          "- Phase 1a (Setup Azure OIDC) = ✅" >> $env:GITHUB_STEP_SUMMARY
          "- Phase 1b (Configure Secrets) = ✅" >> $env:GITHUB_STEP_SUMMARY
          "- environment = ``all``" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "**Step 3 — Re-run this Bootstrap workflow.**" >> $env:GITHUB_STEP_SUMMARY

      - name: Verify Azure Login
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VERIFY AZURE LOGIN - PRODUCTION                       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          try {
            Write-Host "🔍 Verifying Azure login..." -ForegroundColor Cyan
            $account = az account show | ConvertFrom-Json
            
            if ($LASTEXITCODE -ne 0 -or -not $account) {
              Write-Host "❌ Azure login verification failed" -ForegroundColor Red
