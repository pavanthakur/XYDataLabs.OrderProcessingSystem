            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Host "Stack Trace:" -ForegroundColor Yellow
            Write-Host "$($_.ScriptStackTrace)" -ForegroundColor Gray
            Write-Host ""
            Write-Error "Environment configuration failed with exception: $($_.Exception.Message)"
            exit 1
          }
      
      - name: Upload Bootstrap Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-log-staging
          path: Resources/Azure-Deployment/logs/bootstrap-*.log
          retention-days: 30

  bootstrap-prod:
    name: Bootstrap Production Environment
    if: |
      !cancelled() &&
      needs.validate-inputs.result == 'success' &&
      inputs.bootstrapInfra &&
      (inputs.environment == 'prod' || inputs.environment == 'all')
    needs: [validate-inputs]
    runs-on: windows-latest
    environment: prod
    env:
      CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
      TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
      SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate GitHub App Token
        id: app-token
        if: ${{ env.APP_ID != '' }}
        continue-on-error: true
        env:
          APP_ID: ${{ secrets.APP_ID }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Validate Azure Credentials
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VALIDATE AZURE CREDENTIALS - PRODUCTION              ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Timestamp (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "🔍 Checking Azure credentials..." -ForegroundColor Cyan
            
            $hasClientId = -not [string]::IsNullOrWhiteSpace($env:CLIENT_ID)
            $hasTenantId = -not [string]::IsNullOrWhiteSpace($env:TENANT_ID)
            $hasSubscriptionId = -not [string]::IsNullOrWhiteSpace($env:SUBSCRIPTION_ID)
            
            Write-Host "  CLIENT_ID:         $(if ($hasClientId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasClientId) { "Green" } else { "Red" })
            Write-Host "  TENANT_ID:         $(if ($hasTenantId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasTenantId) { "Green" } else { "Red" })
            Write-Host "  SUBSCRIPTION_ID:   $(if ($hasSubscriptionId) { '✅ Present' } else { '❌ Missing' })" -ForegroundColor $(if ($hasSubscriptionId) { "Green" } else { "Red" })
            Write-Host ""
            
            if (-not $hasClientId -or -not $hasTenantId -or -not $hasSubscriptionId) {
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ DEPLOYMENT BLOCKED — OIDC NOT CONFIGURED FOR 'prod'" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "The 'Azure Initial Setup' workflow must be completed first." -ForegroundColor Red
              Write-Host "It creates Azure AD OIDC credentials and GitHub environment secrets." -ForegroundColor Red
              Write-Host ""
              Write-Host "TO FIX — Run the 'Azure Initial Setup' workflow (one-time):" -ForegroundColor Cyan
              Write-Host "  1. Go to Actions → 'Azure Initial Setup' → Run workflow" -ForegroundColor White
              Write-Host "  2. All defaults are correct (environment='all', OIDC + secrets enabled)" -ForegroundColor White
              Write-Host "  3. Click 'Run workflow' and wait for completion" -ForegroundColor White
              Write-Host ""
              Write-Host "After initial setup succeeds, re-run this workflow." -ForegroundColor Yellow
              Write-Host ""
              Write-Host "⚠️  No infrastructure or deployment will proceed until OIDC is configured." -ForegroundColor Red
              Write-Host "⚠️  API and UI deployments are also blocked when bootstrap fails." -ForegroundColor Red
              Write-Host ""
              if (-not $hasClientId) { Write-Host "  ❌ AZUREAPPSERVICE_CLIENTID       — Missing in 'prod' environment" -ForegroundColor Red }
              if (-not $hasTenantId) { Write-Host "  ❌ AZUREAPPSERVICE_TENANTID       — Missing in 'prod' environment" -ForegroundColor Red }
              if (-not $hasSubscriptionId) { Write-Host "  ❌ AZUREAPPSERVICE_SUBSCRIPTIONID — Missing in 'prod' environment" -ForegroundColor Red }
              Write-Host ""
              Write-Error "DEPLOYMENT BLOCKED: OIDC not configured for 'prod'. Run the 'Azure Initial Setup' workflow with environment='all' first."
              exit 1
            }
            
            Write-Host "✅ All Azure credentials validated successfully" -ForegroundColor Green
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING CREDENTIAL VALIDATION" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Error "Credential validation failed: $($_.Exception.Message)"
            exit 1
          }
      - name: Azure Login (OIDC or Secrets)
        id: azure-login
        timeout-minutes: 3
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}
      
      - name: Diagnose Azure Login Failure
        if: failure() && steps.azure-login.outcome == 'failure'
        run: |
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host "❌ AZURE LOGIN FAILED — DIAGNOSIS" -ForegroundColor Red
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
          Write-Host ""
          Write-Host "GitHub OIDC secrets are present for 'prod' but Azure login failed." -ForegroundColor Yellow
          Write-Host ""
          Write-Host "Most likely cause: AADSTS700213" -ForegroundColor Red
          Write-Host "  The Azure AD App Registration is missing the federated identity" -ForegroundColor Red
          Write-Host "  credential for subject 'repo:${{ github.repository }}:environment:prod'." -ForegroundColor Red
          Write-Host ""
          Write-Host "This happens when the 'Azure Initial Setup' workflow was never run for this" -ForegroundColor Yellow
          Write-Host "environment, or was only run with environment='dev' (not 'all')." -ForegroundColor Yellow
          Write-Host ""
          Write-Host "TO FIX — Run the 'Azure Initial Setup' workflow:" -ForegroundColor Cyan
          Write-Host "  1. Go to Actions → 'Azure Initial Setup' → Run workflow" -ForegroundColor White
          Write-Host "  2. All defaults are correct (environment='all', OIDC + secrets enabled)" -ForegroundColor White
          Write-Host "  3. Click 'Run workflow' and wait for completion" -ForegroundColor White
          Write-Host ""
          Write-Host "After initial setup succeeds, re-run this workflow." -ForegroundColor Yellow
          Write-Host ""
      
      - name: Verify Azure Login
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         VERIFY AZURE LOGIN - PRODUCTION                       ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          try {
            Write-Host "🔍 Verifying Azure login..." -ForegroundColor Cyan
            $account = az account show | ConvertFrom-Json
            
            if ($LASTEXITCODE -ne 0 -or -not $account) {
              Write-Host "❌ Azure login verification failed" -ForegroundColor Red
              Write-Error "Failed to verify Azure login"
              exit 1
            }
            
            Write-Host "✅ Azure login verified successfully" -ForegroundColor Green
            Write-Host ""
            Write-Host "Account Details:" -ForegroundColor Yellow
            Write-Host "  Subscription: $($account.name)" -ForegroundColor Gray
            Write-Host "  Subscription ID: $($account.id)" -ForegroundColor Gray
            Write-Host "  Tenant ID: $($account.tenantId)" -ForegroundColor Gray
            Write-Host ""
          }
          catch {
            Write-Host "❌ Exception during Azure login verification: $($_.Exception.Message)" -ForegroundColor Red
            Write-Error "Failed to verify Azure login: $($_.Exception.Message)"
            exit 1
          }
      

      - name: Bootstrap Prod Infrastructure
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         BOOTSTRAP PRODUCTION INFRASTRUCTURE                   ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "🚀 Bootstrapping Prod Environment..." -ForegroundColor Cyan
            Write-Host "" -ForegroundColor Gray
            Write-Host "📋 Configuration:" -ForegroundColor Yellow
            Write-Host "  Branch: main" -ForegroundColor Gray
            Write-Host "  Environment: prod" -ForegroundColor Gray
            Write-Host "  Parameter File: infra/parameters/prod.json" -ForegroundColor Gray
            Write-Host "  Resource Group: rg-orderprocessing-prod" -ForegroundColor Gray
            Write-Host "  OIDC Subject: repo:${{ github.repository }}:ref:refs/heads/main" -ForegroundColor Gray
            Write-Host "" -ForegroundColor Gray
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
            Write-Host ""

            ./Resources/Azure-Deployment/bootstrap-enterprise-infra.ps1 -Environment prod
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ BOOTSTRAP SCRIPT FAILED" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "Exit Code: $LASTEXITCODE" -ForegroundColor Red
              Write-Host "Script: ./Resources/Azure-Deployment/bootstrap-enterprise-infra.ps1" -ForegroundColor Gray
              Write-Host "Environment: prod" -ForegroundColor Gray
              Write-Host ""
              Write-Host "Check the bootstrap log artifact for detailed error information." -ForegroundColor Yellow
              Write-Host ""
              Write-Error "Bootstrap failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
            
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host "✅ PRODUCTION INFRASTRUCTURE BOOTSTRAP COMPLETE" -ForegroundColor Green
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host ""
            Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING BOOTSTRAP" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Host "Stack Trace:" -ForegroundColor Yellow
            Write-Host "$($_.ScriptStackTrace)" -ForegroundColor Gray
            Write-Host ""
            Write-Error "Bootstrap failed with exception: $($_.Exception.Message)"
            exit 1
          }
      
      - name: Provision SQL Database and Configure Connection Strings
        if: success()
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      PROVISION SQL & CONFIGURE CONNECTION STRINGS FOR PROD    ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "🗄️  Provisioning SQL Database and configuring connection strings for production environment..." -ForegroundColor Cyan
            Write-Host ""
            Write-Host "📋 Configuration:" -ForegroundColor Yellow
            Write-Host "  Environment: prod" -ForegroundColor Gray
            Write-Host "  Resource Group: rg-orderprocessing-prod" -ForegroundColor Gray
            Write-Host "  SQL Server: orderprocessing-sql-prod" -ForegroundColor Gray
            Write-Host "  Database: OrderProcessingSystem_Prod" -ForegroundColor Gray
            Write-Host "  API App: ${{ github.repository_owner }}-orderprocessing-api-xyapp-prod" -ForegroundColor Gray
            Write-Host "  UI App: ${{ github.repository_owner }}-orderprocessing-ui-xyapp-prod" -ForegroundColor Gray
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Gray
            Write-Host ""
            
            # The provision script is idempotent - it creates SQL Server/Database if they don't exist
            # and configures connection strings on the App Services
            # Note: Script includes 5-minute wait for firewall rule propagation when creating new IP rules
            ./Resources/Azure-Deployment/provision-azure-sql.ps1 -Environment prod -BaseName orderprocessing -Location centralindia -GitHubOwner '${{ github.repository_owner }}'
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host ""
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host "❌ CONNECTION STRING CONFIGURATION FAILED" -ForegroundColor Red
              Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
              Write-Host ""
              Write-Host "Exit Code: $LASTEXITCODE" -ForegroundColor Red
              Write-Host "Script: ./Resources/Azure-Deployment/provision-azure-sql.ps1" -ForegroundColor Gray
              Write-Host ""
              Write-Host "⚠️  CRITICAL: Connection strings are required for the application to function" -ForegroundColor Yellow
              Write-Host ""
              Write-Error "Connection string configuration failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
            
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host "✅ SQL CONNECTION STRINGS CONFIGURED SUCCESSFULLY" -ForegroundColor Green
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Green
            Write-Host ""
            Write-Host "End Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
            Write-Host ""
          }
          catch {
            Write-Host ""
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host "❌ EXCEPTION DURING CONNECTION STRING CONFIGURATION" -ForegroundColor Red
            Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Red
            Write-Host ""
            Write-Host "Exception Message: $($_.Exception.Message)" -ForegroundColor Red
            Write-Host ""
            Write-Host "Stack Trace:" -ForegroundColor Yellow
            Write-Host "$($_.ScriptStackTrace)" -ForegroundColor Gray
            Write-Host ""
            Write-Error "Connection string configuration failed with exception: $($_.Exception.Message)"
            exit 1
          }
      
      # Refresh Azure authentication token before Key Vault operations
      # Token from initial login may have expired after long-running SQL provisioning steps
      - name: Clear Azure CLI Token Cache
        run: |
          Write-Host "🔄 Clearing Azure CLI token cache to force fresh authentication..." -ForegroundColor Cyan
          try {
            # Clear Azure account to force re-authentication
            az account clear 2>&1 | Out-Null
            Write-Host "  ✓ Azure account cleared" -ForegroundColor Gray
            
            # Purge Azure CLI cache
            az cache purge 2>&1 | Out-Null
            Write-Host "  ✓ Azure CLI cache purged" -ForegroundColor Gray
            
            Write-Host "✅ Token cache cleared successfully" -ForegroundColor Green
          }
          catch {
            # Cache clearing failure is not critical - log and continue
            Write-Host "  ⚠️  Cache clearing encountered an issue (non-critical): $($_.Exception.Message)" -ForegroundColor Yellow
            Write-Host "  Proceeding with Azure login refresh..." -ForegroundColor Gray
          }
      
      - name: Refresh Azure Login for Key Vault Operations
        timeout-minutes: 3
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}
      
      - name: Populate Key Vault Secrets
        if: success()
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      POPULATE KEY VAULT SECRETS FOR PRODUCTION                ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Start Time (UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host ""
          
          try {
            Write-Host "🔑 Populating Key Vault with application secrets..." -ForegroundColor Cyan
            Write-Host ""
            
            # Populate secrets - script will auto-retrieve App Insights connection string
            ./Resources/Azure-Deployment/populate-keyvault-secrets.ps1 -Environment prod -BaseName orderprocessing -OpenPayApiKey "${{ secrets.OPENPAY_API_KEY }}"
            
            if ($LASTEXITCODE -ne 0) {
