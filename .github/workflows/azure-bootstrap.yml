              Write-Host "        4. Generate a private key (saves a .pem file)" -ForegroundColor White
              Write-Host "        5. Note the App ID from the General settings page" -ForegroundColor White
              Write-Host "        6. Install app on: ${{ github.repository }}" -ForegroundColor White
              Write-Host "           Link: https://github.com/settings/installations" -ForegroundColor Gray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 2 вҖ” Add Repository Secrets at:" -ForegroundColor Cyan
              Write-Host "      вһЎпёҸ  $secretsUrl" -ForegroundColor Yellow
              Write-Host "" -ForegroundColor Gray
              Write-Host "      Click 'New repository secret' and add:" -ForegroundColor White
              Write-Host "      в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ" -ForegroundColor DarkGray
              Write-Host "      в”Ӯ APP_ID          в”Ӯ Numeric App ID from app's General settings   в”Ӯ" -ForegroundColor White
              Write-Host "      в”Ӯ                 в”Ӯ page: https://github.com/settings/apps/$appSlug в”Ӯ" -ForegroundColor Gray
              Write-Host "      в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө" -ForegroundColor DarkGray
              Write-Host "      в”Ӯ APP_PRIVATE_KEY в”Ӯ Full contents of the downloaded .pem file    в”Ӯ" -ForegroundColor White
              Write-Host "      в”Ӯ                 в”Ӯ (include -----BEGIN RSA PRIVATE KEY----- )   в”Ӯ" -ForegroundColor Gray
              Write-Host "      в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ" -ForegroundColor DarkGray
              Write-Host "" -ForegroundColor Gray
              Write-Host "    STEP 3 вҖ” Re-run this workflow with:" -ForegroundColor Cyan
