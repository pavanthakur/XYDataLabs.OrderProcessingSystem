            }
            Write-Output "::add-mask::$sqlAdminPassword"
            $sqlAdminPasswordSecure = ConvertTo-SecureString $sqlAdminPassword -AsPlainText -Force
            $sqlAdminPassword = $null
            
            # The provision script is idempotent - it creates SQL Server/Database if they don't exist
            # and configures connection strings on the App Services
            # Note: Script probes SQL connectivity after creating firewall rules (exits early on success, max 5 min)
