name: Azure Bootstrap Setup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'рҹҺҜ Environment | IMPORTANT: Set "Use workflow from" branch to match (devвҶ’dev, stagingвҶ’staging, mainвҶ’prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
          - all
      setupOidc:
        description: 'рҹ”‘ Phase 1 (one-time) вҖ” Setup Azure OIDC | Creates Microsoft Entra ID App Registration + passwordless auth'
        required: true
        type: boolean
        default: true
      oidcAppName:
        description: 'OIDC App Name | Default: GitHub-Actions-OIDC (only change if using custom name)'
        required: false
        type: string
        default: 'GitHub-Actions-OIDC'
      setupGitHubApp:
        description: 'в„№пёҸ Phase 0 helper вҖ” GitHub App Instructions | Shows setup steps if APP_ID + APP_PRIVATE_KEY secrets are missing'
        required: true
        type: boolean
        default: false
      githubAppName:
        description: 'GitHub App Name | Your app name (e.g. XYDataLabsGitHubApp) вҖ” used for validation and instructions'
        required: false
        type: string
        default: 'XYDataLabsGitHubApp'
      configureSecrets:
        description: 'рҹ”‘ Phase 1 (one-time) вҖ” Configure GitHub Secrets | Sets CLIENTID, TENANTID, SUBSCRIPTIONID (needs APP_ID + APP_PRIVATE_KEY)'
        required: true
        type: boolean
        default: true
      enableValidation:
        description: 'рҹ”Қ Pre-Flight Validation [Optional] | Checks branch/env alignment and prerequisites'
        required: true
        type: boolean
        default: false
      bootstrapInfra:
        description: 'рҹ”„ Phase 2 (day-to-day) вҖ” Bootstrap Infrastructure | Creates Resource Group, App Services, SQL, Key Vault'
        required: true
        type: boolean
        default: true
      deployApi:
        description: 'рҹ”„ Phase 2 (day-to-day) вҖ” Deploy API [Optional] | Deploys API code after infrastructure is ready'
        required: true
        type: boolean
        default: false
      deployUi:
        description: 'рҹ”„ Phase 2 (day-to-day) вҖ” Deploy UI [Optional] | Deploys UI code after infrastructure is ready'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  check-trigger:
    name: Check Workflow Trigger
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Workflow trigger check
        run: |
          Write-Host "в„№пёҸ  This workflow is designed for manual dispatch only" -ForegroundColor Cyan
          Write-Host "   Skipping execution for event: ${{ github.event_name }}" -ForegroundColor Yellow
          Write-Host "   To run this workflow, use: Actions > Azure Bootstrap Setup > Run workflow" -ForegroundColor Gray

  validate-inputs:
    name: Validate Workflow Inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Log Workflow Start
        run: |
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "  AZURE BOOTSTRAP WORKFLOW STARTED" -ForegroundColor Cyan
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray
          Write-Host "вҸ° Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" -ForegroundColor Gray
          Write-Host "рҹ‘Ө Triggered by: ${{ github.actor }}" -ForegroundColor Gray
          Write-Host "рҹҢҝ Branch: ${{ github.ref_name }}" -ForegroundColor Gray
          Write-Host "рҹ“Ұ Repository: ${{ github.repository }}" -ForegroundColor Gray
          Write-Host "рҹ”— Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" -ForegroundColor Gray
          Write-Host "" -ForegroundColor Gray
          Write-Host "рҹ“Ӣ USER SELECTED PARAMETERS:" -ForegroundColor Yellow
          Write-Host "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "  Parameter              Value    Checkbox" -ForegroundColor DarkGray
          Write-Host "  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" -ForegroundColor DarkGray
          Write-Host "  environment          = ${{ inputs.environment }}" -ForegroundColor White
          Write-Host "" -ForegroundColor Gray
          Write-Host "  AZURE SETUP:" -ForegroundColor Cyan
          Write-Host "  setupOidc            = ${{ inputs.setupOidc }}  $(if ('${{ inputs.setupOidc }}' -eq 'true') { '[вң… checked]   вҖ” Phase 1: Setup Azure OIDC' } else { '[вҳҗ  unchecked] вҖ” Phase 1: Setup Azure OIDC' })" -ForegroundColor $(if ('${{ inputs.setupOidc }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  oidcAppName          = ${{ inputs.oidcAppName }}" -ForegroundColor DarkGray
          Write-Host "  setupGitHubApp       = ${{ inputs.setupGitHubApp }}  $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { '[вң… checked]   вҖ” Phase 0: Setup GitHub App' } else { '[вҳҗ  unchecked] вҖ” Phase 0: Setup GitHub App' })" -ForegroundColor $(if ('${{ inputs.setupGitHubApp }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  githubAppName        = ${{ inputs.githubAppName }}" -ForegroundColor DarkGray
          Write-Host "  configureSecrets     = ${{ inputs.configureSecrets }}  $(if ('${{ inputs.configureSecrets }}' -eq 'true') { '[вң… checked]   вҖ” Phase 1: Configure Secrets' } else { '[вҳҗ  unchecked] вҖ” Phase 1: Configure Secrets' })" -ForegroundColor $(if ('${{ inputs.configureSecrets }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray
          Write-Host "  INFRASTRUCTURE:" -ForegroundColor Cyan
          Write-Host "  enableValidation     = ${{ inputs.enableValidation }}  $(if ('${{ inputs.enableValidation }}' -eq 'true') { '[вң… checked]   вҖ” Pre-Flight Validation' } else { '[вҳҗ  unchecked] вҖ” Pre-Flight Validation' })" -ForegroundColor $(if ('${{ inputs.enableValidation }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  bootstrapInfra       = ${{ inputs.bootstrapInfra }}  $(if ('${{ inputs.bootstrapInfra }}' -eq 'true') { '[вң… checked]   вҖ” Phase 2: Bootstrap Infrastructure' } else { '[вҳҗ  unchecked] вҖ” Phase 2: Bootstrap Infrastructure' })" -ForegroundColor $(if ('${{ inputs.bootstrapInfra }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "" -ForegroundColor Gray
          Write-Host "  DEPLOYMENT:" -ForegroundColor Cyan
          Write-Host "  deployApi            = ${{ inputs.deployApi }}  $(if ('${{ inputs.deployApi }}' -eq 'true') { '[вң… checked]   вҖ” Phase 2: Deploy API' } else { '[вҳҗ  unchecked] вҖ” Phase 2: Deploy API' })" -ForegroundColor $(if ('${{ inputs.deployApi }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  deployUi             = ${{ inputs.deployUi }}  $(if ('${{ inputs.deployUi }}' -eq 'true') { '[вң… checked]   вҖ” Phase 2: Deploy UI' } else { '[вҳҗ  unchecked] вҖ” Phase 2: Deploy UI' })" -ForegroundColor $(if ('${{ inputs.deployUi }}' -eq 'true') { 'Green' } else { 'DarkGray' })
          Write-Host "  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" -ForegroundColor DarkGray
          Write-Host "" -ForegroundColor Gray
          Write-Host "========================================================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor Gray

      - name: Validate Configuration
        run: |
          Write-Host "рҹ”Қ Validating workflow inputs..." -ForegroundColor Cyan
          Write-Host ("=" * 70) -ForegroundColor Gray

          $env = "${{ inputs.environment }}"
          $setupOidc = "${{ inputs.setupOidc }}"
          $setupGitHubApp = "${{ inputs.setupGitHubApp }}"
          $enableValidation = "${{ inputs.enableValidation }}"
          $bootstrap = "${{ inputs.bootstrapInfra }}"
          $configSecrets = "${{ inputs.configureSecrets }}"

          Write-Host "`nрҹ“Ӣ Workflow Inputs:" -ForegroundColor Cyan
          Write-Host "  Environment: $env" -ForegroundColor Yellow
          Write-Host "  Setup OIDC: $setupOidc" -ForegroundColor Yellow
          Write-Host "  Setup GitHub App: $setupGitHubApp" -ForegroundColor Yellow
          Write-Host "  Enable validation: $enableValidation" -ForegroundColor Yellow
          Write-Host "  Bootstrap infra: $bootstrap" -ForegroundColor Yellow
          Write-Host "  Configure secrets: $configSecrets" -ForegroundColor Yellow

          # Display branch-to-environment mapping
          Write-Host "`nрҹ—әпёҸ  Branch вҶ’ Environment Mapping:" -ForegroundColor Cyan
          Write-Host "  dev branch      вҶ’ dev environment (dev.json)" -ForegroundColor Gray
          Write-Host "  staging branch  вҶ’ staging environment (staging.json)" -ForegroundColor Gray
          Write-Host "  main branch     вҶ’ prod environment (prod.json)" -ForegroundColor Gray

          # Show what will be created based on selection
          Write-Host "`nрҹ“Ұ Resources to be created:" -ForegroundColor Cyan
          if ($env -eq "all") {
            Write-Host "  OIDC Credentials:" -ForegroundColor Yellow
            Write-Host "    - dev branch (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:ref:refs/heads/dev)" -ForegroundColor Gray
            Write-Host "    - staging branch (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:ref:refs/heads/staging)" -ForegroundColor Gray
            Write-Host "    - main branch (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:ref:refs/heads/main)" -ForegroundColor Gray
            Write-Host "    - dev environment (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:environment:dev)" -ForegroundColor Gray
            Write-Host "    - staging environment (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:environment:staging)" -ForegroundColor Gray
            Write-Host "    - prod environment (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:environment:prod)" -ForegroundColor Gray
            Write-Host "  GitHub Secrets: dev, staging, prod" -ForegroundColor Yellow
            Write-Host "  Bootstrap: dev, staging, prod resource groups" -ForegroundColor Yellow
          } elseif ($env -eq "prod") {
            # Production environment uses main branch
            Write-Host "  OIDC Credentials:" -ForegroundColor Yellow
            Write-Host "    - main branch (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:ref:refs/heads/main)" -ForegroundColor Gray
            Write-Host "    - prod environment (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:environment:prod)" -ForegroundColor Gray
            Write-Host "  GitHub Secrets: prod" -ForegroundColor Yellow
            Write-Host "  Bootstrap: prod resource group" -ForegroundColor Yellow
          } else {
            Write-Host "  OIDC Credentials:" -ForegroundColor Yellow
            Write-Host "    - $env branch (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:ref:refs/heads/$env)" -ForegroundColor Gray
            Write-Host "    - $env environment (repo:pavanthakur/XYDataLabs.OrderProcessingSystem:environment:$env)" -ForegroundColor Gray
            Write-Host "  GitHub Secrets: $env" -ForegroundColor Yellow
            Write-Host "  Bootstrap: $env resource group" -ForegroundColor Yellow
          }

          Write-Host "`nвҡ пёҸ  Validation Checks:" -ForegroundColor Cyan

          # Validate environment selection
          if ($env -notin @('dev', 'staging', 'prod', 'all')) {
            Write-Host "  вқҢ Invalid environment: $env" -ForegroundColor Red
            Write-Error "Invalid environment: $env. Must be dev, staging, prod, or all."
            exit 1
          }
          Write-Host "  вң… Environment selection valid" -ForegroundColor Green

          # Validate branch matches target environment
          $currentBranch = "${{ github.ref_name }}"
          $expectedBranch = if ($env -eq "prod") { "main" } elseif ($env -eq "all") { "any" } else { $env }
          
          Write-Host "`n  Branch/Environment Match Check:" -ForegroundColor Cyan
          Write-Host "    Current branch: $currentBranch" -ForegroundColor Gray
          Write-Host "    Target environment: $env" -ForegroundColor Gray
          Write-Host "    Expected branch: $expectedBranch" -ForegroundColor Gray
          
          if ($env -ne "all" -and $currentBranch -ne $expectedBranch) {
            Write-Host "`n  вқҢ BRANCH MISMATCH ERROR" -ForegroundColor Red
            Write-Host "     You are running from branch '$currentBranch' but targeting environment '$env'" -ForegroundColor Red
            Write-Host "     Expected branch: '$expectedBranch'" -ForegroundColor Yellow
            Write-Host "" -ForegroundColor Gray
            Write-Host "  рҹ“Ӣ Correct Branch вҶ’ Environment Mapping:" -ForegroundColor Yellow
            Write-Host "     dev branch      вҶ’ dev environment" -ForegroundColor White
            Write-Host "     staging branch  вҶ’ staging environment" -ForegroundColor White
            Write-Host "     main branch     вҶ’ prod environment" -ForegroundColor White
            Write-Host "" -ForegroundColor Gray
            Write-Host "  рҹ’Ў Solution: Change 'Use workflow from' to branch '$expectedBranch'" -ForegroundColor Yellow
            Write-Error "Branch/environment mismatch. Cannot proceed."
            exit 1
          }
          Write-Host "  вң… Branch matches target environment" -ForegroundColor Green

          # Check if repository secrets exist when setup is skipped
          Write-Host "`n  рҹ”җ Repository Secrets Check:" -ForegroundColor Cyan

          # Detect Phase 0-only run: setupGitHubApp=true with no OIDC/bootstrap/configSecrets
          $isPhase0Only = ($setupGitHubApp -eq "true") -and ($configSecrets -eq "false") -and ($bootstrap -eq "false") -and ($setupOidc -eq "false")

          if ($isPhase0Only) {
            Write-Host "    в„№пёҸ  Phase 0 run detected вҖ” OIDC secrets check skipped" -ForegroundColor Cyan
            Write-Host "    вң… OIDC secrets are not required yet (Phase 1 task)" -ForegroundColor Green
            Write-Host "    рҹ’Ў Next step: After completing GitHub App setup, run Phase 1:" -ForegroundColor Yellow
            Write-Host "       вң… Setup Azure OIDC" -ForegroundColor White
            Write-Host "       вң… Configure Secrets" -ForegroundColor White
          } elseif ($setupOidc -eq "false") {
            Write-Host "    Setup OIDC: Unchecked (skipped)" -ForegroundColor Yellow
            Write-Host "    Checking if OIDC secrets already exist in repository..." -ForegroundColor Gray
            
            # Use GitHub CLI to check if secrets exist (requires secrets:read permission on GITHUB_TOKEN)
            try {
              $secretsCheck = gh secret list --repo ${{ github.repository }} 2>&1 | Out-String
              $checkExitCode = $LASTEXITCODE
              
              if ($checkExitCode -ne 0) {
                Write-Host "    вҡ пёҸ  Could not list repository secrets (exit code: $checkExitCode)" -ForegroundColor Yellow
                Write-Host "    Proceeding with caution вҖ” verify OIDC secrets manually if needed" -ForegroundColor Gray
              } else {
                $hasClientId = $secretsCheck -match "AZUREAPPSERVICE_CLIENTID"
                $hasTenantId = $secretsCheck -match "AZUREAPPSERVICE_TENANTID"
                $hasSubscriptionId = $secretsCheck -match "AZUREAPPSERVICE_SUBSCRIPTIONID"
                
                if ($hasClientId -and $hasTenantId -and $hasSubscriptionId) {
                  Write-Host "    вң… OIDC repository secrets exist" -ForegroundColor Green
                } else {
                  Write-Host "    вқҢ OIDC repository secrets are MISSING!" -ForegroundColor Red
                  Write-Host "" -ForegroundColor Gray
                  Write-Host "    Required secrets not found:" -ForegroundColor Yellow
                  if (-not $hasClientId) { Write-Host "      - AZUREAPPSERVICE_CLIENTID" -ForegroundColor Red }
                  if (-not $hasTenantId) { Write-Host "      - AZUREAPPSERVICE_TENANTID" -ForegroundColor Red }
                  if (-not $hasSubscriptionId) { Write-Host "      - AZUREAPPSERVICE_SUBSCRIPTIONID" -ForegroundColor Red }
                  Write-Host "" -ForegroundColor Gray
                  Write-Host "    в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" -ForegroundColor Red
                  Write-Host "    рҹ’Ў SOLUTION: Re-run this workflow with these checkboxes SELECTED:" -ForegroundColor Yellow
                  Write-Host "       вң… Setup Azure OIDC (REQUIRED)" -ForegroundColor White
                  if ($bootstrap -eq "true") {
                    Write-Host "       вң… Bootstrap infrastructure" -ForegroundColor White
                  }
                  Write-Host "    в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" -ForegroundColor Red
                  Write-Host "" -ForegroundColor Gray
                  Write-Host "    вҡ пёҸ  Deployment workflows will fail without these secrets." -ForegroundColor Yellow
                  
                  if ($bootstrap -eq "true") {
                    Write-Host "" -ForegroundColor Gray
                    Write-Host "    вқҢ ERROR: Cannot bootstrap infrastructure without OIDC credentials!" -ForegroundColor Red
                    Write-Error "OIDC secrets not found. You must check 'Setup Azure OIDC' checkbox to create them."
                    exit 1
                  }
                }
              }
            } catch {
              Write-Host "    вҡ пёҸ  Could not check repository secrets: $($_.Exception.Message)" -ForegroundColor Yellow
              Write-Host "    Proceeding with caution..." -ForegroundColor Gray
            }
          } else {
            Write-Host "    вң… Setup Azure OIDC: Checked - secrets will be created" -ForegroundColor Green
          }

          # Check GitHub App secrets when configureSecrets is requested (Phase 1 mandatory gate)
          if ($configSecrets -eq "true") {
            $appName     = "${{ inputs.githubAppName }}"
            $appSlug     = $appName.ToLower() -replace '[^a-z0-9]', '-'
            $secretsUrl  = "https://github.com/${{ github.repository }}/settings/secrets/actions"

            Write-Host "`n  рҹӨ– GitHub App Check (MANDATORY for Phase 1 вҖ” 'Configure Secrets'):" -ForegroundColor Cyan
            Write-Host "  в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" -ForegroundColor DarkGray

            # Use the secrets injected by GitHub Actions (most reliable method in workflow context)
            $hasAppId      = "${{ secrets.APP_ID }}" -ne ""
            $hasPrivateKey = "${{ secrets.APP_PRIVATE_KEY }}" -ne ""

            Write-Host "    APP_ID        : $(if ($hasAppId) { 'вң… Present' } else { 'вқҢ Missing' })" -ForegroundColor $(if ($hasAppId) { "Green" } else { "Red" })
            Write-Host "    APP_PRIVATE_KEY: $(if ($hasPrivateKey) { 'вң… Present' } else { 'вқҢ Missing' })" -ForegroundColor $(if ($hasPrivateKey) { "Green" } else { "Red" })
            Write-Host ""

            if ($hasAppId -and $hasPrivateKey) {
              Write-Host "    вң… Phase 0 complete вҖ” GitHub App secrets are configured" -ForegroundColor Green
              Write-Host "       GitHub App Name (configured): $appName" -ForegroundColor Cyan
              Write-Host "    в„№пёҸ  APP_INSTALLATION_ID: auto-discovered at runtime" -ForegroundColor Cyan
              Write-Host ""
              Write-Host "    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ" -ForegroundColor Green
              Write-Host "    вң… PHASE 0 IS CONFIGURED CORRECTLY вҖ” OK TO PROCEED WITH PHASE 1" -ForegroundColor Green
              Write-Host "    в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ" -ForegroundColor Green
            } else {
              Write-Host "    вқҢ PHASE 0 INCOMPLETE вҖ” Phase 1 cannot proceed!" -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
              Write-Host "    Phase 1 ('Configure Secrets') requires a GitHub App to be created" -ForegroundColor Red
              Write-Host "    and its APP_ID + APP_PRIVATE_KEY secrets to be configured first." -ForegroundColor Red
              Write-Host "" -ForegroundColor Gray
